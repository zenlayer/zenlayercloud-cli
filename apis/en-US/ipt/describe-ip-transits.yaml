name: DescribeIPTransits
product: ipt
use: describe-ip-transits
short: Query IP Transit resource list
long: Queries IP Transit resource list.
sdk:
  service: ipt
  version: '2024-09-01'
  action: DescribeIPTransits
parameters:
- name: ipt-ids
  type: string-array
  required: false
  sdk-field: iptIds
  description: |-
    List of IP Transit IDs.
    Maximum: 100.
- name: ipt-name
  type: string
  required: false
  sdk-field: iptName
  description: |-
    IP Transit name.
    Fuzzy search is supported.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Resource group ID.
- name: peer-port-id
  type: string
  required: false
  sdk-field: peerPortId
  description: |-
    Port ID.
    Use this field to filter IP Transits associated with the specified port.
- name: ipt-dc-id
  type: string
  required: false
  sdk-field: iptDcId
  description: |-
    Data center ID.
    You can call DescribeDataCenters to get the latest data center list.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of results per page.
    Default: 20. Maximum: 1000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Page number of the returned pages.
    Default: 1.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Filter by tag keys.
    Maximum: 20 tags.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Filter by tags.
    Maximum: 20 tags.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      Tag key.
      Length limit: 1-128 characters.
  - name: value
    type: string
    description: |-
      Tag value.
      Length limit: 1-128 characters.
response:
- name: totalCount
  type: integer
  description: Total number of data meeting the conditions.
- name: dataSet
  type: object-array
  description: IP Transit result set.
  array-style: json
  item-schema:
  - name: iptId
    type: string
    description: IP Transit ID.
  - name: iptName
    type: string
    description: IP Transit name.
  - name: iptDescription
    type: string
    description: IP Transit description.
  - name: dataCenter
    type: object
    description: Data center of the IP Transit.
  - name: peerPortId
    type: string
    description: Connected port ID.
  - name: peerPortName
    type: string
    description: Connected port name.
  - name: peerDataCenter
    type: object
    description: Data center of the port side.
  - name: deliveryType
    type: enum
    description: Delivery type.
    enum-values:
    - value: Auto
      desc: Automated delivery (Usually completed within minutes).
    - value: Manual
      desc: Manual delivery. (Usually completed within 3 days).
  - name: resourceGroupId
    type: string
    description: Resource group ID of the IP Transit.
  - name: resourceGroupName
    type: string
    description: Resource group name of the IP Transit.
  - name: createTime
    type: string
    description: |-
      Creation time.
      Format: YYYY-MM-ddTHH:mm:ssZ.
  - name: routingType
    type: enum
    description: Routing type.
    enum-values:
    - value: BGP
      desc: BGP. (Currently not supported via API)
    - value: Static
      desc: Static routing.
    - value: Gateway
      desc: Gateway mode.
  - name: internetType
    type: enum
    description: Bandwidth billing method.
    enum-values:
    - value: ByBandwidth
      desc: Billed by fixed bandwidth.
    - value: ByInstanceBandwidth95
      desc: Billed by 95th percentile bandwidth.
  - name: bandwidth
    type: integer
    description: |-
      Bandwidth cap.
      Unit: Mbps.
  - name: commitBandwidth
    type: integer
    description: |-
      Committed bandwidth.
      Only available when bandwidth billing method is ByInstanceBandwidth95.
  - name: bfd
    type: object
    description: BFD configuration.
  - name: bgp
    type: object
    description: BGP configurations.
  - name: interconnect
    type: object
    description: Interconnect IP address information.
  - name: privateConnectId
    type: string
    description: Private connect ID associated with the IP Transit.
  - name: privateConnectName
    type: string
    description: Name of the private connect associated with the IP Transit.
  - name: publicIpv4Addresses
    type: object-array
    description: Public IP information.
  - name: iptStatus
    type: enum
    description: IP Transit state.
    enum-values:
    - value: CREATING
      desc: Creating.
    - value: UPDATING
      desc: Updating.
    - value: DELETING
      desc: Deleting.
    - value: DESTROYING
      desc: Releasing.
    - value: RECOVERING
      desc: Restoring.
    - value: RUNNING
      desc: Running.
    - value: RECYCLED
      desc: Recycled.
    - value: DESTROYED
      desc: Released.
    - value: CREATING_FAILED
      desc: Creating failed.
    - value: UPDATING_FAILED
      desc: Updating failed.
    - value: DELETING_FAILED
      desc: Deleting failed.
    - value: DESTROYING_FAILED
      desc: Releasing failed.
    - value: RECOVERING_FAILED
      desc: Restoring failed.
  - name: tags
    type: object
    description: Tags bound to the IP Transit.
