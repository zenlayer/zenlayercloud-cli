name: DescribePolicies
product: user
use: describe-policies
short: Query Access Policies
long: Query access policies.
examples:
- cmd: zeno user describe-policies
  desc: Query all permission policy list.
sdk:
  service: user
  version: '2024-05-29'
  action: DescribePolicies
response:
- name: policies
  type: object-array
  description: Access policy list data.
  array-style: json
  item-schema:
  - name: policyId
    type: string
    description: Access policy unique ID.
  - name: allResource
    type: integer
    description: 'Whether access policy is for all resource groups (1: Yes; 0: No).'
  - name: name
    type: string
    description: Access policy display name.
  - name: desc
    type: string
    description: Access policy description information.
  - name: authorizationTime
    type: integer
    description: Access policy authorization count.
