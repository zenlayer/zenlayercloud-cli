name: InviteMember
product: user
use: invite-member
short: Invite Members
long: Invite one member .
examples:
- cmd: zeno user invite-member --email Email --member-group-id memberGroupId --open-api false
  desc: Invite members.
sdk:
  service: user
  version: '2024-05-29'
  action: InviteMember
parameters:
- name: email
  type: string
  required: true
  sdk-field: email
  description: User email.
- name: member-group-id
  type: string
  required: false
  sdk-field: memberGroupId
  description: Member group unique ID.
- name: open-api
  type: boolean
  required: false
  sdk-field: openApi
  description: Whether to generate API access keys.
