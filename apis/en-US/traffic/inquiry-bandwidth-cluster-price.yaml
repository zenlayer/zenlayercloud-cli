name: InquiryBandwidthClusterPrice
product: traffic
use: inquiry-bandwidth-cluster-price
short: Queries the price of the bandwidth cluster
long: Query the price of the bandwidth cluster.
examples:
- cmd: zeno traffic inquiry-bandwidth-cluster-price --area-code SHA --charge-type POSTPAID --commit-bandwidth-mbps 100 --network-type BGP --internet-charge-type MonthlyPercent95Bandwidth
  desc: Query the price of the bandwidth cluster in Shanghai (SHA), with a bandwidth cluster of `100` Mbps, `BGP` network type and `Monthly Burstable 95th` billing method.
sdk:
  service: traffic
  version: '2024-03-26'
  action: InquiryBandwidthClusterPrice
parameters:
- name: area-code
  type: string
  required: true
  sdk-field: areaCode
  description: |-
    Location of bandwidth cluster.
    To obtain code, you can call DescribeBandwidthClusterAreas, and find areaCode in the response.
- name: commit-bandwidth-mbps
  type: integer
  required: false
  sdk-field: commitBandwidthMbps
  description: |-
    Bandwidth cluster.
    Unit: Mbps.
    Available range: [0, 100000].
    Default value: 0.
- name: international-commit-bandwidth-mbps
  type: integer
  required: false
  sdk-field: internationalCommitBandwidthMbps
  description: |-
    Bandwidth commitment for the international line.
    Unit: Mbps.
    Only applicable to PathBasedBandwidth bandwidth clusters.
- name: network-type
  type: enum
  required: false
  sdk-field: networkType
  description: IP network type.
  enum-values:
  - value: BGP
    desc: BGP network.
  - value: Cogent
    desc: Cogent network.
  - value: CN2
    desc: China Telecom Next Carrier Network.
  - value: PathBasedBandwidth
    desc: Multi-path bandwidth.
  - value: CMI
    desc: China Mobile network.
  - value: CUG
    desc: China Unicom network.
  - value: CTG
    desc: China Telecom network.
- name: internet-charge-type
  type: enum
  required: true
  sdk-field: internetChargeType
  description: |-
    Network billing method.
    The default billing method is Monthly Burstable 95th, if you need Daily Peak billing, please contact us.
    Default value: MonthlyPercent95Bandwidth.
  enum-values:
  - value: MonthlyPercent95Bandwidth
    desc: Monthly Burstable 95th billing method.
  - value: DayPeakBandwidth
    desc: Daily Peak billing method.
- name: product
  type: enum
  required: false
  sdk-field: product
  description: Service type covered by the bandwidth cluster.
  enum-values:
  - value: AllProduct
    desc: |-
      All compute services.
      This service type maybe unavailable in the future.
  - value: BMC
    desc: Bare metal service.
  - value: ZEC
    desc: Elastic compute service.
  - value: VM
    desc: Virtual machine service.
  - value: OFFLINE
    desc: Offline serveice.
response:
- name: price
  type: object
  description: The price of bandwidth cluster.
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR: you will be billed by hour.
      DAY: you will be billed by day.
      MONTH: you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage, such as Mbps, LCU, and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The category to which the price belongs.
    enum-values:
    - value: STANDARD
      desc: Standard pricing.
    - value: CUSTOMIZED
      desc: Fixed price.
- name: internationalPrice
  type: object
  description: |-
    Price information for the international line.
    Only returned for PathBasedBandwidth bandwidth clusters.
  object-schema:
