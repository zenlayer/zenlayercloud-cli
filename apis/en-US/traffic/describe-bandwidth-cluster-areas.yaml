name: DescribeBandwidthClusterAreas
product: traffic
use: describe-bandwidth-cluster-areas
short: Queries the location information of the bandwidth cluster
long: Query the location information of the bandwidth cluster.
examples:
- cmd: zeno traffic describe-bandwidth-cluster-areas
  desc: Query the location information of the bandwidth cluster.
sdk:
  service: traffic
  version: '2024-03-26'
  action: DescribeBandwidthClusterAreas
response:
- name: areas
  type: object-array
  description: Location list of bandwidth cluster.
  array-style: json
  item-schema:
  - name: areaCode
    type: string
    description: Location code of bandwidth cluster.
  - name: areaName
    type: string
    description: Location name of bandwidth cluster.
  - name: networkTypes
    type: string-array
    description: The network type supported in the location.
  - name: products
    type: string-array
    description: The service types supported in the location.
