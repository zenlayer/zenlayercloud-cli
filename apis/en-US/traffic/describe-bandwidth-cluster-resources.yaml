name: DescribeBandwidthClusterResources
product: traffic
use: describe-bandwidth-cluster-resources
short: Queries resources in a bandwidth cluster
long: Query resources in a bandwidth cluster.
examples:
- cmd: zeno traffic describe-bandwidth-cluster-resources --bandwidth-cluster-id <bandwidthClusterId>
  desc: Query resources in a bandwidth cluster.
sdk:
  service: traffic
  version: '2024-03-26'
  action: DescribeBandwidthClusterResources
parameters:
- name: bandwidth-cluster-id
  type: string
  required: true
  sdk-field: bandwidthClusterId
  description: Bandwidth cluster ID.
response:
- name: resources
  type: object-array
  description: Information on resources in a bandwidth cluster.
  array-style: json
  item-schema:
  - name: resourceId
    type: string
    description: Resource ID.
  - name: resourceType
    type: enum
    description: Resource type.
    enum-values:
    - value: VM_INSTANCE
      desc: Virtual machine instances.
    - value: BMC_INSTANCE
      desc: Bare metal instances.
    - value: ZEC_EIP_INSTANCE
      desc: Elastic compute elastic IP addresses.
    - value: ZEC_IPV6_INSTANCE
      desc: Elastic compute IPv6 addresses.
    - value: OTHERS
      desc: Other resources.
- name: totalCount
  type: integer
  description: Quantity of resources in a bandwidth cluster.
