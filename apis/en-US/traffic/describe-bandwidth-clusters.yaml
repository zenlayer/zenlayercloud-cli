name: DescribeBandwidthClusters
product: traffic
use: describe-bandwidth-clusters
short: Queries information of one or more bandwidth clusters
long: Query information of one or more bandwidth clusters. You can filter the query results with bandwidth cluster ID, name, city name and etc.
examples:
- cmd: zeno traffic describe-bandwidth-clusters --page-num 1 --page-size 1
  desc: Query bandwidth cluster list.
sdk:
  service: traffic
  version: '2024-03-26'
  action: DescribeBandwidthClusters
parameters:
- name: bandwidth-cluster-ids
  type: string-array
  required: false
  sdk-field: bandwidthClusterIds
  description: |-
    Bandwidth cluster ID.
    You can query up to 100 IDs in each request.
- name: bandwidth-cluster-name
  type: string
  required: false
  sdk-field: bandwidthClusterName
  description: Bandwidth cluster name. Fuzzy search is supported.
- name: city-name
  type: string
  required: false
  sdk-field: cityName
  description: Name of city included in the bandwidth cluster.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
    Maximum value: 1000.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Filter by resource group ID.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      The tag key.
      Length limit: 1 to 64 characters.
  - name: value
    type: string
    description: |-
      The tag value.
      Length limit: 1 to 64 characters.
response:
- name: totalCount
  type: integer
  description: Number of bandwidth clusters meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on bandwidth clusters.
  array-style: json
  item-schema:
  - name: bandwidthClusterId
    type: string
    description: Bandwidth cluster ID.
  - name: bandwidthClusterName
    type: string
    description: Bandwidth cluster name.
  - name: networkType
    type: enum
    description: IP network type.
    enum-values:
    - value: BGP
      desc: BGP network.
    - value: Cogent
      desc: Cogent network.
    - value: CN2
      desc: China Telecom Next Carrier Network.
    - value: CMI
      desc: China Mobile network.
    - value: CUG
      desc: China Unicom network.
    - value: CTG
      desc: China Telecom network.
  - name: networkLineType
    type: enum
    description: IP network type information.
    enum-values:
    - value: PremiumBGP
      desc: Premium BGP for optimized network performance.
    - value: StandardBGP
      desc: Standard BGP for general use with cost optimization.
    - value: CN2
      desc: China Telecom Next Carrier Network.
    - value: CMI
      desc: China Mobile.
    - value: CUG
      desc: China Unicom.
    - value: CTG
      desc: China Telecom.
  - name: product
    type: enum
    description: Service type covered by bandwidth cluster.
    enum-values:
    - value: AllProduct
      desc: |-
        All compute services.
        This service type maybe unavailable in the future.
    - value: BMC
      desc: Bare metal service.
    - value: ZEC
      desc: Elastic compute service.
    - value: VM
      desc: Virtual machine service.
    - value: OFFLINE
      desc: Offline serveice.
  - name: areaCode
    type: string
    description: Location code of bandwidth cluster.
  - name: internetChargeType
    type: enum
    description: Network billing method.
    enum-values:
    - value: MonthlyPercent95Bandwidth
      desc: Monthly Burstable 95th billing method.
    - value: DayPeakBandwidth
      desc: Daily Peak billing method.
  - name: commitBandwidthMbps
    type: integer
    description: |-
      Bandwidth commitment.
      Unit: Mbps.
  - name: location
    type: string
    description: Location of bandwidth cluster.
  - name: createTime
    type: string
    description: |-
      Creation time.
      Format: YYYY-MM-ddTHH:mm:ssZ.
  - name: resourceNumber
    type: integer
    description: Resource quantity in the bandwidth cluster.
  - name: cities
    type: object-array
    description: City information of the bandwidth cluster.
  - name: tags
    type: object
    description: The tags associated with the shared bandwidth package.
  - name: resourceGroup
    type: object
    description: The resource group to which the shared bandwidth package belongs.
