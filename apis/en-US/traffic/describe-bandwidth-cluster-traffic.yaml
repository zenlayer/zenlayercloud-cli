name: DescribeBandwidthClusterTraffic
product: traffic
use: describe-bandwidth-cluster-traffic
short: Queries bandwidth information of a bandwidth cluster
long: |-
  Query bandwidth information of a bandwidth cluster in the specified date range.
  **Note**

  * Only the date range of 24 hours are supported.
  * Only the bandwidth information within 30 days are supported to query.
examples:
- cmd: zeno traffic describe-bandwidth-cluster-traffic --bandwidth-cluster-id bandwidthClusterId --start-time 2024-01-01T00:00:00Z --end-time 2024-01-01T23:59:59Z
  desc: Query the bandwidth information of a bandwidth cluster in one day.
sdk:
  service: traffic
  version: '2024-03-26'
  action: DescribeBandwidthClusterTraffic
parameters:
- name: bandwidth-cluster-id
  type: string
  required: true
  sdk-field: bandwidthClusterId
  description: Bandwidth cluster ID.
- name: start-time
  type: string
  required: true
  sdk-field: startTime
  description: |-
    Start time.
    Use UTC time according to the ISO8601 standard. Format: YYYY-MM-ddTHH:mm:ssZ.
- name: end-time
  type: string
  required: true
  sdk-field: endTime
  description: |-
    End time.
    Use UTC time according to the ISO8601 standard. Format: YYYY-MM-ddTHH:mm:ssZ.
- name: city
  type: string
  required: false
  sdk-field: city
  description: |-
    Filter by city, such as LAX.
    This value can be the name of the city or the city code.
    By specifying this value, only the bandwidth traffic data for that city will be returned.
    The city code and city name of the current bandwidth cluster can be viewed in the cities field of DescribeBandwidthClusters.
response:
- name: dataList
  type: object-array
  description: List of bandwidth data.
- name: in95
  type: integer
  description: Inbound burstable 95th bandwidth.
- name: in95Time
  type: string
  description: |-
    Time of inbound burstable 95th bandwidth.
    Format: YYYY-MM-ddTHH:mm:ssZ.
- name: inAvg
  type: integer
  description: Average value of inbound bandwidth.
- name: inMax
  type: integer
  description: Maximum value of inbound bandwidth.
- name: inMin
  type: integer
  description: Minimum value of inbound bandwidth.
- name: inTotal
  type: integer
  description: Total data transfer of inbound bandwidth.
- name: out95
  type: integer
  description: Outbound burstable 95th bandwidth.
- name: out95Time
  type: string
  description: |-
    Time of outbound burstable 95th bandwidth.
    Format: YYYY-MM-ddTHH:mm:ssZ.
- name: outAvg
  type: integer
  description: Average value of outbound bandwidth.
- name: outMax
  type: integer
  description: Maximum value of outbound bandwidth.
- name: outMin
  type: integer
  description: Minimum value of outbound bandwidth.
- name: outTotal
  type: integer
  description: Total data transfer of outbound bandwidth.
- name: maxBandwidth95ValueMbps
  type: float
  description: 'Maximum inbound burstable 95th bandwidth. Unit: Mbps.'
- name: totalUnit
  type: string
  description: Unit of data transfer. For example, B.
- name: unit
  type: string
  description: Unit of bandwidth. For example, bps.
