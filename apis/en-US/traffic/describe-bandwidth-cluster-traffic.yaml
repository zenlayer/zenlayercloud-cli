name: DescribeBandwidthClusterTraffic
product: traffic
use: describe-bandwidth-cluster-traffic
short: Queries bandwidth information of a bandwidth cluster.
long: Query bandwidth information of a bandwidth cluster in the specified date range.
sdk:
  service: traffic
  version: '2024-03-26'
  action: DescribeBandwidthClusterTraffic
parameters:
- name: bandwidth-cluster-id
  type: string
  required: true
  sdk-field: bandwidthClusterId
  description: Bandwidth cluster ID.
- name: start-time
  type: string
  required: true
  sdk-field: startTime
  description: |-
    Start time.
    Use UTC time according to the ISO8601 standard. Format: YYYY-MM-ddTHH:mm:ssZ.
- name: end-time
  type: string
  required: true
  sdk-field: endTime
  description: |-
    End time.
    Use UTC time according to the ISO8601 standard. Format: YYYY-MM-ddTHH:mm:ssZ.
- name: city
  type: string
  required: false
  sdk-field: city
  description: |-
    Filter by city, such as LAX.
    This value can be the name of the city or the city code.
    By specifying this value, only the bandwidth traffic data for that city will be returned.
    The city code and city name of the current bandwidth cluster can be viewed in the cities field of DescribeBandwidthClusters.
