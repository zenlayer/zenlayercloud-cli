name: DescribeBandwidthClusterUsage
product: traffic
use: describe-bandwidth-cluster-usage
short: Query bandwidth cluster usage
long: Query usage information for a bandwidth cluster.
examples:
- cmd: zeno traffic describe-bandwidth-cluster-usage --bandwidth-cluster-id bandwidthClusterId --page-num 1 --page-size 20
  desc: Query usage information for a bandwidth cluster.
sdk:
  service: traffic
  version: '2024-03-26'
  action: DescribeBandwidthClusterUsage
parameters:
- name: bandwidth-cluster-id
  type: string
  required: true
  sdk-field: bandwidthClusterId
  description: ID of bandwidth cluster.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: "The returned page size. \nDefault value: 20."
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
response:
- name: totalCount
  type: integer
  description: Number of results meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Bandwidth usage dataset.
  array-style: json
  item-schema:
  - name: time
    type: string
    description: "Time. \nMonthly Burstable 95th. Format: yyyy-MM. \nDaily Peak. Format: yyyy-MM-dd."
  - name: value
    type: float
    description: "Bandwidth value. \nUnit: Mbps."
  - name: typeValues
    type: object-array
    description: |-
      List of bandwidth values by traffic type.
      Only populated for PathBasedBandwidth bandwidth clusters.
    array-style: json
    item-schema:
    - name: trafficType
      type: enum
      description: |-
        Traffic type.
        LOCAL: domestic; INTERNATIONAL: international.
      enum-values:
      - value: LOCAL
        desc: Domestic traffic.
      - value: INTERNATIONAL
        desc: International traffic.
    - name: value
      type: float
      description: |-
        Bandwidth value.
        Unit: Mbps.
  - name: details
    type: object-array
    description: List of bandwidth usage details.
    array-style: json
    item-schema:
    - name: cityName
      type: string
      description: City name.
    - name: cityCode
      type: string
      description: City code.
    - name: product
      type: enum
      description: Product source.
      enum-values:
      - value: AllProduct
        desc: |-
          All compute services.
          This service type maybe unavailable in the future.
      - value: BMC
        desc: Bare metal service.
      - value: ZEC
        desc: Elastic compute service.
      - value: VM
        desc: Virtual machine service.
      - value: OFFLINE
        desc: Offline serveice.
    - name: value
      type: float
      description: "Bandwidth value. \nUnit: Mbps."
    - name: typeValues
      type: object-array
      description: |-
        List of bandwidth values by traffic type.
        Only populated for PathBasedBandwidth bandwidth clusters.
      array-style: json
      item-schema:
      - name: trafficType
        type: enum
        description: |-
          Traffic type.
          LOCAL: domestic; INTERNATIONAL: international.
        enum-values:
        - value: LOCAL
          desc: Domestic traffic.
        - value: INTERNATIONAL
          desc: International traffic.
      - name: value
        type: float
        description: |-
          Bandwidth value.
          Unit: Mbps.
