name: DescribeTags
product: zrm
use: describe-tags
short: Queries pages of tags
long: Retrieve all tags bound to a specific resource.
examples:
- cmd: zeno zrm describe-tags --page-num 1 --page-size 20 --created-date-sort ascend --tag-keys tagKeys_0a847c6582a7 --tags "{key=key_e8a77c6a9fab, value=value_b1c085a59870}"
  desc: Query a single page of tags.
sdk:
  service: zrm
  version: '2025-10-14'
  action: DescribeTags
parameters:
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: Number of items in the current page result.
- name: key-sort
  type: string
  required: false
  sdk-field: keySort
  description: |-
    Sort order for tag keys.
    ascend for ascending;
    descend for descending.
- name: created-date-sort
  type: string
  required: false
  sdk-field: createdDateSort
  description: |-
    Sort by creation time.
    ascend: oldest first;
    descend: newest first, default.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: List of tag keys.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: List of tags.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 64 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 64 characters.'
