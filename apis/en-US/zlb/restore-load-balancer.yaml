name: RestoreLoadBalancer
product: zlb
use: restore-load-balancer
short: Restores the load balancer in the recycle bin
long: |-
  Restore the load balancer in the recycle bin.
  **Note**

  * Operations are only supported if the load balancer state is `RECYCLED`.
  * Please make sure you have enough balance in your account when you restore it, otherwise you will not be able to restore it.
examples:
- cmd: zeno zlb restore-load-balancer --load-balancer-id <loadBalancerId>
  desc: Restore a load balancer.
sdk:
  service: zlb
  version: '2025-04-01'
  action: RestoreLoadBalancer
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: Load balance instance ID.
