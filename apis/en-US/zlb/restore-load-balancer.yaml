name: RestoreLoadBalancer
product: zlb
use: restore-load-balancer
short: Restores the load balancer in the recycle bin.
long: restore the load balancer in the recycle bin.
examples:
- cmd: zeno zlb restore-load-balancer --load-balancer-id <loadBalancerId>
  desc: Restore a load balancer.
sdk:
  service: zlb
  version: '2025-04-01'
  action: RestoreLoadBalancer
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: Load balance instance ID.
