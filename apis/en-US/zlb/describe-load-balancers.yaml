name: DescribeLoadBalancers
product: zlb
use: describe-load-balancers
short: Queries the list of load balancer instances
long: Query the list of load balancer instances.
examples:
- cmd: zeno zlb describe-load-balancers
  desc: Query the list of load balancer instances.
sdk:
  service: zlb
  version: '2025-04-01'
  action: DescribeLoadBalancers
parameters:
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: Region ID.
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: Filter by the VPC ID to which the load balance backend server belongs.
- name: load-balancer-ids
  type: string-array
  required: false
  sdk-field: loadBalancerIds
  description: |-
    ID list of the load balance instance.
    The maximum number of instance IDs is 100.
- name: load-balancer-name
  type: string
  required: false
  sdk-field: loadBalancerName
  description: |-
    Load balance instance name.
    Add * at the end to support fuzzy matching.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
    Maximum value: 1000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Page number of the current page result.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Resource Group ID.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query using tag keys.
    A maximum of 20 tag keys can be used.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 64 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 64 characters.'
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: |-
    Security group ID.
    You can call DescribeSecurityGroups to obtain details.
response:
- name: totalCount
  type: integer
  description: The total number of load balance instances that meet the filtering conditions.
- name: dataSet
  type: object-array
  description: The returned list of load balance instances.
  array-style: json
  item-schema:
  - name: regionId
    type: string
    description: Region ID.
  - name: loadBalancerId
    type: string
    description: Load balance instance ID.
  - name: loadBalancerName
    type: string
    description: Load balance instance name.
  - name: vpcId
    type: string
    description: VPC ID to which the load balance backend server belongs.
  - name: status
    type: enum
    description: Load balance instance state.
    enum-values:
    - value: CREATING
      desc: Creating.
    - value: RUNNING
      desc: Running.
    - value: RECYCLED
      desc: Recycled.
    - value: CREATE_FAILED
      desc: Creating failed.
    - value: RELEASING
      desc: Releasing.
  - name: publicIpAddress
    type: string-array
    description: Public Virtual IP list of the load balancer instance.
  - name: privateIpAddress
    type: string-array
    description: Private Virtual IP list of the load balancer instance.
  - name: healthCheckPrivateIps
    type: string-array
    description: Health probe source private IP list.
  - name: listenerCount
    type: integer
    description: Listener quantity.
  - name: createTime
    type: string
    description: |-
      Creation time.
      Format: YYYY-MM-ddTHH:mm:ssZ
  - name: resourceGroup
    type: object
    description: Resource group information.
    object-schema:
    - name: resourceGroupId
      type: string
      description: Resource group ID.
    - name: resourceGroupName
      type: string
      description: Resource group name.
  - name: tags
    type: object
    description: Tags bound to resources.
    object-schema:
    - name: tags
      type: object-array
      description: List of tags.
      array-style: json
      item-schema:
      - name: key
        type: string
        description: 'Tag key. Length limit: 1 to 64 characters.'
      - name: value
        type: string
        description: 'Tag value. Length limit: 1 to 64 characters.'
  - name: securityGroupId
    type: string
    description: Security group ID.
