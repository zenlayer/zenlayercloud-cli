name: DescribeBackendHealth
product: zlb
use: describe-backend-health
short: Queries the bound backend server list of a load balancer
long: Query the bound backend server list of a load balancer.
examples:
- cmd: zeno zlb describe-backend-health --load-balancer-id <loadBalancerId>
  desc: Query the health state of all bound backend servers of a load balancer.
sdk:
  service: zlb
  version: '2025-04-01'
  action: DescribeBackendHealth
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: Load balance instance ID.
- name: listener-id
  type: string
  required: false
  sdk-field: listenerId
  description: |-
    Load balance listener ID.
    If not specified, all backend servers will be queried.
response:
- name: backends
  type: object-array
  description: Health state of backend servers.
