name: DescribeBackendHealth
product: zlb
use: describe-backend-health
short: Queries the bound backend server list of a load balancer
long: Query the bound backend server list of a load balancer.
examples:
- cmd: zeno zlb describe-backend-health --load-balancer-id <loadBalancerId>
  desc: Query the health state of all bound backend servers of a load balancer.
sdk:
  service: zlb
  version: '2025-04-01'
  action: DescribeBackendHealth
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: Load balance instance ID.
- name: listener-id
  type: string
  required: false
  sdk-field: listenerId
  description: |-
    Load balance listener ID.
    If not specified, all backend servers will be queried.
response:
- name: backends
  type: object-array
  description: Health state of backend servers.
  array-style: json
  item-schema:
  - name: healthStatus
    type: enum
    description: State of backend server health check.
    enum-values:
    - value: Alive
      desc: Healthy.
    - value: Dead
      desc: Unhealthy.
    - value: Unknown
      desc: Not detected.
    - value: Close
      desc: Health check disabled.
  - name: healthStatusDetail
    type: object-array
    description: |-
      Health check status of the backend port.
      When healthStatus is Close or Unknown, no detailed information is available.
    array-style: json
    item-schema:
    - name: port
      type: integer
      description: Backend server port.
    - name: healthStatus
      type: enum
      description: Health check state of backend server.
      enum-values:
      - value: Alive
        desc: Healthy.
      - value: Dead
        desc: Unhealthy.
      - value: Unknown
        desc: Not detected.
      - value: Close
        desc: Health check disabled.
  - name: instanceId
    type: string
    description: |-
      Instance ID.
      You can obtain this value from the InstanceId field in the response of the DescribeInstances API.
  - name: privateIpAddress
    type: string
    description: The private IP of the vNIC attached to the instance.
  - name: weight
    type: integer
    description: |-
      The forwarding weight of the backend server after modification.
      The default value is 100 when adding a server. If not specified during modification, the weight will remain unchanged.
      This parameter is not required when deleting a backend server.
      Valid range: [0, 65535].
  - name: backendPort
    type: integer
    description: |-
      The target port used for request forwarding and health checks.
      If left empty, it follows the listener port configuration.
      This parameter is not required when deleting a backend server.
      Valid range: [1, 65535].
  - name: listenerId
    type: string
    description: Load balancer ID.
  - name: listenerName
    type: string
    description: Load balancer name.
  - name: protocol
    type: enum
    description: Listener protocol.
    enum-values:
    - value: TCP
      desc: TCP protocol.
    - value: UDP
      desc: UDP protocol.
  - name: listenerPort
    type: string
    description: |-
      Listening port.
      Use commas (,) to separate multiple ports.
      For port ranges, use a hyphen (-), e.g., 10000-10005.
