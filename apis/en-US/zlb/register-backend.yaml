name: RegisterBackend
product: zlb
use: register-backend
short: Adds one or more backend servers to a load balance listener
long: |-
  Add one or more backend servers to a load balance listener.
  **Note**

  * The state of the load balance instance must be `RUNNING`.
  * Adding bare metal instances is supported. The bare metal instance must be connected to the border gateway of the load balancer’s VPC through the Layer 3 Cloud Router in Cloud Networking.
  * When adding a bare metal instance, only its private IP address should be specified; the instance ID must not be provided.
examples:
- cmd: zeno zlb register-backend --load-balancer-id <loadBalancerId> --listener-id <listenerId> --backend-servers "{instanceId=<instanceId>, privateIpAddress=10.0.0.1, weight=100}"
  desc: Add a backend server to a listener.
sdk:
  service: zlb
  version: '2025-04-01'
  action: RegisterBackend
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: The ID of the load balance instance.
- name: listener-id
  type: string
  required: true
  sdk-field: listenerId
  description: The listener ID of the load balancer.
- name: backend-servers
  type: object-array
  required: true
  sdk-field: backendServers
  description: |-
    List of backend servers to be added.
    The same server cannot be bound multiple times under a single listener.
  array-style: json
  item-schema:
  - name: instanceId
    type: string
    description: |-
      Instance ID.
      If the backend server is an elastic compute instance, you can call DescribeInstances, and find InstanceId in the response to obtain valid instance ID.
      When unbinding, this field is required if an instance ID is present.
  - name: privateIpAddress
    type: string
    description: Private IP address of the network interface attached to the instance.
  - name: weight
    type: integer
    description: |-
      Forwarding weight of the backend server.
      The default value is 100 when adding a server. If not specified during modification, the value will remain unchanged.
      This parameter is not required when deleting a server.
      Optional range: [0, 65535].
  - name: port
    type: integer
    description: |-
      Target port for request forwarding and health checks.
      If left empty, it will follow the listener port configuration.
      This parameter is not required when deleting a server.
      When the listener forwarding mode is `DR`, or the listener uses all ports (0) or multiple ports, specifying a target port is not supported; the target port must match the listener port.
