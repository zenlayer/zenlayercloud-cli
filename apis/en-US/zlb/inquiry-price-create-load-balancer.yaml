name: InquiryPriceCreateLoadBalancer
product: zlb
use: inquiry-price-create-load-balancer
short: Queries the price for creating a load balancer
long: Query the price for creating a load balancer.
examples:
- cmd: zeno zlb inquiry-price-create-load-balancer --region-id asia-east-1 --vpc-id <vpcId> --internet-charge-type ByBandwidth --ip-network-type BGPLine --bandwidth-mbps 2 --number 1
  desc: Query the price for creating a public network load balance instance.
sdk:
  service: zlb
  version: '2025-04-01'
  action: InquiryPriceCreateLoadBalancer
parameters:
- name: region-id
  type: string
  required: true
  sdk-field: regionId
  description: Region ID.
- name: internet-charge-type
  type: enum
  required: false
  sdk-field: internetChargeType
  description: IP network billing model.
  enum-values:
  - value: ByBandwidth
    desc: Flat rate billing method.
  - value: ByTrafficPackage
    desc: Data transfer package billing method.
  - value: BandwidthCluster
    desc: Bandwidth cluster billing method.
- name: ip-network-type
  type: enum
  required: false
  sdk-field: ipNetworkType
  description: |-
    IP network type.
    Deprecated. Please use networkLineType instead.
  deprecated: true
  enum-values:
  - value: BGPLine
    desc: BGP network.
  - value: CN2Line
    desc: China Telecom Next Carrier Network.
  - value: LocalLine
    desc: Local IP provided by a local ISP.
  - value: ChinaMobile
    desc: China Mobile network.
  - value: ChinaUnicom
    desc: China Unicom network.
  - value: ChinaTelecom
    desc: China Telecom network.
  - value: Cogent
    desc: Cogent IP network offered by Cogent Communications.
  - value: ThreeLine
    desc: 3-in-1 IP Pool.
- name: network-line-type
  type: enum
  required: false
  sdk-field: networkLineType
  description: IP network type.
  enum-values:
  - value: PremiumBGP
    desc: |-
      Premium BGP network.
      High-performance network.
  - value: CN2
    desc: China Telecom CN2 network.
  - value: LocalLine
    desc: Provided by a local ISP.
  - value: StandardBGP
    desc: |-
      Standard BGP network.
      General-purpose network with cost optimization.
  - value: CMI
    desc: 1-Line IP China Mobile.
  - value: CUG
    desc: 1-Line IP China Unicom.
  - value: CTG
    desc: 1-Line IP China Telecom.
  - value: ThreeLine
    desc: 3-in-1 IP Pool.
- name: bandwidth-mbps
  type: integer
  required: false
  sdk-field: bandwidthMbps
  description: |-
    Maximum outbound bandwidth of the elastic IP.
    Unit: Mbps.
    The maximum limit is usually 10000 Mbps. If you have additional requirements, please contact Support.
    Available range: [1, +).
- name: traffic-package-size
  type: float
  required: false
  sdk-field: trafficPackageSize
  description: |-
    Data transfer package size.
    The parameter is only required when internetChargeType is ByTrafficPackage.
    Available range: [0.0, 999999.0].
- name: bandwidth-cluster-id
  type: string
  required: false
  sdk-field: bandwidthClusterId
  description: |-
    ID of bandwidth cluster.
    The parameter is only required when internetChargeType is BandwidthCluster.
response:
- name: loadBalancerInstancePrice
  type: object
  description: The price of the load balancer instance.
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR: you will be billed by hour.
      DAY: you will be billed by day.
      MONTH: you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage, such as Mbps, LCU, and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The category to which the price belongs.
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
