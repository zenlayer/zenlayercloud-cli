name: CreateLoadBalancer
product: zlb
use: create-load-balancer
short: Creates a load balancer instance.
long: Create a load balancer instance.
sdk:
  service: zlb
  version: '2025-04-01'
  action: CreateLoadBalancer
parameters:
- name: region-id
  type: string
  required: true
  sdk-field: regionId
  description: Region ID.
- name: vpc-id
  type: string
  required: true
  sdk-field: vpcId
  description: VPC ID to which the load balance backend server belongs.
- name: load-balancer-name
  type: string
  required: true
  sdk-field: loadBalancerName
  description: |-
    Load balance instance name.
    Containing 1 to 64 characters.
    Available range: [1.0, +).
- name: internet-charge-type
  type: enum
  required: false
  sdk-field: internetChargeType
  description: IP network billing model.
  enum-values:
  - ByBandwidth
  - ByTrafficPackage
  - BandwidthCluster
- name: ip-network-type
  type: enum
  required: false
  sdk-field: ipNetworkType
  description: |-
    IP network type.
    Deprecated. Please use networkLineType instead.
  deprecated: true
  enum-values:
  - BGPLine
  - CN2Line
  - LocalLine
  - ChinaMobile
  - ChinaUnicom
  - ChinaTelecom
  - Cogent
  - ThreeLine
- name: network-line-type
  type: enum
  required: false
  sdk-field: networkLineType
  description: IP network type.
  enum-values:
  - PremiumBGP
  - CN2
  - LocalLine
  - StandardBGP
  - CMI
  - CUG
  - CTG
  - ThreeLine
- name: bandwidth-mbps
  type: integer
  required: false
  sdk-field: bandwidthMbps
  description: |-
    Maximum outbound bandwidth of the elastic IP.
    Unit: Mbps.
    The maximum limit is usually 10000 Mbps. If you have additional requirements, please contact Support.
    Available range: [1, +).
- name: traffic-package-size
  type: integer
  required: false
  sdk-field: trafficPackageSize
  description: |-
    Data transfer package size.
    The parameter is only required when internetChargeType is ByTrafficPackage.
    Available range: [0.0, 999999.0].
- name: bandwidth-cluster-id
  type: string
  required: false
  sdk-field: bandwidthClusterId
  description: |-
    ID of bandwidth cluster.
    The parameter is only required when internetChargeType is BandwidthCluster.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Resource Group ID
    If not specified, the load balance instance will belong to the default resource group.
- name: number
  type: integer
  required: false
  sdk-field: number
  description: The number of created load balancers.
- name: marketing-options
  type: object
  required: false
  sdk-field: marketingOptions
  description: Information on marketing campaigns.
  object-schema:
  - name: discountCode
    type: string
    description: |-
      Promo Code.
      If no Promo Code exists, the final discount will not apply.
  - name: usePocVoucher
    type: boolean
    description: |-
      Whether to use POC voucher.
      If no POC voucher exists, the related creation will fail.
- name: tags
  type: object
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    Bound tags when creating the image.
    Tag keys must be unique.
  object-schema:
  - name: tags
    type: object-array
    description: List of tags.
- name: subnet-id
  type: string
  required: false
  sdk-field: subnetId
  description: |-
    ID of the subnet where the health check private source IP belong.
    You can call DescribeSubnets to obtain details.
- name: health-check-private-ips
  type: string-array
  required: false
  sdk-field: healthCheckPrivateIps
  description: |-
    Health probe private IP.
    When subnetId is specified, this parameter is required with a quantity of 2.
    If subnetId is not specified, this parameter is invalid. When this value is left empty, IP addresses will be allocated automatically.
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: |-
    Security group ID.
    You can call DescribeSecurityGroups to obtain details.
