name: TerminateLoadBalancer
product: zlb
use: terminate-load-balancer
short: Deletes a specified load balancer instance
long: |-
  Delete a specified load balancer instance.
  **Note**

  After deleting the instance, the instance may be retained for a period of time, and the state is `RECYCLED` when retained. You can call [RestoreLoadBalancer](restoreloadbalancer.md) to restore the load balance instance.
examples:
- cmd: zeno zlb terminate-load-balancer --load-balancer-id <loadBalancerId>
  desc: Delete a load balancer.
sdk:
  service: zlb
  version: '2025-04-01'
  action: TerminateLoadBalancer
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: Load balance instance ID.
