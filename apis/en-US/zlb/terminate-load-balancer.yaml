name: TerminateLoadBalancer
product: zlb
use: terminate-load-balancer
short: Deletes a specified load balancer instance.
long: delete a specified load balancer instance.
examples:
- cmd: zeno zlb terminate-load-balancer --load-balancer-id <loadBalancerId>
  desc: Delete a load balancer.
sdk:
  service: zlb
  version: '2025-04-01'
  action: TerminateLoadBalancer
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: Load balance instance ID.
