name: DescribeListeners
product: zlb
use: describe-listeners
short: Queries the list of listeners
long: Get the list of listeners by the load balancer ID and the listener protocol as filtering conditions. If no filtering conditions are specified, all listeners under the specified load balancer instance will be returned.
examples:
- cmd: zeno zlb describe-listeners --load-balancer-id <loadBalancerId>
  desc: Query all listeners under a specified load balancer instance.
- cmd: zeno zlb describe-listeners --load-balancer-id <loadBalancerId> --protocol TCP
  desc: Query listeners by the load balancer ID and the listener protocol as filtering conditions.
sdk:
  service: zlb
  version: '2025-04-01'
  action: DescribeListeners
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: The ID of the load balance instance.
- name: listener-ids
  type: string-array
  required: false
  sdk-field: listenerIds
  description: The list of load balancer listener IDs to query.
- name: protocol
  type: enum
  required: false
  sdk-field: protocol
  description: The type of the queried listener protocol.
  enum-values:
  - value: TCP
    desc: TCP protocol.
  - value: UDP
    desc: UDP protocol.
response:
- name: listeners
  type: object-array
  description: List of listeners.
  array-style: json
  item-schema:
  - name: listenerId
    type: string
    description: Listener ID.
  - name: listenerName
    type: string
    description: Listener name.
  - name: protocol
    type: enum
    description: Listening protocols.
    enum-values:
    - value: TCP
      desc: TCP protocol.
    - value: UDP
      desc: UDP protocol.
  - name: port
    type: string
    description: |-
      Listening port.
      Use commas (,) to separate multiple ports.
      Use a hyphen (-) to define a port range, e.g., 10000-10005.
      If multiple consecutive individual ports are provided, they will be automatically aggregated into a port range.
  - name: healthCheck
    type: object
    description: Heath check information of a listener.
    object-schema:
    - name: enabled
      type: boolean
      description: Whether to enable health check.
    - name: checkType
      type: enum
      description: |-
        Health check protocols.
        When health check is enabled, the value is required.
      enum-values:
      - value: PING_CHECK
        desc: PING check.
      - value: TCP
        desc: TCP check.
      - value: HTTP_GET
        desc: HTTP check.
    - name: checkPort
      type: integer
      description: |-
        Health check port.
        When the listener port is set to all ports (0) and the health check type is TCP or HTTP_GET, the value must be specified.
        Defaults to the backend server port. Unless you need a specific port, it is recommended to leave this field empty.
    - name: checkDelayLoop
      type: integer
      description: |-
        Health check interval.
        Unit: seconds.
        Optional range: [3, 30].
        Default: 3.
    - name: checkConnTimeout
      type: integer
      description: |-
        Health check timeout period.
        Unit: seconds.
        Optional range: [1, 15].
        Default: 2.
    - name: checkRetry
      type: integer
      description: |-
        Health check retry count.
        Optional range: [1, 5].
        Default: 2.
    - name: checkDelayTry
      type: integer
      description: |-
        Interval between health check retries.
        Unit: seconds.
        Optional range: [1, 15].
        Default: 2.
    - name: checkHttpGetUrl
      type: string
      description: |-
        Health check path.
        Applicable only for the HTTP_GET protocol.
        If specified, it must start with a forward slash (/).
    - name: checkHttpStatusCode
      type: integer
      description: |-
        Health check status code.
        Applicable only for the HTTP_GET protocol.
        Optional range: [100, 599].
    - name: failOpen
      type: boolean
      description: If all backends fail health checks, the load balancer will fail open and continue forwarding traffic to all servers to maintain service continuity.
  - name: scheduler
    type: enum
    description: Scheduling algorithm.
    enum-values:
    - value: mh
      desc: Maglev Hashing (mh).
    - value: rr
      desc: Round Robin (rr).
    - value: wrr
      desc: Weighted Round Robin (wrr).
    - value: lc
      desc: Least Connections (lc).
    - value: wlc
      desc: Weighted Least Connections (wlc).
    - value: sh
      desc: Source Hashing (sh).
    - value: dh
      desc: Destination Hashing (dh).
  - name: kind
    type: enum
    description: Forwarding mode.
    enum-values:
    - value: FNAT
      desc: Full NAT.
    - value: DR
      desc: Direct Routing.
    - value: DNAT
      desc: Destination NAT.
  - name: createTime
    type: string
    description: |-
      Creation time.
      Format: YYYY-MM-ddTHH:mm:ssZ
  - name: persistent
    type: integer
    description: Session persistence duration, in seconds.
  - name: idleTimeout
    type: integer
    description: 'Idle timeout period. Unit: seconds.'
