name: ResetInstancesPassword
product: vm
use: reset-instances-password
short: Resets instance login password
long: |-
  Reset instance login password.
  **Note**

  * For Windows operating system, call this API to reset Administrator password; for Linux operating system, call this API to reset root password.
  * Shut down the instance before resetting the password. After the password is reset, the instance will be automatically restarted.
  * Batch operations are supported. The maximum number of instances in each request is 100.
sdk:
  service: vm
  version: '2026-04-01'
  action: ResetInstancesPassword
parameters:
- name: instance-ids
  type: string-array
  required: true
  sdk-field: instanceIds
  description: |-
    Instance ID(s).
    The maximum number of instances in each request is 100.
- name: password
  type: string
  required: true
  sdk-field: password
  description: |-
    Instance login password.
    The parameter must be 8-16 characters, including:lowercase letters: [a-z]uppercase letters: [A-Z]digits: 0-9special characters: ! @ # $ % ^ + * ( )
