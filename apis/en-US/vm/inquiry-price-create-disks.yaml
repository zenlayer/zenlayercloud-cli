name: InquiryPriceCreateDisks
product: vm
use: inquiry-price-create-disks
short: Queries the price of creating a disk
long: |-
  Query the price of creating a disk.
  **Note**

  * Only operations on data disks are supported.
  * For a `PREPAID` disk, call this API to query the subscription price; for a `POSTPAID` disk, query the pay-as-you-go price. If you need to purchase specified disks, please contact Zenlayer Support.
examples:
- cmd: zeno vm inquiry-price-create-disks --zone-id HKG-A --disk-size 2000 --charge-type PREPAID
  desc: Query the price of creating a disk.
sdk:
  service: vm
  version: '2026-04-01'
  action: InquiryPriceCreateDisks
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: |-
    ID of zone to which the disk belongs.
    Call DescribeZones to obtain.
- name: disk-size
  type: integer
  required: true
  sdk-field: diskSize
  description: |-
    Storage space.
    Unit: GB.
- name: disk-amount
  type: integer
  required: false
  sdk-field: diskAmount
  description: |-
    Quantity of cloud disks.
    Minimum value: 1 (default value);
    Maximum value: 50.
- name: charge-type
  type: enum
  required: true
  sdk-field: chargeType
  description: |-
    Cloud disk pricing model.
    PREPAID: subscription
    POSTPAID: pay-as-you-go
  enum-values:
  - value: PREPAID
    desc: Subscription.
  - value: POSTPAID
    desc: Pay-as-you-go.
- name: charge-prepaid
  type: object
  required: false
  sdk-field: chargePrepaid
  description: Details of the monthly subscription, including the purchase period, auto-renewal. It is required if the chargeType is PREPAID.
  object-schema:
  - name: period
    type: integer
    description: |-
      Period of subscription.
      Unit: month.
- name: disk-category
  type: string
  required: false
  sdk-field: diskCategory
  description: 'Disk type.Standard Disk: Hard Disk DriveSSD: Solid State Drive'
response:
- name: dataDiskPrice
  type: object
  description: Price of a disk.
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR : you will be billed by hour.
      DAY : you will be billed by day.
      MONTH : you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
  - name: amountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: Information on the price.
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
