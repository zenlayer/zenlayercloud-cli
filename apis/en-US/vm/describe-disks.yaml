name: DescribeDisks
product: vm
use: describe-disks
short: Queries the details of disks
long: Query the details of disks.
examples:
- cmd: zeno vm describe-disks --disk-status AVAILABLE --disk-size 20 --portable true --zone-id SIN-E
  desc: Query the details of disks.
sdk:
  service: vm
  version: '2026-04-01'
  action: DescribeDisks
parameters:
- name: disk-ids
  type: string-array
  required: false
  sdk-field: diskIds
  description: ID list of disks.
- name: disk-name
  type: string
  required: false
  sdk-field: diskName
  description: Disk name.
- name: disk-status
  type: enum
  required: false
  sdk-field: diskStatus
  description: Disk status.
  enum-values:
  - value: CREATING
    desc: Creating.
  - value: IN_USE
    desc: In use.
  - value: AVAILABLE
    desc: Available to be attached.
  - value: CHANGING
    desc: Changing
  - value: ATTACHING
    desc: Attaching.
  - value: DETACHING
    desc: Detaching.
  - value: DELETING
    desc: Releasing.
  - value: RECYCLED
    desc: Recycled.
  - value: RECYCLING
    desc: Recycling.
- name: disk-type
  type: enum
  required: false
  sdk-field: diskType
  description: 'Disk type.SYSTEM: System Disk;DATA: Data Disk.'
  enum-values:
  - value: SYSTEM
    desc: System Disk.
  - value: DATA
    desc: Data Disk.
- name: disk-category
  type: string
  required: false
  sdk-field: diskCategory
  description: |-
    Disk type.Standard Disk: Hard Disk DriveSSD: Solid State DriveThe default value is Standard Disk.
    Call DescribeDiskCategory to obtain disk type.
- name: disk-size
  type: integer
  required: false
  sdk-field: diskSize
  description: 'Disk size. Unit: GB.'
- name: portable
  type: boolean
  required: false
  sdk-field: portable
  description: |-
    Whether the disk is detachable or not.
    true: the disk is detachable, and thus will not be deleted while deleting its attached instance and becomes AVAILABLE.
    false: the disk is undetachable, and thus will be deleted at the same time while deleting its attached instance.
- name: instance-id
  type: string
  required: false
  sdk-field: instanceId
  description: Instance ID.
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: |-
    Zone ID.
    To obtain zone ID, call DescribeZones.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
    Maximum value: 1000.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Resource group ID.
    If the value is null, then return all the instances in the authorized resource groups.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query using tag keys.
    A maximum of 20 tag keys can be used.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      Tag key.
      Length limit: 1 to 64 characters.
  - name: value
    type: string
    description: "Tag value. \nLength limit: 1 to 64 characters."
response:
- name: totalCount
  type: integer
  description: Number of disks meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on a disk.
  array-style: json
  item-schema:
  - name: diskId
    type: string
    description: Disk ID.
  - name: diskName
    type: string
    description: Disk name.
  - name: zoneId
    type: string
    description: Zone ID to which the disks belong.
  - name: diskType
    type: enum
    description: 'Disk type.SYSTEM: System Disk;DATA: Data Disk.'
    enum-values:
    - value: SYSTEM
      desc: System Disk.
    - value: DATA
      desc: Data Disk.
  - name: portable
    type: boolean
    description: Whether the disk is detachable or not.
  - name: diskCategory
    type: string
    description: 'Disk category.cloud efficiency: Ultra Disk.'
  - name: diskSize
    type: integer
    description: 'Disk size. Unit: GB.'
  - name: diskStatus
    type: enum
    description: |-
      Disk status.
      See DiskStatus for more details.
    enum-values:
    - value: CREATING
      desc: Creating.
    - value: IN_USE
      desc: In use.
    - value: AVAILABLE
      desc: Available to be attached.
    - value: CHANGING
      desc: Changing
    - value: ATTACHING
      desc: Attaching.
    - value: DETACHING
      desc: Detaching.
    - value: DELETING
      desc: Releasing.
    - value: RECYCLED
      desc: Recycled.
    - value: RECYCLING
      desc: Recycling.
  - name: instanceId
    type: string
    description: Attached instance ID.
  - name: instanceName
    type: string
    description: Attached instance name.
  - name: chargeType
    type: enum
    description: |-
      Disk pricing model.
      PREPAID: monthly subscription.
      POSTPAID: pay-as-you-go.
    enum-values:
    - value: PREPAID
      desc: Subscription.
    - value: POSTPAID
      desc: Pay-as-you-go.
  - name: createTime
    type: string
    description: |-
      Creation time.
      Format: YYYY-MM-DDThh:mm:ssZ.
  - name: expiredTime
    type: string
    description: |-
      Expiration time.
      Format: YYYY-MM-DDThh:mm:ssZ.
  - name: period
    type: integer
    description: |-
      Subscription term.
      Unit: Month.
      The value is empty for POSTPAID pricing model.
  - name: autoRenew
    type: boolean
    description: Whether to enable auto-renewal.For subscription instances, if you cancel subscription, the field returns false.
  - name: tags
    type: object
    description: Tags bound to resources.
