name: CreateDisks
product: vm
use: create-disks
short: Creates one or more disks
long: |-
  Create one or more disks.
  **Note**

  * If you create a subscription disk, the amount required will be pre-deducted. If the balance is insufficient, the request will fail. If you create a pay-as-you-go disk, please ensure your account balance is sufficient before calling this API.
  * This API is an async API. A disk ID list is returned after the creation request is sent. However, it does not mean the creation has been completed. You can use [`DescribeDisks`](describedisks.md) to query the status of the disk. If disk has been queried with the `Available` status, it means that the disk has been created successfully; if disk has been attached to a certain instance while creating, the `IN_USE` status means attaching successfully.
examples:
- cmd: zeno vm create-disks --charge-type POSTPAID --disk-name Test-Disk --disk-size 30 --disk-amount 1 --zone-id HKG-A
  desc: Create one or more disks.
sdk:
  service: vm
  version: '2026-04-01'
  action: CreateDisks
parameters:
- name: charge-type
  type: enum
  required: true
  sdk-field: chargeType
  description: |-
    Disk pricing model.
    PREPAID: subscription
    POSTPAID: pay-as-you-go
  enum-values:
  - value: PREPAID
    desc: Subscription.
  - value: POSTPAID
    desc: Pay-as-you-go.
- name: charge-prepaid
  type: object
  required: false
  sdk-field: chargePrepaid
  description: Details of the monthly subscription, including the purchase period, auto-renewal. It is required if the chargeType is PREPAID.
  object-schema:
  - name: period
    type: integer
    description: |-
      Period of subscription.
      Unit: month.
- name: disk-name
  type: string
  required: true
  sdk-field: diskName
  description: |-
    Disk name to be displayed.
    This parameter must start with a number or a letter, containing up to 64 characters. Only letters, numbers, - and periods (.) are supported.
- name: disk-size
  type: integer
  required: true
  sdk-field: diskSize
  description: |-
    Storage space.
    Unit: GB.
- name: disk-amount
  type: integer
  required: false
  sdk-field: diskAmount
  description: |-
    Quantity of disks.
    Minimum value: 1 (default value);
    Maximum value: 50.
- name: instance-id
  type: string
  required: false
  sdk-field: instanceId
  description: |-
    ID of instance to which the disks are attached.
    Specify the ID of an instance in the current zone to which the disks are attached.
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: |-
    ID of zone to which thedisk belongs.
    If instanceId is specified, this parameter is invalid.
    Call Describezones to obtain zoneId.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Resource group ID.
    If the value is null, the disk will be added into default resource group.
- name: disk-category
  type: string
  required: false
  sdk-field: diskCategory
  description: |-
    Disk type.Standard Disk: Hard Disk DriveSSD: Solid State DriveThe default value is Standard Disk.
    Call DescribeDiskCategory to obtain disk type.
- name: marketing-options
  type: object
  required: false
  sdk-field: marketingOptions
  description: Information on marketing campaigns.
  object-schema:
  - name: discountCode
    type: string
    description: |-
      Promo Code.
      If no Promo Code exists, the final discount will not apply.
  - name: usePocVoucher
    type: boolean
    description: |-
      Whether to use POC voucher.
      If no POC voucher exists, the related creation will fail.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    Tags associated when creating resources.
    Note: The associated tag key cannot be duplicated.--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: |-
      Tag key.
      Length limit: 1 to 64 characters.
  - name: value
    type: string
    description: "Tag value. \nLength limit: 1 to 64 characters."
response:
- name: diskIds
  type: string-array
  description: ID List of disks.
- name: orderNumber
  type: string
  description: Number of order.
