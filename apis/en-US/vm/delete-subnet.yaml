name: DeleteSubnet
product: vm
use: delete-subnet
short: Deletes a subnet
long: |-
  Delete a subnet.
  **Note**

  * Operations on subnets with instances in it are not supported. You can use [`DescribeSubnets`](describesubnets.md) to query the status of the subnet.
  * Only operations on subnets in the status of `Available` or `Failed` are supported.
examples:
- cmd: zeno vm delete-subnet --subnet-id your-subnet-id
  desc: Delete a subnet.
sdk:
  service: vm
  version: '2026-04-01'
  action: DeleteSubnet
parameters:
- name: subnet-id
  type: string
  required: true
  sdk-field: subnetId
  description: Subnet ID.
