name: DescribeInstances
product: vm
use: describe-instances
short: Queries the details of instances
long: Query the details of instances. You can filter the query results with the instance ID, name, or billing method.
examples:
- cmd: zeno vm describe-instances --page-num 1 --page-size 1
  desc: Query list of virtual machine instances.
sdk:
  service: vm
  version: '2026-04-01'
  action: DescribeInstances
parameters:
- name: instance-ids
  type: string-array
  required: false
  sdk-field: instanceIds
  description: |-
    Instance IDs.
    You can query up to 100 instances in each request.
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: Zone ID to which the instances belong.
- name: internet-charge-type
  type: enum
  required: false
  sdk-field: internetChargeType
  description: |-
    Network pricing model.
    See
    InternetChargeType for details.
  enum-values:
  - value: ByBandwidth
    desc: Billed by the flat rate bandwidth.
  - value: ByTrafficPackage
    desc: Billed by the traffic package size purchased.
  - value: ByClusterBandwidth95
    desc: Billed by the burstable 95th bandwidth of instances in a city-based bandwidth cluster
  - value: BandwidthCluster
    desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
- name: image-id
  type: string
  required: false
  sdk-field: imageId
  description: Image ID.
- name: instance-type
  type: string
  required: false
  sdk-field: instanceType
  description: |-
    Instance model ID.
    You can call DescribeInstanceTypes to obtain the latest specification.
- name: key-id
  type: string
  required: false
  sdk-field: keyId
  description: "SSH key pair ID. \nFor example: key-YWD2QFOl ."
- name: public-ip-addresses
  type: string-array
  required: false
  sdk-field: publicIpAddresses
  description: Public IPv4 addresses.
- name: private-ip-addresses
  type: string-array
  required: false
  sdk-field: privateIpAddresses
  description: Public IPv4 addresses in subnet.
- name: instance-status
  type: enum
  required: false
  sdk-field: instanceStatus
  description: |-
    Instance status.
    See InstanceStatus for details.
  enum-values:
  - value: PENDING
    desc: Pending
  - value: DEPLOYING
    desc: Deploying
  - value: REBUILDING
    desc: Rebuilding.
  - value: REBOOT
    desc: Rebooting.
  - value: RUNNING
    desc: Running.
  - value: STOPPED
    desc: Powered off.
  - value: BOOTING
    desc: Powered on.
  - value: RELEASING
    desc: Releasing.
  - value: STOPPING
    desc: Powering off.
  - value: RECYCLE
    desc: Recycled.
  - value: RECYCLING
    desc: Recycling.
  - value: CREATE_FAILED
    desc: Creating failed.
  - value: IMAGING
    desc: Image creating.
- name: instance-name
  type: string
  required: false
  sdk-field: instanceName
  description: |-
    Instance name.
    If the value ends with *, a fuzzy match will be performed on instanceName, otherwise an exact match will be performed.
- name: subnet-id
  type: string
  required: false
  sdk-field: subnetId
  description: |-
    Subnet ID.
    You can call DescribeSubnets to query information on subnet.
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: Security group ID.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
    Maximum value: 1000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Resource group ID.
    If the value is null, then return all the instances in the authorized resource groups.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query using tag keys.
    A maximum of 20 tag keys can be used.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      Tag key.
      Length limit: 1 to 64 characters.
  - name: value
    type: string
    description: "Tag value. \nLength limit: 1 to 64 characters."
response:
- name: totalCount
  type: integer
  description: Number of instances meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on an instance.
  array-style: json
  item-schema:
  - name: instanceId
    type: string
    description: Instance ID.
  - name: zoneId
    type: string
    description: Zone ID to which the instances belong.
  - name: instanceName
    type: string
    description: Instance name to be displayed.
  - name: instanceType
    type: string
    description: Instance model ID.
  - name: cpuCount
    type: integer
    description: |-
      Quantity of CPU cores.
      Unit: cores.
  - name: memory
    type: integer
    description: |-
      Memory size.
      Unit: GiB.
  - name: imageId
    type: string
    description: Image ID.
  - name: imageName
    type: string
    description: Image name.
  - name: instanceChargeType
    type: enum
    description: |-
      Instance pricing model.
      PREPAID: monthly subscription.
      POSTPAID: pay-as-you-go.
    enum-values:
    - value: PREPAID
      desc: Subscription.
    - value: POSTPAID
      desc: Pay-as-you-go.
  - name: internetMaxBandwidthOut
    type: integer
    description: |-
      Public outbound bandwidth.
      Unit: Mbps.
      Value 0 means no limit, but not exceeds the upper limit of the instance model supported.
  - name: internetChargeType
    type: enum
    description: |-
      Network pricing model.
      See InternetChargeType for details.
    enum-values:
    - value: ByBandwidth
      desc: Billed by the flat rate bandwidth.
    - value: ByTrafficPackage
      desc: Billed by the traffic package size purchased.
    - value: ByClusterBandwidth95
      desc: Billed by the burstable 95th bandwidth of instances in a city-based bandwidth cluster
    - value: BandwidthCluster
      desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
  - name: period
    type: integer
    description: |-
      Period of instance subscription.
      Unit: month.
      For postpaid instances, the value is empty.
  - name: publicIpAddresses
    type: string-array
    description: |-
      List of public IPv4 addresses.
      If the instance primary IP is not added to the public network interface, the primary IP will not be available., and its value will not be returned.
  - name: publicIpv6Addresses
    type: string-array
    description: List of public IPv6 addresses.
  - name: privateIpAddresses
    type: string-array
    description: List of private IP addresses.
  - name: subnetId
    type: string
    description: Subnet ID to which the instances belong..
  - name: createTime
    type: string
    description: |-
      Creation time.
      Use UTC time according to the ISO8601 standard. Format: YYYY-MM-DDThh:mm:ssZ.
  - name: expiredTime
    type: string
    description: |-
      Expiration time.
      Use UTC time according to the ISO8601 standard. Format: YYYY-MM-DDThh:mm:ssZ.
  - name: resourceGroupId
    type: string
    description: Resource group ID to which instances belong.
  - name: resourceGroupName
    type: string
    description: Resource group name to which instances belong.
  - name: instanceStatus
    type: enum
    description: |-
      Status of instances.
      See InstanceStatus for details.
    enum-values:
    - value: PENDING
      desc: Pending
    - value: DEPLOYING
      desc: Deploying
    - value: REBUILDING
      desc: Rebuilding.
    - value: REBOOT
      desc: Rebooting.
    - value: RUNNING
      desc: Running.
    - value: STOPPED
      desc: Powered off.
    - value: BOOTING
      desc: Powered on.
    - value: RELEASING
      desc: Releasing.
    - value: STOPPING
      desc: Powering off.
    - value: RECYCLE
      desc: Recycled.
    - value: RECYCLING
      desc: Recycling.
    - value: CREATE_FAILED
      desc: Creating failed.
    - value: IMAGING
      desc: Image creating.
  - name: trafficPackageSize
    type: float
    description: |-
      Traffic package size purchased.
      Unit: TB.
  - name: securityGroupIds
    type: string-array
    description: ID List of security groups to which the instances are added.
  - name: systemDisk
    type: object
    description: Information of system disk.
  - name: dataDisks
    type: object-array
    description: Information of data disk.
  - name: autoRenew
    type: boolean
    description: |-
      Whether to enable auto-renewal.
      For subscription instances, if you cancel subscription, the field returns false.
  - name: keyId
    type: string
    description: |-
      SSH key pair ID.
      The value may be null, indicating that there is no valid value.
  - name: nic
    type: object
    description: NIC configuration.
  - name: tags
    type: object
    description: Tags bound to resources.
