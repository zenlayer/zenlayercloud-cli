name: DescribeInstances
product: vm
use: describe-instances
short: Queries the details of instances
long: Query the details of instances. You can filter the query results with the instance ID, name, or billing method.
examples:
- cmd: zeno vm describe-instances --page-num 1 --page-size 1
  desc: Query list of virtual machine instances.
sdk:
  service: vm
  version: '2026-04-01'
  action: DescribeInstances
parameters:
- name: instance-ids
  type: string-array
  required: false
  sdk-field: instanceIds
  description: |-
    Instance IDs.
    You can query up to 100 instances in each request.
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: Zone ID to which the instances belong.
- name: internet-charge-type
  type: enum
  required: false
  sdk-field: internetChargeType
  description: |-
    Network pricing model.
    See
    InternetChargeType for details.
  enum-values:
  - value: ByBandwidth
    desc: Billed by the flat rate bandwidth.
  - value: ByTrafficPackage
    desc: Billed by the traffic package size purchased.
  - value: ByClusterBandwidth95
    desc: Billed by the burstable 95th bandwidth of instances in a city-based bandwidth cluster
  - value: BandwidthCluster
    desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
- name: image-id
  type: string
  required: false
  sdk-field: imageId
  description: Image ID.
- name: instance-type
  type: string
  required: false
  sdk-field: instanceType
  description: |-
    Instance model ID.
    You can call DescribeInstanceTypes to obtain the latest specification.
- name: key-id
  type: string
  required: false
  sdk-field: keyId
  description: "SSH key pair ID. \nFor example: key-YWD2QFOl ."
- name: public-ip-addresses
  type: string-array
  required: false
  sdk-field: publicIpAddresses
  description: Public IPv4 addresses.
- name: private-ip-addresses
  type: string-array
  required: false
  sdk-field: privateIpAddresses
  description: Public IPv4 addresses in subnet.
- name: instance-status
  type: enum
  required: false
  sdk-field: instanceStatus
  description: |-
    Instance status.
    See InstanceStatus for details.
  enum-values:
  - value: PENDING
    desc: Pending
  - value: DEPLOYING
    desc: Deploying
  - value: REBUILDING
    desc: Rebuilding.
  - value: REBOOT
    desc: Rebooting.
  - value: RUNNING
    desc: Running.
  - value: STOPPED
    desc: Powered off.
  - value: BOOTING
    desc: Powered on.
  - value: RELEASING
    desc: Releasing.
  - value: STOPPING
    desc: Powering off.
  - value: RECYCLE
    desc: Recycled.
  - value: RECYCLING
    desc: Recycling.
  - value: CREATE_FAILED
    desc: Creating failed.
  - value: IMAGING
    desc: Image creating.
- name: instance-name
  type: string
  required: false
  sdk-field: instanceName
  description: |-
    Instance name.
    If the value ends with *, a fuzzy match will be performed on instanceName, otherwise an exact match will be performed.
- name: subnet-id
  type: string
  required: false
  sdk-field: subnetId
  description: |-
    Subnet ID.
    You can call DescribeSubnets to query information on subnet.
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: Security group ID.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
    Maximum value: 1000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Resource group ID.
    If the value is null, then return all the instances in the authorized resource groups.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query using tag keys.
    A maximum of 20 tag keys can be used.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      Tag key.
      Length limit: 1 to 64 characters.
  - name: value
    type: string
    description: "Tag value. \nLength limit: 1 to 64 characters."
response:
- name: totalCount
  type: integer
  description: Number of instances meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on an instance.
  array-style: json
  item-schema:
  - name: instanceId
    type: string
    description: Instance ID.
  - name: zoneId
    type: string
    description: Zone ID to which the instances belong.
  - name: instanceName
    type: string
    description: Instance name to be displayed.
  - name: instanceType
    type: string
    description: Instance model ID.
  - name: cpuCount
    type: integer
    description: |-
      Quantity of CPU cores.
      Unit: cores.
  - name: memory
    type: integer
    description: |-
      Memory size.
      Unit: GiB.
  - name: imageId
    type: string
    description: Image ID.
  - name: imageName
    type: string
    description: Image name.
  - name: instanceChargeType
    type: enum
    description: |-
      Instance pricing model.
      PREPAID: monthly subscription.
      POSTPAID: pay-as-you-go.
    enum-values:
    - value: PREPAID
      desc: Subscription.
    - value: POSTPAID
      desc: Pay-as-you-go.
  - name: internetMaxBandwidthOut
    type: integer
    description: |-
      Public outbound bandwidth.
      Unit: Mbps.
      Value 0 means no limit, but not exceeds the upper limit of the instance model supported.
  - name: internetChargeType
    type: enum
    description: |-
      Network pricing model.
      See InternetChargeType for details.
    enum-values:
    - value: ByBandwidth
      desc: Billed by the flat rate bandwidth.
    - value: ByTrafficPackage
      desc: Billed by the traffic package size purchased.
    - value: ByClusterBandwidth95
      desc: Billed by the burstable 95th bandwidth of instances in a city-based bandwidth cluster
    - value: BandwidthCluster
      desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
  - name: period
    type: integer
    description: |-
      Period of instance subscription.
      Unit: month.
      For postpaid instances, the value is empty.
  - name: publicIpAddresses
    type: string-array
    description: |-
      List of public IPv4 addresses.
      If the instance primary IP is not added to the public network interface, the primary IP will not be available., and its value will not be returned.
  - name: publicIpv6Addresses
    type: string-array
    description: List of public IPv6 addresses.
  - name: privateIpAddresses
    type: string-array
    description: List of private IP addresses.
  - name: subnetId
    type: string
    description: Subnet ID to which the instances belong..
  - name: createTime
    type: string
    description: |-
      Creation time.
      Use UTC time according to the ISO8601 standard. Format: YYYY-MM-DDThh:mm:ssZ.
  - name: expiredTime
    type: string
    description: |-
      Expiration time.
      Use UTC time according to the ISO8601 standard. Format: YYYY-MM-DDThh:mm:ssZ.
  - name: resourceGroupId
    type: string
    description: Resource group ID to which instances belong.
  - name: resourceGroupName
    type: string
    description: Resource group name to which instances belong.
  - name: instanceStatus
    type: enum
    description: |-
      Status of instances.
      See InstanceStatus for details.
    enum-values:
    - value: PENDING
      desc: Pending
    - value: DEPLOYING
      desc: Deploying
    - value: REBUILDING
      desc: Rebuilding.
    - value: REBOOT
      desc: Rebooting.
    - value: RUNNING
      desc: Running.
    - value: STOPPED
      desc: Powered off.
    - value: BOOTING
      desc: Powered on.
    - value: RELEASING
      desc: Releasing.
    - value: STOPPING
      desc: Powering off.
    - value: RECYCLE
      desc: Recycled.
    - value: RECYCLING
      desc: Recycling.
    - value: CREATE_FAILED
      desc: Creating failed.
    - value: IMAGING
      desc: Image creating.
  - name: trafficPackageSize
    type: float
    description: |-
      Traffic package size purchased.
      Unit: TB.
  - name: securityGroupIds
    type: string-array
    description: ID List of security groups to which the instances are added.
  - name: systemDisk
    type: object
    description: Information of system disk.
    object-schema:
    - name: diskId
      type: string
      description: |-
        System disk ID.This is an output parameter returned in the data query APIs like DescribeInstances. Can't be used as an input parameter in data writer interfaces like
        CreateInstances.
    - name: diskSize
      type: integer
      description: 'Size of system disk.Unit: GiB.'
    - name: diskCategory
      type: string
      description: 'Disk type.STANDARD: Standard DiskSSD: Solid State DriveThe default value is Standard Disk.'
  - name: dataDisks
    type: object-array
    description: Information of data disk.
    array-style: json
    item-schema:
    - name: diskId
      type: string
      description: |-
        Data disk ID.
        This is an output parameter returned in the data query APIs like DescribeInstances. Can't be used as an input parameter in data writer interfaces like
        CreateInstances.
    - name: diskName
      type: string
      description: |-
        Data disk name.
        This is an output parameter returned in the data query APIs like DescribeInstances.
    - name: diskSize
      type: integer
      description: |-
        Size of data disk.
        Unit: GiB.
    - name: diskAmount
      type: integer
      description: |-
        Quantity of data disks.
        This parameter is used only as the input parameter in interfaces such as CreateInstances and InquiryPriceCreateInstance.
    - name: portable
      type: boolean
      description: |-
        Whether the data disk is detachable or not.
        This parameter is only used to query the output parameter, while not the input parameter.
        true: the data disk is detachable, and thus will not be deleted while deleting its attached instance.
        false: the data disk is undetachable, and thus will be deleted at the same time while deleting its attached instance.
    - name: diskCategory
      type: string
      description: 'Disk type.STANDARD: Standard DiskSSD: Solid State DriveThe default value is STANDARD.'
    - name: diskPrice
      type: object
      description: |-
        Price of data disks.
        This parameter is used only as the output parameter in interfaces such as
        InquiryPriceCreateInstance.
      object-schema:
      - name: discount
        type: float
        description: |-
          Discount.
          For example, 80.0 means 20% off.
      - name: discountPrice
        type: float
        description: |-
          Discount price of postpaid resources.
          Only used in pay-as-you-go model. For tiered billing, the value is empty.
      - name: originalPrice
        type: float
        description: |-
          Original price of prepaid resources.
          Only used in subscription model. For pay-as-you-go model, the value is empty.
      - name: unitPrice
        type: float
        description: |-
          Original unit price of postpaid resources.
          Only used in pay-as-you-go model. For tiered billing, the value is empty.
      - name: discountUnitPrice
        type: float
        description: |-
          Discount unit price of postpaid resources.
          Only used in pay-as-you-go model. For tiered billing, the value is empty.
      - name: chargeUnit
        type: string
        description: |-
          Unit of postpaid billing.
          Only used in pay-as-you-go model.
          Value range:
          HOUR : you will be billed by hour.
          DAY : you will be billed by day.
          MONTH : you will be billed by month. For example, the burstable 95th pricing model.
      - name: stepPrices
        type: object-array
        description: |-
          Tiered price of postpaid billing.
          Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
        array-style: json
        item-schema:
        - name: stepStart
          type: float
          description: First price range of a tiered price.
        - name: stepEnd
          type: float
          description: Last price range of a tiered price.
        - name: unitPrice
          type: float
          description: |-
            Original unit price of current price range.
            Only used in pay-as-you-go model.
        - name: discountUnitPrice
          type: float
          description: |-
            Discount unit price of current price range.
            Only used in pay-as-you-go model.
      - name: amountUnit
        type: string
        description: |-
          Unit of overage usage.
          If the value is empty, it means there is no unit.
      - name: excessUnitPrice
        type: float
        description: Original unit price of overages.
      - name: excessDiscountUnitPrice
        type: float
        description: Discount unit price of overages.
      - name: excessAmountUnit
        type: string
        description: |-
          Unit of overage usage.
          If the value is empty, it means there is no unit.
      - name: category
        type: enum
        description: Information on the price.
        enum-values:
        - value: STANDARD
          desc: Standard price.
        - value: CUSTOMIZED
          desc: Fixed price.
  - name: autoRenew
    type: boolean
    description: |-
      Whether to enable auto-renewal.
      For subscription instances, if you cancel subscription, the field returns false.
  - name: keyId
    type: string
    description: |-
      SSH key pair ID.
      The value may be null, indicating that there is no valid value.
  - name: nic
    type: object
    description: NIC configuration.
    object-schema:
    - name: wanName
      type: string
      description: |-
        Public NIC name.
        Only numbers and lowercase letters are allowed, starting with a letter with a length limit of 4 to 15 characters.
        The default public NIC name is eth0.
    - name: lanName
      type: string
      description: |-
        Private NIC name.
        Only numbers and lowercase letters are allowed, starting with a letter with a length limit of 4 to 15 characters.
        The default private NIC name is eth1.
  - name: tags
    type: object
    description: Tags bound to resources.
    object-schema:
    - name: tags
      type: object-array
      description: List of tags.
      array-style: json
      item-schema:
      - name: key
        type: string
        description: |-
          Tag key.
          Length limit: 1 to 64 characters.
      - name: value
        type: string
        description: "Tag value. \nLength limit: 1 to 64 characters."
