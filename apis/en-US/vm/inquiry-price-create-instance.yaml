name: InquiryPriceCreateInstance
product: vm
use: inquiry-price-create-instance
short: Queries the price of creating a virtual machine instance
long: Query the price of creating a virtual machine instance.
examples:
- cmd: zeno vm inquiry-price-create-instance --zone-id SAO-A --instance-type c.1c2g --image-id img-yKK4q6XybymPgfx7ynUUqC3N8 --instance-charge-type PREPAID --internet-charge-type ByBandwidth --internet-max-bandwidth-out 1
  desc: Query the price of a subscription instance with the public network billing method of flat rate.
sdk:
  service: vm
  version: '2026-04-01'
  action: InquiryPriceCreateInstance
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: ID of zone to which the instance belongs.
- name: image-id
  type: string
  required: false
  sdk-field: imageId
  description: Image ID.
- name: instance-type
  type: string
  required: true
  sdk-field: instanceType
  description: |-
    Instance model.
    To view specific values, you can call DescribeZoneInstanceConfigInfos.
- name: instance-charge-type
  type: enum
  required: true
  sdk-field: instanceChargeType
  description: |-
    Instance pricing model.
    PREPAID: subscription
    POSTPAID: pay-as-you-go.
  enum-values:
  - value: PREPAID
    desc: Subscription.
  - value: POSTPAID
    desc: Pay-as-you-go.
- name: instance-charge-prepaid
  type: object
  required: false
  sdk-field: instanceChargePrepaid
  description: Details of the monthly subscription, including the purchase period, auto-renewal. It is required if the instanceChargeType is PREPAID.
  object-schema:
  - name: period
    type: integer
    description: |-
      Period of subscription.
      Unit: month.
- name: instance-charge-postpaid
  type: object
  required: false
  sdk-field: instanceChargePostpaid
  description: Postpaid mode parameter settings.
  object-schema:
  - name: period
    type: integer
    description: |-
      Postpaid duration.
      Unit: Month.
- name: internet-charge-type
  type: enum
  required: true
  sdk-field: internetChargeType
  description: |-
    Network pricing model.
    See InternetChargeType for details.
  enum-values:
  - value: ByBandwidth
    desc: Billed by the flat rate bandwidth.
  - value: ByTrafficPackage
    desc: Billed by the traffic package size purchased.
  - value: ByClusterBandwidth95
    desc: Billed by the burstable 95th bandwidth of instances in a city-based bandwidth cluster
  - value: BandwidthCluster
    desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
- name: traffic-package-size
  type: float
  required: false
  sdk-field: trafficPackageSize
  description: |-
    Traffic package size (TB).
    The parameter is valid only when internetChargeType is ByTrafficPackage.
- name: internet-max-bandwidth-out
  type: integer
  required: false
  sdk-field: internetMaxBandwidthOut
  description: |-
    Public network bandwidth cap (Mbps).
    Default value: 1 Mbps.
    The parameter value differs by different instance models. See bandwidth configuration for details.
- name: instance-count
  type: integer
  required: true
  sdk-field: instanceCount
  description: The number of instances to be purchased.
- name: system-disk
  type: object
  required: true
  sdk-field: systemDisk
  description: System disk.
  object-schema:
  - name: diskId
    type: string
    description: |-
      System disk ID.This is an output parameter returned in the data query APIs like DescribeInstances. Can't be used as an input parameter in data writer interfaces like
      CreateInstances.
  - name: diskSize
    type: integer
    description: 'Size of system disk.Unit: GiB.'
  - name: diskCategory
    type: string
    description: 'Disk type.STANDARD: Standard DiskSSD: Solid State DriveThe default value is Standard Disk.'
- name: data-disks
  type: object-array
  required: false
  sdk-field: dataDisks
  description: Data disk.
  array-style: json
  item-schema:
  - name: diskId
    type: string
    description: |-
      Data disk ID.
      This is an output parameter returned in the data query APIs like DescribeInstances. Can't be used as an input parameter in data writer interfaces like
      CreateInstances.
  - name: diskName
    type: string
    description: |-
      Data disk name.
      This is an output parameter returned in the data query APIs like DescribeInstances.
  - name: diskSize
    type: integer
    description: |-
      Size of data disk.
      Unit: GiB.
  - name: diskAmount
    type: integer
    description: |-
      Quantity of data disks.
      This parameter is used only as the input parameter in interfaces such as CreateInstances and InquiryPriceCreateInstance.
  - name: portable
    type: boolean
    description: |-
      Whether the data disk is detachable or not.
      This parameter is only used to query the output parameter, while not the input parameter.
      true: the data disk is detachable, and thus will not be deleted while deleting its attached instance.
      false: the data disk is undetachable, and thus will be deleted at the same time while deleting its attached instance.
  - name: diskCategory
    type: string
    description: 'Disk type.STANDARD: Standard DiskSSD: Solid State DriveThe default value is STANDARD.'
  - name: diskPrice
    type: object
    description: |-
      Price of data disks.
      This parameter is used only as the output parameter in interfaces such as
      InquiryPriceCreateInstance.
    object-schema:
    - name: discount
      type: float
      description: |-
        Discount.
        For example, 80.0 means 20% off.
    - name: discountPrice
      type: float
      description: |-
        Discount price of postpaid resources.
        Only used in pay-as-you-go model. For tiered billing, the value is empty.
    - name: originalPrice
      type: float
      description: |-
        Original price of prepaid resources.
        Only used in subscription model. For pay-as-you-go model, the value is empty.
    - name: unitPrice
      type: float
      description: |-
        Original unit price of postpaid resources.
        Only used in pay-as-you-go model. For tiered billing, the value is empty.
    - name: discountUnitPrice
      type: float
      description: |-
        Discount unit price of postpaid resources.
        Only used in pay-as-you-go model. For tiered billing, the value is empty.
    - name: chargeUnit
      type: string
      description: |-
        Unit of postpaid billing.
        Only used in pay-as-you-go model.
        Value range:
        HOUR : you will be billed by hour.
        DAY : you will be billed by day.
        MONTH : you will be billed by month. For example, the burstable 95th pricing model.
    - name: stepPrices
      type: object-array
      description: |-
        Tiered price of postpaid billing.
        Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
      array-style: json
      item-schema:
      - name: stepStart
        type: float
        description: First price range of a tiered price.
      - name: stepEnd
        type: float
        description: Last price range of a tiered price.
      - name: unitPrice
        type: float
        description: |-
          Original unit price of current price range.
          Only used in pay-as-you-go model.
      - name: discountUnitPrice
        type: float
        description: |-
          Discount unit price of current price range.
          Only used in pay-as-you-go model.
    - name: amountUnit
      type: string
      description: |-
        Unit of overage usage.
        If the value is empty, it means there is no unit.
    - name: excessUnitPrice
      type: float
      description: Original unit price of overages.
    - name: excessDiscountUnitPrice
      type: float
      description: Discount unit price of overages.
    - name: excessAmountUnit
      type: string
      description: |-
        Unit of overage usage.
        If the value is empty, it means there is no unit.
    - name: category
      type: enum
      description: Information on the price.
      enum-values:
      - value: STANDARD
        desc: Standard price.
      - value: CUSTOMIZED
        desc: Fixed price.
