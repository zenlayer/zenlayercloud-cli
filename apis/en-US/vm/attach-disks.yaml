name: AttachDisks
product: vm
use: attach-disks
short: Attaches disks to an instance
long: |-
  Attach disks to instance.
  **Note**

  * A maximum of 10 disks can be attached to an instance in one request.
  * Quantity of attached disks cannot exceed available disk numbers of an instance, that is usually 15 disks.
  * The disk and the instance to which you want to attach the disk reside in the same zone.
  * You can only attach disks to the available instance. Please note that status of `DEPLOYING` or `PENDING` is not available.
  * Disks must be detachable (`portable` = `true`) .
  * This API is an async API. A request ID is returned after the creation request is sent. However, it does not mean the operation has been completed. You can use [`DescribeDisks`](describedisks.md) to query the status of the disk. If the status changes from `AVAILABLE` to `IN_USE`, it means that the disk is attached successfully.
examples:
- cmd: zeno vm attach-disks --disk-ids your-disk-id --instance-id your-instance-id
  desc: Attach disks to an instance.
sdk:
  service: vm
  version: '2026-04-01'
  action: AttachDisks
parameters:
- name: disk-ids
  type: string-array
  required: true
  sdk-field: diskIds
  description: ID list of disks.
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: ID of instance to which the disks to be attached.
