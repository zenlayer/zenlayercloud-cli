name: AuthorizeSecurityGroupRules
product: vm
use: authorize-security-group-rules
short: Adds security group rules
long: |-
  Add security group rules.
  **Note**

  * Status of security group should be `Available`.
  * Rules cannot be duplicated in one rule direction.
  * The upper limit of quantity of security group rules is 40, including 20 inbound rules and 20 outbound rules.
  * Editing is not supported for default security group.
examples:
- cmd: zeno vm authorize-security-group-rules --security-group-id your-security-group-id --rule-infos "{direction=ingress, policy=accept, priority=3, ipProtocol=tcp, portRange=22/22, cidrIp=0.0.0.0/0}"
  desc: Add security group rules.
sdk:
  service: vm
  version: '2026-04-01'
  action: AuthorizeSecurityGroupRules
parameters:
- name: security-group-id
  type: string
  required: true
  sdk-field: securityGroupId
  description: Security group ID.
- name: rule-infos
  type: object-array
  required: true
  sdk-field: ruleInfos
  description: Security group rules.
  array-style: json
  item-schema:
  - name: direction
    type: string
    description: |-
      Traffic directions.
      ingress: inbound rules.
      egress: outbound rules.
  - name: policy
    type: string
    description: |-
      Access strategy.
      Available values:
      accept: allows access by default.
      Only accept strategy is supported for now.
  - name: priority
    type: integer
    description: Rule priority.
  - name: ipProtocol
    type: string
    description: |-
      Transport protocol. The value is case sensitive.
      Available value:tcp: TCP protocol.udp: UDP protocol.icmp: ICMP protocol.all: all protocols supported.
  - name: portRange
    type: string
    description: |-
      Destination port range.
      Available values:For TCP and UDP protocols: The value ranges from 1 to 65535. Use a slash (/) to separate the start port number and the end port number. Examples: 1/200; incorrect example: 200/1.For ICMP protocol: -1/-1.For all protocols: -1/-1.
  - name: cidrIp
    type: string
    description: |-
      Source IP address range.
      Default value: 0.0.XX.XX/0.
  - name: description
    type: string
    description: Rule description.
