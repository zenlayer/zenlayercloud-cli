name: ModifySecurityGroupsAttribute
product: vm
use: modify-security-groups-attribute
short: Modifies the information about security groups, such as the names
long: The API is used to modify the attributes of one or more security groups. Only the security group name to be displayed can be modified for now.
examples:
- cmd: zeno vm modify-security-groups-attribute --security-group-ids 791721259766392536 --security-group-name abc12345 --description 123456
  desc: Modify security group names in batches.
sdk:
  service: vm
  version: '2026-04-01'
  action: ModifySecurityGroupsAttribute
parameters:
- name: security-group-name
  type: string
  required: true
  sdk-field: securityGroupName
  description: |-
    Security group name to be displayed.
    This parameter can contain up to 64 characters. Only letters, numbers, - and periods (.) are supported.
- name: description
  type: string
  required: false
  sdk-field: description
  description: |-
    Security group description.
    This parameter must contain 2 to 255 characters.
- name: security-group-ids
  type: string-array
  required: true
  sdk-field: securityGroupIds
  description: |-
    Security group ID(s).
    To obtain the security group IDs, you can call DescribeSecurityGroups and look for securityGroupId in the response.
    The maximum number of security groups in each request is 100.
