name: DetachNetworkInterface
product: zec
use: detach-network-interface
short: Detaches the vNIC from the instance
long: |-
  Detach the vNIC from the instance.
  **Note**

  * The instance state should be Running.
  * The vNIC state should be `USED`.
  * Operations on the primary vNIC are not supported.
examples:
- cmd: zeno zec detach-network-interface --nic-id XXX
  desc: Detach the vNIC.
sdk:
  service: zec
  version: '2025-09-01'
  action: DetachNetworkInterface
parameters:
- name: nic-id
  type: string
  required: true
  sdk-field: nicId
  description: ID of the vNIC.
