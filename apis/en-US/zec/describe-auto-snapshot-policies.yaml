name: DescribeAutoSnapshotPolicies
product: zec
use: describe-auto-snapshot-policies
short: Queries the details of snapshot schedules
long: Query the details of snapshot schedules.
examples:
- cmd: zeno zec describe-auto-snapshot-policies
  desc: Query the list of snapshot schedule.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeAutoSnapshotPolicies
parameters:
- name: auto-snapshot-policy-ids
  type: string-array
  required: false
  sdk-field: autoSnapshotPolicyIds
  description: Filter by the ID of the snapshot schedule.
- name: zone-ids
  type: string-array
  required: false
  sdk-field: zoneIds
  description: Filter by the availability zone ID of the snapshot schedule.
- name: auto-snapshot-policy-name
  type: string
  required: false
  sdk-field: autoSnapshotPolicyName
  description: |-
    Filter by the name of the snapshot schedule.
    This field supports fuzzy search.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Filter by resource group ID.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: Number of items in the current page result.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query using tag keys.
    A maximum of 20 tag keys can be used.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 64 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 64 characters.'
response:
- name: dataSet
  type: object-array
  description: The data results of the snapshot schedule queried.
  array-style: json
  item-schema:
  - name: autoSnapshotPolicyId
    type: string
    description: Snapshot schedule ID.
  - name: zoneId
    type: string
    description: Availability zone ID.
  - name: autoSnapshotPolicyName
    type: string
    description: Snapshot schedule name.
  - name: repeatWeekDays
    type: integer-array
    description: |-
      The backup date of the schedule.
      Unit: day, cycle: week (e.g., 1 = Monday)
      Available range: [1, 7].
  - name: hours
    type: integer-array
    description: |-
      Specify the start time of the snapshot schedule.
      UTC time is used. Unit: hour.
      24 time points are available from 00:00 to 23:00, 1 = 01:00, and so on.
      Available range: [0, 23].
  - name: retentionDays
    type: integer
    description: |-
      Retention time of automatic snapshots. Unit: day.
      If the value is set to -1, it means that it is retained indefinitely.
      The default is indefinite.
      Value range: -1 or [1,65535].
  - name: diskNum
    type: integer
    description: Source disk quantity.
  - name: createTime
    type: string
    description: Creation time.
  - name: resourceGroup
    type: object
    description: Resource group information.
    object-schema:
    - name: resourceGroupId
      type: string
      description: Resource group ID.
    - name: resourceGroupName
      type: string
      description: Resource group name.
  - name: diskIdSet
    type: string-array
    description: Source disk information.
  - name: tags
    type: object
    description: Tags bound to resources.
    object-schema:
    - name: tags
      type: object-array
      description: List of tags.
      array-style: json
      item-schema:
      - name: key
        type: string
        description: 'Tag key. Length limit: 1 to 64 characters.'
      - name: value
        type: string
        description: 'Tag value. Length limit: 1 to 64 characters.'
- name: totalCount
  type: integer
  description: The total number of matching results.
