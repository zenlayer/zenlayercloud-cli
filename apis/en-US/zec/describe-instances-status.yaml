name: DescribeInstancesStatus
product: zec
use: describe-instances-status
short: Queries the status of one or more instances
long: Query the status of one or more elastic compute instances.
examples:
- cmd: zeno zec describe-instances-status
  desc: Query status of instances.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeInstancesStatus
parameters:
- name: instance-ids
  type: string-array
  required: false
  sdk-field: instanceIds
  description: |-
    Instance IDs.
    You can query up to 100 instances in each request. If the value is empty, return status of instances in one page, that is 20 by default.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
    Maximum value: 1000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Resource Group ID.
