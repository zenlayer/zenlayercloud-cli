name: DeleteIpv6Cidr
product: zec
use: delete-ipv6-cidr
short: Deletes an IPv6 CIDR block
long: |-
  Delete an IPv6 CIDR block.
  **Note**

  * If any IP ranges of the CIDR block have been assigned to subnets, the CIDR block cannot be deleted.
  * For regular accounts, once a CIDR block is deleted, the resource will be immediately reclaimed. This operation is irreversible.
examples:
- cmd: zeno zec delete-ipv6-cidr --cidr-id <cidrId>
  desc: Delete a CIDR block.
sdk:
  service: zec
  version: '2025-09-01'
  action: DeleteIpv6Cidr
parameters:
- name: cidr-id
  type: string
  required: true
  sdk-field: cidrId
  description: IPv6 CIDR block.
