name: DescribeIpv6Cidrs
product: zec
use: describe-ipv6-cidrs
short: Queries the details of one or more IPv6 CIDR blocks
long: Query IPv6 CIDR block information in the account. You can filter by CIDR ID, region, name, or address block. Supports tag-based filtering and pagination.
examples:
- cmd: zeno zec describe-ipv6-cidrs --cidr-ids xxx --region-id asia-east-1 --cidr-block 2400:8a00::/28 --page-size 10 --page-num 1
  desc: Query the list of CIDR blocks within `2400:8a00::/28`.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeIpv6Cidrs
parameters:
- name: cidr-ids
  type: string-array
  required: false
  sdk-field: cidrIds
  description: Filter by one or more CIDR block IDs.
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: Filter by the region ID where the CIDR block is located.
- name: name
  type: string
  required: false
  sdk-field: name
  description: Filter by CIDR block name. Fuzzy search is supported.
- name: cidr-block
  type: string
  required: false
  sdk-field: cidrBlock
  description: Filter by CIDR block address.
- name: asn
  type: integer
  required: false
  sdk-field: asn
  description: Filter by ASN.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Filter by resource group ID.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 'The returned page size. Default value: 20. Maximum  value: 1000.'
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Search by tag key.
    You can query up to 20 tag keys in each request.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Search by tag.
    You can query up to 20 tags in each request.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 64 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 64 characters.'
response:
- name: totalCount
  type: integer
  description: Number of resources meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Data for the list of IPv6 CIDR blocks.
  array-style: json
  item-schema:
  - name: cidrId
    type: string
    description: IPv6 CIDR block ID.
  - name: regionId
    type: string
    description: The region ID to which the CIDR block belongs.
  - name: name
    type: string
    description: CIDR block name.
  - name: cidrBlock
    type: string
    description: 'CIDR block address, for example: 2400:8a00::/28.'
  - name: source
    type: enum
    description: |-
      The ownership of the CIDR block.
      For example, CONSOLE (owned by Zenlayer) or BYOIP (customer-provided IP).
    enum-values:
    - value: CONSOLE
      desc: CIDR block created on Console.
    - value: BYOIP
      desc: Bring your own IP (BYOIP).
    - value: SDN_RIPT
      desc: IP Transit CIDR block.
  - name: networkLineType
    type: enum
    description: |-
      CIDR network type.
      The public IP line type supported by this CIDR block.
    enum-values:
    - value: PremiumBGP
      desc: |-
        Premium BGP network.
        High-performance network.
    - value: CN2
      desc: China Telecom CN2 network.
    - value: LocalLine
      desc: Provided by a local ISP.
    - value: StandardBGP
      desc: |-
        Standard BGP network.
        General-purpose network with cost optimization.
    - value: CMI
      desc: 1-Line IP China Mobile.
    - value: CUG
      desc: 1-Line IP China Unicom.
    - value: CTG
      desc: 1-Line IP China Telecom.
  - name: subnetIds
    type: string-array
    description: Set of subnet IDs.
  - name: nicIds
    type: string-array
    description: Set of network interface IDs.
  - name: netmask
    type: integer
    description: |-
      Subnet mask.
      The length of the network prefix in CIDR notation.
  - name: poolId
    type: string
    description: |-
      The ID of the pool.
      The public IP pool to which this CIDR block belongs.
  - name: createTime
    type: string
    description: The creation time of the CIDR block.
  - name: expiredTime
    type: string
    description: The expiration time of the CIDR block.
  - name: resourceGroup
    type: object
    description: The resource group to which this CIDR block belongs.
  - name: status
    type: enum
    description: The state of the CIDR block .
    enum-values:
    - value: CREATING
      desc: Creating.
    - value: AVAILABLE
      desc: Available to be used.
    - value: CHANGING
      desc: Changing.
    - value: RECYCLING
      desc: Recycling.
    - value: RECYCLED
      desc: Recycled.
    - value: DELETING
      desc: Deleting.
    - value: FAILED
      desc: Created failed.
  - name: asn
    type: integer
    description: |-
      ASN.
      Only available when the CIDR source is BYOIP.
  - name: tags
    type: object
    description: The bound tags of this CIDR block.
