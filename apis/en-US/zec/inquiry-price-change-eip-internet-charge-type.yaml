- name: bandwidthPrices
  type: object-array
  description: |-
    Bandwidth price details for each traffic direction.
    Multiple items are returned for the PathBasedBandwidthIP line type; a single item (trafficType=ALL) is returned for other line types.
  array-style: json
  item-schema:
  - name: trafficType
    type: string
    description: Traffic direction type.
  - name: price
    type: object
    description: Bandwidth price for this traffic direction.
