name: InquiryPriceChangeEipInternetChargeType
product: zec
use: inquiry-price-change-eip-internet-charge-type
short: Inquires the price after changing the EIP billing mode
long: |-
  Inquire the price after changing the EIP billing mode
  **Notes**

  * Only EIPs not billed by unlimited traffic support billing mode changes.
  * When changing to bandwidth billing (`ByBandwidth`), `bandwidth` is required.
  * When changing to traffic package billing (`ByTrafficPackage`), `flowPackage` is required (in TB, a multiple of 0.1 or 0).
  * When changing to shared bandwidth package billing (`BandwidthCluster`), `clusterId` is required.
examples:
- cmd: zeno zec inquiry-price-change-eip-internet-charge-type --eip-id eip-xxx --internet-charge-type ByBandwidth --bandwidth 20
  desc: Inquires the price after changing the EIP billing mode to bandwidth billing (20 Mbps bandwidth).
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPriceChangeEipInternetChargeType
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: The elastic IP to operate on.
- name: internet-charge-type
  type: enum
  required: true
  sdk-field: internetChargeType
  description: Target billing mode to change to.
  enum-values:
  - value: ByBandwidth
    desc: Billed by the flat rate bandwidth.
  - value: ByTrafficPackage
    desc: Billed by the traffic package size purchased.
  - value: BandwidthCluster
    desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
- name: bandwidth
  type: integer
  required: false
  sdk-field: bandwidth
  description: |-
    Bandwidth limit.
    Unit: Mbps.
    Required when the billing mode is bandwidth billing (ByBandwidth).
- name: flow-package
  type: float
  required: false
  sdk-field: flowPackage
  description: |-
    Traffic package size.
    Unit: TB.
    Required when the billing mode is traffic package billing (ByTrafficPackage).
- name: cluster-id
  type: string
  required: false
  sdk-field: clusterId
  description: |-
    Shared bandwidth package ID.
    Required when the billing mode is shared bandwidth package billing (BandwidthCluster).
response:
- name: eipPrice
  type: object
  description: |-
    Retention price of the elastic IP.
    Null for IPs created via CIDR.
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR : you will be billed by hour.
      DAY : you will be billed by day.
      MONTH : you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage,
      such as Mbps , LCU , and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The category to which the price belongs.
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
- name: bandwidthPrice
  type: object
  description: |-
    Bandwidth price for the elastic IP.
    Null for the PathBasedBandwidthIP line type; see bandwidthPrices for details.
  object-schema:
