name: DescribeNetworkInterfaces
product: zec
use: describe-network-interfaces
short: Queries the information of one or more specified vNICs
long: Query the information of one or more specified vNICs. Users can search for vNIC information based on vNIC ID, vNIC name, etc.
examples:
- cmd: zeno zec describe-network-interfaces --nic-type Secondary --page-size 1 --page-num 1
  desc: Query the list of secondary network interfaces.
- cmd: zeno zec describe-network-interfaces --subnet-id <subnetId> --nic-subnet-type IPv4_IPv6 --page-size 20 --page-num 1
  desc: Query NICs in a subnet that still hold an IPv6 address (use before disabling subnet IPv6).
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeNetworkInterfaces
parameters:
- name: nic-ids
  type: string-array
  required: false
  sdk-field: nicIds
  description: |-
    Filter by vNIC ID(s).
    Up to 100 IDs can be specified per request.
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    vNIC name.
    Fuzzy search supported.
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: Region ID.
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: Filter by the VPC ID that the network interface belongs to.
- name: subnet-id
  type: string
  required: false
  sdk-field: subnetId
  description: ID of Subnet.
- name: instance-id
  type: string
  required: false
  sdk-field: instanceId
  description: ID of Instance.
- name: status
  type: enum
  required: false
  sdk-field: status
  description: vNIC state.
  enum-values:
  - value: PENDING
    desc: Creating.
  - value: AVAILABLE
    desc: Available. Not bound to any instance.
  - value: ATTACHING
    desc: Binding.
  - value: DETACHING
    desc: Unbinding.
  - value: DELETING
    desc: Deleting.
  - value: CREATE_FAILED
    desc: Creating failed.
  - value: USED
    desc: Bound.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20 ;
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
- name: nic-type
  type: enum
  required: false
  sdk-field: nicType
  description: vNIC type.
  enum-values:
  - value: Primary
    desc: Primary network interface.
  - value: Secondary
    desc: Secondary network interface.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Resource Group ID.
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: Filter by the security group ID to which the network interface belongs.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query using tag keys.
    A maximum of 20 tag keys can be used.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 64 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 64 characters.'
- name: nic-subnet-type
  type: enum
  required: false
  sdk-field: nicSubnetType
  description: 'Filter by NIC stack type. Valid values: IPv4, IPv4_IPv6, IPv6. Use together with subnetId to list all NICs in the subnet that still hold an IPv6 address.'
  enum-values:
  - value: IPv4
    desc: IPv4 stack type only.
  - value: IPv4_IPv6
    desc: IPv4 and IPv6 stack type.
  - value: IPv6
    desc: IPv6 stack type only.
response:
- name: totalCount
  type: integer
  description: Number of vNICs meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on vNIC(s).
  array-style: json
  item-schema:
  - name: nicId
    type: string
    description: vNIC ID.
  - name: name
    type: string
    description: vNIC name.
  - name: status
    type: enum
    description: vNIC status.
    enum-values:
    - value: PENDING
      desc: Creating.
    - value: AVAILABLE
      desc: Available. Not bound to any instance.
    - value: ATTACHING
      desc: Binding.
    - value: DETACHING
      desc: Unbinding.
    - value: DELETING
      desc: Deleting.
    - value: CREATE_FAILED
      desc: Creating failed.
    - value: USED
      desc: Bound.
  - name: nicType
    type: enum
    description: vNIC type.
    enum-values:
    - value: Primary
      desc: Primary network interface.
    - value: Secondary
      desc: Secondary network interface.
  - name: regionId
    type: string
    description: Region ID.
  - name: nicSubnetType
    type: enum
    description: IP stack type of the vNIC.
    enum-values:
    - value: IPv4
      desc: IPv4 stack type only.
    - value: IPv4_IPv6
      desc: IPv4 and IPv6 stack type.
    - value: IPv6
      desc: IPv6 stack type only.
  - name: publicIpList
    type: string-array
    description: Public IP addresses.
  - name: privateIpList
    type: string-array
    description: Private IP addresses.
  - name: primaryIpv4
    type: string
    description: Primary private IPv4 address.
  - name: primaryIpv6
    type: string
    description: |-
      Primary private IPv6 address.
      If the IP stack type is IPv4, this value is null.
  - name: ipv6Cidr
    type: string
    description: |-
      IPv6 CIDR block.
      If the IP stack type is IPv4, this value is null.
  - name: secondaryIpv4s
    type: string-array
    description: Secondary private IPv4 addresses.
  - name: macAddress
    type: string
    description: MAC address.
  - name: instanceId
    type: string
    description: Instance ID.
  - name: vpcId
    type: string
    description: VPC ID.
  - name: subnetId
    type: string
    description: Subnet ID.
  - name: createTime
    type: string
    description: Creation time.
  - name: updateTime
    type: string
    description: Updating time.
  - name: resourceGroup
    type: object
    description: Resource group information.
    object-schema:
    - name: resourceGroupId
      type: string
      description: Resource group ID.
    - name: resourceGroupName
      type: string
      description: Resource group name.
  - name: securityGroupId
    type: string
    description: Associated security group ID of the vNIC.
  - name: tags
    type: object
    description: Tags bound to resources.
    object-schema:
    - name: tags
      type: object-array
      description: List of tags.
      array-style: json
      item-schema:
      - name: key
        type: string
        description: 'Tag key. Length limit: 1 to 64 characters.'
      - name: value
        type: string
        description: 'Tag value. Length limit: 1 to 64 characters.'
