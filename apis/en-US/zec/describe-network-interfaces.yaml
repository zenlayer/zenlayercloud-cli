name: DescribeNetworkInterfaces
product: zec
use: describe-network-interfaces
short: Queries the information of one or more specified vNICs
long: Query the information of one or more specified vNICs. Users can search for vNIC information based on vNIC ID, vNIC name, etc.
examples:
- cmd: zeno zec describe-network-interfaces --nic-type Secondary --page-size 1 --page-num 1
  desc: Query the list of secondary vNICs.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeNetworkInterfaces
parameters:
- name: nic-ids
  type: string-array
  required: false
  sdk-field: nicIds
  description: vNic ID(s).
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    vNIC name.
    Fuzzy search supported.
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: Region ID.
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: ID of VPC.
- name: subnet-id
  type: string
  required: false
  sdk-field: subnetId
  description: ID of Subnet.
- name: instance-id
  type: string
  required: false
  sdk-field: instanceId
  description: ID of Instance.
- name: status
  type: enum
  required: false
  sdk-field: status
  description: vNIC state.
  enum-values:
  - value: PENDING
    desc: Creating.
  - value: AVAILABLE
    desc: Available. Not bound to any instance.
  - value: ATTACHING
    desc: Binding.
  - value: DETACHING
    desc: Unbinding.
  - value: DELETING
    desc: Deleting.
  - value: CREATE_FAILED
    desc: Creating failed.
  - value: USED
    desc: Bound.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20 ;
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
- name: nic-type
  type: enum
  required: false
  sdk-field: nicType
  description: vNIC type.
  enum-values:
  - value: Primary
    desc: Primary network interface.
  - value: Secondary
    desc: Secondary network interface.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Resource Group ID.
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: Filter by the security group ID to which the network interface belongs.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query using tag keys.
    A maximum of 20 tag keys can be used.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 64 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 64 characters.'
