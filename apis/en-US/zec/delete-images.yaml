name: DeleteImages
product: zec
use: delete-images
short: Deletes one or more images
long: |-
  Delete one or more images.
  **Note**

  The API returns the IDs of images that failed to be deleted. An empty set indicates that all deletions succeeded.
examples:
- cmd: zeno zec delete-images --image-ids imageId1 --image-ids imageId2
  desc: Delete images in batches.
sdk:
  service: zec
  version: '2025-09-01'
  action: DeleteImages
parameters:
- name: image-ids
  type: string-array
  required: true
  sdk-field: imageIds
  description: List of image IDs.
