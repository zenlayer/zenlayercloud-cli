name: StartAgentMonitor
product: zec
use: start-agent-monitor
short: Enables QEMU Guest Agent (QGA) data collection for an instance
long: |-
  Enables QEMU Guest Agent (QGA) data collection for the specified elastic compute instance. Once enabled, internal performance metrics can be retrieved through the monitoring API.
  **Note**

  * To enable performance data collection, ensure that QGA (QEMU Guest Agent) is installed.
examples:
- cmd: zeno zec start-agent-monitor --instance-id instanceId1
  desc: Enable QEMU Guest Agent (QGA) data collection.
sdk:
  service: zec
  version: '2025-09-01'
  action: StartAgentMonitor
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: ID of the instance.
