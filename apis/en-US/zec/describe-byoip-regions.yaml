name: DescribeByoipRegions
product: zec
use: describe-byoip-regions
short: Queries the list of regions that support BYOIP CIDR block
long: Query the list of regions that support BYOIP CIDR block, including IP range, network type and other information.
examples:
- cmd: zeno zec describe-byoip-regions
  desc: Query the list of regions that support BYOIP CIDR block.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeByoipRegions
response:
- name: regions
  type: object-array
  description: Query the list of regions that support BYOIP CIDR block.
  array-style: json
  item-schema:
  - name: netmask
    type: integer
    description: Supported subnet mask.
  - name: regionId
    type: string
    description: Supported regions.
  - name: network
    type: enum
    description: Supported network types.
    enum-values:
    - value: PremiumBGP
      desc: |-
        Premium BGP network.
        High-performance network.
    - value: CN2
      desc: China Telecom CN2 network.
    - value: PathBasedBandwidthIP
      desc: Multi-path bandwidth IP.
    - value: LocalLine
      desc: Provided by a local ISP.
    - value: StandardBGP
      desc: |-
        Standard BGP network.
        General-purpose network with cost optimization.
    - value: CMI
      desc: 1-Line IP China Mobile.
    - value: CUG
      desc: 1-Line IP China Unicom.
    - value: CTG
      desc: 1-Line IP China Telecom.
  - name: ipType
    type: enum
    description: Supported IP types.
    enum-values:
    - value: IPv4
      desc: IPv4 address.
    - value: IPv6
      desc: IPv6 address.
