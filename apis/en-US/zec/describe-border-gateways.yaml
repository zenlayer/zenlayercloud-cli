name: DescribeBorderGateways
product: zec
use: describe-border-gateways
short: Queries the details of one or more border gateways
long: Query the details of one or more border gateways. You can filter the query results with the border gateway ID and name.
examples:
- cmd: zeno zec describe-border-gateways --region-id xxx --page-size 10 --page-num 1
  desc: Query all the available border gateways.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeBorderGateways
parameters:
- name: zbg-ids
  type: string-array
  required: false
  sdk-field: zbgIds
  description: Border gateway IDs.
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    Border gateway name.
    Fuzzy query is supported.
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: Region ID.
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: VPC ID to which the border gateway belongs.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
    Maximum value: 1000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1.
response:
- name: totalCount
  type: integer
  description: Number of border gateways meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on border gateways.
