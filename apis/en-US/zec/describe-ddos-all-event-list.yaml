name: DescribeDDosAllEventList
product: zec
use: describe-ddos-all-event-list
short: Gets a list of DDoS attack events
long: Get a list of DDoS attack events.
examples:
- cmd: zeno zec describe-ddos-all-event-list --status status --ip-address 10.0.0.2
  desc: Get a list of attack events.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeDDosAllEventList
parameters:
- name: status
  type: enum
  required: false
  sdk-field: status
  description: Attack state.
  enum-values:
  - value: ATTACKING
    desc: The attack target is under attack.
  - value: ATTACKED
    desc: The attack event is resolved.
  - value: BLOCKING
    desc: The attack event is mitigating.
- name: ip-address
  type: string
  required: false
  sdk-field: ipAddress
  description: Attacked target IP.
- name: start-time
  type: string
  required: false
  sdk-field: startTime
  description: Attack start time.
- name: end-time
  type: string
  required: false
  sdk-field: endTime
  description: Attack end time.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default: 20.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
response:
- name: totalCount
  type: integer
  description: Number of disks meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Data for the list of attack events.
  array-style: json
  item-schema:
  - name: eventId
    type: string
    description: DDoS attack event ID.
  - name: status
    type: enum
    description: Attack state.
    enum-values:
    - value: ATTACKING
      desc: The attack target is under attack.
    - value: ATTACKED
      desc: The attack event is resolved.
    - value: BLOCKING
      desc: The attack event is mitigating.
  - name: ipAddress
    type: string
    description: Attack target IP.
  - name: protecting
    type: boolean
    description: Whether the IP is being protected.
  - name: startTime
    type: string
    description: Attack start time.
  - name: endTime
    type: string
    description: Attack end time.
  - name: endBlackholeTime
    type: string
    description: Time to unblock from blackhole.
  - name: attackBandwidthMax
    type: float
    description: 'Peak attack bandwidth. Unit: bps.'
  - name: attackPackageMax
    type: float
    description: 'Peak attack packet rate. Unit: pps.'
  - name: regionId
    type: string
    description: Region ID of attack event.
