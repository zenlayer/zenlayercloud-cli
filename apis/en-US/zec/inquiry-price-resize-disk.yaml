  description: Performance configuration details of the cloud disk after expansion.
  object-schema:
  - name: maxIops
    type: integer
    description: Maximum IOPS without burst enabled.
  - name: maxBandwidth
    type: integer
    description: Maximum bandwidth without burst enabled, in MB/s.
  - name: iopsBurst
    type: integer
    description: IOPS after enabling burst.
  - name: bandwidthBurst
    type: integer
    description: Bandwidth after enabling burst, in MB/s.
