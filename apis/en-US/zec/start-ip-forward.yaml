name: StartIpForward
product: zec
use: start-ip-forward
short: Enables IP forwarding for an instance
long: |-
  Enables IP forwarding on the specified elastic compute instance, allowing it to act as a router or gateway to forward network traffic from other resources.
  **Note**

  Only operations on instances that are in powered-off or power-on state are supported.
examples:
- cmd: zeno zec start-ip-forward --instance-id instanceId1
  desc: Enable IP forwarding of the instance
sdk:
  service: zec
  version: '2025-09-01'
  action: StartIpForward
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: ID of the instance.
