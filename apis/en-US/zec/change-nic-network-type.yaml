name: ChangeNicNetworkType
product: zec
use: change-nic-network-type
short: Modifies the vNIC mode of the instance
long: |-
  Modify the network interface mode of the instance.
  #### Prerequisites

  * Query images: call[ `DescribeImages`](../image/describeimages.md) to check information on image.

  ## 2. Input Parameters

  The following request parameter list only provides API request parameters.

  <table><thead><tr><th width="211">Parameter Name</th><th width="160">Required</th><th width="120">Type</th><th>Description</th></tr></thead><tbody><tr><td>instanceId</td><td>Yes</td><td>String</td><td>ID of the instance.</td></tr><tr><td>nicNetworkType</td><td>Yes</td><td>String</td><td>Network interface mode.</td></tr></tbody></table>

  ## 3. Output Parameters

  <table><thead><tr><th width="213">Parameter Name</th><th width="113">Type</th><th>Description</th></tr></thead><tbody><tr><td>requestId</td><td>String</td><td>The unique request ID, which is returned for each request. RequestId is required for locating a problem.</td></tr></tbody></table>

  ## 4. Code Example
examples:
- cmd: zeno zec change-nic-network-type --instance-id instanceId1 --nic-network-type FailOver
  desc: Modify the network interface mode of the instance.
sdk:
  service: zec
  version: '2025-09-01'
  action: ChangeNicNetworkType
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: ID of the instance.
- name: nic-network-type
  type: enum
  required: true
  sdk-field: nicNetworkType
  description: Network interface mode.
  enum-values:
  - value: Auto
    desc: Default mode auto-adapted to image.
  - value: FailOver
    desc: Failover mode.
  - value: VirtioOnly
    desc: Virtio-net mode.
  - value: VfOnly
    desc: VFIO mode.
