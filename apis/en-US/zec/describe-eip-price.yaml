name: DescribeEipPrice
product: zec
use: describe-eip-price
short: Queries the price of elastic IPs
long: Query the price of elastic IPs.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeEipPrice
parameters:
- name: region-id
  type: string
  required: true
  sdk-field: regionId
  description: Region ID
- name: internet-charge-type
  type: enum
  required: true
  sdk-field: internetChargeType
  description: Network billing methods.
  enum-values:
  - value: ByBandwidth
    desc: Billed by the flat rate bandwidth.
  - value: ByTrafficPackage
    desc: Billed by the traffic package size purchased.
  - value: BandwidthCluster
    desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
- name: amount
  type: integer
  required: false
  sdk-field: amount
  description: Quantity.
- name: eip-v4-type
  type: enum
  required: false
  sdk-field: eipV4Type
  description: |-
    Network types of public IPv4.
    Deprecated. Please use networkLineType instead.
  deprecated: true
  enum-values:
  - value: BGPLine
    desc: BGP network type.
  - value: CN2Line
    desc: CN2 GIA (CN2 Global Internet Access) network type.
  - value: LocalLine
    desc: Local IP network type.
  - value: ChinaMobile
    desc: China Mobile network type.
  - value: ChinaUnicom
    desc: China Unicom network type.
  - value: ChinaTelecom
    desc: China Telecom network type.
  - value: Cogent
    desc: Cogent Communications network type.
  - value: ThreeLine
    desc: 3-in-1 IP pool network type.
- name: network-line-type
  type: enum
  required: false
  sdk-field: networkLineType
  description: Network types of public IPv4.
  enum-values:
  - value: PremiumBGP
    desc: |-
      Premium BGP network.
      High-performance network.
  - value: CN2
    desc: China Telecom CN2 network.
  - value: LocalLine
    desc: Provided by a local ISP.
  - value: StandardBGP
    desc: |-
      Standard BGP network.
      General-purpose network with cost optimization.
  - value: CMI
    desc: 1-Line IP China Mobile.
  - value: CUG
    desc: 1-Line IP China Unicom.
  - value: CTG
    desc: 1-Line IP China Telecom.
- name: bandwidth
  type: integer
  required: false
  sdk-field: bandwidth
  description: |-
    Bandwidth limit for the elastic public IP.
    Unit: Mbps.
- name: flow-package
  type: float
  required: false
  sdk-field: flowPackage
  description: |-
    Data transfer package size for public IPv6.
    Unit: TB.
    Value must be 0 or a multiple of 0.1.
    Required when the subnet stack type includes IPv6 with public internet access and the billing type is ByTrafficPackage.
- name: cidr-id
  type: string
  required: false
  sdk-field: cidrId
  description: |-
    CIDR ID. Specifies the CIDR block from which an elastic IP is allocated.
    This field and eipV4Type cannot be specified at the same time.
- name: cluster-id
  type: string
  required: false
  sdk-field: clusterId
  description: |-
    Bandwidth cluster ID.
    If the value of internetChargeType is Bandwidth , clusterld is required.
- name: peer-region-id
  type: string
  required: false
  sdk-field: peerRegionId
  description: Remote region ID.
response:
- name: eipPrice
  type: object
  description: |-
    Reservation price of the elastic public IP.
    If the elastic IP is created from a CIDR block, the reservation price is null.
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR : you will be billed by hour.
      DAY : you will be billed by day.
      MONTH : you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage,
      such as Mbps , LCU , and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The category to which the price belongs.
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
