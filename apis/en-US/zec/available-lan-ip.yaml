name: AvailableLanIp
product: zec
use: available-lan-ip
short: List of vNIC/IP pairs eligible for association with the specified EIP
long: Query a list of NIC/IP pairs (within the same subnet) that are eligible to be associated with the specified EIP.
sdk:
  service: zec
  version: '2025-09-01'
  action: AvailableLanIp
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: "ID of the elastic IP to check association eligibility for.\nOnly vNICs whose subnet is within the same region as this EIP will be returned. \nTo obtain an EIP ID, call DescribeEips."
response:
- name: lanIps
  type: object-array
  description: List of NIC/IP pairs (within the same subnet) that are eligible to be associated with the specified EIP.
  array-style: json
  item-schema:
  - name: lanIp
    type: string
    description: Private IPv4 address assigned to the vNIC that can be bound to the specified EIP.
  - name: nicId
    type: string
    description: ID of the vNIC.
  - name: nicName
    type: string
    description: vNIC name.
  - name: instanceId
    type: string
    description: |-
      ID of the instance the vNIC is attached to.
      Null if the vNIC is not attached to any instance.
  - name: instanceName
    type: string
    description: |-
      Name of the instance the vNIC is attached to.
      Null if the vNIC is not attached to any instance.
