name: InquiryPricePublicIpv6
product: zec
use: inquiry-price-public-ipv6
short: Queries the price of data transfer or bandwidth for the public IPv6
long: |-
  Query the price of data transfer or bandwidth for the public IPv6.
  **Notes**

  * The size of the guaranteed traffic package is only valid for billing periods of one month.
examples:
- cmd: zeno zec inquiry-price-public-ipv6 --region-id xxx --package-size 10
  desc: ''
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPricePublicIpv6
parameters:
- name: region-id
  type: string
  required: true
  sdk-field: regionId
  description: Region ID.
- name: package-size
  type: float
  required: false
  sdk-field: packageSize
  description: |-
    Traffic package size (TB). The unit is TB.
    This value takes effect only when internetChargeType is set to ByTrafficPackage .
    The default value is 0.
    Maximum of one decimal place.
- name: bandwidth
  type: integer
  required: false
  sdk-field: bandwidth
  description: |-
    Outbound public network bandwidth cap (Mbps). Unit: Mbps.
    The value differs with different instance types.
response:
- name: bandwidthPrice
  type: object
  description: Price of bandwidth.
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR : you will be billed by hour.
      DAY : you will be billed by day.
      MONTH : you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage,
      such as Mbps , LCU , and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The category to which the price belongs.
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
