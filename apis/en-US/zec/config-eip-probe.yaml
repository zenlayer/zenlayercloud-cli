name: ConfigEipProbe
product: zec
use: config-eip-probe
short: Configures public network probe of an elastic IP.
long: configure public network probe of an elastic IP.
examples:
- cmd: zeno zec config-eip-probe --eip-id eipId1 --disable-icmp true --tcp-port 20
  desc: Configure public network probe of an elastic IP.
sdk:
  service: zec
  version: '2025-09-01'
  action: ConfigEipProbe
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: The elastic IP ID for configuring public network probe.
- name: disable-icmp
  type: boolean
  required: true
  sdk-field: disableIcmp
  description: Whether to disable ICMP.
- name: tcp-port
  type: integer
  required: false
  sdk-field: tcpPort
  description: |-
    TCP probe port, range [1-65535].
    Not passing means disabled.
