name: ModifySubnetsAttribute
product: zec
use: modify-subnets-attribute
short: Modifies the attributes of one or more subnets under a global VPC.
long: modify the attributes of one or more subnets under a global VPC. Only the subnet name to be displayed can be modified for now.
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifySubnetsAttribute
parameters:
- name: subnet-ids
  type: string-array
  required: true
  sdk-field: subnetIds
  description: |-
    Subnet ID(s).
    The maximum number of subnets in each request is 100.
- name: name
  type: string
  required: true
  sdk-field: name
  description: |-
    Subnet name.
    This parameter must start and end with a number or a letter, containing 2 to 63 characters. Only letters, numbers, - and periods (.) are supported.
