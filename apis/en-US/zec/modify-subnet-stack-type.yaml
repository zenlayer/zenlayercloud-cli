name: ModifySubnetStackType
product: zec
use: modify-subnet-stack-type
short: Modifies the IP stack type of a subnet.
long: |-
  Modify the IP stack type of the specified subnet (IPv4, IPv4_IPv6, or IPv6). When switching to dual-stack or IPv6-only, you must provide the IPv6 type and the corresponding CIDR block configuration.
  **Note**

  * Switching `IPv4` to `IPv4_IPv6` (enabling IPv6): you must specify `ipv6Type` (public `Public` / private `Private`); after the change, an IPv6 address block is assigned to the subnet.
  * Switching `IPv4_IPv6` to `IPv4` (disabling IPv6): supported for both public and private IPv6 subnets; before proceeding, all NICs in the subnet must have their IPv6 addresses removed via `UnassignNetworkInterfaceIpv6`.
examples:
- cmd: zeno zec modify-subnet-stack-type --subnet-id <subnetId> --stack-type IPv4_IPv6 --ipv6-type Private
  desc: Switch the subnet stack type from IPv4 to IPv4_IPv6 with private IPv6.
- cmd: zeno zec modify-subnet-stack-type --subnet-id <subnetId> --stack-type IPv4
  desc: 'Disable subnet IPv6: IPv4_IPv6 → IPv4.'
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifySubnetStackType
parameters:
- name: subnet-id
  type: string
  required: true
  sdk-field: subnetId
  description: Subnet ID.
- name: stack-type
  type: enum
  required: true
  sdk-field: stackType
  description: |-
    IP stack type of the subnet.
    IPv4_IPv6: enable IPv6 — public or private is determined by ipv6Type.
    IPv4: disable IPv6 — supported for both public and private IPv6 subnets; before proceeding, all NICs in the subnet must have their IPv6 addresses removed via UnassignNetworkInterfaceIpv6.
  enum-values:
  - value: IPv4
    desc: IPv4 stack type only.
  - value: IPv4_IPv6
    desc: IPv4 and IPv6 stack type.
  - value: IPv6
    desc: IPv6 stack type only.
- name: ipv6-type
  type: enum
  required: false
  sdk-field: ipv6Type
  description: |-
    IPv6 type. Required when stackType is IPv4_IPv6.
    Public: public IPv6; Private: private IPv6.
  enum-values:
  - value: Private
    desc: Private network.
  - value: Public
    desc: Public network.
- name: ipv6-cidr-block-id
  type: string
  required: false
  sdk-field: ipv6CidrBlockId
  description: |-
    ID of the public IPv6 CIDR block.
    This field can only be specified when ipv6Type is Public.
    If not specified, it will be allocated from the system's default IP pool.
- name: ipv6-mask-length
  type: integer
  required: false
  sdk-field: ipv6MaskLength
  description: |-
    The size of the IPv6 CIDR prefix assigned to the instance.
    This parameter must be used together with the ipv6CidrBlockId parameter.
    The default value is 96 if not explicitly provided.
    The minimum value must be greater than or equal to the prefix of the specified ipv6CidrBlockId, and the maximum value cannot exceed 96.
response:
- name: ipv6CidrBlock
  type: string
  description: IPv6 CIDR block of subnet.
