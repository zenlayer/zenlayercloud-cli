name: ModifyNetworkInterfacePublicIPv6BandwidthLimitMode
product: zec
use: modify-network-interface-public-ipv6-bandwidth-limit-mode
short: Modify Public IPv6 Bandwidth Rate Limit Mode
long: |-
  Modify the bandwidth rate limit mode of the specified public IPv6.
  **Notes**

  * Only public IPv6 in the available status (`RUNNING`) support this operation.
  * Public IPv6 without bandwidth configured do not support this operation.
  * `LOOSE` (relaxed mode) allows short-term bursts exceeding the rate limit; `STRICT` (strict mode) enforces the rate limit strictly without any bursts.
examples:
- cmd: zeno zec modify-network-interface-public-ipv6-bandwidth-limit-mode --ipv6-cidr-id ipv6CidrId-xxx --rate-limit-mode STRICT
  desc: Modify the bandwidth rate limit mode of a public IPv6
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifyNetworkInterfacePublicIPv6BandwidthLimitMode
parameters:
- name: ipv6-cidr-id
  type: string
  required: true
  sdk-field: ipv6CidrId
  description: ID of the IPv6 CIDR.
- name: rate-limit-mode
  type: enum
  required: true
  sdk-field: rateLimitMode
  description: New rate limit mode.
  enum-values:
  - value: LOOSE
    desc: 'Loose mode: allows short-term bursts exceeding the limit.'
  - value: STRICT
    desc: 'Strict mode: strictly enforced, no bursts allowed.'
