name: DescribeSecurityGroups
product: zec
use: describe-security-groups
short: Queries the information of one or more specified security groups
long: Query security group information in the account. You can filter results by security group ID or name. Supports pagination.
examples:
- cmd: zeno zec describe-security-groups --security-group-name --page-size 5 --page-num 1
  desc: Obtain all security group information. Query all security groups without any parameters.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeSecurityGroups
parameters:
- name: security-group-ids
  type: string-array
  required: false
  sdk-field: securityGroupIds
  description: |-
    The security group ID.
    Values can consist of multiple security group IDs. The maximum number of IDs in each request is 100.
- name: security-group-name
  type: string
  required: false
  sdk-field: securityGroupName
  description: Security group name.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20 ;
    Maximum value: 1000 .
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1 .
response:
- name: totalCount
  type: integer
  description: Number of security groups meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on security groups.
  array-style: json
  item-schema:
  - name: securityGroupId
    type: string
    description: Security group ID.
  - name: securityGroupName
    type: string
    description: Security group name.
  - name: scope
    type: string
    description: |-
      Security group deployed scope.
      Currently only support Global .
  - name: createTime
    type: string
    description: |-
      Creation time.
      Format: YYYY-MM-ddTHH:mm:ssZ .
  - name: vpcIds
    type: string-array
    description: Associated global VPC ID list.
  - name: isDefault
    type: boolean
    description: Whether the security group is default or not.
  - name: nicIdList
    type: string-array
    description: ID list of associated vNICs.
  - name: natIdList
    type: string-array
    description: ID list of associated NAT gateways.
  - name: loadBalancerIdList
    type: string-array
    description: ID list of associated load balancers.
  - name: haVipIdList
    type: string-array
    description: List of HaVip IDs associated with the security group.
