name: RenewDisk
product: zec
use: renew-disk
short: Restores a disk from the recycle bin
long: |-
  Restores a cloud disk that is in the recycle bin, making it available again. Only disks within the retention period can be restored; resources are permanently destroyed after the period expires.
  **Note**

  * Operations on boot disks are not supported
  * Please ensure that the account balance is sufficient when renewing.
examples:
- cmd: zeno zec renew-disk --disk-id your-disk-id
  desc: Restore a disk.
sdk:
  service: zec
  version: '2025-09-01'
  action: RenewDisk
parameters:
- name: disk-id
  type: string
  required: true
  sdk-field: diskId
  description: Disk ID.
