name: DescribeAvailableBorderGateway
product: zec
use: describe-available-border-gateway
short: Queries available border gateways that can be bound to a public NAT gateway
long: Query available border gateways that can be bound to a public NAT gateway.
examples:
- cmd: zeno zec describe-available-border-gateway --nat-gateway-id <natGatewayId>
  desc: Query available border gateways that can be bound to a public NAT gateway.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeAvailableBorderGateway
parameters:
- name: nat-gateway-id
  type: string
  required: true
  sdk-field: natGatewayId
  description: Public NAT gateway ID.
response:
- name: zbgId
  type: string
  description: Border gateway ID.
