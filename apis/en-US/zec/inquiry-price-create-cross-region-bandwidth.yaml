name: InquiryPriceCreateCrossRegionBandwidth
product: zec
use: inquiry-price-create-cross-region-bandwidth
short: Queries the price of creating a cross-region bandwidth
long: Query the price of creating a cross-region bandwidth.
examples:
- cmd: zeno zec inquiry-price-create-cross-region-bandwidth --internet-charge-type ByBandwidth --region-a asia-east-1 --region-z asia-north-1 --bandwidth 100
  desc: Create a private cross-region bandwidth from Shanghai to Beijing, with the network billing model of Flat Rate. The bandwidth cap is 100 Mbps.
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPriceCreateCrossRegionBandwidth
parameters:
- name: internet-charge-type
  type: enum
  required: true
  sdk-field: internetChargeType
  description: Network billing model.
  enum-values:
  - value: ByBandwidth
    desc: Billed by the flat rate bandwidth.
  - value: ByTrafficPackage
    desc: Billed by the traffic package size purchased.
  - value: BandwidthCluster
    desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
- name: marketing-info
  type: object
  required: false
  sdk-field: marketingInfo
  description: Information on marketing campaigns.
  object-schema:
  - name: discountCode
    type: string
    description: |-
      Promo Code.
      If no Promo Code exists, the final discount will not apply.
  - name: usePocVoucher
    type: boolean
    description: |-
      Whether to use POC voucher.
      If no POC voucher exists, the related creation will fail.
- name: region-a
  type: string
  required: true
  sdk-field: regionA
  description: One end of the cross-region bandwidth.
- name: region-z
  type: string
  required: true
  sdk-field: regionZ
  description: The other end of the cross-region bandwidth.
- name: bandwidth
  type: integer
  required: true
  sdk-field: bandwidth
  description: Bandwidth cap.
response:
- name: crossRegionBandwidthPrice
  type: object
  description: The price of cross-region bandwidth.
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR : you will be billed by hour.
      DAY : you will be billed by day.
      MONTH : you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage,
      such as Mbps , LCU , and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The category to which the price belongs.
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
