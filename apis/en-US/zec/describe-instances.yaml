name: DescribeInstances
product: zec
use: describe-instances
short: Queries the details of instances
long: Query the details of instances. You can filter the query results with the instance ID, name, or billing method.
examples:
- cmd: zeno zec describe-instances --instance-ids xxx --page-size 10 --page-num 1
  desc: Query list of elastic compute instances.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeInstances
parameters:
- name: instance-ids
  type: string-array
  required: false
  sdk-field: instanceIds
  description: |-
    Instance IDs.
    You can query up to 100 instances in each request.
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: Zone ID to which the instances belong.
- name: image-id
  type: string
  required: false
  sdk-field: imageId
  description: Image ID.
- name: ipv4-address
  type: string
  required: false
  sdk-field: ipv4Address
  description: IPv4 addresses.
- name: ipv6-address
  type: string
  required: false
  sdk-field: ipv6Address
  description: IPv6 addresses.
- name: status
  type: enum
  required: false
  sdk-field: status
  description: Instance status.
  enum-values:
  - value: DEPLOYING
    desc: Creating.
  - value: REBUILDING
    desc: Rebuilding.
  - value: REBOOT
    desc: Rebooting.
  - value: RUNNING
    desc: Running.
  - value: STOPPED
    desc: Powered off.
  - value: BOOTING
    desc: Powered on.
  - value: RELEASING
    desc: Releasing.
  - value: STOPPING
    desc: Powering off.
  - value: RECYCLE
    desc: Recycled.
  - value: RECYCLING
    desc: Recycling.
  - value: CREATE_FAILED
    desc: Creating failed.
  - value: IMAGING
    desc: Image creating.
  - value: RESIZING
    desc: Resizing.
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    Filter by instance display name.
    This field supports fuzzy search.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Maximum value: 1000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Resource Group ID.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query using tag keys.
    A maximum of 20 tag keys can be used.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 64 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 64 characters.'
response:
- name: totalCount
  type: integer
  description: Number of instances meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on an instance.
  array-style: json
  item-schema:
  - name: instanceId
    type: string
    description: Instance ID.
  - name: instanceName
    type: string
    description: Instance name to be displayed.
  - name: zoneId
    type: string
    description: Availability zone ID to which the instances belong.
  - name: instanceType
    type: string
    description: Type of instance. eg. z2a.cpu.1
  - name: cpu
    type: integer
    description: |-
      Quantity of CPU cores.
      Unit: cores.
  - name: memory
    type: integer
    description: |-
      Memory size.
      Unit: GiB.
  - name: imageId
    type: string
    description: Image ID.
  - name: imageName
    type: string
    description: Image name.
  - name: timeZone
    type: string
    description: Time zone of the system.
  - name: nicNetworkType
    type: enum
    description: Network interface mode.
    enum-values:
    - value: Auto
      desc: Default mode auto-adapted to image.
    - value: FailOver
      desc: Failover mode.
    - value: VirtioOnly
      desc: Virtio-net mode.
    - value: VfOnly
      desc: VFIO mode.
  - name: status
    type: enum
    description: Status of instances.
    enum-values:
    - value: DEPLOYING
      desc: Creating.
    - value: REBUILDING
      desc: Rebuilding.
    - value: REBOOT
      desc: Rebooting.
    - value: RUNNING
      desc: Running.
    - value: STOPPED
      desc: Powered off.
    - value: BOOTING
      desc: Powered on.
    - value: RELEASING
      desc: Releasing.
    - value: STOPPING
      desc: Powering off.
    - value: RECYCLE
      desc: Recycled.
    - value: RECYCLING
      desc: Recycling.
    - value: CREATE_FAILED
      desc: Creating failed.
    - value: IMAGING
      desc: Image creating.
    - value: RESIZING
      desc: Resizing.
  - name: systemDisk
    type: object
    description: Boot disk information.
    object-schema:
    - name: diskId
      type: string
      description: |-
        Boot disk ID.
        This parameter is currently only used as a response parameter in query operations such as `DescribeInstances`, and cannot be used as an input parameter in write operations like `CreateInstances`.
    - name: diskSize
      type: integer
      description: |-
        Boot disk size.
        Unit: GiB.
    - name: diskCategory
      type: string
      description: |-
        Disk type.
        Basic NVMe SSD: Economical NVMe SSD.
        Standard NVMe SSD: Standard NVMe SSD.
        Default is Standard NVMe SSD.
    - name: burstingEnabled
      type: boolean
      description: Whether to enable burstable performance.
  - name: dataDisks
    type: object-array
    description: Disk information.
    array-style: json
    item-schema:
    - name: diskId
      type: string
      description: |-
        Disk ID.
        This parameter is currently only used as a response parameter in query operations such as `DescribeInstances`, and cannot be used as an input parameter for write operations such as `CreateInstances`.
    - name: diskName
      type: string
      description: |-
        Disk name.
        This parameter is currently only used as a response parameter for query operations such as DescribeInstances.
    - name: diskSize
      type: integer
      description: |-
        Disk size.
        Unit: GiB.
    - name: diskAmount
      type: integer
      description: |-
        Number of disks.
        This parameter is only used as an input parameter for APIs such as `CreateInstances` and `InquiryPriceCreateInstance`.
    - name: portable
      type: boolean
      description: |-
        Whether the disk is detachable.
        This parameter is used  as a response parameter in query operations, not as an input parameter.
        true means the disk will not be deleted when the instance is deleted.
        false means the disk will be deleted when the instance is deleted.
    - name: burstingEnabled
      type: boolean
      description: Whether to enable burstable performance.
    - name: diskCategory
      type: string
      description: |-
        Disk type.
        Basic NVMe SSD: the Basic NVMe SSD.
        Standard NVMe SSD: the Standard NVMe SSD.
        Default value: Standard NVMe SSD.
  - name: publicIpAddresses
    type: string-array
    description: List of public IPs.
  - name: privateIpAddresses
    type: string-array
    description: List of private IPs.
  - name: keyId
    type: string
    description: |-
      SSH key pair ID.
      The value may be null, indicating that there is no valid value.
  - name: subnetId
    type: string
    description: Associated subnet ID of the primary vNIC.
  - name: securityGroupId
    type: string
    description: Associated security group ID of the primary vNIC.
  - name: enableAgent
    type: boolean
    description: Whether to enable the QEMU Guest Agent (QGA).
  - name: enableAgentMonitor
    type: boolean
    description: Whether to enable data collection of the QEMU Guest Agent (QGA).
  - name: enableIpForward
    type: boolean
    description: Whether to enable IP forwarding.
  - name: createTime
    type: string
    description: |-
      Creation time.
      Format: YYYY-MM-ddTHH:mm:ssZ .
  - name: expiredTime
    type: string
    description: |-
      Expiration time.
      Format: YYYY-MM-ddTHH:mm:ssZ .
  - name: resourceGroupId
    type: string
    description: Resource group ID.
  - name: resourceGroupName
    type: string
    description: Resource group name.
  - name: nics
    type: object-array
    description: Information of the vNIC attached to an instance.
    array-style: json
    item-schema:
    - name: nicId
      type: string
      description: vNIC ID.
    - name: name
      type: string
      description: vNIC name.
    - name: status
      type: enum
      description: vNIC status.
      enum-values:
      - value: PENDING
        desc: Creating.
      - value: AVAILABLE
        desc: Available. Not bound to any instance.
      - value: ATTACHING
        desc: Binding.
      - value: DETACHING
        desc: Unbinding.
      - value: DELETING
        desc: Deleting.
      - value: CREATE_FAILED
        desc: Creating failed.
      - value: USED
        desc: Bound.
    - name: nicType
      type: enum
      description: vNIC type.
      enum-values:
      - value: Primary
        desc: Primary network interface.
      - value: Secondary
        desc: Secondary network interface.
    - name: regionId
      type: string
      description: Region ID.
    - name: nicSubnetType
      type: enum
      description: IP stack type of the vNIC.
      enum-values:
      - value: IPv4
        desc: IPv4 stack type only.
      - value: IPv4_IPv6
        desc: IPv4 and IPv6 stack type.
      - value: IPv6
        desc: IPv6 stack type only.
    - name: publicIpList
      type: string-array
      description: Public IP addresses.
    - name: privateIpList
      type: string-array
      description: Private IP addresses.
    - name: primaryIpv4
      type: string
      description: Primary private IPv4 address.
    - name: primaryIpv6
      type: string
      description: |-
        Primary private IPv6 address.
        If the IP stack type is IPv4, this value is null.
    - name: ipv6Cidr
      type: string
      description: |-
        IPv6 CIDR block.
        If the IP stack type is IPv4, this value is null.
    - name: secondaryIpv4s
      type: string-array
      description: Secondary private IPv4 addresses.
    - name: macAddress
      type: string
      description: MAC address.
    - name: instanceId
      type: string
      description: Instance ID.
    - name: vpcId
      type: string
      description: VPC ID.
    - name: subnetId
      type: string
      description: Subnet ID.
    - name: createTime
      type: string
      description: Creation time.
    - name: updateTime
      type: string
      description: Updating time.
    - name: resourceGroup
      type: object
      description: Resource group information.
      object-schema:
      - name: resourceGroupId
        type: string
        description: Resource group ID.
      - name: resourceGroupName
        type: string
        description: Resource group name.
    - name: securityGroupId
      type: string
      description: Associated security group ID of the vNIC.
    - name: tags
      type: object
      description: Tags bound to resources.
      object-schema:
      - name: tags
        type: object-array
        description: List of tags.
        array-style: json
        item-schema:
        - name: key
          type: string
          description: 'Tag key. Length limit: 1 to 64 characters.'
        - name: value
          type: string
          description: 'Tag value. Length limit: 1 to 64 characters.'
  - name: tags
    type: object
    description: Tags bound to resources.
    object-schema:
    - name: tags
      type: object-array
      description: List of tags.
      array-style: json
      item-schema:
      - name: key
        type: string
        description: 'Tag key. Length limit: 1 to 64 characters.'
      - name: value
        type: string
        description: 'Tag value. Length limit: 1 to 64 characters.'
  - name: loadBalancerIds
    type: string-array
    description: Attached load balancer IDs.
  - name: placementGroupId
    type: string
    description: The placement group ID to which the instance belongs.
  - name: instanceOptions
    type: object
    description: Instance options configuration.
    object-schema:
    - name: nestedVirtualization
      type: boolean
      description: |-
        Whether to the instance for nested virtualization.
        To enable nested virtualization, you must contact Support to activate it; otherwise, the setting will be ineffective.
