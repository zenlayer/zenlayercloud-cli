name: ReleaseDisk
product: zec
use: release-disk
short: Releases a disk
long: |-
  Release a disk.
  **Note**

  * Operations on boot disks are not supported.
  * This operation is irreversible. Once the operation is successful, the disks will be completely released. Please operate with caution.
examples:
- cmd: zeno zec release-disk --disk-id your-disk-id
  desc: Release a disk.
sdk:
  service: zec
  version: '2025-09-01'
  action: ReleaseDisk
parameters:
- name: disk-id
  type: string
  required: true
  sdk-field: diskId
  description: Disk ID.
