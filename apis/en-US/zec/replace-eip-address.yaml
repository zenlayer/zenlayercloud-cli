name: ReplaceEipAddress
product: zec
use: replace-eip-address
short: Replaces the elastic IP addresses
long: |-
  Replace the elastic IP addresses.
  **Note**

  * `ownIp` is required for a 3-in-1 IP pool.
  * The API returns the elastic IP IDs that failed to operate. An empty list indicates all operations succeeded.
sdk:
  service: zec
  version: '2025-09-01'
  action: ReplaceEipAddress
parameters:
- name: replace-ips
  type: object-array
  required: true
  sdk-field: replaceIps
  description: Lists of the original and target elastic IPs.
  array-style: json
  item-schema:
  - name: eipId
    type: string
    description: Elastic IP ID.
  - name: ownIp
    type: string
    description: Source IP.
  - name: targetIp
    type: string
    description: Target IP.
response:
- name: failedEipIds
  type: string-array
  description: Elastic IP IDs that failed to replace.
