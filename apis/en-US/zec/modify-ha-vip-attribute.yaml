name: ModifyHaVipAttribute
product: zec
use: modify-ha-vip-attribute
short: Modify HaVip Attribute
long: Modify the name or security group of a HaVip.
examples:
- cmd: zeno zec modify-ha-vip-attribute --ha-vip-id havip-xxxxxxxx --name my-havip-renamed
  desc: Rename a HaVip.
- cmd: zeno zec modify-ha-vip-attribute --ha-vip-id havip-xxxxxxxx --security-group-id sg-xxxxxxxx
  desc: Change the security group bound to a HaVip.
- cmd: zeno zec modify-ha-vip-attribute --ha-vip-id havip-xxxxxxxx --name my-havip-new --security-group-id sg-xxxxxxxx
  desc: Modify both name and security group.
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifyHaVipAttribute
parameters:
- name: ha-vip-id
  type: string
  required: true
  sdk-field: haVipId
  description: The ID of the high availability virtual IP.
- name: name
  type: string
  required: false
  sdk-field: name
  description: 'HaVip name. Length: 1 to 64 characters. At least one of name or securityGroupId must be provided.'
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: The ID of the security group. If set, the security group bound to the HaVip will be changed to the specified one. At least one of name or securityGroupId must be provided.
