name: ModifyHaVipAttribute
product: zec
use: modify-ha-vip-attribute
short: Modify HaVip Attribute
long: Modify the name of a HaVip.
examples:
- cmd: zeno zec modify-ha-vip-attribute --ha-vip-id havip-xxxxxxxx --name my-havip-renamed
  desc: Rename a HaVip.
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifyHaVipAttribute
parameters:
- name: ha-vip-id
  type: string
  required: true
  sdk-field: haVipId
  description: The ID of the high availability virtual IP.
- name: name
  type: string
  required: true
  sdk-field: name
  description: 'HaVip name. Length: 1 to 64 characters.'
