name: AssociateEipAddress
product: zec
use: associate-eip-address
short: Associates elastic IPs to resources in the same region
long: |-
  Associate elastic IPs to resources in the same region.
  **Note**

  * You can call [DescribeLoadBalancers](../../../networking/zlb/load-balancer-instance/describeloadbalancers.md) to query supported load balancers.
  * You can call [DescribeNetworkInterfaces](../vnic/describenetworkinterfaces.md) to query supported vNIC.
  * You can call [DescribeNatGateways](../nat-gateway/describenatgateways.md) to query supported NAT gateway.
  * You can call [DescribeHaVips](../havip/describehavips.md) to query supported high availability virtual IPs.
  * You must specify exactly one of the following parameters: `loadBalancerId`, `nicId`, `natId`, or `haVipId`, in order of priority: `loadBalancerId` > `nicId` > `natId` > `haVipId`.
  * When associating via `haVipId`, `bindType` must be `FullNat`. Any other value will cause all elastic IPs in this request to fail to associate.
  * If the upper limit is exceeded, please contact us to request a quota increase.
  * The API returns the elastic IP IDs that failed to operate. An empty list indicates all operations succeeded.
examples:
- cmd: zeno zec associate-eip-address --nic-id <nicId> --lan-ip 10.0.0.2 --eip-ids <eipId1> --eip-ids <eipId2> --bind-type Passthrough
  desc: Associate elastic IPs to a specified vNIC with the Cut-through Mode.
- cmd: zeno zec associate-eip-address --load-balancer-id <loadBalancerId> --eip-ids <eipId1> --eip-ids <eipId2>
  desc: Associate elastic IPs to a specified load balancer instance.
- cmd: zeno zec associate-eip-address --nat-id <natId> --eip-ids <eipId1> --eip-ids <eipId2>
  desc: Associate elastic IPs to a specified NAT gateway.
- cmd: zeno zec associate-eip-address --ha-vip-id <haVipId> --eip-ids <eipId1>
  desc: Associate an elastic IP to a high availability virtual IP (HaVip).
- cmd: zeno zec associate-eip-address --ha-vip-id <haVipId> --eip-ids <eipId1> --eip-ids <eipId2>
  desc: Associate multiple elastic IPs to a high availability virtual IP (HaVip) at the same time.
sdk:
  service: zec
  version: '2025-09-01'
  action: AssociateEipAddress
parameters:
- name: load-balancer-id
  type: string
  required: false
  sdk-field: loadBalancerId
  description: Load balancer ID.
- name: nic-id
  type: string
  required: false
  sdk-field: nicId
  description: vNIC ID.
- name: lan-ip
  type: string
  required: false
  sdk-field: lanIp
  description: |-
    Private IP.
    If nicId is provided, this field is required.
- name: nat-id
  type: string
  required: false
  sdk-field: natId
  description: NAT gateway ID.
- name: eip-ids
  type: string-array
  required: true
  sdk-field: eipIds
  description: ID list of elastic IPs.
- name: ha-vip-id
  type: string
  required: false
  sdk-field: haVipId
  description: The ID of the high availability virtual IP.
- name: bind-type
  type: enum
  required: false
  sdk-field: bindType
  description: |-
    Elastic IP mode.
    Default value: FullNat .
    Effective when the elastic IP is assigned to a vNIC.
    When associated to a high availability virtual IP (haVip), only FullNat is supported. Any other value will cause all elastic IPs in this request to fail to associate.
  enum-values:
  - value: FullNat
    desc: NAT mode.
  - value: Passthrough
    desc: Bypass mode.
response:
- name: failedEipIds
  type: string-array
  description: Elastic IP IDs that failed to bind.
