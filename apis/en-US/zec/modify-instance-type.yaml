name: ModifyInstanceType
product: zec
use: modify-instance-type
short: Modifies the type of an elastic compute instance
long: |-
  Changes the instance type of the specified elastic compute instance.
  **Note**

  You can only perform this operation on instances whose status is `STOPPED`.
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifyInstanceType
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: |-
    Instance ID.
    To obtain the instance ID, you can call DescribeInstances and look for instanceId in the response.
- name: instance-type
  type: string
  required: true
  sdk-field: instanceType
  description: |-
    The instance type ID to replace.
    To obtain the instance ID, you can call DescribeZoneInstanceConfigInfos and look for instanceType in the response.
