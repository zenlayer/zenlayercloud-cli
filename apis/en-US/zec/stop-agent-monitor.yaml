name: StopAgentMonitor
product: zec
use: stop-agent-monitor
short: Disables QEMU Guest Agent (QGA) data collection for an instance.
long: Disables QEMU Guest Agent (QGA) data collection for the specified elastic compute instance. After disabling, internal performance metrics will no longer be available through the monitoring API.
examples:
- cmd: zeno zec stop-agent-monitor --instance-id instanceId1
  desc: Disable QEMU Guest Agent (QGA) data collection.
sdk:
  service: zec
  version: '2025-09-01'
  action: StopAgentMonitor
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: ID of the instance.
