name: DetachDhcpOptionsSetFromSubnet
product: zec
use: detach-dhcp-options-set-from-subnet
short: Disassociates a DHCP options set from subnets
long: Disassociate a DHCP options set from subnets.
examples:
- cmd: zeno zec detach-dhcp-options-set-from-subnet --subnet-ids subnetId1 --subnet-ids subnetId2
  desc: Disassociate a DHCP options set from subnets.
sdk:
  service: zec
  version: '2025-09-01'
  action: DetachDhcpOptionsSetFromSubnet
parameters:
- name: subnet-ids
  type: string-array
  required: true
  sdk-field: subnetIds
  description: ID list of the subnets to be disassociated from the DHCP options set.
