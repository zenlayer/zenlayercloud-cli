name: UnassignBorderGateway
product: zec
use: unassign-border-gateway
short: Unbinds a border gateway from a NAT gateway.
long: |-
  Removes the binding between the specified border gateway (ZBG) and its NAT gateway. After unbinding, the border gateway will no longer advertise routes for that NAT gateway.
  **Notes**

  * If a border gateway is not bound to the NAT gateway, this operation will not fail.
examples:
- cmd: zeno zec unassign-border-gateway --zbg-id xxx
  desc: Unbind a NAT gateway to a border gateway.
sdk:
  service: zec
  version: '2025-09-01'
  action: UnassignBorderGateway
parameters:
- name: zbg-id
  type: string
  required: true
  sdk-field: zbgId
  description: Border gateway ID.
