name: DescribePolicyDetail
product: zec
use: describe-policy-detail
short: Queries the details of a DDoS protection policy
long: Query the detailed configuration of the specified DDoS protection policy, including IP allowlists/blocklists, protocol blocking, geo-blocking, traffic fingerprinting, and traffic control rules.
examples:
- cmd: zeno zec describe-policy-detail --policy-id <policyId>
  desc: Get protection strategy details.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribePolicyDetail
parameters:
- name: policy-id
  type: string
  required: true
  sdk-field: policyId
  description: Protection strategy ID.
response:
- name: policyId
  type: string
  description: Protection strategy ID.
- name: policyName
  type: string
  description: The name of the protection strategy.
- name: attachmentIps
  type: string-array
  description: List of linked protection target IPs.
- name: createTime
  type: string
  description: Creation time.
- name: blackIps
  type: string-array
  description: IP deny list.
- name: whiteIps
  type: string-array
  description: IP allow list.
- name: blackIpListExpireAt
  type: integer
  description: IP deny timeout.
- name: blockProtocols
  type: string-array
  description: Enabled protocol blocking. UDP and TCP cannot be enabled at the same time.
- name: ports
  type: object-array
  description: Port blocking.
  array-style: json
  item-schema:
  - name: protocol
    type: enum
    description: |-
      Supported protocols of port blocking.
      Only UDP and TCP are supported.
    enum-values:
    - value: TCP
      desc: Block TCP traffic.
    - value: UDP
      desc: Block UDP traffic.
    - value: ICMP
      desc: |-
        Blocks all ICMP traffic.
        ICMP protocol is not supported for port blocking.
  - name: srcPortStart
    type: integer
    description: |-
      Start value of the source port range for port blocking.
      Valid range: [0, 65535].
  - name: srcPortEnd
    type: integer
    description: |-
      End value of the source port range for port blocking.
      Valid range: [0, 65535].
  - name: dstPortStart
    type: integer
    description: |-
      Start value of the destination port range for port blocking.
      Valid range: [0, 65535].
  - name: dstPortEnd
    type: integer
    description: |-
      End value of the destination port range for port blocking.
      Valid range: [0, 65535].
  - name: action
    type: enum
    description: Action to perform after the port blocking is matched.
    enum-values:
    - value: Drop
      desc: Drop traffic based on packet fingerprint rules.
- name: blockRegions
  type: string-array
  description: Regions blocked.
- name: reflectUdpPort
  type: object-array
  description: Port list for reflection attack filtering.
  array-style: json
  item-schema:
  - name: port
    type: integer
    description: |-
      Custom UDP reflection source port.
      Valid range: [0, 65535].
- name: trafficControl
  type: object
  description: Source IP rate limiting configurations.
  object-schema:
  - name: bpsEnabled
    type: boolean
    description: Enable bandwidth rate limit or not.
  - name: bps
    type: integer
    description: |-
      Limited bandwidth value.
      Valid range: [8192, 2147483648].
  - name: ppsEnabled
    type: boolean
    description: Enable packet rate limit or not.
  - name: pps
    type: integer
    description: |-
      Limited packet rate value.
      Valid range: [32, 50000].
  - name: synBPSEnabled
    type: boolean
    description: Enable SYN bandwidth limit or not.
  - name: synBPS
    type: integer
    description: |-
      Limited SYN traffic value.
      Valid range: [8192, 2147483648].
  - name: synPPSEnabled
    type: boolean
    description: Enable SYN packet rate limit or not.
  - name: synPPS
    type: integer
    description: |-
      Limited SYN packet rate value.
      Valid range: [1, 100000].
- name: fingerPrintRules
  type: object-array
  description: Fingerprint filtering configurations.
  array-style: json
  item-schema:
  - name: protocol
    type: enum
    description: Supported protocols of the fingerprint.
    enum-values:
    - value: TCP
      desc: Block TCP traffic.
    - value: UDP
      desc: Block UDP traffic.
    - value: ICMP
      desc: |-
        Blocks all ICMP traffic.
        ICMP protocol is not supported for port blocking.
  - name: srcPortStart
    type: integer
    description: |-
      Start value of the source port range for the fingerprint.
      Valid range: [0, 65535].
  - name: srcPortEnd
    type: integer
    description: |-
      End value of the source port range for the fingerprint.
      Valid range: [0, 65535].
  - name: dstPortStart
    type: integer
    description: |-
      Start value of the destination port range for the fingerprint.
      Valid range: [0, 65535].
  - name: dstPortEnd
    type: integer
    description: |-
      End value of the destination port range for the fingerprint.
      Valid range: [0, 65535].
  - name: minPktLength
    type: integer
    description: |-
      Minimum packet length to be filtered.
      Valid range: [1, 1500].
  - name: maxPktLength
    type: integer
    description: |-
      Maximum packet length to be filtered.
      Valid range: [1, 1500].
  - name: offset
    type: integer
    description: |-
      Byte offset of the payload signature.
      Offset within TCP/UDP payload: [0–1500].
      Valid range: [0, 1500].
  - name: matchBytes
    type: string
    description: |-
      Payload pattern to match.
      Hex string in lowercase, padded to 2 digits, without 0x prefix.
  - name: action
    type: enum
    description: Action to perform after the fingerprint is matched.
    enum-values:
    - value: Drop
      desc: Drop traffic based on packet fingerprint rules.
