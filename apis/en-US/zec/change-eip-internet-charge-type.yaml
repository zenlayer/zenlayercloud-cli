name: ChangeEipInternetChargeType
product: zec
use: change-eip-internet-charge-type
short: Changes the network billing method of an elastic IP
long: Change the network billing method of an elastic IP.
sdk:
  service: zec
  version: '2025-09-01'
  action: ChangeEipInternetChargeType
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: ID of the elastic IP.
- name: internet-charge-type
  type: enum
  required: true
  sdk-field: internetChargeType
  description: Network billing methods.
  enum-values:
  - value: ByBandwidth
    desc: Billed by the flat rate bandwidth.
  - value: ByTrafficPackage
    desc: Billed by the traffic package size purchased.
  - value: BandwidthCluster
    desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
- name: flow-package
  type: float
  required: false
  sdk-field: flowPackage
  description: |-
    Traffic package size.
    Unit: TB.
    The network charging method is traffic package-based (ByTrafficPackage), and it needs to be specified when using this method.
- name: bandwidth
  type: integer
  required: false
  sdk-field: bandwidth
  description: |-
    Bandwidth limit.
    Unit: Mbps.
    When the network billing method is set to "By Bandwidth" (based on bandwidth), a specification is required.
- name: bandwidth-cap
  type: integer
  required: false
  sdk-field: bandwidthCap
  description: Bandwidth peak limit (Mbps).
- name: cluster-id
  type: string
  required: false
  sdk-field: clusterId
  description: |-
    Bandwidth cluster ID.
    Must be specified if changing to bandwidth cluster billing.
response:
- name: orderNumber
  type: string
  description: Order No.
