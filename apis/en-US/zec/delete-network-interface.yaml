name: DeleteNetworkInterface
product: zec
use: delete-network-interface
short: Deletes an elastic vNIC
long: |-
  Delete an elastic vNIC.
  **Note**

  * If the vNIC is attached to an instance, you need to detach it first before deleting it.
  * The primary vNIC can only be deleted along with the attached instance.
sdk:
  service: zec
  version: '2025-09-01'
  action: DeleteNetworkInterface
parameters:
- name: nic-id
  type: string
  required: true
  sdk-field: nicId
  description: ID of the vNIC.
