name: DeleteCidrs
product: zec
use: delete-cidrs
short: Deletes one or more CIDR blocks
long: |-
  Delete one or more CIDR blocks.
  **Note**

  * You cannot delete a CIDR block containing an elastic IP.
  * Deleting a CIDR block is irreversible. Please operate with caution.
examples:
- cmd: zeno zec delete-cidrs --cidr-ids cidrId1 --cidr-ids cidrId2
  desc: Delete CIDR blocks in batch.
sdk:
  service: zec
  version: '2025-09-01'
  action: DeleteCidrs
parameters:
- name: cidr-ids
  type: string-array
  required: true
  sdk-field: cidrIds
  description: List of CIDR IDs.
