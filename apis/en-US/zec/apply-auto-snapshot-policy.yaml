name: ApplyAutoSnapshotPolicy
product: zec
use: apply-auto-snapshot-policy
short: Attaches a disk to the specified snapshot schedule.
long: attach a disk to the specified snapshot schedule.
examples:
- cmd: zeno zec apply-auto-snapshot-policy --auto-snapshot-policy-id <autoSnapshotPolicyId> --disk-ids <diskId>
  desc: Attach disks to the snapshot schedule.
sdk:
  service: zec
  version: '2025-09-01'
  action: ApplyAutoSnapshotPolicy
parameters:
- name: auto-snapshot-policy-id
  type: string
  required: true
  sdk-field: autoSnapshotPolicyId
  description: Snapshot schedule ID.
- name: disk-ids
  type: string-array
  required: true
  sdk-field: diskIds
  description: ID list of disks to be attached.
