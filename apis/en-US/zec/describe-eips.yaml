name: DescribeEips
product: zec
use: describe-eips
short: Queries the information of one or more specified elastic IPs
long: Query the information of one or more specified elastic IPs. You can search for elastic IP information based on elastic IP ID, elastic IP name, etc.
examples:
- cmd: zeno zec describe-eips --ip-address 128.0.0.1
  desc: Query the list of IPs based on public IP.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeEips
parameters:
- name: eip-ids
  type: string-array
  required: false
  sdk-field: eipIds
  description: Elastic IP ID(s).
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: Filter by the region ID that the EIP belongs to.
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    Elastic IP name.
    Fuzzy search supported.
- name: status
  type: enum
  required: false
  sdk-field: status
  description: Status of the elastic IP.
  enum-values:
  - value: CREATING
    desc: Creating.
  - value: DELETING
    desc: Deleting.
  - value: ASSIGNING
    desc: Binding.
  - value: BINDED
    desc: Bound.
  - value: RECYCLED
    desc: Recycled.
  - value: UNBIND
    desc: Unbound.
  - value: CREATE_FAILED
    desc: Creating failed.
- name: is-default
  type: boolean
  required: false
  sdk-field: isDefault
  description: Whether the elastic IP is the default public IP.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
    Maximum value: 1000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1.
- name: private-ip-address
  type: string
  required: false
  sdk-field: privateIpAddress
  description: Filter by private IP bound to the elastic IP.
- name: ip-address
  type: string
  required: false
  sdk-field: ipAddress
  description: Filter by elastic IP address.
- name: ip-addresses
  type: string-array
  required: false
  sdk-field: ipAddresses
  description: Filter by elastic IP addresses.
- name: instance-id
  type: string
  required: false
  sdk-field: instanceId
  description: |-
    Filter by instance ID bound to the elastic IP.
    This field filters the elastic IPs bound to the instance's vNIC.
- name: associated-id
  type: string
  required: false
  sdk-field: associatedId
  description: Filter by resource ID bound to the elastic IP.
- name: cidr-ids
  type: string-array
  required: false
  sdk-field: cidrIds
  description: Filter by CIDR IDs to which the EIP belongs.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Resource Group ID.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query using tag keys.
    A maximum of 20 tag keys can be used.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 64 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 64 characters.'
- name: internet-charge-type
  type: enum
  required: false
  sdk-field: internetChargeType
  description: Filter by the network billing model of the elastic IP.
  enum-values:
  - value: ByBandwidth
    desc: Billed by the flat rate bandwidth.
  - value: ByTrafficPackage
    desc: Billed by the traffic package size purchased.
  - value: BandwidthCluster
    desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
response:
- name: totalCount
  type: integer
  description: Number of elastic IPs meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: List of elastic IPs.
  array-style: json
  item-schema:
  - name: eipId
    type: string
    description: ID of elastic IP.
  - name: name
    type: string
    description: Name of elastic IP.
  - name: regionId
    type: string
    description: Region ID.
  - name: peerRegionId
    type: string
    description: |-
      Remote region ID.
      This field is valid only when the IP is a Remote IP.
  - name: isDefault
    type: boolean
    description: Default IP or not.
  - name: status
    type: enum
    description: ​Status of elastic IP.​
    enum-values:
    - value: CREATING
      desc: Creating.
    - value: DELETING
      desc: Deleting.
    - value: ASSIGNING
      desc: Binding.
    - value: BINDED
      desc: Bound.
    - value: RECYCLED
      desc: Recycled.
    - value: UNBIND
      desc: Unbound.
    - value: CREATE_FAILED
      desc: Creating failed.
  - name: publicIpAddresses
    type: string-array
    description: Public IP address.
  - name: privateIpAddress
    type: string
    description: Private IP bound to the elastic IP.
  - name: eipV4Type
    type: enum
    description: |-
      ​Network type of elastic IP​.
      Deprecated. Please use networkLineType instead.
    enum-values:
    - value: BGPLine
      desc: BGP network type.
    - value: CN2Line
      desc: CN2 GIA (CN2 Global Internet Access) network type.
    - value: LocalLine
      desc: Local IP network type.
    - value: ChinaMobile
      desc: China Mobile network type.
    - value: ChinaUnicom
      desc: China Unicom network type.
    - value: ChinaTelecom
      desc: China Telecom network type.
    - value: Cogent
      desc: Cogent Communications network type.
    - value: PathBasedBandwidthIP
      desc: Multi-path bandwidth IP.
  - name: networkLineType
    type: enum
    description: ​Network type of elastic IP​.
    enum-values:
    - value: PremiumBGP
      desc: |-
        Premium BGP network.
        High-performance network.
    - value: CN2
      desc: China Telecom CN2 network.
    - value: PathBasedBandwidthIP
      desc: Multi-path bandwidth IP.
    - value: LocalLine
      desc: Provided by a local ISP.
    - value: StandardBGP
      desc: |-
        Standard BGP network.
        General-purpose network with cost optimization.
    - value: CMI
      desc: 1-Line IP China Mobile.
    - value: CUG
      desc: 1-Line IP China Unicom.
    - value: CTG
      desc: 1-Line IP China Telecom.
  - name: internetChargeType
    type: enum
    description: ​Network billing method of elastic IP.​
    enum-values:
    - value: ByBandwidth
      desc: Billed by the flat rate bandwidth.
    - value: ByTrafficPackage
      desc: Billed by the traffic package size purchased.
    - value: BandwidthCluster
      desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
  - name: cidrId
    type: string
    description: CIDR block ID from which the elastic IP originates.
  - name: nicId
    type: string
    description: |-
      vNIC ID associated with the elastic IP.
      This field is deprecated; please use the associatedId field instead.
  - name: associatedId
    type: string
    description: |-
      Resource ID bound to the elastic IP.
      It may be an instance ID, vNIC ID, or NAT gateway ID.
  - name: associatedType
    type: enum
    description: |-
      Resource type bound to the elastic IP.
      It may be an instance, vNIC, or NAT gateway.
    enum-values:
    - value: NIC
      desc: vNIC.
    - value: NAT
      desc: NAT gateway.
    - value: LB
      desc: Load balancer.
    - value: HAVIP
      desc: High availability virtual IP.
  - name: instanceId
    type: string
    description: |-
      ID of the instance to which elastic IP is bound.
      This field may have a value only when the associatedType is NIC .
  - name: bindType
    type: enum
    description: Elastic IP mode.
    enum-values:
    - value: FullNat
      desc: NAT mode.
    - value: Passthrough
      desc: Bypass mode.
  - name: flowPackage
    type: float
    description: |-
      Data transfer package size of the EIP.
      This field is only available when the billing type is traffic-based.
      This field may be null.
  - name: flowPackages
    type: object-array
    description: List of multi-direction traffic packages for the EIP.
    array-style: json
    item-schema:
    - name: trafficType
      type: string
      description: Traffic direction type.
    - name: flowPackage
      type: float
      description: Traffic package size for this direction, in TB.
  - name: bandwidth
    type: integer
    description: |-
      Bandwidth limit of the EIP.
      Unit: Mbps.
  - name: rateLimitMode
    type: enum
    description: Rate limit mode.
    enum-values:
    - value: LOOSE
      desc: 'Loose mode: allows short-term bursts exceeding the limit.'
    - value: STRICT
      desc: 'Strict mode: strictly enforced, no bursts allowed.'
  - name: eipGeoRefs
    type: object-array
    description: Elastic IP geolocation information.
    array-style: json
    item-schema:
    - name: maxMind
      type: string
      description: Geolocation information queried from MaxMind.
    - name: ipInfo
      type: string
      description: Geolocation information queried from IPinfo (ipinfo.io).
    - name: dbIp
      type: string
      description: Geolocation information queried from DB-IP (db-ip.com).
    - name: ipData
      type: string
      description: Geolocation information queried from ipdata (ipdata.co).
    - name: ipGeoLocation
      type: string
      description: Geographic information queried from IpGeoLocation.
    - name: standard
      type: string
      description: Geolocation information of the elastic IP.
    - name: isConsistent
      type: boolean
      description: Whether the queried geolocation matches the actual location.
  - name: blockInfoList
    type: object-array
    description: Elastic IP block threshold.
    array-style: json
    item-schema:
    - name: ip
      type: string
      description: The elastic IP address being blocked.
    - name: bps
      type: integer
      description: 'Blocking threshold in bandwidth, unit: bps (bits per second).'
    - name: pps
      type: integer
      description: 'Blocking threshold in packet rate, unit: pps (packets per second).'
    - name: inCps
      type: integer
      description: 'Blocking threshold for inbound connections, unit: count .'
    - name: outCps
      type: integer
      description: 'Blocking threshold for outbound connections, unit: count .'
    - name: enable
      type: boolean
      description: Whether to enable the specific threshold.
  - name: createTime
    type: string
    description: Creation time.
  - name: expiredTime
    type: string
    description: |-
      Expiration time of the EIP.
      This field may be null.
  - name: resourceGroupId
    type: string
    description: Resource group ID.
  - name: resourceGroupName
    type: string
    description: Resource group name.
  - name: bandwidthCluster
    type: object
    description: Bandwidth cluster ID.
    object-schema:
    - name: bandwidthClusterId
      type: string
      description: Bandwidth Cluster ID.
    - name: bandwidthClusterName
      type: string
      description: Bandwidth Cluster name.
  - name: tags
    type: object
    description: Tags bound to resources.
    object-schema:
    - name: tags
      type: object-array
      description: List of tags.
      array-style: json
      item-schema:
      - name: key
        type: string
        description: 'Tag key. Length limit: 1 to 64 characters.'
      - name: value
        type: string
        description: 'Tag value. Length limit: 1 to 64 characters.'
  - name: operationInfo
    type: object
    description: The bandwidth and traffic package operation status of EIP.
    object-schema:
    - name: operation
      type: string
      description: 'Operation action. Value range: `ModifyBandwidth` (adjust bandwidth), `ModifyFlowPackage` (adjust flow package).'
    - name: status
      type: string
      description: 'Operation status. Value range: `OPERATING` (in operation), `FAILED` (operation failed).'
