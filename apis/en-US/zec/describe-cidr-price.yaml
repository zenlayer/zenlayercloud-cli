name: DescribeCidrPrice
product: zec
use: describe-cidr-price
short: Queries the price of the CIDR block
long: Query the price of the CIDR block.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeCidrPrice
parameters:
- name: region-id
  type: string
  required: true
  sdk-field: regionId
  description: Region ID.
- name: eip-v4-type
  type: enum
  required: false
  sdk-field: eipV4Type
  description: |-
    Network types of public IPv4.
    Deprecated. Please use networkLineType instead.
  deprecated: true
  enum-values:
  - value: BGPLine
    desc: BGP network type.
  - value: CN2Line
    desc: CN2 GIA (CN2 Global Internet Access) network type.
  - value: LocalLine
    desc: Local IP network type.
  - value: ChinaMobile
    desc: China Mobile network type.
  - value: ChinaUnicom
    desc: China Unicom network type.
  - value: ChinaTelecom
    desc: China Telecom network type.
  - value: Cogent
    desc: Cogent Communications network type.
  - value: ThreeLine
    desc: 3-in-1 IP pool network type.
- name: network-line-type
  type: enum
  required: false
  sdk-field: networkLineType
  description: Network types of public IPv4.
  enum-values:
  - value: PremiumBGP
    desc: |-
      Premium BGP network.
      High-performance network.
  - value: CN2
    desc: China Telecom CN2 network.
  - value: LocalLine
    desc: Provided by a local ISP.
  - value: StandardBGP
    desc: |-
      Standard BGP network.
      General-purpose network with cost optimization.
  - value: CMI
    desc: 1-Line IP China Mobile.
  - value: CUG
    desc: 1-Line IP China Unicom.
  - value: CTG
    desc: 1-Line IP China Telecom.
  - value: ThreeLine
    desc: 3-in-1 IP Pool.
- name: netmask
  type: object
  required: true
  sdk-field: netmask
  description: CIDR block size and quantity.
  object-schema:
  - name: netmask
    type: integer
    description: CIDR block size.
  - name: amount
    type: integer
    description: CIDR block quantity.
response:
- name: cidrPrice
  type: object
  description: CIDR block price
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR : you will be billed by hour.
      DAY : you will be billed by day.
      MONTH : you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage,
      such as Mbps , LCU , and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The category to which the price belongs.
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
