name: DescribeCidrPrice
product: zec
use: describe-cidr-price
short: Queries the price of the CIDR block.
long: query the price of the CIDR block.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeCidrPrice
parameters:
- name: region-id
  type: string
  required: true
  sdk-field: regionId
  description: Region ID.
- name: eip-v4-type
  type: enum
  required: false
  sdk-field: eipV4Type
  description: |-
    Network types of public IPv4.
    Deprecated. Please use networkLineType instead.
  deprecated: true
  enum-values:
  - BGPLine
  - CN2Line
  - LocalLine
  - ChinaMobile
  - ChinaUnicom
  - ChinaTelecom
  - Cogent
  - ThreeLine
- name: network-line-type
  type: enum
  required: false
  sdk-field: networkLineType
  description: Network types of public IPv4.
  enum-values:
  - PremiumBGP
  - CN2
  - LocalLine
  - StandardBGP
  - CMI
  - CUG
  - CTG
  - ThreeLine
- name: netmask
  type: object
  required: true
  sdk-field: netmask
  description: CIDR block size and quantity.
  object-schema:
  - name: netmask
    type: integer
    description: CIDR block size.
  - name: amount
    type: integer
    description: CIDR block quantity.
