name: RenewEip
product: zec
use: renew-eip
short: Restores an elastic IP.
long: |-
  Restore an elastic IP.
  **Note**

  * This operation is only supported for elastic IPs in the recycle bin (i.e., with state `RECYCLE`).
sdk:
  service: zec
  version: '2025-09-01'
  action: RenewEip
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: ID of elastic IP.
