name: CreateSnapshot
product: zec
use: create-snapshot
short: Creates a snapshot of the specified disk
long: |-
  Create a snapshot of the specified disk.
  **Notes**

  * This is an asynchronous API. The request returns immediately after submission, but the operation is not yet complete. You can query the snapshot creation result by calling [`DescribeSnapshots`](../snapshot/describesnapshots.md). If the snapshot status changes from `CREATING` to `AVAILABLE`, the creation was successful. The snapshot cannot be deleted during the creation process.
  * Whether the disk supports creating snapshots can be determined by the `SnapshotAbility` field, which can be queried via the [`DescribeDisks`](../disk/describedisks.md) API.
  * The disk must be in **In Use** or **Available** state.
  * See the product usage limits for the maximum number of snapshots that can be created.
examples:
- cmd: zeno zec create-snapshot --disk-id diskId1 --snapshot-name xxx --retention-time 2025-07-16T01:26:39Z
  desc: Create a snapshot of the disk.
sdk:
  service: zec
  version: '2025-09-01'
  action: CreateSnapshot
parameters:
- name: disk-id
  type: string
  required: true
  sdk-field: diskId
  description: ID of the disk.
- name: snapshot-name
  type: string
  required: true
  sdk-field: snapshotName
  description: Snapshot name.
- name: retention-time
  type: string
  required: false
  sdk-field: retentionTime
  description: |-
    Retention expiration time.
    Format: YYYY-MM-ddTHH:mm:ssZ.
    If not transmitted, it means that it is retained indefinitely.
    The specified time must be 24 hours after the current time.
response:
- name: snapshotId
  type: string
  description: The IDs of the created snapshots.
