name: DescribePlacementGroups
product: zec
use: describe-placement-groups
short: Queries the details of placement groups
long: Query information of one or more placement groups. Users can query detailed placement group information by placement group ID, name, availability zone, and other criteria.
examples:
- cmd: zeno zec describe-placement-groups --page-size 20 --page-num 1
  desc: Query the placement group list.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribePlacementGroups
parameters:
- name: placement-group-ids
  type: string-array
  required: false
  sdk-field: placementGroupIds
  description: |-
    Filter by placement group ID list.
    Up to 100 IDs are supported per query.
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    Filter by placement group name.
    Fuzzy matching is supported.
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: Filter by the available zone of the placement group.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Page size for the response.
    Defaults to 20, maximum is 1000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Page number.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Filter by resource group ID.
response:
- name: totalCount
  type: integer
  description: Total number of data that meets the conditions.
- name: dataSet
  type: object-array
  description: Placement group result set.
  array-style: json
  item-schema:
  - name: placementGroupId
    type: string
    description: Placement group ID
  - name: name
    type: string
    description: Placement group name.
  - name: zoneId
    type: string
    description: Zone ID of the placement group.
  - name: partitionNum
    type: integer
    description: |-
      Number of partitions in the placement group.
      Valid values range from 2 to 5, which determines the maximum number of associated instances.
  - name: affinity
    type: integer
    description: |-
      Affinity of the placement group.
      Valid values range from 1 to floor(partitionNum / 2).
  - name: instanceCount
    type: integer
    description: Number of instances within the placement group.
  - name: instanceIds
    type: string-array
    description: List of instance IDs associated with the placement group.
  - name: constraintStatus
    type: enum
    description: Constraint satisfaction status of the placement group.
    enum-values:
    - value: Satisfied
      desc: Placement policy constraint is satisfied.
    - value: Unsatisfied
      desc: Placement policy constraint is not satisfied.
  - name: createTime
    type: string
    description: Creation time.
  - name: resourceGroup
    type: object
    description: Resource group information to which the placement group belongs.
  - name: tags
    type: object
    description: Tags of the placement group.
