name: ResetInstancePassword
product: zec
use: reset-instance-password
short: Resets the instance login password
long: |-
  Reset the instance login password.
  **Note**

  * For Windows systems, the default reset applies to the Administrator password; for Linux systems, it applies to the root password.
  * The instance must have QGA installed and be in a powered-on state.
  * The operation may fail; refer to the API response for details.
  * Batch operations are supported. The maximum number of instances in each request is 100.
sdk:
  service: zec
  version: '2025-09-01'
  action: ResetInstancePassword
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: |-
    Instance ID(s).
    To obtain the instance ID, you can call DescribeInstances and look for instanceId in the response.
- name: password
  type: string
  required: true
  sdk-field: password
  description: |-
    Instance password.
    The parameter must be 8-16 characters, including:
    lowercase letters: [a-z] uppercase letters: [A-Z] digits: 0-9 special characters: ~!@$^*-_=+
