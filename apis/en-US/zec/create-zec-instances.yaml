name: CreateZecInstances
product: zec
use: create-zec-instances
short: Creates one or more instances with specified configurations
long: |-
  Create one or more elastic compute instances with specified configurations.
  #### Prerequisites

  * Query instance models: call [`DescribeZoneInstanceConfigInfos`](describezoneinstanceconfiginfos.md) to check specifications.
  * Query images: call [`DescribeImages`](../image/describeimages.md) to check information on image.
  * Query key pairs: call [`DescribeKeyPairs`](../../../security/key-service/key-pair/describekeypairs.md) to check information on key pair ID.


  **Note**

  * After an instance is created successfully, it will start up automatically, and the instance status will become "`RUNNING`".
  * Please ensure your account balance is sufficient before calling this API.
  * Vouchers can be used for fee deduction in instance creation. See [Vouchers](https://docs.console.zenlayer.com/welcome/platform/billing-center/vouchers) for more details.
  * This API is an async API. An instance ID list is returned after the creation request is sent. However, it does not mean the creation has been completed. The status of the instance will be `DEPLOYING` during the creation. You can use [`DescribeInstances`](describeinstances.md) to query the status of the instance. If the status changes from `DEPLOYING` to `Running`, it means that the instance has been created successfully; `CREATE_FAILED` means creation failed. Any operations on the instances are not allowed while creating.
  * A maximum of 100 instances can be created in one request.
examples:
- cmd: zeno zec create-zec-instances --zone-id asia-east-1a --instance-type z2a.cpu.1 --image-id ubuntu2404_20240712 --instance-name Test-InstanceName --key-id key-rcfljdP5 --subnet-id 1272168087751233112 --nic-network-type Auto
  desc: Create an instance with the simplest parameters with no public IPv4 assigned.
- cmd: zeno zec create-zec-instances --zone-id asia-east-1a --instance-type z2a.cpu.1 --image-id ubuntu2404_20240712 --instance-name Test-InstanceName --key-id key-rcfljdP5 --subnet-id 1272168087751233112 --internet-charge-type BandwidthCluster --bandwidth 10 --cluster-id <clusterId> --eip-v4-type BGPLine
  desc: Create 2 instances with public IPs, using BGP lines and bandwidth cluster billing, limited to `10` Mbps.
sdk:
  service: zec
  version: '2025-09-01'
  action: CreateZecInstances
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: Availability zone ID.
- name: image-id
  type: string
  required: true
  sdk-field: imageId
  description: |-
    Valid image ID.
    To obtain valid image ID, you can call DescribeImages , and find imageId in the response.
- name: time-zone
  type: string
  required: false
  sdk-field: timeZone
  description: |-
    Time zone of instance.
    Default value: America/Los_Angeles .
- name: instance-type
  type: string
  required: true
  sdk-field: instanceType
  description: |-
    Instance size.
    To view specific values, you can call DescribeZoneInstanceConfigInfos .
- name: instance-name
  type: string
  required: false
  sdk-field: instanceName
  description: |-
    Instance name to be displayed.
    Default value: instance.
    This parameter must start with a number or a letter, containing 2 to 63 characters. Only letters, numbers, - and periods (.) are supported.
    If you purchase multiple instances at the same time, you can specify a pattern string [begin_number,bits] .
    begin_number : the starting value of an ordered number, value range: [0,99999], default value: 0.
    bits : the number of digits occupied by an ordered value, value range: [1,6], default value: 6.
    For example, if you purchase 1 instance and the instance name body is server_[3,3] , the instance name will be server003 ; if you purchase 2 instances, the instance names will be server003 , server004 .
    Note:
    Spaces are not supported in the pattern string. Multiple pattern strings are supported, such as server_[3,3]_[1,1] .
- name: password
  type: string
  required: false
  sdk-field: password
  description: |-
    Instance password.
    The parameter must be 8-16 characters, including:
    lowercase letters: [a-z] uppercase letters: [A-Z] digits: 0-9 special characters: ~!@$^*-_=+|;:,.?
    You can set either a password or a keyId , but not both; Windows and Generic images support neither option.
- name: key-id
  type: string
  required: false
  sdk-field: keyId
  description: |-
    SSH key pair ID. For example: key-YWD2QFOl .
    Your SSH key pair contains several public keys that can be placed on your server. You can access your instance with the private key. Call DescribeKeyPairs to obtain key pair information.
    You can set either a password or a keyId , but not both; Windows and Generic images support neither option.
- name: nic-network-type
  type: enum
  required: false
  sdk-field: nicNetworkType
  description: |-
    Network interface mode.
    Default value: Auto .
  enum-values:
  - value: Auto
    desc: Default mode auto-adapted to image.
  - value: FailOver
    desc: Failover mode.
  - value: VirtioOnly
    desc: Virtio-net mode.
  - value: VfOnly
    desc: VFIO mode.
- name: instance-count
  type: integer
  required: true
  sdk-field: instanceCount
  description: |-
    The number of instances to be purchased.
    Value range: [1,100].
    Default value: 1.
- name: system-disk
  type: object
  required: false
  sdk-field: systemDisk
  description: |-
    Boot disk configuration.
    If the value is empty, the boot disk size is the minimum default value to store the operating system.
  object-schema:
  - name: diskId
    type: string
    description: |-
      Boot disk ID.
      This parameter is currently only used as a response parameter in query operations such as `DescribeInstances`, and cannot be used as an input parameter in write operations like `CreateInstances`.
  - name: diskSize
    type: integer
    description: |-
      Boot disk size.
      Unit: GiB.
  - name: diskCategory
    type: string
    description: |-
      Disk type.
      Basic NVMe SSD: Economical NVMe SSD.
      Standard NVMe SSD: Standard NVMe SSD.
      Default is Standard NVMe SSD.
  - name: burstingEnabled
    type: boolean
    description: Whether to enable disk bursting.
- name: data-disks
  type: object-array
  required: false
  sdk-field: dataDisks
  description: |-
    Disk configuration.
    If the value is empty, no disk is attached by default.
    Only 1 disk can be attached along with the instance for now.
  array-style: json
  item-schema:
  - name: diskId
    type: string
    description: |-
      Disk ID.
      This parameter is currently only used as a response parameter in query operations such as `DescribeInstances`, and cannot be used as an input parameter for write operations such as `CreateInstances`.
  - name: diskName
    type: string
    description: |-
      Disk name.
      This parameter is currently only used as a response parameter for query operations such as DescribeInstances.
  - name: diskSize
    type: integer
    description: |-
      Disk size.
      Unit: GiB.
  - name: diskAmount
    type: integer
    description: |-
      Number of disks.
      This parameter is only used as an input parameter for APIs such as `CreateInstances` and `InquiryPriceCreateInstance`.
  - name: portable
    type: boolean
    description: |-
      Whether the disk is detachable.
      This parameter is used  as a response parameter in query operations, not as an input parameter.
      true means the disk will not be deleted when the instance is deleted.
      false means the disk will be deleted when the instance is deleted.
  - name: burstingEnabled
    type: boolean
    description: Whether to enable disk bursting.
  - name: diskCategory
    type: string
    description: |-
      Disk type.
      Basic NVMe SSD: the Basic NVMe SSD.
      Standard NVMe SSD: the Standard NVMe SSD.
      Default value: Standard NVMe SSD.
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: |-
    ID of the security group deployed on the primary vNIC.
    Currently only one security group can be deployed.
    If not specified, the security group associated with global VPC will be used by default.
- name: subnet-id
  type: string
  required: true
  sdk-field: subnetId
  description: |-
    Subnet ID.
    If you need to configure public IP, please ensure your subnet is public network accessible. Subnets only with IPv6 private network access type are not supported.
- name: lan-ip
  type: string
  required: false
  sdk-field: lanIp
  description: Private IP. If the specified IP is occupied, a default private IP will be allocated.
- name: enable-agent
  type: boolean
  required: false
  sdk-field: enableAgent
  description: Whether to enable QEMU Guest Agent (QGA). QGA is enabled by default.
- name: enable-ip-forward
  type: boolean
  required: false
  sdk-field: enableIpForward
  description: Whether to enable IP forwarding. IP forwarding is disabled by default.
- name: internet-charge-type
  type: enum
  required: false
  sdk-field: internetChargeType
  description: Public network pricing model.
  enum-values:
  - value: ByBandwidth
    desc: Billed by the flat rate bandwidth.
  - value: ByTrafficPackage
    desc: Billed by the traffic package size purchased.
  - value: BandwidthCluster
    desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
- name: traffic-package-size
  type: float
  required: false
  sdk-field: trafficPackageSize
  description: |-
    The size of the data transfer package to order.
    Unit: TB.
    This value only takes effect when internetChargeType = ByTrafficPackage.
    When IpStackType = IPv4_IPv6, the data transfer package size applies to IPv4.
- name: bandwidth
  type: integer
  required: false
  sdk-field: bandwidth
  description: |-
    Public outbound bandwidth cap.
    Unit: Mbps .
    Bandwidth cap varies by instance size.
- name: eip-bind-type
  type: enum
  required: false
  sdk-field: eipBindType
  description: |-
    Elastic IP mode. If not specified, the default is Full NAT mode.
    Default value: FullNat .
  enum-values:
  - value: FullNat
    desc: NAT mode.
  - value: Passthrough
    desc: Bypass mode.
- name: eip-v4-type
  type: enum
  required: false
  sdk-field: eipV4Type
  description: |-
    Network type of public IPv4.
    If you need to specify the value, please ensure that your subnet supports IPv4 stack type.
    If the subnet IP stack type is IPv4, the value is required.
    ThreeLine are not supported for now.
    Deprecated. Please use networkLineType instead.
  deprecated: true
  enum-values:
  - value: BGPLine
    desc: BGP network type.
  - value: CN2Line
    desc: CN2 GIA (CN2 Global Internet Access) network type.
  - value: LocalLine
    desc: Local IP network type.
  - value: ChinaMobile
    desc: China Mobile network type.
  - value: ChinaUnicom
    desc: China Unicom network type.
  - value: ChinaTelecom
    desc: China Telecom network type.
  - value: Cogent
    desc: Cogent Communications network type.
  - value: ThreeLine
    desc: 3-in-1 IP pool network type.
- name: ip-stack-type
  type: enum
  required: false
  sdk-field: ipStackType
  description: |-
    Set the IP stack type.
    If not specified, IPv4 is used by default when the subnet stack type is IPv4 or IPv4_IPv6.
  enum-values:
  - value: IPv4
    desc: IPv4 stack type only.
  - value: IPv4_IPv6
    desc: IPv4 and IPv6 stack type.
  - value: IPv6
    desc: IPv6 stack type only.
- name: network-line-type
  type: enum
  required: false
  sdk-field: networkLineType
  description: |-
    Network type of public IPv4.
    If you need to specify the value, please ensure that your subnet supports IPv4 stack type.
    If the subnet IP stack type is IPv4, the value is required.
    ThreeLine are not supported for now.
  enum-values:
  - value: PremiumBGP
    desc: |-
      Premium BGP network.
      High-performance network.
  - value: CN2
    desc: China Telecom CN2 network.
  - value: LocalLine
    desc: Provided by a local ISP.
  - value: StandardBGP
    desc: |-
      Standard BGP network.
      General-purpose network with cost optimization.
  - value: CMI
    desc: 1-Line IP China Mobile.
  - value: CUG
    desc: 1-Line IP China Unicom.
  - value: CTG
    desc: 1-Line IP China Telecom.
  - value: ThreeLine
    desc: 3-in-1 IP Pool.
- name: cluster-id
  type: string
  required: false
  sdk-field: clusterId
  description: |-
    Bandwidth cluster ID.
    This parameter is required when the network billing model is BandwidthCluster.
- name: ipv6-cluster-id
  type: string
  required: false
  sdk-field: ipv6ClusterId
  description: |-
    Bandwidth cluster ID of the public IPv6 address.
    Required when the network billing model is BandwidthCluster and ipStackType is IPv4_IPv6.
    If not specified, clusterId is used by default.
    This field is typically used when IPv4 and IPv6 belong to different bandwidth clusters.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Resource group ID where the instances reside.
    If the value is empty, the instance will be added into the default resource group.
- name: marketing-options
  type: object
  required: false
  sdk-field: marketingOptions
  description: Information on marketing campaigns.
  object-schema:
  - name: discountCode
    type: string
    description: |-
      Promo Code.
      If no Promo Code exists, the final discount will not apply.
  - name: usePocVoucher
    type: boolean
    description: |-
      Whether to use POC voucher.
      If no POC voucher exists, the related creation will fail.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    Bound tags when creating resources.
    Tag keys must be unique.--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 64 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 64 characters.'
- name: user-data
  type: string
  required: false
  sdk-field: userData
  description: Initialization command.
- name: instance-options
  type: object
  required: false
  sdk-field: instanceOptions
  description: Instance options configuration.
  object-schema:
  - name: nestedVirtualization
    type: boolean
    description: |-
      Whether to the instance for nested virtualization.
      To enable nested virtualization, you must contact Support to activate it; otherwise, the setting will be ineffective.
response:
- name: orderNumber
  type: string
  description: Number of order.
- name: instanceIdSet
  type: string-array
  description: |-
    List of instance IDs.
    The returned instance ID list does not mean the creation has been completed.uery the status of the instance according to dataSet . If the status changes from DEPLOYING to RUNNING , it means that the instance has been created successfully; CREATE_FAILED or no instance found means the instance has been created failed.
- name: instances
  type: object-array
  description: Set of disk IDs created along with the instances. If no disk is specified, the value is empty.
