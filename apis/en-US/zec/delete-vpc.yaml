name: DeleteVpc
product: zec
use: delete-vpc
short: Deletes a global VPC
long: |-
  Delete a global VPC.
  **Note**

  * Operations on global VPCs with subnets in it are not supported.
  * Operations on default global VPCs are not supported.
sdk:
  service: zec
  version: '2025-09-01'
  action: DeleteVpc
parameters:
- name: vpc-id
  type: string
  required: true
  sdk-field: vpcId
  description: Global VPC ID.
