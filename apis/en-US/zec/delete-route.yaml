name: DeleteRoute
product: zec
use: delete-route
short: Deletes a route
long: |-
  Delete a route.
  **Note**

  System-generated routes cannot be deleted. Only user-created routes can be deleted. Routes of type `RouteTypeStatic` and `RouteTypePolicy` are supported.
examples:
- cmd: zeno zec delete-route --vpc-id <vpcId> --route-id <routeId>
  desc: Delete a route.
sdk:
  service: zec
  version: '2025-09-01'
  action: DeleteRoute
parameters:
- name: route-id
  type: string
  required: true
  sdk-field: routeId
  description: Route ID.
