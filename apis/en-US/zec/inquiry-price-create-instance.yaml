name: InquiryPriceCreateInstance
product: zec
use: inquiry-price-create-instance
short: Queries the price of creating an elastic compute instance
long: |-
  Query the price of creating an elastic compute instance.
  * When querying the price for a GPU instance, pass the `instanceType` field returned by [`DescribeZoneGpuInstanceConfigInfos`](describezoneGpuinstanceconfiginfos.md) to `instanceType`. In this case, `gpuPrice` in the response is the GPU instance type fee, and `specPrice` is null.
  * When querying the price for a standard instance, pass the `instanceType` field returned by [`DescribeZoneInstanceConfigInfos`](describezoneinstanceconfiginfos.md) to `instanceType`. In this case, `specPrice` in the response is the instance type fee, and `gpuPrice` is null.
  * The size of the guaranteed traffic package is only valid for billing periods of one month.
examples:
- cmd: zeno zec inquiry-price-create-instance --zone-id asia-east-1a --instance-type z2a.cpu.1 --instance-count 1
  desc: Query the price of creating an instance (without public IP).
- cmd: zeno zec inquiry-price-create-instance --zone-id asia-east-1a --instance-type z2a.cpu.1 --network-line-type PremiumBGP --internet-charge-type ByBandwidth --bandwidth 1 --instance-count 1
  desc: Query the price of creating an instance (PremiumBGP network, billed by bandwidth).
- cmd: zeno zec inquiry-price-create-instance --zone-id SEA-A --instance-type c.1c2g --network-line-type PathBasedBandwidthIP --internet-charge-type ByBandwidth --bandwidth 1 --instance-count 1
  desc: Query the price of creating an instance (PathBasedBandwidthIP network, billed by bandwidth). ipv4BandwidthPrice is null; refer to ipv4BandwidthPrices for bandwidth details.
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPriceCreateInstance
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: Zone ID to which the instance belongs.
- name: instance-type
  type: string
  required: true
  sdk-field: instanceType
  description: Instance type. For VM instances, the value can be obtained through [DescribeZoneInstanceConfigInfos](describezoneinstanceconfiginfos.md). For GPU instances, the value can be obtained through [DescribeZoneGpuInstanceConfigInfos](describezoneGpuinstanceconfiginfos.md).
- name: eip-v4-type
  type: enum
  required: false
  sdk-field: eipV4Type
  description: |-
    The network type of the public IPv4. Ensure that the stack type of the selected subnet supports IPv4.
    ThreeLine are not currently supported.
    Deprecated. Please use networkLineType instead.
  deprecated: true
  enum-values:
  - value: BGPLine
    desc: BGP network type.
  - value: CN2Line
    desc: CN2 GIA (CN2 Global Internet Access) network type.
  - value: LocalLine
    desc: Local IP network type.
  - value: ChinaMobile
    desc: China Mobile network type.
  - value: ChinaUnicom
    desc: China Unicom network type.
  - value: ChinaTelecom
    desc: China Telecom network type.
  - value: Cogent
    desc: Cogent Communications network type.
  - value: PathBasedBandwidthIP
    desc: Multi-path bandwidth IP.
- name: network-line-type
  type: enum
  required: false
  sdk-field: networkLineType
  description: Network line type of the public IPv4. Required when internetChargeType is specified.
  enum-values:
  - value: PremiumBGP
    desc: |-
      Premium BGP network.
      High-performance network.
  - value: CN2
    desc: China Telecom CN2 network.
  - value: PathBasedBandwidthIP
    desc: Multi-path bandwidth IP.
  - value: LocalLine
    desc: Provided by a local ISP.
  - value: StandardBGP
    desc: |-
      Standard BGP network.
      General-purpose network with cost optimization.
  - value: CMI
    desc: 1-Line IP China Mobile.
  - value: CUG
    desc: 1-Line IP China Unicom.
  - value: CTG
    desc: 1-Line IP China Telecom.
- name: internet-charge-type
  type: enum
  required: false
  sdk-field: internetChargeType
  description: Network billing method of the public IP. If not specified, the public IP price will not be queried.
  enum-values:
  - value: ByBandwidth
    desc: Billed by the flat rate bandwidth.
  - value: ByTrafficPackage
    desc: Billed by the traffic package size purchased.
  - value: BandwidthCluster
    desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
- name: traffic-package-size
  type: float
  required: false
  sdk-field: trafficPackageSize
  description: |-
    Data transfer package size (TB).
    The unit is TB. The parameter is only required when internetChargeType is ByTrafficPackage .
- name: bandwidth
  type: integer
  required: false
  sdk-field: bandwidth
  description: |-
    Outbound public network bandwidth cap (Mbps).
    Unit: Mbps.
    The value differs with different instance types.
- name: instance-count
  type: integer
  required: true
  sdk-field: instanceCount
  description: |-
    Quantity.
    Default value: 1.
- name: system-disk
  type: object
  required: true
  sdk-field: systemDisk
  description: Boot disk.
  object-schema:
  - name: diskId
    type: string
    description: |-
      Boot disk ID.
      This parameter is currently only used as a response parameter in query operations such as `DescribeInstances`, and cannot be used as an input parameter in write operations like `CreateInstances`.
  - name: diskSize
    type: integer
    description: |-
      Boot disk size.
      Unit: GiB.
  - name: diskCategory
    type: string
    description: |-
      Disk type.
      Basic NVMe SSD: Economical NVMe SSD.
      Standard NVMe SSD: Standard NVMe SSD.
      Default is Standard NVMe SSD.
  - name: burstingEnabled
    type: boolean
    description: Whether to enable burstable performance.
- name: data-disk
  type: object
  required: false
  sdk-field: dataDisk
  description: The size of the attached disk.
  object-schema:
  - name: diskId
    type: string
    description: |-
      Disk ID.
      This parameter is currently only used as a response parameter in query operations such as `DescribeInstances`, and cannot be used as an input parameter for write operations such as `CreateInstances`.
  - name: diskName
    type: string
    description: |-
      Disk name.
      This parameter is currently only used as a response parameter for query operations such as DescribeInstances.
  - name: diskSize
    type: integer
    description: |-
      Disk size.
      Unit: GiB.
  - name: diskAmount
    type: integer
    description: |-
      Number of disks.
      This parameter is only used as an input parameter for APIs such as `CreateInstances` and `InquiryPriceCreateInstance`.
  - name: portable
    type: boolean
    description: |-
      Whether the disk is detachable.
      This parameter is used  as a response parameter in query operations, not as an input parameter.
      true means the disk will not be deleted when the instance is deleted.
      false means the disk will be deleted when the instance is deleted.
  - name: burstingEnabled
    type: boolean
    description: Whether to enable burstable performance.
  - name: diskCategory
    type: string
    description: |-
      Disk type.
      Basic NVMe SSD: the Basic NVMe SSD.
      Standard NVMe SSD: the Standard NVMe SSD.
      Default value: Standard NVMe SSD.
response:
- name: specPrice
  type: object
  description: Price of specifications.
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR : you will be billed by hour.
      DAY : you will be billed by day.
      MONTH : you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: First price range of a tiered price.
    - name: stepEnd
      type: float
      description: |-
        Last price range of a tiered price.
        If the value is empty, it means the last tier.
    - name: unitPrice
      type: float
      description: Original unit price of current price range.
    - name: discountUnitPrice
      type: float
      description: Discount unit price of current price range.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage,
      such as Mbps , LCU , and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The category to which the price belongs.
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
