name: InquiryPriceCreateInstance
product: zec
use: inquiry-price-create-instance
short: Queries the price of creating an elastic compute instance
long: Query the price of creating an elastic compute instance.
examples:
- cmd: zeno zec inquiry-price-create-instance --zone-id SAO-A --instance-type c.1c2g --eip-v4-type xxx --internet-charge-type ByBandwidth --bandwidth 1 --instance-count 1
  desc: Query the price of a pay-as-you-go instance with the public network billing method of flat rate.
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPriceCreateInstance
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: Zone ID to which the instance belongs.
- name: instance-type
  type: string
  required: true
  sdk-field: instanceType
  description: |-
    Instance type.
    Specific values can be obtained by calling the interface DescribeZoneInstanceConfigInfos .
- name: eip-v4-type
  type: enum
  required: false
  sdk-field: eipV4Type
  description: |-
    The network type of the public IPv4. Ensure that the stack type of the selected subnet supports IPv4.
    ThreeLine are not currently supported.
    Deprecated. Please use networkLineType instead.
  deprecated: true
  enum-values:
  - value: BGPLine
    desc: BGP network type.
  - value: CN2Line
    desc: CN2 GIA (CN2 Global Internet Access) network type.
  - value: LocalLine
    desc: Local IP network type.
  - value: ChinaMobile
    desc: China Mobile network type.
  - value: ChinaUnicom
    desc: China Unicom network type.
  - value: ChinaTelecom
    desc: China Telecom network type.
  - value: Cogent
    desc: Cogent Communications network type.
  - value: ThreeLine
    desc: 3-in-1 IP pool network type.
- name: network-line-type
  type: enum
  required: false
  sdk-field: networkLineType
  description: |-
    The network type of the public IPv4. Ensure that the stack type of the selected subnet supports IPv4.
    ThreeLine are not currently supported.
  enum-values:
  - value: PremiumBGP
    desc: |-
      Premium BGP network.
      High-performance network.
  - value: CN2
    desc: China Telecom CN2 network.
  - value: LocalLine
    desc: Provided by a local ISP.
  - value: StandardBGP
    desc: |-
      Standard BGP network.
      General-purpose network with cost optimization.
  - value: CMI
    desc: 1-Line IP China Mobile.
  - value: CUG
    desc: 1-Line IP China Unicom.
  - value: CTG
    desc: 1-Line IP China Telecom.
  - value: ThreeLine
    desc: 3-in-1 IP Pool.
- name: internet-charge-type
  type: enum
  required: true
  sdk-field: internetChargeType
  description: Network billing method.
  enum-values:
  - value: ByBandwidth
    desc: Billed by the flat rate bandwidth.
  - value: ByTrafficPackage
    desc: Billed by the traffic package size purchased.
  - value: BandwidthCluster
    desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
- name: traffic-package-size
  type: float
  required: false
  sdk-field: trafficPackageSize
  description: |-
    Data transfer package size (TB).
    The unit is TB. The parameter is only required when internetChargeType is ByTrafficPackage .
- name: bandwidth
  type: integer
  required: false
  sdk-field: bandwidth
  description: |-
    Outbound public network bandwidth cap (Mbps).
    Unit: Mbps.
    The value differs with different instance types.
- name: instance-count
  type: integer
  required: true
  sdk-field: instanceCount
  description: |-
    Quantity.
    Default value: 1.
- name: system-disk
  type: object
  required: true
  sdk-field: systemDisk
  description: Boot disk.
  object-schema:
  - name: diskId
    type: string
    description: |-
      Boot disk ID.
      This parameter is currently only used as a response parameter in query operations such as `DescribeInstances`, and cannot be used as an input parameter in write operations like `CreateInstances`.
  - name: diskSize
    type: integer
    description: |-
      Boot disk size.
      Unit: GiB.
  - name: diskCategory
    type: string
    description: |-
      Disk type.
      Basic NVMe SSD: Economical NVMe SSD.
      Standard NVMe SSD: Standard NVMe SSD.
      Default is Standard NVMe SSD.
  - name: burstingEnabled
    type: boolean
    description: Whether to enable burstable performance.
- name: data-disk
  type: object
  required: false
  sdk-field: dataDisk
  description: The size of the attached disk.
  object-schema:
  - name: diskId
    type: string
    description: |-
      Disk ID.
      This parameter is currently only used as a response parameter in query operations such as `DescribeInstances`, and cannot be used as an input parameter for write operations such as `CreateInstances`.
  - name: diskName
    type: string
    description: |-
      Disk name.
      This parameter is currently only used as a response parameter for query operations such as DescribeInstances.
  - name: diskSize
    type: integer
    description: |-
      Disk size.
      Unit: GiB.
  - name: diskAmount
    type: integer
    description: |-
      Number of disks.
      This parameter is only used as an input parameter for APIs such as `CreateInstances` and `InquiryPriceCreateInstance`.
  - name: portable
    type: boolean
    description: |-
      Whether the disk is detachable.
      This parameter is used  as a response parameter in query operations, not as an input parameter.
      true means the disk will not be deleted when the instance is deleted.
      false means the disk will be deleted when the instance is deleted.
  - name: burstingEnabled
    type: boolean
    description: Whether to enable burstable performance.
  - name: diskCategory
    type: string
    description: |-
      Disk type.
      Basic NVMe SSD: the Basic NVMe SSD.
      Standard NVMe SSD: the Standard NVMe SSD.
      Default value: Standard NVMe SSD.
response:
- name: specPrice
  type: object
  description: Price of specifications.
- name: gpuPrice
  type: object
  description: GPU price.
- name: ipv4Price
  type: object
  description: IPv4 price.
- name: ipv4BandwidthPrice
  type: object
  description: Public network IPv4 bandwidth price.
- name: ipv6Price
  type: object
  description: IPv6 price.
- name: ipv6BandwidthPrice
  type: object
  description: Public network IPv6 bandwidth price.
- name: systemDiskPrice
  type: object
  description: Price of the boot disk.
- name: dataDiskPrice
  type: object
  description: The price of the attached disk.
