name: DescribeCrossRegionBandwidth
product: zec
use: describe-cross-region-bandwidth
short: Queries the list of cross-region bandwidth
long: Query the private cross-region bandwidth list.
examples:
- cmd: zeno zec describe-cross-region-bandwidth --name "<your cross name>" --vpc-id "<your vpc id>"
  desc: Query the list of private cross-region bandwidth and filter by name and vpcId.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeCrossRegionBandwidth
parameters:
- name: cross-region-bandwidth-ids
  type: string-array
  required: false
  sdk-field: crossRegionBandwidthIds
  description: Filter by unique cross-region bandwidth ID.
- name: cross-region-bandwidth-name
  type: string
  required: false
  sdk-field: crossRegionBandwidthName
  description: Filter by cross-region bandwidth name. This field supports fuzzy matching.
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: Filter by the global VPC ID.
- name: region-a
  type: string
  required: false
  sdk-field: regionA
  description: Filter by region A name.
- name: region-z
  type: string
  required: false
  sdk-field: regionZ
  description: Filter by region Z name.
- name: status
  type: enum
  required: false
  sdk-field: status
  description: Filter by state of cross-region bandwidth.
  enum-values:
  - value: CREATING
    desc: The cross-region bandwidth is being created.
  - value: AVAILABLE
    desc: The cross-region bandwidth is available.
  - value: CHANGING
    desc: The cross-region bandwidth is being changed.
  - value: RECYCLING
    desc: The cross-region bandwidth is being recycled.
  - value: RECYCLED
    desc: The cross-region bandwidth is recycled.
  - value: DELETING
    desc: The cross-region bandwidth is being deleted.
  - value: CREATE_FAILED
    desc: The cross-region bandwidth is creating failed.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20 ;
    Maximum value: 1000 .
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Page number of the current page result.
    Default value: 1 .
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Filter by resource group ID.
response:
- name: totalCount
  type: integer
  description: Number of resources meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on list of cross-region bandwidth.
  array-style: json
  item-schema:
  - name: crossRegionBandwidthId
    type: string
    description: Cross-region bandwidth ID.
  - name: crossRegionBandwidthName
    type: string
    description: Cross-region bandwidth name.
  - name: status
    type: enum
    description: Cross-region bandwidth state.
    enum-values:
    - value: CREATING
      desc: The cross-region bandwidth is being created.
    - value: AVAILABLE
      desc: The cross-region bandwidth is available.
    - value: CHANGING
      desc: The cross-region bandwidth is being changed.
    - value: RECYCLING
      desc: The cross-region bandwidth is being recycled.
    - value: RECYCLED
      desc: The cross-region bandwidth is recycled.
    - value: DELETING
      desc: The cross-region bandwidth is being deleted.
    - value: CREATE_FAILED
      desc: The cross-region bandwidth is creating failed.
  - name: vpcId
    type: string
    description: Global VPC ID where the cross-region bandwidth belong.
  - name: regionA
    type: string
    description: One end of the cross-region bandwidth.
  - name: regionZ
    type: string
    description: The other end of the cross-region bandwidth.
  - name: bandwidth
    type: integer
    description: Bandwidth cap.
  - name: bandwidthCap
    type: integer
    description: |-
      Burst bandwidth.
      The value may be empty.
  - name: createTime
    type: string
    description: Creation time.
  - name: internetChargeType
    type: enum
    description: Network pricing model.
    enum-values:
    - value: ByBandwidth
      desc: Billed by the flat rate bandwidth.
    - value: ByTrafficPackage
      desc: Billed by the traffic package size purchased.
    - value: BandwidthCluster
      desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
  - name: expiredTime
    type: string
    description: |-
      Expiration time.
      The value may be empty.
  - name: resourceGroupId
    type: string
    description: Resource group ID.
  - name: resourceGroupName
    type: string
    description: Resource group name.
