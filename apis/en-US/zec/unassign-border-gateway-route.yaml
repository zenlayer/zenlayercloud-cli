name: UnassignBorderGatewayRoute
product: zec
use: unassign-border-gateway-route
short: Not advertise custom routes to a border gateway
long: Not advertise custom routes to a border gateway.
examples:
- cmd: zeno zec unassign-border-gateway-route --zbg-id xxx --advertised-route-ids routeId1 --advertised-route-ids routeId2
  desc: Do not advertise custom routes to a border gateway.
sdk:
  service: zec
  version: '2025-09-01'
  action: UnassignBorderGatewayRoute
parameters:
- name: zbg-id
  type: string
  required: true
  sdk-field: zbgId
  description: Border gateway ID.
- name: advertised-route-ids
  type: string-array
  required: true
  sdk-field: advertisedRouteIds
  description: ID list of the custom routes not to be advertised.
