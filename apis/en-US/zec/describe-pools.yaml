name: DescribePools
product: zec
use: describe-pools
short: Queries the details of one or more IP pools
long: Query public IP pool information in the account. You can filter results by pool ID, region, or name. Supports pagination.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribePools
parameters:
- name: pool-ids
  type: string-array
  required: false
  sdk-field: poolIds
  description: Pool ID(s).
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: Region ID.
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    Pool name.
    Fuzzy search supported.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
response:
- name: totalCount
  type: integer
  description: Number of pools meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on pools.
