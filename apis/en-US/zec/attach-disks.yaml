name: AttachDisks
product: zec
use: attach-disks
short: Attaches disks to instance
long: |-
  Attach disks to instance.
  **Note**

  * A maximum of 10 disks can be attached to an instance in one request.
  * Quantity of attached disks cannot exceed available disk numbers of an instance. See quota limit for details.
  * The disk and the instance to which you want to attach the disk reside in the same availability zone.
  * You can only attach disks to the available instance. Please note that status of **DEPLOYING** or **PENDING** is not available.
  * Disks must be detachable.
examples:
- cmd: zeno zec attach-disks --disk-ids your-disk-id --instance-id your-instance-id
  desc: Attach disks to an instance.
sdk:
  service: zec
  version: '2025-09-01'
  action: AttachDisks
parameters:
- name: disk-ids
  type: string-array
  required: true
  sdk-field: diskIds
  description: ID list of disks.
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: ID of the instance to which the disks to be attached.
