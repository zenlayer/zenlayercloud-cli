name: DescribeCrossRegionBandwidthMonitorData
product: zec
use: describe-cross-region-bandwidth-monitor-data
short: Queries the performance metric data of the cross-region bandwidth
long: Query the performance metric data of cross-region bandwidth.
examples:
- cmd: zeno zec describe-cross-region-bandwidth-monitor-data --cross-region-bandwidth-id "<your cross id>" --metric-type BANDWIDTH --start-time 2025-06-25T01:55:00Z --end-time 2025-06-25T02:05:00Z
  desc: Query the performance metric data of the cross-region bandwidth with the billing model of `BANDWIDTH`.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeCrossRegionBandwidthMonitorData
parameters:
- name: cross-region-bandwidth-id
  type: string
  required: true
  sdk-field: crossRegionBandwidthId
  description: Cross-region bandwidth ID.
- name: metric-type
  type: enum
  required: true
  sdk-field: metricType
  description: Cross-region bandwidth performance metric type.
  enum-values:
  - value: BANDWIDTH
    desc: |-
      Bandwidth.
      Unit: bps .
  - value: PACKETS
    desc: |-
      Data transfer.
      Unit: pps .
- name: start-time
  type: string
  required: true
  sdk-field: startTime
  description: |-
    Start time.
    Time format: yyyy-MM-ddTHH: mm: ssZ .
- name: end-time
  type: string
  required: true
  sdk-field: endTime
  description: |-
    End time.
    Time format: yyyy-MM-ddTHH: mm: ssZ .
response:
- name: inMaxValue
  type: float
  description: Maximum inbound bandwidth.
- name: inAvgValue
  type: float
  description: Average inbound bandwidth.
- name: inMinValue
  type: float
  description: Minimum inbound bandwidth.
- name: inTotalValue
  type: float
  description: Total inbound bandwidth.
- name: outMaxValue
  type: float
  description: Maximum outbound bandwidth.
- name: outAvgValue
  type: float
  description: Average outbound bandwidth.
- name: outMinValue
  type: float
  description: Minimum outbound bandwidth.
- name: outTotalValue
  type: float
  description: Total outbound bandwidth.
- name: dataList
  type: object-array
  description: Information on performance metric data.
