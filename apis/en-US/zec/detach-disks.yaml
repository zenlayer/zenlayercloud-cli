name: DetachDisks
product: zec
use: detach-disks
short: Detaches one or more disks from an instance
long: |-
  Detach one or more disks from an instance.
  **Note**

  * Disks to be detached should be attached to the same instance. If any of the disks is undetachable, the operation will not be performed.
  * Only operations on disks with the status of **IN\_use** are supported.
  * Only operations on disks that are detachable (**`portable`****&#x20;****=****&#x20;****`true`**) are supported.
  * Operation on boot disks are not supported.
  * A maximum of 10 disks can be detached from an instance in one request.
examples:
- cmd: zeno zec detach-disks --disk-ids your-disk-id
  desc: Detach one or more disks from an instance.
sdk:
  service: zec
  version: '2025-09-01'
  action: DetachDisks
parameters:
- name: disk-ids
  type: string-array
  required: true
  sdk-field: diskIds
  description: ID list of disks to be detached.
- name: instance-check-flag
  type: boolean
  required: false
  sdk-field: instanceCheckFlag
  description: |-
    Check instance running status.
    Default value: true , meaning disk detach allowed only when instance is shut down.
