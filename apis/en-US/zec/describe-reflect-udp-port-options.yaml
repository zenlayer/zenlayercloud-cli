name: DescribeReflectUdpPortOptions
product: zec
use: describe-reflect-udp-port-options
short: Queries the default UDP reflection source port list
long: Query the default list of UDP source ports blocked by the DDoS protection policy's UDP reflection attack prevention feature. Use this as a reference when configuring the `reflectUdpPort` parameter.
examples:
- cmd: zeno zec describe-reflect-udp-port-options
  desc: Get a list of default UDP reflection source ports.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeReflectUdpPortOptions
response:
- name: reflectUdpPorts
  type: object-array
  description: List of default UDP reflection source ports.
