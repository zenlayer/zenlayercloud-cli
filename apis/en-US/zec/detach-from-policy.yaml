name: DetachFromPolicy
product: zec
use: detach-from-policy
short: Removes a protection strategy from a protection target.
long: remove a protection strategy from a protection target.
examples:
- cmd: zeno zec detach-from-policy --policy-id <policyId> --ipv4-id-list eipId1 --ipv4-id-list eipId2
  desc: Remove a protection strategy from a protection target.
sdk:
  service: zec
  version: '2025-09-01'
  action: DetachFromPolicy
parameters:
- name: policy-id
  type: string
  required: true
  sdk-field: policyId
  description: Protection strategy ID.
- name: ipv4-id-list
  type: string-array
  required: false
  sdk-field: ipv4IdList
  description: List of protection targets.
