name: AttachToPolicy
product: zec
use: attach-to-policy
short: Adds a protection strategy to a protection target
long: Add a protection strategy to a protection target.
examples:
- cmd: zeno zec attach-to-policy --policy-id <policyId> --ipv4-id-list eipId1 --ipv4-id-list eipId2
  desc: Add a protection strategy to a protection target.
sdk:
  service: zec
  version: '2025-09-01'
  action: AttachToPolicy
parameters:
- name: policy-id
  type: string
  required: true
  sdk-field: policyId
  description: Protection strategy ID.
- name: ipv4-id-list
  type: string-array
  required: false
  sdk-field: ipv4IdList
  description: List of protection targets.
