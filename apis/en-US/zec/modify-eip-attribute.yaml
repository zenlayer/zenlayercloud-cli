name: ModifyEipAttribute
product: zec
use: modify-eip-attribute
short: Modifies the name of the elastic IP.
long: modify the name of the elastic IP.
examples:
- cmd: zeno zec modify-eip-attribute --eip-id <eipId> --name Test-IP
  desc: Modify the name of the elastic IP.
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifyEipAttribute
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: ID of the elastic IP.
- name: name
  type: string
  required: true
  sdk-field: name
  description: |-
    Name of the elastic IP.
    This parameter must start with a number or a letter, containing 2 to 63 characters. Only letters, numbers, - and periods (.) are supported.
