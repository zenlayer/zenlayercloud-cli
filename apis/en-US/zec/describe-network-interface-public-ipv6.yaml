name: DescribeNetworkInterfacePublicIPv6
product: zec
use: describe-network-interface-public-ipv6
short: Queries the public IPv6 information of a vNIC
long: Query the public IPv6 address and its associated billing method and bandwidth configuration assigned to the specified vNIC.
examples:
- cmd: zeno zec describe-network-interface-public-ipv6 --nic-id <nicId>
  desc: Query the public IPv6 information of a vNIC.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeNetworkInterfacePublicIPv6
parameters:
- name: nic-id
  type: string
  required: true
  sdk-field: nicId
  description: vNIC ID.
response:
- name: address
  type: object
  description: |-
    Public IPv6 information.
    If the vNIC does not have a public IPv6 address, the value is empty.
  object-schema:
  - name: ipv6CidrId
    type: string
    description: The ID of the IPv6 address.
  - name: ipv6Cidr
    type: string
    description: The IPv6 address.
  - name: primaryIpv6Address
    type: string
    description: The primary IPv6 address of the network interface.
  - name: internetChargeType
    type: enum
    description: The network billing model of the IPv6 address.
    enum-values:
    - value: ByBandwidth
      desc: Billed by the flat rate bandwidth.
    - value: ByTrafficPackage
      desc: Billed by the traffic package size purchased.
    - value: BandwidthCluster
      desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
  - name: bandwidth
    type: integer
    description: |-
      Public bandwidth cap for IPv6 address.
      Unit: Mbps.
  - name: rateLimitMode
    type: enum
    description: Rate limit mode.
    enum-values:
    - value: LOOSE
      desc: 'Loose mode: allows short-term bursts exceeding the limit.'
    - value: STRICT
      desc: 'Strict mode: strictly enforced, no bursts allowed.'
  - name: trafficPackageSize
    type: float
    description: |-
      The size of the IPv6 data transfer package.
      Unit: TB.
  - name: bandwidthCluster
    type: object
    description: The associated bandwidth cluster information.
    object-schema:
    - name: bandwidthClusterId
      type: string
      description: Bandwidth Cluster ID.
    - name: bandwidthClusterName
      type: string
      description: Bandwidth Cluster name.
  - name: operationInfo
    type: object
    description: The bandwidth and traffic packet operation status of IPv6.
    object-schema:
    - name: operation
      type: string
      description: 'Operation action. Value range: `ModifyBandwidth` (adjust bandwidth), `ModifyFlowPackage` (adjust flow package).'
    - name: status
      type: string
      description: 'Operation status. Value range: `OPERATING` (in operation), `FAILED` (operation failed).'
