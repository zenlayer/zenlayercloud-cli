name: ModifyInstancesAttribute
product: zec
use: modify-instances-attribute
short: Modifies the attributes of one or more elastic compute instances.
long: modify the attributes of one or more elastic compute instances. Only the instance name to be displayed can be modified for now.
examples:
- cmd: zeno zec modify-instances-attribute --instance-ids instanceId1 --instance-ids instanceId2 --instance-name myInstanceName
  desc: Batch modify instance names. Modify names of two instances to `myInstanceName`.
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifyInstancesAttribute
parameters:
- name: instance-ids
  type: string-array
  required: true
  sdk-field: instanceIds
  description: |-
    Instance ID(s).
    To obtain the instance ID, you can call DescribeInstances and look for instanceId in the response. The maximum number of instances in each request is 100.
- name: instance-name
  type: string
  required: true
  sdk-field: instanceName
  description: |-
    Instance name.
    This parameter can contain up to 64 characters. Only letters, numbers, - and periods (.) are supported.
