name: AttachNetworkInterface
product: zec
use: attach-network-interface
short: Attaches the vNIC to the instance.
long: attach the vNIC to the instance.
examples:
- cmd: zeno zec attach-network-interface --nic-id XXX --instance-id xxx
  desc: Attach the vNIC to the instance.
sdk:
  service: zec
  version: '2025-09-01'
  action: AttachNetworkInterface
parameters:
- name: nic-id
  type: string
  required: true
  sdk-field: nicId
  description: ID of the vNIC.
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: ID of the instance.
