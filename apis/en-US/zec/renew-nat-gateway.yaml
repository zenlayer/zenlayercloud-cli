name: RenewNatGateway
product: zec
use: renew-nat-gateway
short: Restores a specified NAT gateway.
long: restore a specified NAT gateway.
examples:
- cmd: zeno zec renew-nat-gateway --nat-gateway-id <natGatewayId>
  desc: Restore a NAT gateway.
sdk:
  service: zec
  version: '2025-09-01'
  action: RenewNatGateway
parameters:
- name: nat-gateway-id
  type: string
  required: true
  sdk-field: natGatewayId
  description: NAT gateway ID.
