name: DeleteBorderGateway
product: zec
use: delete-border-gateway
short: Deletes a border gateway
long: |-
  Delete a border gateway.
  **Note**

  * If the border gateway is already bound to a NAT gateway, you must unbind the NAT gateway before deletion.
  * If the border gateway is part of a Layer 3 Cloud Router, it must be removed first before deletion.
examples:
- cmd: zeno zec delete-border-gateway --zbg-id xxx
  desc: Delete a border gateway.
sdk:
  service: zec
  version: '2025-09-01'
  action: DeleteBorderGateway
parameters:
- name: zbg-id
  type: string
  required: true
  sdk-field: zbgId
  description: Border gateway ID.
