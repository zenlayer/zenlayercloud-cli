name: ModifyVpcsAttribute
product: zec
use: modify-vpcs-attribute
short: Modifies the attributes of one or more global VPCs.
long: The API is used to modify the attributes of one or more global VPCs. Only the global VPC name to be displayed can be modified for now.
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifyVpcsAttribute
parameters:
- name: vpc-ids
  type: string-array
  required: true
  sdk-field: vpcIds
  description: |-
    Global VPC ID(s).
    The maximum number of networks in each request is 100.
- name: name
  type: string
  required: true
  sdk-field: name
  description: |-
    Global VPC name to be displayed.
    This parameter must start and end with a number or a letter, containing 2 to 63 characters. Only letters, numbers, - and periods (.) are supported.
