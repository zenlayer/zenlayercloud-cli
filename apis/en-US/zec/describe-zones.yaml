name: DescribeZones
product: zec
use: describe-zones
short: Queries available zones
long: Query availability zones available.
examples:
- cmd: zeno zec describe-zones --zone-ids asia-east-1a --zone-ids asia-south-1a
  desc: Query available zone list.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeZones
parameters:
- name: zone-ids
  type: string-array
  required: false
  sdk-field: zoneIds
  description: List of availability zone IDs.
response:
- name: zoneSet
  type: object-array
  description: Information on availability zones.
  array-style: json
  item-schema:
  - name: zoneId
    type: string
    description: Zone ID. For example, SEL-A .
  - name: regionId
    type: string
    description: Region ID of the zone.
  - name: zoneName
    type: string
    description: Zone name.
  - name: supportSecurityGroup
    type: boolean
    description: Support security groups or not.
  - name: timeZone
    type: string
    description: Time zone of the availability zone.
