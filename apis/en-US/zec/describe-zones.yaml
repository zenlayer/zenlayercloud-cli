name: DescribeZones
product: zec
use: describe-zones
short: Queries available zones
long: Query availability zones available.
examples:
- cmd: zeno zec describe-zones --zone-ids sa-north-1a --zone-ids asia-east-1a
  desc: Query the available zone list.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeZones
parameters:
- name: zone-ids
  type: string-array
  required: false
  sdk-field: zoneIds
  description: List of availability zone IDs.
response:
- name: zoneSet
  type: object-array
  description: Information on availability zones.
  array-style: json
  item-schema:
  - name: zoneId
    type: string
    description: Zone ID. For example, SEL-A .
  - name: regionId
    type: string
    description: Region ID of the zone.
  - name: zoneName
    type: string
    description: Zone name.
  - name: supportSecurityGroup
    type: boolean
    description: Support security groups or not.
  - name: timeZone
    type: string
    description: Time zone of the availability zone.
  - name: cityName
    type: string
    description: Name of the city where the availability zone is located.
  - name: cityCode
    type: string
    description: Three-letter IATA city code (e.g., LAX, HKG).
  - name: countryCode
    type: string
    description: Country where the availability zone is located, in ISO 3166-1 alpha-2 format (e.g., US, JP).
  - name: countryName
    type: string
    description: Name of the country where the availability zone is located.
  - name: supportHaVip
    type: boolean
    description: Whether the availability zone supports HaVip.
