name: CreateBorderGateway
product: zec
use: create-border-gateway
short: Creates a border gateway.
long: create a border gateway.
sdk:
  service: zec
  version: '2025-09-01'
  action: CreateBorderGateway
parameters:
- name: region-id
  type: string
  required: true
  sdk-field: regionId
  description: Region ID.
- name: vpc-id
  type: string
  required: true
  sdk-field: vpcId
  description: VPC ID.
- name: label
  type: string
  required: true
  sdk-field: label
  description: |-
    Border gateway name.
    This parameter must start and end with a number or a letter, containing 2 to 63 characters. Only letters, numbers, - and periods (.) are supported.
- name: asn
  type: integer
  required: true
  sdk-field: asn
  description: |-
    Autonomous System Number.
    The range is from 65000 to 65534 .
- name: routing-mode
  type: enum
  required: false
  sdk-field: routingMode
  description: Information on dynamic routing modes.
  enum-values:
  - value: Regional
    desc: Regional routing. Learn routes only within the region it was created in.
  - value: Global
    desc: Global routing. Dynamically learn and distribute routes across all regions using a single VPN or Interconnect.
- name: advertised-subnet
  type: enum
  required: false
  sdk-field: advertisedSubnet
  description: |-
    Subnet route advertisement.
    Default value: Advertise All .
  enum-values:
  - value: ALL
    desc: Advertise all.
  - value: NONE
    desc: Do not advertise.
  - value: PART
    desc: Advertise partial.
- name: advertised-cidrs
  type: string-array
  required: false
  sdk-field: advertisedCidrs
  description: Custom IPv4 CIDR block list.
- name: advertised-route-ids
  type: string-array
  required: false
  sdk-field: advertisedRouteIds
  description: ID list of the custom routes to be advertised.
