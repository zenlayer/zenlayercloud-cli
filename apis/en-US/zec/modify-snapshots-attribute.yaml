name: ModifySnapshotsAttribute
product: zec
use: modify-snapshots-attribute
short: Modifies the attributes of the specified snapshot.
long: modify the attributes of the specified snapshot.
examples:
- cmd: zeno zec modify-snapshots-attribute --snapshot-ids snapshotId1 --snapshot-ids snapshotId2 --snapshot-name snap_201711301143 --is-permanent true
  desc: Modify the attributes of the specified snapshot. Modify the name and set the retention time to indefinite.
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifySnapshotsAttribute
parameters:
- name: snapshot-ids
  type: string-array
  required: true
  sdk-field: snapshotIds
  description: List of snapshot IDs.
- name: snapshot-name
  type: string
  required: false
  sdk-field: snapshotName
  description: Snapshot name.
- name: retention-time
  type: string
  required: false
  sdk-field: retentionTime
  description: |-
    Snapshot expiration time.
    Format: YYYY-MM-ddTHH:mm:ssZ.
    If you want to change it to indefinite retention, please set isPermanent = true . If you set the custom retention, it must be set to 24 hours after the current time.
- name: is-permanent
  type: boolean
  required: false
  sdk-field: isPermanent
  description: Whether the snapshots created by the snapshot schedule are retained indefinitely.
