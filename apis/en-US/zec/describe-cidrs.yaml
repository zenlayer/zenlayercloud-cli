name: DescribeCidrs
product: zec
use: describe-cidrs
short: Queries the information of one or more specified CIDR blocks
long: Query the information of one or more specified CIDR blocks. Users can search for CIDR block information based on CIDR block ID, CIDR block name, etc.
examples:
- cmd: zeno zec describe-cidrs --cidr-ids xxx --region-id asia-east-1 --cidr-block 128.0.0.0/24 --page-size 10 --page-num 1
  desc: Query CIDR block list with IP range of `10.0.0.0/24`.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeCidrs
parameters:
- name: cidr-ids
  type: string-array
  required: false
  sdk-field: cidrIds
  description: CIDR block ID(s).
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: Region ID.
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    CIDR block name.
    Fuzzy search supported.
- name: cidr-block
  type: string
  required: false
  sdk-field: cidrBlock
  description: |-
    CIDR IP range.
    Fuzzy search supported.
- name: source
  type: enum
  required: false
  sdk-field: source
  description: IP type. IP leasing or BYOIP.
  enum-values:
  - value: CONSOLE
    desc: CIDR block created on Console.
  - value: BYOIP
    desc: Bring your own IP (BYOIP).
  - value: SDN_RIPT
    desc: IP Transit CIDR block.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Resource Group ID.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query using tag keys.
    A maximum of 20 tag keys can be used.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 64 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 64 characters.'
response:
- name: totalCount
  type: integer
  description: Number of CIDR blocks meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on CIDR blocks.
  array-style: json
  item-schema:
  - name: cidrId
    type: string
    description: CIDR block ID.
  - name: regionId
    type: string
    description: Region ID.
  - name: name
    type: string
    description: CIDR block name.
  - name: cidrBlock
    type: string
    description: CIDR IP range.
  - name: totalCount
    type: integer
    description: Quantity of available CIDR IPs.
  - name: usedCount
    type: integer
    description: Quantity of used CIDR IPs.
  - name: source
    type: enum
    description: IP type. IP leasing or BYOIP.
    enum-values:
    - value: CONSOLE
      desc: CIDR block created on Console.
    - value: BYOIP
      desc: Bring your own IP (BYOIP).
    - value: SDN_RIPT
      desc: IP Transit CIDR block.
  - name: eipV4Type
    type: enum
    description: |-
      Network type of elastic IP.
      Deprecated. Please use networkLineType instead.
    enum-values:
    - value: BGPLine
      desc: BGP network type.
    - value: CN2Line
      desc: CN2 GIA (CN2 Global Internet Access) network type.
    - value: LocalLine
      desc: Local IP network type.
    - value: ChinaMobile
      desc: China Mobile network type.
    - value: ChinaUnicom
      desc: China Unicom network type.
    - value: ChinaTelecom
      desc: China Telecom network type.
    - value: Cogent
      desc: Cogent Communications network type.
    - value: ThreeLine
      desc: 3-in-1 IP pool network type.
  - name: networkLineType
    type: enum
    description: Network type of elastic IP.
    enum-values:
    - value: PremiumBGP
      desc: |-
        Premium BGP network.
        High-performance network.
    - value: CN2
      desc: China Telecom CN2 network.
    - value: LocalLine
      desc: Provided by a local ISP.
    - value: StandardBGP
      desc: |-
        Standard BGP network.
        General-purpose network with cost optimization.
    - value: CMI
      desc: 1-Line IP China Mobile.
    - value: CUG
      desc: 1-Line IP China Unicom.
    - value: CTG
      desc: 1-Line IP China Telecom.
    - value: ThreeLine
      desc: 3-in-1 IP Pool.
  - name: netmask
    type: integer
    description: CIDR block size.
  - name: poolId
    type: string
    description: IP pool ID.
  - name: createTime
    type: string
    description: Creation time.
  - name: expiredTime
    type: string
    description: Expiration time.
  - name: resourceGroupId
    type: string
    description: Resource group ID.
  - name: resourceGroupName
    type: string
    description: Resource group name.
  - name: status
    type: enum
    description: CIDR block status.
    enum-values:
    - value: CREATING
      desc: Creating.
    - value: AVAILABLE
      desc: Available to be used.
    - value: CHANGING
      desc: Changing.
    - value: RECYCLING
      desc: Recycling.
    - value: RECYCLED
      desc: Recycled.
    - value: DELETING
      desc: Deleting.
    - value: FAILED
      desc: Created failed.
  - name: tags
    type: object
    description: Tags bound to resources.
