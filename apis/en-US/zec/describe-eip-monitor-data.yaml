name: DescribeEipMonitorData
product: zec
use: describe-eip-monitor-data
short: Queries the performance data of the elastic IP
long: Query the performance data of the elastic IP.
examples:
- cmd: zeno zec describe-eip-monitor-data --eip-id "< EipId >" --metric-type BANDWIDTH --start-time 2025-06-25T01:55:00Z --end-time 2025-06-25T07:55:00Z
  desc: Query the performance data of the elastic IP.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeEipMonitorData
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: Elastic IP ID.
- name: metric-type
  type: enum
  required: true
  sdk-field: metricType
  description: Performance metrics.
  enum-values:
  - value: BANDWIDTH
    desc: |-
      Bandwidth.
      Unit: bps .
  - value: PACKETS
    desc: |-
      Packet transmission.
      Unit: pps .
- name: start-time
  type: string
  required: true
  sdk-field: startTime
  description: Start time.
- name: end-time
  type: string
  required: true
  sdk-field: endTime
  description: End time.
response:
- name: inMaxValue
  type: float
  description: Inbound maximum value.
- name: inAvgValue
  type: float
  description: Inbound average value.
- name: inMinValue
  type: float
  description: Inbound minimum value.
- name: inTotalValue
  type: float
  description: Inbound total value.
- name: outMaxValue
  type: float
  description: Outbound maximum value.
- name: outAvgValue
  type: float
  description: Outbound average value.
- name: outMinValue
  type: float
  description: Outbound minimum value.
- name: outTotalValue
  type: float
  description: Outbound total value.
- name: loseOutMaxValue
  type: float
  description: Outbound maximum loss value.
- name: loseOutMinValue
  type: float
  description: Outbound minimum loss value.
- name: loseOutTotalValue
  type: float
  description: Outbound total loss value.
- name: loseInMaxValue
  type: float
  description: Inbound maximum loss value.
- name: loseInMinValue
  type: float
  description: Inbound minimum loss value.
- name: loseInTotalValue
  type: float
  description: Inbound total loss value.
- name: dataList
  type: object-array
  description: Information on performance data.
