name: DescribeSubnets
product: zec
use: describe-subnets
short: Queries the details of subnets under a global VPC
long: Query the details of subnets. You can filter the query results with the subnet ID or name.
examples:
- cmd: zeno zec describe-subnets --cidr-block 10.0.0.0/24 --page-size 10 --page-num 1
  desc: Query all the available subnets with a CIDR block of `10.0.0.0/24`.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeSubnets
parameters:
- name: subnet-ids
  type: string-array
  required: false
  sdk-field: subnetIds
  description: Subnet ID(s).
- name: name
  type: string
  required: false
  sdk-field: name
  description: Subnet name. Fuzzy query is supported.
- name: cidr-block
  type: string
  required: false
  sdk-field: cidrBlock
  description: |-
    CIDR block of the subnet.
    Fuzzy query is supported.
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: Region ID of the subnet.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
    Maximum value: 1000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
- name: vpc-ids
  type: string-array
  required: false
  sdk-field: vpcIds
  description: ID list of global VPCs.
- name: dhcp-options-set-id
  type: string
  required: false
  sdk-field: dhcpOptionsSetId
  description: ID of the associated DHCP options set.
response:
- name: totalCount
  type: integer
  description: Number of subnets meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on a subnet.
  array-style: json
  item-schema:
  - name: subnetId
    type: string
    description: Subnet ID.
  - name: regionId
    type: string
    description: Region ID.
  - name: name
    type: string
    description: Subnet name.
  - name: cidrBlock
    type: string
    description: CIDR block of subnet.
  - name: gatewayIpAddress
    type: string
    description: Gateway ip address.
  - name: ipv6CidrBlock
    type: string
    description: IPv6 CIDR block of subnet.
  - name: ipv6GatewayIpAddress
    type: string
    description: IPv6 gateway ip address.
  - name: stackType
    type: string
    description: |-
      Subnet IP stack type.
      The optional values are as follows:
      IPv4 , IPv4_IPv6 , IPv6
  - name: ipv6Type
    type: string
    description: |-
      Subnet IPv6 type.
      The optional values are as follows:
      Public , Private
  - name: vpcId
    type: string
    description: Global VPC ID to which the subnet belong.
  - name: vpcName
    type: string
    description: Global VPC name to which the subnet belong.
  - name: usageIpv4Count
    type: integer
    description: Used IPv4 quantity of the subnet.
  - name: usageIpv6Count
    type: integer
    description: Used IPv6 quantity of the subnet.
  - name: createTime
    type: string
    description: Creation time of subnet.
  - name: isDefault
    type: boolean
    description: Whether is default subnet or not.
  - name: dhcpOptionsSetId
    type: string
    description: DHCP options set ID.
  - name: ipv6MaskLength
    type: integer
    description: |-
      IPv6 mask length assigned to the vNIC.
      This field is empty if the subnet's IP stack type does not include V6.
