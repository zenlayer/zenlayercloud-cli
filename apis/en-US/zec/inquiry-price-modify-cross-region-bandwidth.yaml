name: InquiryPriceModifyCrossRegionBandwidth
product: zec
use: inquiry-price-modify-cross-region-bandwidth
short: Queries the price of modifying the cross-region bandwidth configurations
long: |-
  Query the price of changing the cross-region bandwidth configuration.
  **Note**

  When the network billing model is `ByInstanceBandwidth95`, modifying the burst bandwidth does not involve a billing change.
examples:
- cmd: zeno zec inquiry-price-modify-cross-region-bandwidth --cross-region-bandwidth-id "<your cross id>" --bandwidth 500
  desc: Query the price of changing the bandwidth cap of cross-region bandwidth into 500Mbps. The network billing model is `ByBandwidth`.
- cmd: zeno zec inquiry-price-modify-cross-region-bandwidth --cross-region-bandwidth-id "<your cross id>" --bandwidth 500
  desc: Query the price of changing the bandwidth commitment of cross-region bandwidth into 500 Mbps. The network billing model is `ByInstanceBandwidth95`.
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPriceModifyCrossRegionBandwidth
parameters:
- name: cross-region-bandwidth-id
  type: string
  required: true
  sdk-field: crossRegionBandwidthId
  description: Cross-region bandwidth ID.
- name: bandwidth
  type: integer
  required: true
  sdk-field: bandwidth
  description: Bandwidth cap.
response:
- name: crossRegionBandwidthPrice
  type: object
  description: The price of cross-region bandwidth.
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR : you will be billed by hour.
      DAY : you will be billed by day.
      MONTH : you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: First price range of a tiered price.
    - name: stepEnd
      type: float
      description: |-
        Last price range of a tiered price.
        If the value is empty, it means the last tier.
    - name: unitPrice
      type: float
      description: Original unit price of current price range.
    - name: discountUnitPrice
      type: float
      description: Discount unit price of current price range.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage,
      such as Mbps , LCU , and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The category to which the price belongs.
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
