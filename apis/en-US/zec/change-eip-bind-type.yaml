name: ChangeEipBindType
product: zec
use: change-eip-bind-type
short: Changes elastic IP mode
long: |-
  Change elastic IP mode.
  **Notes**

  * Only elastic IPs bound to a vNIC or HaVip support this operation.
  * To change the elastic mode, backend configuration is required. Please contact Console Support.
examples:
- cmd: zeno zec change-eip-bind-type --eip-id <eipId1> --bind-type FullNat
  desc: Change elastic IP mode.
sdk:
  service: zec
  version: '2025-09-01'
  action: ChangeEipBindType
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: ID of elastic IP.
- name: bind-type
  type: enum
  required: true
  sdk-field: bindType
  description: |-
    Bind type.
    Only effective when the elastic IP is bound to a vNIC or HaVip.
    Default value: NAT mode.
  enum-values:
  - value: FullNat
    desc: NAT mode.
  - value: Passthrough
    desc: Bypass mode.
