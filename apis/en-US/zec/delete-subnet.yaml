name: DeleteSubnet
product: zec
use: delete-subnet
short: Deletes a subnet under a global VPC
long: |-
  Delete a subnet under a global VPC.
  **Note**

  * Operations on subnets associated with vNICs are not supported.
  * Operations on default subnets are not supported.
sdk:
  service: zec
  version: '2025-09-01'
  action: DeleteSubnet
parameters:
- name: subnet-id
  type: string
  required: true
  sdk-field: subnetId
  description: Subnet ID.
