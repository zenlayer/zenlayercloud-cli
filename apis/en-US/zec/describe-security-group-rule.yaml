name: DescribeSecurityGroupRule
product: zec
use: describe-security-group-rule
short: Queries the security group rules
long: Query the security group rules.
examples:
- cmd: zeno zec describe-security-group-rule --security-group-id 791721259766392536
  desc: Query the security group rules.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeSecurityGroupRule
parameters:
- name: security-group-id
  type: string
  required: true
  sdk-field: securityGroupId
  description: Security group ID.
response:
- name: ingressRuleList
  type: object-array
  description: Inbound rules.
  array-style: json
  item-schema:
  - name: direction
    type: string
    description: |-
      Traffic directions.
      ingress : inbound rules.
      egress : outbound rules.
  - name: policy
    type: string
    description: |-
      Access strategy.
      Available values:
      accept : allows access by default.
      Only accept strategy is supported for now.
  - name: priority
    type: integer
    description: |-
      Priority of rules.
      Available values:
      [1,100].
      Default value: 1.
  - name: ipProtocol
    type: string
    description: |-
      Transport protocol. The value is case sensitive.
      Available value:
      tcp : TCP protocol. udp : UDP protocol. icmp : ICMP protocol. all : all protocols supported.
  - name: portRange
    type: string
    description: |-
      Destination port range.
      Available values:
      For TCP and UDP protocols: The value ranges from 1 to 65535. Use a slash (/) to separate the start port number and the end port number. Examples: 1/200 ; incorrect example: 200/1 . For ICMP protocol: -1/-1 . For all protocols: -1/-1 .
  - name: cidrIp
    type: string
    description: |-
      Source IP address range.
      Default value: 0.0.XX.XX/0 .
  - name: desc
    type: string
    description: Description. 255 characters in length.
- name: egressRuleList
  type: object-array
  description: Outbound rules.
  array-style: json
  item-schema:
  - name: direction
    type: string
    description: |-
      Traffic directions.
      ingress : inbound rules.
      egress : outbound rules.
  - name: policy
    type: string
    description: |-
      Access strategy.
      Available values:
      accept : allows access by default.
      Only accept strategy is supported for now.
  - name: priority
    type: integer
    description: |-
      Priority of rules.
      Available values:
      [1,100].
      Default value: 1.
  - name: ipProtocol
    type: string
    description: |-
      Transport protocol. The value is case sensitive.
      Available value:
      tcp : TCP protocol. udp : UDP protocol. icmp : ICMP protocol. all : all protocols supported.
  - name: portRange
    type: string
    description: |-
      Destination port range.
      Available values:
      For TCP and UDP protocols: The value ranges from 1 to 65535. Use a slash (/) to separate the start port number and the end port number. Examples: 1/200 ; incorrect example: 200/1 . For ICMP protocol: -1/-1 . For all protocols: -1/-1 .
  - name: cidrIp
    type: string
    description: |-
      Source IP address range.
      Default value: 0.0.XX.XX/0 .
  - name: desc
    type: string
    description: Description. 255 characters in length.
