name: DescribeSubnetRegions
product: zec
use: describe-subnet-regions
short: Queries regions supporting subnet creation
long: Query regions supporting subnet creation.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeSubnetRegions
parameters:
- name: region-ids
  type: string-array
  required: false
  sdk-field: regionIds
  description: Region ID(s).
response:
- name: regionSet
  type: object-array
  description: Information on regions.
  array-style: json
  item-schema:
  - name: regionId
    type: string
    description: Region ID.
  - name: regionName
    type: string
    description: Region name.
  - name: regionTitle
    type: string
    description: Region title.
  - name: enablePubIpv6
    type: boolean
    description: Whether support public IPv6 or not.
