name: InquiryPriceCreateDisks
product: zec
use: inquiry-price-create-disks
short: Queries the price of creating a disk
long: |-
  Query the price of creating a disk.
  **Note**

  Only operations on disks are supported.
examples:
- cmd: zeno zec inquiry-price-create-disks --zone-id HKG-A --disk-size 2000
  desc: Query the price of creating a disk.
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPriceCreateDisks
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: Availability zone ID.
- name: disk-size
  type: integer
  required: true
  sdk-field: diskSize
  description: |-
    Disk size.
    Unit: GB.
- name: disk-amount
  type: integer
  required: false
  sdk-field: diskAmount
  description: Quantity of disks.
- name: disk-category
  type: string
  required: false
  sdk-field: diskCategory
  description: |-
    Basic NVMe SSD: the Basic NVMe SSD. Standard NVMe SSD: the Standard NVMe SSD.
    Default value: Standard NVMe SSD.
    Call DescribeDiskCategory to obtain disk type.
response:
- name: dataDiskPrice
  type: object
  description: Disk price.
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR : you will be billed by hour.
      DAY : you will be billed by day.
      MONTH : you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: First price range of a tiered price.
    - name: stepEnd
      type: float
      description: |-
        Last price range of a tiered price.
        If the value is empty, it means the last tier.
    - name: unitPrice
      type: float
      description: Original unit price of current price range.
    - name: discountUnitPrice
      type: float
      description: Discount unit price of current price range.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage,
      such as Mbps , LCU , and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The category to which the price belongs.
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
