name: DescribeNatGateways
product: zec
use: describe-nat-gateways
short: Queries the NAT gateway list
long: Query the NAT gateway list.
examples:
- cmd: zeno zec describe-nat-gateways
  desc: Query the NAT gateway list.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeNatGateways
parameters:
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: Region ID.
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: Filter by VPC network ID to which the NAT gateway belongs.
- name: nat-gateway-ids
  type: string-array
  required: false
  sdk-field: natGatewayIds
  description: |-
    NAT gateway ID list.
    The maximum number of instance IDs is 100 .
- name: name
  type: string
  required: false
  sdk-field: name
  description: NAT gateway name.
- name: status
  type: string
  required: false
  sdk-field: status
  description: NAT gateway state.
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: Filter by the security group ID to which the NAT gateway belongs.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20 ;
    Maximum value: 1000 .
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Page number of the current page result.
    Default value: 1 .
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Resource Group ID.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query using tag keys.
    A maximum of 20 tag keys can be used.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query using tags.
    A maximum of 20 tags can be used.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 64 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 64 characters.'
response:
- name: totalCount
  type: integer
  description: The total number of NAT gateways that meet the filtering conditions.
- name: dataSet
  type: object-array
  description: The returned NAT gateway list.
  array-style: json
  item-schema:
  - name: natGatewayId
    type: string
    description: The unique ID of the NAT gateway.
  - name: vpcId
    type: string
    description: VPC network ID to which the NAT gateway belongs.
  - name: regionId
    type: string
    description: Region ID.
  - name: status
    type: enum
    description: NAT gateway state.
    enum-values:
    - value: CREATING
      desc: NAT gateway is being created.
    - value: RUNNING
      desc: NAT gateway is running.
    - value: RECYCLED
      desc: NAT gateway is in the recycle bin.
    - value: CREATE_FAILED
      desc: NAT gateway creation failed.
    - value: RELEASING
      desc: NAT gateway is being released.
  - name: name
    type: string
    description: The name of the NAT gateway.
  - name: subnetIds
    type: string-array
    description: Subnet ID list to which the NAT gateway belongs.
  - name: isAllSubnets
    type: boolean
    description: Whether all subnets within a region are associated with the NAT gateway.
  - name: eipIds
    type: string-array
    description: Elastic IP ID list bound to the NAT gateway.
  - name: zbgId
    type: string
    description: Border gateway ID.
  - name: icmpReplyEnabled
    type: boolean
    description: Whether to enable ICMP echo reply or not.
  - name: securityGroupId
    type: string
    description: Associated security group ID of the NAT gateway.
  - name: resourceGroupId
    type: string
    description: Resource group ID.
  - name: resourceGroupName
    type: string
    description: Resource group name.
  - name: createTime
    type: string
    description: |-
      Creation time.
      Use UTC time according to the ISO8601 standard. Format: YYYY-MM-ddTHH:mm:ssZ.
  - name: expiredTime
    type: string
    description: |-
      Expiration time.
      Use UTC time according to the ISO8601 standard. Format: YYYY-MM-ddTHH:mm:ssZ.
  - name: tags
    type: object
    description: Tags bound to resources.
    object-schema:
    - name: tags
      type: object-array
      description: List of tags.
      array-style: json
      item-schema:
      - name: key
        type: string
        description: 'Tag key. Length limit: 1 to 64 characters.'
      - name: value
        type: string
        description: 'Tag value. Length limit: 1 to 64 characters.'
