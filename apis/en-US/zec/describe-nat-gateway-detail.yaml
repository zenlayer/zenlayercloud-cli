name: DescribeNatGatewayDetail
product: zec
use: describe-nat-gateway-detail
short: Queries the NAT rule details of a NAT gateway
long: Query the NAT rule details of a NAT gateway.
examples:
- cmd: zeno zec describe-nat-gateway-detail --nat-gateway-id <natGatewayId>
  desc: Query NAT rule details.
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeNatGatewayDetail
parameters:
- name: nat-gateway-id
  type: string
  required: true
  sdk-field: natGatewayId
  description: NAT gateway ID.
response:
- name: natGatewayId
  type: string
  description: The unique ID of the NAT gateway.
- name: name
  type: string
  description: NAT gateway name.
- name: snats
  type: object-array
  description: SNAT rule list.
- name: dnats
  type: object-array
  description: DNAT rule list.
