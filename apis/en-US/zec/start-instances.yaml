name: StartInstances
product: zec
use: start-instances
short: Starts one or more elastic compute instances
long: |-
  Start one or more elastic compute instances.
  **Note**

  * You can only perform this operation on instances whose status is `STOPPED` and that are not in the recycle bin.
  * If the API is called successfully, the instance status will become `STARTING`. After the instance is started, its status will become `RUNNING`.
  * This API is an async API. A response is returned after the request is sent. However, it does not mean the start has been completed. You can use `DescribeInstancesStatus` to query the status of the instance. If the status (instanceStatus) changes from `STARTING` to `RUNNING`, it means that the instance has been started successfully. Any operations on the instances are not allowed while starting.
  * Batch operations are supported. The maximum number of instances in each request is 100.
examples:
- cmd: zeno zec start-instances --instance-ids instanceId1 --instance-ids instanceId2
  desc: Start an instance of the specified ID.
sdk:
  service: zec
  version: '2025-09-01'
  action: StartInstances
parameters:
- name: instance-ids
  type: string-array
  required: true
  sdk-field: instanceIds
  description: |-
    Instance ID(s).
    To obtain the instance ID, you can call DescribeInstances and look for instanceId in the response. The maximum number of instances in each request is 100.
