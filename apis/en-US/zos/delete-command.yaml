name: DeleteCommand
product: zos
use: delete-command
short: Deletes a command
long: |-
  Delete a command.
  **Note**

  If the command is running, you cannot delete it.
examples:
- cmd: zeno zos delete-command --command-id <commandId>
  desc: Delete a command.
sdk:
  service: zos
  version: '2025-10-10'
  action: DeleteCommand
parameters:
- name: command-id
  type: string
  required: true
  sdk-field: commandId
  description: Command ID to be deleted.
