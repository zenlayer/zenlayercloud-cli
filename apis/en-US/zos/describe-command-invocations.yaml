name: DescribeCommandInvocations
product: zos
use: describe-command-invocations
short: Queries the command execution list
long: Query the command execution list.
examples:
- cmd: zeno zos describe-command-invocations --invocation-ids <invocationId>
  desc: Query the command execution list according to execution ID.
sdk:
  service: zos
  version: '2025-10-10'
  action: DescribeCommandInvocations
parameters:
- name: command-ids
  type: string-array
  required: false
  sdk-field: commandIds
  description: Query according to command ID.
- name: invocation-ids
  type: string-array
  required: false
  sdk-field: invocationIds
  description: Query according to execution ID.
- name: instance-ids
  type: string-array
  required: false
  sdk-field: instanceIds
  description: Query according to instance ID.
- name: invocation-statuses
  type: string-array
  required: false
  sdk-field: invocationStatuses
  description: Query according to execution status.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
    Maximum value: 10000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1.
    Value range: [1, +).
response:
- name: dataSet
  type: object-array
  description: Execution list.
  array-style: json
  item-schema:
  - name: invocationId
    type: string
    description: Execution ID.
  - name: commandId
    type: string
    description: Command ID.
  - name: commandName
    type: string
    description: Command name.
  - name: commandType
    type: enum
    description: Script language type.
    enum-values:
    - value: SHELL
      desc: Shell script running on Linux instances.
    - value: POWERSHELL
      desc: PowerShell script running on Windows instances.
    - value: BAT
      desc: Bat script running on Windows instances.
  - name: content
    type: string
    description: Script content.
  - name: timeout
    type: integer
    description: Execution timeout.
  - name: createTime
    type: string
    description: Execution creation time.
  - name: invocationStatus
    type: enum
    description: Execution state.
    enum-values:
    - value: Pending
      desc: |-
        Command executions are pending.
        All instance tasks are Pending.
    - value: Running
      desc: |-
        Command executions are running.
        All instance tasks are Running.
    - value: PartialFailed
      desc: |-
        Command executions are partially failed.
        All instance tasks completed with mixed results.
    - value: Failed
      desc: |-
        Command executions are failed.
        All instance tasks completed and failed.
    - value: Success
      desc: |-
        Command executions are succeeded.
        All instance tasks completed successfully.
  - name: invocationInstances
    type: object-array
    description: Target instance list for command execution.
    array-style: json
    item-schema:
    - name: instanceId
      type: string
      description: Execution ID.
    - name: instanceName
      type: string
      description: Instance name.
    - name: instanceExist
      type: boolean
      description: Whether the specified instance exists.
    - name: taskStatus
      type: enum
      description: Instance status of command execution.
      enum-values:
      - value: Pending
        desc: Waiting for command execution.
      - value: Running
        desc: Command execution in progress.
      - value: Timeout
        desc: Command execution timed out.
      - value: Failed
        desc: Command execution failed with non-zero exit code.
      - value: Success
        desc: Command completed with exit code 0.
      - value: Error
        desc: Command execution failed due to system error or instance not running.
    - name: exitCode
      type: integer
      description: Exit code of command execution.
    - name: errorCode
      type: enum
      description: Error code of command execution.
      enum-values:
      - value: InstanceNotExists
        desc: Instance does not exist.
      - value: InstanceInstanceState
        desc: Instance is not running.
      - value: SystemError
        desc: System error. Execution pending.
      - value: CommandPlatformInvalid
        desc: Command type cannot be executed on this instance.
      - value: ExecutionTimeout
        desc: Script execution timed out.
      - value: ExecutionExitNoneZero
        desc: Script execution failed with non-zero exit code.
    - name: output
      type: string
      description: Standard output (stdout) of command execution.
    - name: outputError
      type: string
      description: Standard input (stderr) of command execution.
    - name: execStartTime
      type: string
      description: Start time of command execution.
    - name: execEndTime
      type: string
      description: End time of command execution.
- name: totalCount
  type: integer
  description: Number of executions meeting the filtering conditions.
