name: DescribeLoadBalancers
product: bmc
use: describe-load-balancers
short: Queries the information of one or more specified load balancing instances
long: Query the information of one or more specified load balancing instances. Users can search for load balancer information based on the ID of the load balancer, the zone, and other information.
examples:
- cmd: zeno bmc describe-load-balancers --load-balancer-ids xxxx
  desc: Query the information of the load balancer instance by ID.
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeLoadBalancers
parameters:
- name: load-balancer-ids
  type: string-array
  required: false
  sdk-field: loadBalancerIds
  description: ID list of the load balance instance.
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: Zone ID.
- name: load-balancer-name
  type: string
  required: false
  sdk-field: loadBalancerName
  description: |-
    The name of the load balancer instance.
    Fuzzy search supported.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1 .
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20 ;
    Maximum value: 1000 .
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: The ID of the resource group.
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query according to tag key.
    You can query up to 20 tag keys in each request.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query according to tag.
    You can query up to 20 tags in each request.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 128 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 128 characters.'
response:
- name: totalCount
  type: integer
  description: The total number of load balancers that meet the filtering conditions.
- name: dataSet
  type: object-array
  description: Load balancer set.
  array-style: json
  item-schema:
  - name: loadBalancerId
    type: string
    description: Load balance instance ID.
  - name: zoneId
    type: string
    description: Zone ID of a load balancer.
  - name: loadBalancerName
    type: string
    description: Load balance instance name.
  - name: specName
    type: string
    description: Specification name.
  - name: vipList
    type: object-array
    description: Virtual IP list of a load balancer.
  - name: chargeType
    type: string
    description: Pricing model.
  - name: period
    type: integer
    description: Billing cycle.
  - name: createTime
    type: string
    description: |-
      Creation time.
      Use UTC time according to the ISO8601 standard. Format: YYYY-MM-ddTHH:mm:ssZ .
  - name: expiredTime
    type: string
    description: Expiration time.
  - name: status
    type: string
    description: State of a load balancer.
  - name: resourceGroupId
    type: string
    description: Resource group ID.
  - name: resourceGroupName
    type: string
    description: Resource group name.
  - name: masterIp
    type: string
    description: Primary IP.
  - name: backupIp
    type: string
    description: Secondary IP.
  - name: ipType
    type: string
    description: IPv4.
  - name: bandwidth
    type: integer
    description: Bandwidth.
  - name: isWorking
    type: boolean
    description: Whether the load balancer is active or not.
  - name: listenerList
    type: object-array
    description: Listener set.
  - name: backendList
    type: object-array
    description: Backend server set.
  - name: tags
    type: object
    description: Bound tags.
