name: RestoreLoadBalancer
product: bmc
use: restore-load-balancer
short: Restores a load balancer in the recycle bin
long: |-
  Restore a load balancer in the recycle bin.
  **Note**

  The operation is only supported for load balance instances in the recycle bin.
examples:
- cmd: zeno bmc restore-load-balancer --load-balancer-id xxxx
  desc: Restore a load balancer.
sdk:
  service: bmc
  version: '2026-02-01'
  action: RestoreLoadBalancer
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: The ID of the load balance instance.
response:
- name: orderNumber
  type: string
  description: Order number.
