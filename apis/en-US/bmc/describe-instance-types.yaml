name: DescribeInstanceTypes
product: bmc
use: describe-instance-types
short: Queries instance types
long: |-
  Query the model configuration of an instance.
  **Note**

  Use `DescribeInstanceTypes` to query the configuration and performance information of an instance model. If you need to check the available instance models in a specific zone, please call `DescribeAvailableResources.`
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeInstanceTypes
parameters:
- name: image-id
  type: string
  required: false
  sdk-field: imageId
  description: Instance models that support specified image.
- name: instance-type-ids
  type: string-array
  required: false
  sdk-field: instanceTypeIds
  description: |-
    Instance model ID.
    Maximum number: 100
- name: minimum-cpu-core-count
  type: integer
  required: false
  sdk-field: minimumCpuCoreCount
  description: |-
    Desired minimum number of CPU cores.
    Value range: positive integer.
- name: maximum-cpu-core-count
  type: integer
  required: false
  sdk-field: maximumCpuCoreCount
  description: |-
    Desired maximum number of CPU cores.
    Value range: positive integer.
- name: minimum-memory-size
  type: integer
  required: false
  sdk-field: minimumMemorySize
  description: |-
    Desired minimum memory size.
    Value range: positive integer.
    Unit: GB.
- name: maximum-memory-size
  type: integer
  required: false
  sdk-field: maximumMemorySize
  description: |-
    Desired maximum memory size.
    Value range: positive integer.
    Unit: GB.
- name: minimum-bandwidth
  type: integer
  required: false
  sdk-field: minimumBandwidth
  description: |-
    Desired minimum public inbound bandwidth cap.
    Unit: Mbps.
- name: support-raids
  type: integer-array
  required: false
  sdk-field: supportRaids
  description: |-
    Supported RAID levels.
    Value range: 0, 1, 5, 10.
- name: support-subnet
  type: boolean
  required: false
  sdk-field: supportSubnet
  description: Subnet supported or not.
- name: minimum-disk-size
  type: integer
  required: false
  sdk-field: minimumDiskSize
  description: |-
    Desired minimum disk size.
    Value range: positive integer.
    Unit: GB.
- name: maximum-disk-size
  type: integer
  required: false
  sdk-field: maximumDiskSize
  description: |-
    Desired maximum memory size.
    Value range: positive integer.
    Unit: GB.
- name: is-ha
  type: boolean
  required: false
  sdk-field: isHA
  description: High availability supported or not.
response:
- name: instanceTypes
  type: object-array
  description: Information on instance model.
  array-style: json
  item-schema:
  - name: imageIds
    type: string-array
    description: 'Image ID supported. Hint: only accessible in DescribeInstanceType .'
  - name: instanceTypeId
    type: string
    description: Instance model ID.
  - name: description
    type: string
    description: Model description, including memory size, disk, etc.
  - name: cpuCoreCount
    type: integer
    description: Quantity of CPUs.
  - name: cpuDetail
    type: string
    description: Details of CPU.
  - name: cpuCores
    type: integer
    description: Quantity of CPU cores.
  - name: cpuThreads
    type: integer
    description: CPU threads.
  - name: baseFrequency
    type: string
    description: CPU base frequency.
  - name: memorySize
    type: integer
    description: |-
      Memory size.
      Unit: GB.
  - name: maximumBandwidth
    type: integer
    description: |-
      Outbound bandwidth cap.
      Unit: Mbps.
  - name: supportRaids
    type: integer-array
    description: RAID level supported.
  - name: supportSubnet
    type: boolean
    description: Subnet supported or not.
  - name: isHA
    type: boolean
    description: High availability supported or not.
  - name: diskInfo
    type: object
    description: |-
      Disk size.
      Unit: GB.
    object-schema:
    - name: totalDiskSize
      type: integer
      description: |-
        Total disk size.
        Unit: GiB.
        The available storage space is relatively less than the total disk size to create partitions successfully. What remains actually will be added to the last partition.
    - name: diskDescription
      type: string
      description: Description of the disks.
    - name: disks
      type: object-array
      description: |-
        Disk information available for RAID and partition.
        Numbered sequentially. For example, for 880 x 2 and 220 x 2, the disk serial numbers 1, 2, 3, and 4 respectively correspond to disk sizes of 880 GB, 880 GB, 220 GB, and 220 GB.
      array-style: json
      item-schema:
      - name: diskSize
        type: integer
        description: |-
          Disk size.
          Unit: GB.
      - name: diskCount
        type: integer
        description: Quantity of disks of the size.
  - name: vpuVendor
    type: string
    description: VPU vendor
  - name: vpuCard
    type: string
    description: 'VPU Model. Example: T1U'
  - name: vpuCount
    type: integer
    description: VPU count.
