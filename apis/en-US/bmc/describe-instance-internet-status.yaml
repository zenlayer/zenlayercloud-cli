name: DescribeInstanceInternetStatus
product: bmc
use: describe-instance-internet-status
short: Queries the status of instance bandwidth and traffic package
long: Query the bandwidth and traffic package status of an instance.
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeInstanceInternetStatus
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: |-
    Instance ID.
    To obtain the instance ID, you can call DescribeInstances and look for instanceId in the response.
response:
- name: instanceId
  type: string
  description: Instance ID.
- name: instanceName
  type: string
  description: Instance name.
- name: internetMaxBandwidthOut
  type: integer
  description: Current instance bandwidth.
- name: modifiedInternetMaxBandwidthOut
  type: integer
  description: Modified instance bandwidth.
- name: modifiedBandwidthStatus
  type: string
  description: |-
    Status of instance bandwidth.
    Processing : modifying.
    Enable : effective now.
    WaitToEnable : effective in next billing cycle.
- name: trafficPackageSize
  type: float
  description: Current instance traffic package
- name: modifiedTrafficPackageSize
  type: float
  description: Modified instance traffic package
- name: modifiedTrafficPackageStatus
  type: string
  description: |-
    Status of instance traffic package
    Processing : modifying.
    Enable : effective now.
    WaitToEnable : effective in next billing cycle.
