name: DescribeBackends
product: bmc
use: describe-backends
short: Queries the information of one or more specified backend servers
long: Query the information of one or more specified backend servers. Users can search for backend server information based on the ID of the listener, the ID of the backend server, and other information.
examples:
- cmd: zeno bmc describe-backends --listener-id xxxx
  desc: Get a list of all backend servers based on the listener ID.
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeBackends
parameters:
- name: listener-id
  type: string
  required: true
  sdk-field: listenerId
  description: The listener ID.
- name: backend-ids
  type: string-array
  required: false
  sdk-field: backendIds
  description: ID list of backend servers.
- name: backend-name
  type: string
  required: false
  sdk-field: backendName
  description: Backend server name.
- name: instance-type
  type: enum
  required: false
  sdk-field: instanceType
  description: 'Instance type. Default value: BM'
  enum-values:
  - value: BM
    desc: Bare Metal
  - value: VM
    desc: Virtual machine.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1 .
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20 ;
    Maximum value: 1000 .
response:
- name: totalCount
  type: integer
  description: The total number of backend servers that meet the filtering conditions.
- name: dataSet
  type: object-array
  description: Backend server list.
  array-style: json
  item-schema:
  - name: listenerId
    type: string
    description: Listener ID.
  - name: backendId
    type: string
    description: Backend server ID.
  - name: backendName
    type: string
    description: Backend server name.
  - name: status
    type: string
    description: Backend server state.
  - name: port
    type: string
    description: Backend port.
  - name: weight
    type: integer
    description: Backend server weight.
  - name: instanceId
    type: string
    description: Instance ID.
  - name: instanceType
    type: enum
    description: Instance type.
    enum-values:
    - value: BM
      desc: Bare Metal
    - value: VM
      desc: Virtual machine.
  - name: instanceName
    type: string
    description: Instance name.
  - name: createTime
    type: string
    description: |-
      Creation time.
      Use UTC time according to the ISO8601 standard. Format: YYYY-MM-ddTHH:mm:ssZ .
