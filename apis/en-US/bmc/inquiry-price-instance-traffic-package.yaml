name: InquiryPriceInstanceTrafficPackage
product: bmc
use: inquiry-price-instance-traffic-package
short: Queries the price of instance traffic package
long: |-
  Query the price of modified instance traffic package.
  **Note**

  Use this API only when [`InternetChargeType`](../datastructure.md#internetchargetype) is `ByTrafficPackage.`
examples:
- cmd: zeno bmc inquiry-price-instance-traffic-package --instance-id instanceId --traffic-package-size 100
  desc: Query the price of modified instance traffic package
sdk:
  service: bmc
  version: '2026-02-01'
  action: InquiryPriceInstanceTrafficPackage
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: |-
    Instance ID.
    To obtain the instance ID, you can call DescribeInstances and look for instanceId in the response.
- name: traffic-package-size
  type: float
  required: true
  sdk-field: trafficPackageSize
  description: |-
    Traffic package size.
    The value must be a multiple of 0.05.
response:
- name: trafficPackagePrice
  type: object-array
  description: |-
    Price of traffic package.
    Kinds of prices may exist. For example, traffic package billing method may contain the package price and overage price.
  array-style: json
  item-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR: you will be billed by hour.
      DAY: you will be billed by day.
      MONTH: you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: First price range of a tiered price.
    - name: stepEnd
      type: float
      description: Last price range of a tiered price.
    - name: unitPrice
      type: float
      description: |-
        Original unit price of current price range.
        Only used in pay-as-you-go model.
    - name: discountUnitPrice
      type: float
      description: |-
        Discount unit price of current price range.
        Only used in pay-as-you-go model.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage,
      such as Mbps, LCU, and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The price category
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
