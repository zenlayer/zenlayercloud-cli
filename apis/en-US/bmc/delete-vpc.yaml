name: DeleteVpc
product: bmc
use: delete-vpc
short: Deletes VPC
long: |-
  Delete a VPC.
  **Note**

  * This API is an async API. A `requestId` is returned after the deletion request is sent. However, it does not mean the deletion has been completed. The status of the VPC will be `DELETING` during the deletion. You can use [DescribeVpcs](describevpcs.md) to query the status of the VPC. If this VPC does not exist in the VPC list, it means that the VPC has been deleted successfully. Any operations on the VPCs are not allowed while deleting.
  * Operations on VPCs with subnets in it are not supported. You can use [DescribeVpcs](describevpcs.md) to query the status of the VPC.
  * Only operations on VPCs in the status of `AVAILABLE` or `CREATE_FAILED` are supported.
examples:
- cmd: zeno bmc delete-vpc --vpc-id 835957634816289496
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: DeleteVpc
parameters:
- name: vpc-id
  type: string
  required: true
  sdk-field: vpcId
  description: VPC ID.
