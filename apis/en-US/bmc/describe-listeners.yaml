name: DescribeListeners
product: bmc
use: describe-listeners
short: Queries the information of one or more specified listeners
long: Query the information of one or more specified listeners. Users can search for listener information based on the ID of the load balancer, the ID of the listener, and other information.
examples:
- cmd: zeno bmc describe-listeners --load-balancer-ids xxxx
  desc: by load balancer instance ID.
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeListeners
parameters:
- name: listener-ids
  type: string-array
  required: false
  sdk-field: listenerIds
  description: |-
    List of listener IDs.
    Up to 100 requests are supported.
- name: load-balancer-ids
  type: string-array
  required: false
  sdk-field: loadBalancerIds
  description: |-
    List of load balancer instance IDs.
    Up to 100 requests are supported.
- name: listener-name
  type: string
  required: false
  sdk-field: listenerName
  description: |-
    Listener name.
    Fuzzy search supported.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1 .
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20 ;
    Maximum value: 1000 .
response:
- name: totalCount
  type: integer
  description: The total number of listeners that meet the filtering conditions.
- name: dataSet
  type: object-array
  description: Listener set.
  array-style: json
  item-schema:
  - name: loadBalancerId
    type: string
    description: Load balance instance ID.
  - name: listenerId
    type: string
    description: Listener ID.
  - name: listenerName
    type: string
    description: Listener name.
  - name: status
    type: string
    description: State of a listener.
  - name: port
    type: string
    description: Listening port.
  - name: protocol
    type: string
    description: Listening protocol.
  - name: backendProtocol
    type: string
    description: Backend forwarding protocol.
  - name: scheduler
    type: string
    description: Scheduling algorithm.
  - name: kind
    type: enum
    description: Forwarding mode.
    enum-values:
    - value: DR
      desc: Direct Routing.
    - value: FNAT
      desc: Global Network Address Translation.
  - name: healthCheck
    type: object
    description: Heath check information of a listener.
  - name: notify
    type: object
    description: Alarm.
  - name: createTime
    type: string
    description: |-
      Creation time.
      Use UTC time according to the ISO8601 standard. Format: YYYY-MM-ddTHH:mm:ssZ .
