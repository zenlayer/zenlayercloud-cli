name: ReleaseLoadBalancer
product: bmc
use: release-load-balancer
short: Releases a load balancer.
long: release a load balancer.
examples:
- cmd: zeno bmc release-load-balancer --load-balancer-id xxxx
  desc: Release a load balancer.
sdk:
  service: bmc
  version: '2026-02-01'
  action: ReleaseLoadBalancer
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: The ID of the load balance instance.
