name: DescribeCidrBlockIps
product: bmc
use: describe-cidr-block-ips
short: Queries list of CIDR block IPs
long: Query the IPs of a CIDR block.
examples:
- cmd: zeno bmc describe-cidr-block-ips --cidr-block-id aCidrBlockId
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeCidrBlockIps
parameters:
- name: instance-id
  type: string
  required: false
  sdk-field: instanceId
  description: |-
    ID of the instance.
    You can find the instanceId in the response by calling DescribeInstances .
- name: ip
  type: string
  required: false
  sdk-field: ip
  description: IP address.
- name: cidr-block-id
  type: string
  required: true
  sdk-field: cidrBlockId
  description: |-
    ID of the CIDR block.
    You can find the cidrBlockId in the response by calling DescribeCidrBlocks .
response:
- name: cidrBlockIps
  type: object-array
  description: IPs of the CIDR block.
  array-style: json
  item-schema:
  - name: cidrBlockId
    type: string
    description: ID of CIDR block.
  - name: cidrBlockType
    type: enum
    description: |-
      Type of CIDR block. The optional values are as follows:
      IPv4 IPv6
    enum-values:
    - value: IPV4
      desc: IPv4.
    - value: IPV6
      desc: IPv6.
  - name: ip
    type: string
    description: IP address.
  - name: instanceId
    type: string
    description: List of instance IDs.
  - name: status
    type: enum
    description: Status of IPs .
    enum-values:
    - value: BINDING
      desc: Binding.
    - value: UNBINDING
      desc: Unbinding.
    - value: BOUND
      desc: Bound.
    - value: AVAILABLE
      desc: Available.
