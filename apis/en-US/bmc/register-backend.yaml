name: RegisterBackend
product: bmc
use: register-backend
short: Creates a backend server and add it to a load balance listener
long: Create a backend server and add it to a load balance listener.
examples:
- cmd: zeno bmc register-backend --listener-id xxxx --backend-name xxxx --port-list 80 --client-token xxxx --weight 100 --instance-id xxxx
  desc: Add a backend server to a load balance listener.
sdk:
  service: bmc
  version: '2026-02-01'
  action: RegisterBackend
parameters:
- name: listener-id
  type: string
  required: true
  sdk-field: listenerId
  description: The listener ID.
- name: backend-name
  type: string
  required: true
  sdk-field: backendName
  description: |-
    Backend server name.
    This parameter can contain up to 64 characters. Only letters, numbers, - and periods (.) are supported.
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: Bare metal instance ID.
- name: client-token
  type: string
  required: true
  sdk-field: clientToken
  description: Used to ensure the idempotency of the request.
- name: port-list
  type: integer-array
  required: false
  sdk-field: portList
  description: Port list.
- name: weight
  type: integer
  required: false
  sdk-field: weight
  description: Weight of the instance.
response:
- name: backendId
  type: string
  description: Backend server ID.
