name: DescribeVpcAvailableRegions
product: bmc
use: describe-vpc-available-regions
short: Queries information about availability regions for VPCs
long: |-
  Query information about availability regions for VPCs.
  **Note**

  Availability regions in some cities may adopt different network architectures, which will be named with different names, such as `LAX2` and `LAX2_2.0`. Please note that subnets in these availability regions with different network architectures cannot communicate with each other.
examples:
- cmd: zeno bmc describe-vpc-available-regions --vpc-region-id SIN3
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeVpcAvailableRegions
parameters:
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: Zone ID to which the VPCs belong.
- name: vpc-region-id
  type: string
  required: false
  sdk-field: vpcRegionId
  description: IDs of availability regions for VPCs.
