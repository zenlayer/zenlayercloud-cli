name: InquiryPriceCreateEipAddress
product: bmc
use: inquiry-price-create-eip-address
short: Queries the price of creating elastic IP
long: Query the price of creating elastic IP.
examples:
- cmd: zeno bmc inquiry-price-create-eip-address --zone-id SEL-A --eip-charge-type POSTPAID
  desc: Query the pay-as-you-go price of creating an elastic IP
sdk:
  service: bmc
  version: '2026-02-01'
  action: InquiryPriceCreateEipAddress
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: Zone ID to which the elastic IP belongs.
- name: eip-charge-type
  type: enum
  required: true
  sdk-field: eipChargeType
  description: |-
    Elastic IP pricing model .
    PREPAID: subscription
    POSTPAID: pay-as-you-go
  enum-values:
  - value: PREPAID
    desc: Subscription.
  - value: POSTPAID
    desc: Pay-as-you-go.
- name: eip-charge-prepaid
  type: object
  required: false
  sdk-field: eipChargePrepaid
  description: Details of the monthly subscription, including the purchase period, auto-renewal. It is required if the eipChargeType is PREPAID.
  object-schema:
  - name: period
    type: integer
    description: |-
      Period of subscription.
      Unit: month.
- name: amount
  type: integer
  required: false
  sdk-field: amount
  description: |-
    Quantity of elastic IPs.
    Value range: 1-100.
    Default value: 1.
- name: netmask
  type: integer
  required: false
  sdk-field: netmask
  description: |-
    The netmask.
    You can obtain the list of available netmasks from the DescribeEipAvailableResources API.
response:
- name: eipPrice
  type: object
  description: Price of the elastic IP.
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR: you will be billed by hour.
      DAY: you will be billed by day.
      MONTH: you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: First price range of a tiered price.
    - name: stepEnd
      type: float
      description: Last price range of a tiered price.
    - name: unitPrice
      type: float
      description: |-
        Original unit price of current price range.
        Only used in pay-as-you-go model.
    - name: discountUnitPrice
      type: float
      description: |-
        Discount unit price of current price range.
        Only used in pay-as-you-go model.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage,
      such as Mbps, LCU, and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The price category
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
