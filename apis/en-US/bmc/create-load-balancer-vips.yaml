name: CreateLoadBalancerVIPs
product: bmc
use: create-load-balancer-vips
short: Creates a load balancing virtual IP (VIP)
long: Create a load balancing virtual IP (VIP).
examples:
- cmd: zeno bmc create-load-balancer-vips --load-balancer-id xxxx --count 2
  desc: Create a VIP under a load balancer.
sdk:
  service: bmc
  version: '2026-02-01'
  action: CreateLoadBalancerVIPs
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: The ID of the load balancer.
- name: count
  type: integer
  required: true
  sdk-field: count
  description: Number of additional IPs to be created.
response:
- name: orderNumber
  type: string
  description: Order number. If the load balancer is of the Virtual IPv6 type, it returns null.
- name: vipIdSet
  type: string-array
  description: IP ID list.
