name: InquiryPriceCreateIpv4Block
product: bmc
use: inquiry-price-create-ipv4-block
short: Queries the price of creating IPv4 CIDR blocks
long: Query the price of creating IPv4 CIDR blocks.
examples:
- cmd: zeno bmc inquiry-price-create-ipv4-block --zone-id CHI-A --charge-type POSTPAID --netmask 28
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: InquiryPriceCreateIpv4Block
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: Zone ID to which the CIDR blocks belong.
- name: charge-type
  type: enum
  required: true
  sdk-field: chargeType
  description: |-
    CIDR block pricing model .
    PREPAID: subscription POSTPAID: pay-as-you-go
  enum-values:
  - value: PREPAID
    desc: Subscription.
  - value: POSTPAID
    desc: Pay-as-you-go.
- name: cidr-type
  type: enum
  required: false
  sdk-field: cidrType
  description: CIDR block type.
  enum-values:
  - value: BGP
    desc: BGP IP.
  - value: Local
    desc: Local IP.
- name: charge-prepaid
  type: object
  required: false
  sdk-field: chargePrepaid
  description: Details of the monthly subscription, including the purchase period, auto-renewal. It is required if the chargeType is PREPAID.
  object-schema:
  - name: period
    type: integer
    description: |-
      Period of subscription.
      Unit: month.
- name: netmask
  type: integer
  required: true
  sdk-field: netmask
  description: |-
    Netmasks you want to purchase.
    You can find the available netmasks in the response by calling DescribeAvailableIpv4Resource .
- name: amount
  type: integer
  required: false
  sdk-field: amount
  description: |-
    Quantity of IPv4 CIDR blocks you want to purchase.
    Default value: 1.
response:
- name: price
  type: object
  description: Price of IPv4 CIDR blocks.
  object-schema:
  - name: discount
    type: float
    description: |-
      Discount.
      For example, 80.0 means 20% off.
  - name: discountPrice
    type: float
    description: |-
      Discount price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: originalPrice
    type: float
    description: |-
      Original price of prepaid resources.
      Only used in subscription model. For pay-as-you-go model, the value is empty.
  - name: unitPrice
    type: float
    description: |-
      Original unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: discountUnitPrice
    type: float
    description: |-
      Discount unit price of postpaid resources.
      Only used in pay-as-you-go model. For tiered billing, the value is empty.
  - name: chargeUnit
    type: string
    description: |-
      Unit of postpaid billing.
      Only used in pay-as-you-go model.
      Value range:
      HOUR: you will be billed by hour.
      DAY: you will be billed by day.
      MONTH: you will be billed by month. For example, the burstable 95th pricing model.
  - name: stepPrices
    type: object-array
    description: |-
      Tiered price of postpaid billing.
      Only used in pay-as-you-go model. If it is not tiered price, the value is empty.
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: First price range of a tiered price.
    - name: stepEnd
      type: float
      description: Last price range of a tiered price.
    - name: unitPrice
      type: float
      description: |-
        Original unit price of current price range.
        Only used in pay-as-you-go model.
    - name: discountUnitPrice
      type: float
      description: |-
        Discount unit price of current price range.
        Only used in pay-as-you-go model.
  - name: amountUnit
    type: string
    description: |-
      Unit of usage,
      such as Mbps, LCU, and etc.
      If the value is empty, it means there is no unit.
  - name: excessUnitPrice
    type: float
    description: Original unit price of overages.
  - name: excessDiscountUnitPrice
    type: float
    description: Discount unit price of overages.
  - name: excessAmountUnit
    type: string
    description: |-
      Unit of overage usage.
      If the value is empty, it means there is no unit.
  - name: category
    type: enum
    description: The price category
    enum-values:
    - value: STANDARD
      desc: Standard price.
    - value: CUSTOMIZED
      desc: Fixed price.
