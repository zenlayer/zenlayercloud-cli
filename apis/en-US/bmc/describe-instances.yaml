name: DescribeInstances
product: bmc
use: describe-instances
short: Queries the details of one or more instances
long: Query the details of instances. You can filter the query results with the instance ID, name, or billing method.
examples:
- cmd: zeno bmc describe-instances --page-num 1 --page-size 1
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeInstances
parameters:
- name: instance-ids
  type: string-array
  required: false
  sdk-field: instanceIds
  description: |-
    Instance IDs.
    You can query up to 100 instances in each request.
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: Zone ID to which the instances belong.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Resource group ID.
    If the value is null, then return all the instances in the authorized resource groups.
- name: instance-type-id
  type: string
  required: false
  sdk-field: instanceTypeId
  description: Instance model ID.btain the latest specification.
- name: internet-charge-type
  type: enum
  required: false
  sdk-field: internetChargeType
  description: Network pricing model.
  enum-values:
  - value: ByBandwidth
    desc: Billed by the flat rate bandwidth.
  - value: ByTrafficPackage
    desc: Billed by the traffic package size purchased.
  - value: ByInstanceBandwidth95
    desc: Burstable 95th billing.
  - value: ByClusterBandwidth95
    desc: Billed by the burstable 95th bandwidth of instances in a city-based bandwidth cluster.
  - value: ByBandwidthCluster
    desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
- name: image-id
  type: string
  required: false
  sdk-field: imageId
  description: Image ID.
- name: subnet-id
  type: string
  required: false
  sdk-field: subnetId
  description: Subnet ID.uery information on subnet.
- name: instance-status
  type: enum
  required: false
  sdk-field: instanceStatus
  description: Instance status.
  enum-values:
  - value: PENDING
    desc: To be created.
  - value: CREATING
    desc: Creating.
  - value: CREATE_FAILED
    desc: Creating failed.
  - value: INSTALLING
    desc: Installing.
  - value: INSTALL_FAILED
    desc: Installing failed.
  - value: RUNNING
    desc: Running.
  - value: STOPPED
    desc: Powered off.
  - value: BOOTING
    desc: Powered on.
  - value: STOPPING
    desc: Powering off.
  - value: RECYCLE
    desc: Recycled.
- name: instance-name
  type: string
  required: false
  sdk-field: instanceName
  description: |-
    Instance name.
    If the value ends with * , a fuzzy match will be performed on instanceName, otherwise an exact match will be performed.
- name: hostname
  type: string
  required: false
  sdk-field: hostname
  description: |-
    Instance hostname.
    If the value ends with * , a fuzzy match will be performed on hostname, otherwise an exact match will be performed.
- name: public-ip-addresses
  type: string-array
  required: false
  sdk-field: publicIpAddresses
  description: List of public IPs of the instance.
- name: private-ip-addresses
  type: string-array
  required: false
  sdk-field: privateIpAddresses
  description: List of private IPs of the instance.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    Number of pages returned.
    Default value: 1
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20
    Maximum value: 1000
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    Query according to tag key.
    You can query up to 20 tag keys in each request.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    Query according to tag.
    You can query up to 20 tags in each request.
  array-style: json
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 128 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 128 characters.'
response:
- name: totalCount
  type: integer
  description: Number of instances meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on an instance.
  array-style: json
  item-schema:
  - name: instanceId
    type: string
    description: Instance ID
  - name: zoneId
    type: string
    description: Zone ID to which the instances belong.
  - name: instanceName
    type: string
    description: Instance name to be displayed.
  - name: hostname
    type: string
    description: Instance hostname.
  - name: instanceTypeId
    type: string
    description: Instance model ID.
  - name: instanceType
    type: object
    description: Instance model configuration info.
    object-schema:
    - name: imageIds
      type: string-array
      description: 'Image ID supported. Hint: only accessible in DescribeInstanceType .'
    - name: instanceTypeId
      type: string
      description: Instance model ID.
    - name: description
      type: string
      description: Model description, including memory size, disk, etc.
    - name: cpuCoreCount
      type: integer
      description: Quantity of CPUs.
    - name: cpuDetail
      type: string
      description: Details of CPU.
    - name: cpuCores
      type: integer
      description: Quantity of CPU cores.
    - name: cpuThreads
      type: integer
      description: CPU threads.
    - name: baseFrequency
      type: string
      description: CPU base frequency.
    - name: memorySize
      type: integer
      description: |-
        Memory size.
        Unit: GB.
    - name: maximumBandwidth
      type: integer
      description: |-
        Outbound bandwidth cap.
        Unit: Mbps.
    - name: supportRaids
      type: integer-array
      description: RAID level supported.
    - name: supportSubnet
      type: boolean
      description: Subnet supported or not.
    - name: isHA
      type: boolean
      description: High availability supported or not.
    - name: diskInfo
      type: object
      description: |-
        Disk size.
        Unit: GB.
      object-schema:
      - name: totalDiskSize
        type: integer
        description: |-
          Total disk size.
          Unit: GiB.
          The available storage space is relatively less than the total disk size to create partitions successfully. What remains actually will be added to the last partition.
      - name: diskDescription
        type: string
        description: Description of the disks.
      - name: disks
        type: object-array
        description: |-
          Disk information available for RAID and partition.
          Numbered sequentially. For example, for 880 x 2 and 220 x 2, the disk serial numbers 1, 2, 3, and 4 respectively correspond to disk sizes of 880 GB, 880 GB, 220 GB, and 220 GB.
        array-style: json
        item-schema:
        - name: diskSize
          type: integer
          description: |-
            Disk size.
            Unit: GB.
        - name: diskCount
          type: integer
          description: Quantity of disks of the size.
    - name: vpuVendor
      type: string
      description: VPU vendor
    - name: vpuCard
      type: string
      description: 'VPU Model. Example: T1U'
    - name: vpuCount
      type: integer
      description: VPU count.
  - name: imageId
    type: string
    description: Image ID.
  - name: imageName
    type: string
    description: Image name.
  - name: ipxeUrl
    type: string
    description: iPXE URL.
  - name: instanceChargeType
    type: enum
    description: |-
      Instance pricing model.
      PREPAID:monthly subscription.
      POSTPAID:pay-as-you-go.
    enum-values:
    - value: PREPAID
      desc: Subscription.
    - value: POSTPAID
      desc: Pay-as-you-go.
  - name: bandwidthOutMbps
    type: integer
    description: |-
      Public outbound bandwidth.
      Unit:Mbps.
      Value 0 means no limit,but not exceeds the upper limit of the instance model supported.
  - name: internetChargeType
    type: enum
    description: Network pricing model.
    enum-values:
    - value: ByBandwidth
      desc: Billed by the flat rate bandwidth.
    - value: ByTrafficPackage
      desc: Billed by the traffic package size purchased.
    - value: ByInstanceBandwidth95
      desc: Burstable 95th billing.
    - value: ByClusterBandwidth95
      desc: Billed by the burstable 95th bandwidth of instances in a city-based bandwidth cluster.
    - value: ByBandwidthCluster
      desc: Billed by the burstable 95th bandwidth of all compute resources in a city-based or regional bandwidth cluster with a shared commitment.
  - name: period
    type: integer
    description: |-
      Period of instance subscription.
      Unit:month.
      For postpaid instances,the value is empty.
  - name: primaryPublicIpAddress
    type: string
    description: Instance primary IP address.
  - name: primaryPublicIPv6Address
    type: string
    description: Instance primary IPv6 address.
  - name: publicIpAddresses
    type: string-array
    description: |-
      List of public IPv4 addresses.
      If the instance primary IP is not added to the public network interface,the primary IP will not be available.,and its value will not be returned.
  - name: privateIpAddresses
    type: string-array
    description: List of private IPv4 addresses.
  - name: ipv6Addresses
    type: string-array
    description: |-
      Instance IPv6 addresses.
      The value may be empty,which means no available IPv6 address exists.
  - name: subnetIds
    type: string-array
    description: List of subnet IDs.
  - name: createTime
    type: string
    description: |-
      Creation time.
      Use UTC time according to the ISO8601 standard.Format: YYYY-MM-ddTHH:mm:ssZ .
  - name: expiredTime
    type: string
    description: |-
      Expiration time.
      Use UTC time according to the ISO8601 standard.Format: YYYY-MM-ddTHH:mm:ssZ .
  - name: resourceGroupId
    type: string
    description: Resource group ID to which instances belong.
  - name: resourceGroupName
    type: string
    description: Resource group name to which instances belong.
  - name: instanceStatus
    type: enum
    description: Status of instances.
    enum-values:
    - value: PENDING
      desc: To be created.
    - value: CREATING
      desc: Creating.
    - value: CREATE_FAILED
      desc: Creating failed.
    - value: INSTALLING
      desc: Installing.
    - value: INSTALL_FAILED
      desc: Installing failed.
    - value: RUNNING
      desc: Running.
    - value: STOPPED
      desc: Powered off.
    - value: BOOTING
      desc: Powered on.
    - value: STOPPING
      desc: Powering off.
    - value: RECYCLE
      desc: Recycled.
  - name: trafficPackageSize
    type: float
    description: |-
      Traffic package size purchased.
      Unit:TB.
  - name: raidConfig
    type: object
    description: Disk array configuration.
    object-schema:
    - name: raidType
      type: integer
      description: |-
        RAID levels for rapid RAID settings.
        Value possible: 0, 1, 5, 10.
        Only one of raidType and customRaids can be specified.
    - name: customRaids
      type: object-array
      description: |-
        RAID levels for custom RAID settings.
        Only one of raidType and customRaids can be specified.
      array-style: json
      item-schema:
      - name: raidType
        type: integer
        description: |-
          RAID levels.
          Value possible: 0, 1, 5, 10.
      - name: diskSequence
        type: integer-array
        description: |-
          Serial number of the disk
          Numbered sequentially starting from 1. Multiple disk serial numbers should be consecutive.
  - name: partitions
    type: object-array
    description: Partition configuration.
    array-style: json
    item-schema:
    - name: fsPath
      type: string
      description: |-
        Partition letter.
        Linux: must start with "/", and the first system partition must be "/".
        Windows: support C~H, the first system partition must be designated as "C".
    - name: fsType
      type: string
      description: |-
        File type of partition.
        Linux: ext2 , ext3 , ext4 , ext type is needed.
        Windows: NTFS .
    - name: size
      type: integer
      description: |-
        Partition size.
        Unit: GiB.
  - name: nic
    type: object
    description: NIC configuration.
    object-schema:
    - name: wanName
      type: string
      description: |-
        Public NIC name.
        Only numbers, uppercase and lowercase letters are allowed, starting with a letter with a length limit of 4 to 10 characters.
        For non-high-availability models, the default public NIC name is wan0 . It cannot start with lan .
        For high-availability models, the default public NIC name is bond0 .
        Public and private NIC names cannot be the same.
    - name: lanName
      type: string
      description: |-
        Private NIC name.
        Only numbers, uppercase and lowercase letters are allowed, starting with a letter with a length limit of 4 to 10 characters.
        For non-high-availability models, the default private NIC name is lan0 . It cannot start with wan .
        For high-availability models, the default private NIC name is bond1 .
        Public and private NIC names cannot be the same.
  - name: autoRenew
    type: boolean
    description: Whether to enable auto-renewal.
  - name: keyId
    type: string
    description: |-
      SSH key pair ID.
      The value may be null,indicating that there is no valid value.
  - name: tags
    type: object
    description: Bound tags.
    object-schema:
    - name: tags
      type: object-array
      description: List of tags.
      array-style: json
      item-schema:
      - name: key
        type: string
        description: 'Tag key. Length limit: 1 to 128 characters.'
      - name: value
        type: string
        description: 'Tag value. Length limit: 1 to 128 characters.'
  - name: enableGatewayMode
    type: boolean
    description: Whether to enable Gateway Mode.
