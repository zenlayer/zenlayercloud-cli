name: ModifyVpcsAttribute
product: bmc
use: modify-vpcs-attribute
short: Modifies the information about VPCs
long: |-
  The API is used to modify the attributes of one or more VPCs. Only the VPC name to be displayed can be modified for now.
  **Note**

  * Batch operations are supported. Each request can modify up to 100 VPCs.
  * If any of the VPC IDs does not exist, the operation will fail immediately.
examples:
- cmd: zeno bmc modify-vpcs-attribute --vpc-ids 675574041725115352 --vpc-name 111
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: ModifyVpcsAttribute
parameters:
- name: vpc-name
  type: string
  required: true
  sdk-field: vpcName
  description: |-
    VPC name to be displayed.
    This parameter can contain up to 64 characters. Only letters, numbers, - and periods (.) are supported.
- name: vpc-ids
  type: string-array
  required: true
  sdk-field: vpcIds
  description: |-
    VPC ID(s).
    To obtain the VPC IDs, you can call DescribeVpcs and look for vpcId in the response.
    The maximum number of VPCs in each request is 100.
