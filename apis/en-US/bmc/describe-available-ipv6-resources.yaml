name: DescribeAvailableIpv6Resources
product: bmc
use: describe-available-ipv6-resources
short: Queries available IPv6 CIDR blocks
long: Query available IPv6 CIDR blocks.
examples:
- cmd: zeno bmc describe-available-ipv6-resources --zone-id IAD-A
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeAvailableIpv6Resources
parameters:
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: Zone ID to which the CIDR blocks belong.
response:
- name: availableIpv6Resources
  type: object-array
  description: List of available IPv6 CIDR blocks.
  array-style: json
  item-schema:
  - name: zoneId
    type: string
    description: Zone ID to which the CIDR block belongs.
  - name: sellStatus
    type: enum
    description: |-
      Status for sale.
      SELL : available for sale, stock > 10. SELL_SHORTAGE : available for sale, stock SOLD_OUT : sold out.
    enum-values:
    - value: SOLD_OUT
      desc: Sold out.
    - value: SELL_SHORTAGE
      desc: Available for sale, stock <= 10.
    - value: SELL
      desc: Available for sale, stock > 10.
