name: DescribeInstancesMonitorHealth
product: bmc
use: describe-instances-monitor-health
short: Query server hardware health information
long: |-
  Query server hardware health information.
  **Note**

  Batch operations are supported. The maximum number of instances in each request is 10.
examples:
- cmd: zeno bmc describe-instances-monitor-health --instance-ids instanceId1 --instance-ids instanceId2
  desc: Query server hardware health information.
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeInstancesMonitorHealth
parameters:
- name: instance-ids
  type: string-array
  required: true
  sdk-field: instanceIds
  description: |-
    Instance ID(s).
    To obtain the instance ID, you can call DescribeInstances and look for instanceId in the response.
    The maximum number of instances in each request is 10.
response:
- name: monitorHealthList
  type: object-array
  description: List of hardware health information.
  array-style: json
  item-schema:
  - name: instanceId
    type: string
    description: Instance ID.
  - name: cpuStatus
    type: string
    description: |-
      CPU health state.
      OK : Normal state. WARNING : Abnormal state. UNKNOWN : State detected failed.
  - name: diskStatus
    type: string
    description: |-
      Disk health state.
      OK : Normal state. WARNING : Abnormal state. UNKNOWN : State detected failed.
  - name: ipmiPing
    type: string
    description: |-
      IPMI IP health state.
      OK : ICMP detected normal. CRITICAL : ICMP detected failed. UNKNOWN : State detected failed.
  - name: ipmiStatus
    type: string
    description: |-
      IPMI health state.
      OK : ICMP detected normal. WARNING : Abnormal state. UNKNOWN : State detected failed.
  - name: memoryStatus
    type: string
    description: |-
      Memory health state.
      OK : Normal state. WARNING : Abnormal state. UNKNOWN : State detected failed.
  - name: psuStatus
    type: string
    description: |-
      Power supply health state.
      OK : Normal state. WARNING : Abnormal state. UNKNOWN : State detected failed.
  - name: wanPortStatus
    type: string
    description: |-
      Server's public network interface connection state.
      OK : Normal state. WARNING : Abnormal state. UNKNOWN : State detected failed.
  - name: fanStatus
    type: string
    description: |-
      Fan state.
      OK : Normal state. WARNING : Abnormal state. UNKNOWN : State detected failed.
  - name: serverBrand
    type: string
    description: Server supplier brand.
  - name: serverModel
    type: string
    description: Server supplier model.
  - name: cpuTemp
    type: integer
    description: |-
      Temperature of a single CPU in Supermicro blade servers.
      The range is from 0 to 100. The unit is ℃.
      Note that a value of 0 is generally not retrievable, and a value of 100 signifies an exceptionally high temperature.
  - name: cpu0Temp
    type: integer
    description: CPU0 temperature. The range is from 0 to 100. The unit is ℃. If the value is empty, it means the temperature is not retrievable.
  - name: cpu1Temp
    type: integer
    description: CPU1 temperature. The range is from 0 to 100. The unit is ℃. If the value is empty, it means the temperature is not retrievable.
  - name: cpu2Temp
    type: integer
    description: CPU2 temperature. The range is from 0 to 100. The unit is ℃. If the value is empty, it means the temperature is not retrievable.
  - name: inletTemp
    type: integer
    description: Temperature of the air or environment surrounding the server equipment in a data center or server room.
  - name: tempUnit
    type: string
    description: |-
      Temperature unit.
      Only Celsius is supported, that is ℃.
