name: CreateVpc
product: bmc
use: create-vpc
short: Creates VPC
long: |-
  Create a VPC.
  #### Prerequisites

  Before creating a VPC, call [`DescribeVpcAvailableRegions`](describevpcavailableregions.md) to check the availability regions for VPC creation.


  **Note**

  * The quantity of VPCs you can create in one availability region is limited. If you need more, please contact Zenlayer Support.
  * This API is an async API. A VPC ID list is returned after the creation request is sent. However, it does not mean the creation has been completed. The status of the VPC will be `CREATING` during the creation. You can use [DescribeVpcs](describevpcs.md) to query the status of the VPC. If the status changes from `CREATING` to `AVAILABLE`, it means that the VPC has been created successfully; `CREATE_FAILED` means the VPC has been created failed. Any operations on the VPCs are not allowed while creating.
examples:
- cmd: zeno bmc create-vpc --vpc-region-id CHI1 --cidr-block 10.0.0.0/8 --vpc-name 1122
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: CreateVpc
parameters:
- name: vpc-region-id
  type: string
  required: true
  sdk-field: vpcRegionId
  description: Availability region ID of VPC.
- name: cidr-block
  type: string
  required: true
  sdk-field: cidrBlock
  description: CIDR block of VPC.
- name: vpc-name
  type: string
  required: true
  sdk-field: vpcName
  description: |-
    VPC name to be displayed.
    This parameter can contain up to 64 characters. Only letters, numbers, - and periods (.) are supported.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Resource group ID.
    If the value is not passed in, the VPC will be put into the default resource group. If no authorized default resource group found, the request will fail.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    Bound tags when creating resources.
    Tag keys must be unique.--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 128 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 128 characters.'
