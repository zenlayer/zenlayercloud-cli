name: DescribeLoadBalancerZones
product: bmc
use: describe-load-balancer-zones
short: Queries the zones supporting the creating of load balancers.
long: query the zones supporting the creating of load balancers.
examples:
- cmd: zeno bmc describe-load-balancer-zones --charge-type POSTPAID
  desc: Query available zones supporting for creating pay-as-you-go load balancers.
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeLoadBalancerZones
parameters:
- name: charge-type
  type: enum
  required: true
  sdk-field: chargeType
  description: |-
    Pricing model.
    PREPAID : subscription;
    POSTPAID : pay-as-you-go.
  enum-values:
  - value: POSTPAID
    desc: Pay-as-you-go.
  - value: PREPAID
    desc: Subscription.
