name: DescribeInstanceTraffic
product: bmc
use: describe-instance-traffic
short: Queries instance traffic data.
long: query the data transfer in the specified date range.
examples:
- cmd: zeno bmc describe-instance-traffic --instance-id 932237369560662463 --start-time 2023-07-11T06:50:36Z --end-time 2023-07-11T07:10:36Z
  desc: Query the data transfer of the instance in one day.
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeInstanceTraffic
parameters:
- name: start-time
  type: string
  required: true
  sdk-field: startTime
  description: |-
    Start time.
    Use UTC time according to the ISO8601 standard. Format: YYYY-MM-ddTHH:mm:ssZ .
- name: end-time
  type: string
  required: true
  sdk-field: endTime
  description: |-
    End time.
    Use UTC time according to the ISO8601 standard. Format: YYYY-MM-ddTHH:mm:ssZ .
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: Instance ID.
