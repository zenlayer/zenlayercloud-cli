name: ModifyLoadBalancersName
product: bmc
use: modify-load-balancers-name
short: Modifies the name of a load balancer.
long: modify the name of a load balancer.
examples:
- cmd: zeno bmc modify-load-balancers-name --load-balancer-ids xxxx --load-balancer-name xxxx
  desc: Modify the name of the load balancer instance.
sdk:
  service: bmc
  version: '2026-02-01'
  action: ModifyLoadBalancersName
parameters:
- name: load-balancer-name
  type: string
  required: true
  sdk-field: loadBalancerName
  description: |-
    The name of the load balancer.
    This parameter can contain up to 64 characters. Only letters, numbers, - and periods (.) are supported.
- name: load-balancer-ids
  type: string-array
  required: true
  sdk-field: loadBalancerIds
  description: Load balancer ID list.
