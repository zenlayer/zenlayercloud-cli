name: BindCidrBlockIps
product: bmc
use: bind-cidr-block-ips
short: Assigns CIDR block IPs to instances
long: |-
  Bind one or more CIDR block IPs to instances.
  **Note**

  * Only operations on CIDR blocks in `AVAILABLE` status are supported.
  * CIDR block IPs can only be assigned to instances in the same zone.
  * The instance to be assigned a CIDR block IP should be in status of `RUNNING`.
  * This API is an async API. A request ID is returned after the request is sent. However, it does not mean the binding has been completed. You can use [`DescribeCidrBlockIps`](describecidrblockips.md) to query the status of the CIDR block IPs.
  * You need first assign an IPv4 CIDR to the instance before adding another IPv6 CIDR.
examples:
- cmd: zeno bmc bind-cidr-block-ips --cidr-block-id cidrBlockId --ip-bind-list "{instanceId=instanceId1, ip=1111:1111:2:25::2}" --ip-bind-list "{instanceId=instanceId2, ip=1.1.1.1}"
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: BindCidrBlockIps
parameters:
- name: ip-bind-list
  type: object-array
  required: true
  sdk-field: ipBindList
  description: List of IPs to be assigned.
  array-style: json
  item-schema:
  - name: instanceId
    type: string
    description: Instance ID.
  - name: ip
    type: string
    description: |-
      CIDR block IP.
      To obtain the CIDR block IP, you can call DescribeInstanceAvailableCidrBlock and look for availableIps in the response.
- name: cidr-block-id
  type: string
  required: true
  sdk-field: cidrBlockId
  description: |-
    ID of the CIDR block.
    You can find the cidrBlockId in the response by calling DescribeCidrBlocks .
