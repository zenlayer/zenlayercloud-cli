name: TerminateInstance
product: bmc
use: terminate-instance
short: Returns an instance
long: |-
  Return an instance.
  **Note**

  * Use this API to return an instance that is no longer required. A pay-as-you-go instance will stop billing after it is returns.
  * Calling this API on a subscription instance will cancel the subscription and the instance will be automatically returned after the subscription expires.
  * When this API is called, the instance will be moved to the recycle bin and be released in 24 hours if there are no other operations. You can also call [`ReleaseInstances`](releaseinstances.md) to release the instance.
  * Operations on instances in recycle bin or in stalling status are not supported.
  * Operations on instances in `CREATE_FAILED` status will delete the instance directly. For prepaid instances, all payment amounts will be refunded.
examples:
- cmd: zeno bmc terminate-instance --instance-id instanceId
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: TerminateInstance
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: |-
    Instance ID.
    To obtain the instance ID, you can call DescribeInstances and look for instanceId in the response.
