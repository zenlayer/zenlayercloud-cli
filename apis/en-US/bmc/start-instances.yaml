name: StartInstances
product: bmc
use: start-instances
short: Starts one or more instances
long: |-
  Start instances.
  **Note**

  * You can only perform this operation on instances whose status is `STOPPED` and that are not in the recycle bin.
  * If the API is called successfully, the instance status will become `BOOTING`. After the instance is started, its status will become `RUNNING`.
  * This API is an async API. A response is returned after the request is sent. However, it does not mean the start has been completed. You can use [DescribeInstances](describeinstances.md) to query the status of the instance. If the status changes from `BOOTING` to `RUNNING`, it means that the instance has been started successfully. Any operations on the instances are not allowed while creating.
  * Batch operations are supported. The maximum number of instances in each request is 100.
examples:
- cmd: zeno bmc start-instances --instance-ids instanceId1 --instance-ids instanceId2
  desc: Start two instances with specified IDs
sdk:
  service: bmc
  version: '2026-02-01'
  action: StartInstances
parameters:
- name: instance-ids
  type: string-array
  required: true
  sdk-field: instanceIds
  description: |-
    Instance ID(s).
    To obtain the instance IDs, you can call DescribeInstances and look for instanceId in the response. The maximum number of instances in each request is 100.
