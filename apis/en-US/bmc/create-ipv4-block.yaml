name: CreateIpv4Block
product: bmc
use: create-ipv4-block
short: Creates IPv4 CIDR blocks
long: |-
  Create one or more IPv4 CIDR blocks.
  #### Prerequisites

  * Query stock: call [`DescribeAvailableIpv4Resources`](describeavailableipv4resources.md) to check available resources.
  * Cost estimation: know of CIDR block pricing. See [Billing Method](https://docs.console.zenlayer.com/welcome/pricing/bare-metal-cloud-pricing/billing-method#cidr-block) for more details.


  **Note**

  * If you create a subscription CIDR block, the amount required will be pre-deducted. If the balance is insufficient, the request will fail. If you create a pay-as-you-go CIDR block, please ensure your account balance is sufficient before calling this API.
  * Vouchers can be used for fee deduction in instance creation. See [Vouchers](https://docs.console.zenlayer.com/welcome/platform/billing-center/vouchers) for more details.
  * This API is an async API. A CIDR block ID list is returned after the creation request is sent. However, it does not mean the creation has been completed. The status of the CIDR block will be `CREATING` during the creation. You can use [DescribeCidrBlocks](describecidrblocks.md) to query the status of the CIDR block. If the status changes from `Creating` to `Available`, it means that the CIDR block has been created successfully; `CREATE_FAILED` means the CIDR block has been created failed. Any operations on the instances are not allowed while creating.
examples:
- cmd: zeno bmc create-ipv4-block --zone-id IST-B --name example1 --charge-type POSTPAID --netmask 29
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: CreateIpv4Block
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: Zone ID to which the CIDR blocks belong.
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    CIDR block name to be displayed.
    This parameter can contain up to 64 characters.
- name: cidr-type
  type: enum
  required: false
  sdk-field: cidrType
  description: CIDR block type.
  enum-values:
  - value: BGP
    desc: BGP IP.
  - value: Local
    desc: Local IP.
- name: charge-type
  type: enum
  required: true
  sdk-field: chargeType
  description: |-
    CIDR block pricing model .
    PREPAID: subscription POSTPAID: pay-as-you-go
  enum-values:
  - value: PREPAID
    desc: Subscription.
  - value: POSTPAID
    desc: Pay-as-you-go.
- name: charge-prepaid
  type: object
  required: false
  sdk-field: chargePrepaid
  description: Details of the monthly subscription, including the purchase period, auto-renewal. It is required if the chargeType is PREPAID .
  object-schema:
  - name: period
    type: integer
    description: |-
      Period of subscription.
      Unit: month.
- name: netmask
  type: integer
  required: true
  sdk-field: netmask
  description: |-
    Netmasks you want to purchase.
    Value range: [1,32].
    You can find the available netmasks in the response by calling DescribeAvailableIpv4Resource .
- name: amount
  type: integer
  required: false
  sdk-field: amount
  description: |-
    Quantity of IPv4 CIDR blocks you want to purchase.
    Default value: 1.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Resource group ID where the CIDR blocks reside.
    If an available VLAN exists in the specified zone, this parameter will be ignored. The created CIDR blocks will be added to the resource group of the VLAN.
- name: marketing-options
  type: object
  required: false
  sdk-field: marketingOptions
  description: Information on marketing campaigns.
  object-schema:
  - name: discountCode
    type: string
    description: |-
      Promo Code.
      If no Promo Code exists, the final discount will not apply.
  - name: usePocVoucher
    type: boolean
    description: |-
      Whether to use POC voucher.
      If no POC voucher exists, the related creation will fail.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    Bound tags when creating resources.
    Tag keys must be unique.--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 128 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 128 characters.'
response:
- name: orderNumber
  type: string
  description: Number of order.
- name: cidrBlockIds
  type: string-array
  description: List of CIDR block IDs.
