name: DescribeZones
product: bmc
use: describe-zones
short: Queries available zones
long: Query zones available.
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeZones
parameters:
- name: accept-language
  type: string
  required: false
  sdk-field: acceptLanguage
  description: |-
    The languages of zones available. The optional values are as follows:
    zh-CN: Chinese en-US: English
    Default value: en-US.
- name: is-cloud-router-available
  type: boolean
  required: false
  sdk-field: isCloudRouterAvailable
  description: "Query the zone supports Layer 3 cloud router.\nAvailable values:\ntrue : supported \nfalse : not supported"
