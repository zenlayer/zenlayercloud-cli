name: DescribeInstanceAvailableCidrBlock
product: bmc
use: describe-instance-available-cidr-block
short: Queries available CIDR blocks for the instance
long: Query available CIDR blocks for the instance.
examples:
- cmd: zeno bmc describe-instance-available-cidr-block --instance-id 123456 --cidr-block-type IPV4
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeInstanceAvailableCidrBlock
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: |-
    ID of the instance.
    You can find the instanceId in the response by calling DescribeInstances .
- name: cidr-block-type
  type: enum
  required: false
  sdk-field: cidrBlockType
  description: |-
    Type of CIDR block. The optional values are as follows:
    IPv4 IPv6
  enum-values:
  - value: IPV4
    desc: IPv4.
  - value: IPV6
    desc: IPv6.
response:
- name: instanceAvailableCidrBlocks
  type: object-array
  description: List of available CIDR blocks for the instance.
  array-style: json
  item-schema:
  - name: cidrBlockId
    type: string
    description: ID of CIDR block.
  - name: zoneId
    type: string
    description: Zone ID to which the CIDR block belongs.
  - name: cidrBlockType
    type: enum
    description: CIDR block type.
    enum-values:
    - value: IPV4
      desc: IPv4.
    - value: IPV6
      desc: IPv6.
  - name: cidrType
    type: enum
    description: CIDR block type.
    enum-values:
    - value: BGP
      desc: BGP IP.
    - value: Local
      desc: Local IP.
  - name: cidrBlock
    type: string
    description: CIDR block.
  - name: availableIps
    type: string-array
    description: List of available IPs.
  - name: availableIpCount
    type: integer
    description: Quantity of available IPs.
