name: AllocateEipAddresses
product: bmc
use: allocate-eip-addresses
short: Creates elastic IPs
long: |-
  Apply for one or multiple elastic IPs.
  #### Prerequisites

  * Query available elastic IPs in zone: call `DescribeEipAvailableResources` to check the stock of the specified zone.
  * Cost estimation: know of the pricing model of elastic IPs. See [Elastic IP](https://docs.console.zenlayer.com/welcome/pricing/bare-metal-cloud-pricing/billing-method#elastic-ip) for details.


  **Note**

  * If you create a subscription elastic IP, the amount required will be pre-deducted. If the balance is insufficient, the request will fail. If you create a pay-as-you-go elastic IP, please ensure your account balance is sufficient before calling this API.
  * Vouchers can be used for fee deduction in creation. See [Vouchers](https://docs.console.zenlayer.com/welcome/platform/billing-center/vouchers) for more details.
  * This API is an async API. An ID list is returned after the request is sent. However, it does not mean the creation has been completed. The status of the elastic IP will be or `CREATING` during the creation. You can use [`DescribeEipAddresses`](describeeipaddresses.md) to query the status of the elastic IP. If the status changes from `Creating` to `Available`, it means that the elastic IP has been created successfully; `CREATE_FAILED` means the elastic IP has been created failed. Any operations on the elastic IPs are not allowed while creating.
  * A maximum of 100 elastic IPs can be created in one request.
examples:
- cmd: zeno bmc allocate-eip-addresses --eip-charge-type POSTPAID --zone-id SEL-A
  desc: 'Create a pay-as-you -go elastic IP with the simplest parameters in zone: SEL-A'
sdk:
  service: bmc
  version: '2026-02-01'
  action: AllocateEipAddresses
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: Zone ID to which the elastic IPs belong.
- name: eip-charge-type
  type: enum
  required: true
  sdk-field: eipChargeType
  description: |-
    Elastic IP pricing model .
    PREPAID: subscription
    POSTPAID: pay-as-you-go
  enum-values:
  - value: PREPAID
    desc: Subscription.
  - value: POSTPAID
    desc: Pay-as-you-go.
- name: eip-charge-prepaid
  type: object
  required: false
  sdk-field: eipChargePrepaid
  description: Details of the monthly subscription, including the purchase period, auto-renewal. It is required if the eipChargeType is PREPAID .
  object-schema:
  - name: period
    type: integer
    description: |-
      Period of subscription.
      Unit: month.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Resource group ID
    If the value is not passed in, the elastic IP will be put into the default resource group. If no authorized default resource group found, the request will fail.
- name: amount
  type: integer
  required: false
  sdk-field: amount
  description: Quantity of elastic IPs.
- name: netmask
  type: integer
  required: false
  sdk-field: netmask
  description: |-
    The purchased netmask.
    You can obtain the list of available netmasks from the DescribeEipAvailableResources API.
- name: marketing-options
  type: object
  required: false
  sdk-field: marketingOptions
  description: Information on marketing campaigns.
  object-schema:
  - name: discountCode
    type: string
    description: |-
      Promo Code.
      If no Promo Code exists, the final discount will not apply.
  - name: usePocVoucher
    type: boolean
    description: |-
      Whether to use POC voucher.
      If no POC voucher exists, the related creation will fail.
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    Bound tags when creating resources.
    Tag keys must be unique.--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: 'Tag key. Length limit: 1 to 128 characters.'
  - name: value
    type: string
    description: 'Tag value. Length limit: 1 to 128 characters.'
response:
- name: eipIdSet
  type: string-array
  description: |-
    ID list of elastic IPs.
    The returned ID list does not mean the creation has been completed.uery the status of the elastic IPs. If the status changes from Creating to Available , it means that the elastic IPs have been created successfully.
- name: orderNumber
  type: string
  description: |-
    Number of order.
    This parameter returns when eipChargeType is PREPAID .
