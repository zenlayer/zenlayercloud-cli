name: UnAssociateEipAddress
product: bmc
use: un-associate-eip-address
short: Unassigns elastic IPs from instances.
long: unbind an elastic IP from an instance.
examples:
- cmd: zeno bmc un-associate-eip-address --eip-id eipId1
  desc: Unbind an elastic IP from an instance
sdk:
  service: bmc
  version: '2026-02-01'
  action: UnAssociateEipAddress
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: |-
    ID of an elastic IP.
    To obtain the elastic IP ID, you can call DescribeEipAddresses and look for eipId in the response.
