name: ReleaseInstances
product: bmc
use: release-instances
short: Releases one or more instances
long: |-
  Release instances.
  **Note**

  * Only operations on instances in recycle bin are supported.
  * Batch operations are supported. The maximum number of instances in each request is 100.
examples:
- cmd: zeno bmc release-instances --instance-ids instanceId1 --instance-ids instanceId2
  desc: Release two instances
sdk:
  service: bmc
  version: '2026-02-01'
  action: ReleaseInstances
parameters:
- name: instance-ids
  type: string-array
  required: true
  sdk-field: instanceIds
  description: |-
    Instance ID(s).
    To obtain the instance IDs, you can call DescribeInstances and look for instanceId in the response. The maximum number of instances in each request is 100.
