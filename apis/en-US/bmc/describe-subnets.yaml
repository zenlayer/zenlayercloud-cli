name: DescribeSubnets
product: bmc
use: describe-subnets
short: Queries list of subnets
long: Query the details of one or more subnets. You can filter the query results with the subnet ID, VPC ID, zone ID and subnet name.
examples:
- cmd: zeno bmc describe-subnets --cidr-block 10.0.0.0/8 --page-size 10 --page-num 1
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeSubnets
parameters:
- name: subnet-ids
  type: string-array
  required: false
  sdk-field: subnetIds
  description: |-
    Subnet ID(s).
    The maximum number of subnets in each request is 100.
- name: subnet-name
  type: string
  required: false
  sdk-field: subnetName
  description: Name of subnet.
- name: cidr-block
  type: string
  required: false
  sdk-field: cidrBlock
  description: CIDR block of subnet.
- name: subnet-status
  type: enum
  required: false
  sdk-field: subnetStatus
  description: '[Status of subnet](../datastructure.md#subnetstatus).'
  enum-values:
  - value: CREATING
    desc: Creating.
  - value: CREATE_FAILED
    desc: Creating failed.
  - value: AVAILABLE
    desc: Available.
  - value: DELETING
    desc: Deleting.
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: Zone ID to which subnets belong.
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: VPC ID.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Resource group ID.
    If the value is null, then return all the subnets in the authorized resource groups.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
    Maximum value: 1000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
response:
- name: totalCount
  type: integer
  description: Number of subnets meeting the filtering conditions.
- name: dataSet
  type: object-array
  description: Information on subnets.
  array-style: json
  item-schema:
  - name: subnetId
    type: string
    description: Subnet ID.
  - name: subnetName
    type: string
    description: Subnet name.
  - name: zoneId
    type: string
    description: Zone ID to which the subnet belongs.
  - name: availableIpCount
    type: integer
    description: Quantity of available IPs in subnet.
  - name: cidrBlock
    type: string
    description: CIDR block of subnet.
  - name: subnetStatus
    type: string
    description: Status of subnet .
  - name: createTime
    type: string
    description: |-
      Creation time.
      Use UTC time according to the ISO8601 standard. Format: YYYY-MM-ddTHH:mm:ssZ .
  - name: vpcSubnetStatus
    type: string
    description: Status of subnets in VPC .
  - name: vpcId
    type: string
    description: VPC ID.
  - name: vpcName
    type: string
    description: VPC name.
  - name: resourceGroupId
    type: string
    description: Resource group ID.
  - name: resourceGroupName
    type: string
    description: Resource group name.
  - name: subnetInstanceSet
    type: object-array
    description: Information about instances in the subnet.
