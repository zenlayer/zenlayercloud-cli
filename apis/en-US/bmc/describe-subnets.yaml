name: DescribeSubnets
product: bmc
use: describe-subnets
short: Queries list of subnets.
long: query the details of one or more subnets. You can filter the query results with the subnet ID, VPC ID, zone ID and subnet name.
examples:
- cmd: zeno bmc describe-subnets --cidr-block 10.0.0.0/8 --page-size 10 --page-num 1
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeSubnets
parameters:
- name: subnet-ids
  type: string-array
  required: false
  sdk-field: subnetIds
  description: |-
    Subnet ID(s).
    The maximum number of subnets in each request is 100.
- name: subnet-name
  type: string
  required: false
  sdk-field: subnetName
  description: Name of subnet.
- name: cidr-block
  type: string
  required: false
  sdk-field: cidrBlock
  description: CIDR block of subnet.
- name: subnet-status
  type: enum
  required: false
  sdk-field: subnetStatus
  description: '[Status of subnet](../datastructure.md#subnetstatus).'
  enum-values:
  - value: CREATING
    desc: Creating.
  - value: CREATE_FAILED
    desc: Creating failed.
  - value: AVAILABLE
    desc: Available.
  - value: DELETING
    desc: Deleting.
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: Zone ID to which subnets belong.
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: VPC ID.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Resource group ID.
    If the value is null, then return all the subnets in the authorized resource groups.
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    Number of items in the current page result.
    Default value: 20;
    Maximum value: 1000.
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: Number of pages returned.
