name: DescribeAvailableIpv4Resources
product: bmc
use: describe-available-ipv4-resources
short: Queries available IPv4 CIDR blocks
long: Query available IPv4 CIDR blocks.
examples:
- cmd: zeno bmc describe-available-ipv4-resources --charge-type PREPAID
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeAvailableIpv4Resources
parameters:
- name: charge-type
  type: enum
  required: true
  sdk-field: chargeType
  description: |-
    CIDR block pricing model .
    PREPAID: subscription POSTPAID: pay-as-you-go
  enum-values:
  - value: PREPAID
    desc: Subscription.
  - value: POSTPAID
    desc: Pay-as-you-go.
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: Zone ID to which the CIDR blocks belong.
response:
- name: availableIpv4Resources
  type: object-array
  description: List of available IPv4 CIDR blocks.
  array-style: json
  item-schema:
  - name: zoneId
    type: string
    description: Zone ID to which the CIDR block belongs.
  - name: netmask
    type: integer
    description: Netmask.
  - name: sellStatus
    type: enum
    description: |-
      Status for sale.
      SELL : available for sale, stock > 10. SELL_SHORTAGE : available for sale, stock SOLD_OUT : sold out.
    enum-values:
    - value: SOLD_OUT
      desc: Sold out.
    - value: SELL_SHORTAGE
      desc: Available for sale, stock <= 10.
    - value: SELL
      desc: Available for sale, stock > 10.
  - name: cidrType
    type: enum
    description: CIDR block type.
    enum-values:
    - value: BGP
      desc: BGP IP.
    - value: Local
      desc: Local IP.
