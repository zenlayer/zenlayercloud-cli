name: InquiryPriceInstanceBandwidth
product: bmc
use: inquiry-price-instance-bandwidth
short: Queries the price of instance bandwidth
long: |-
  Query the price of modified instance bandwidth.
  **Note**

  * Use this API only when [`InternetChargeType`](../datastructure.md#internetchargetype) is `ByBandwidth`. When the target bandwidth > default bandwidth, a price returns.
  * Price structure varies by `instanceChargeType`.
examples:
- cmd: zeno bmc inquiry-price-instance-bandwidth --instance-id instanceId --bandwidth-out-mbps 100
  desc: Query the price of modified instance bandwidth
sdk:
  service: bmc
  version: '2026-02-01'
  action: InquiryPriceInstanceBandwidth
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: |-
    Instance ID.
    To obtain the instance ID, you can call DescribeInstances and look for instanceId in the response.
- name: bandwidth-out-mbps
  type: integer
  required: true
  sdk-field: bandwidthOutMbps
  description: Bandwidth size.
