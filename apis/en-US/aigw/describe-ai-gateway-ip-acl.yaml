name: DescribeAiGatewayIpAcl
product: aigw
use: describe-ai-gateway-ip-acl
short: Describe AI Gateway IP ACL
long: |-
  Describe AI gateway IP ACL
  **Notes**

  * For the authentication method of this API, refer to [Authentication](../../../api-introduction/instruction/authorization/README.md)
examples:
- cmd: zeno aigw describe-ai-gateway-ip-acl --gateway-uuid 1568676002379339603
  desc: Query the AI gateway IP ACL.
sdk:
  service: aigw
  version: '2026-04-14'
  action: DescribeAiGatewayIpAcl
parameters:
- name: gateway-uuid
  type: string
  required: true
  sdk-field: gatewayUuid
  description: Gateway UUID.
response:
- name: ipAclType
  type: enum
  description: IP ACL type (whitelist/blacklist).
  enum-values:
  - value: WHITE
    desc: IP Whitelist
  - value: BLACK
    desc: IP Blacklist
- name: ipAddresses
  type: string-array
  description: List of IP addresses.
- name: enabled
  type: boolean
  description: Whether enabled.
