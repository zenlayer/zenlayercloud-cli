name: DescribeAiMonthlyTotalCost
product: aigw
use: describe-ai-monthly-total-cost
short: Describe AI Monthly Total Cost
long: |-
  Describe AI monthly total cost
  **Notes**

  * For the authentication method of this API, refer to [Authentication](../../../api-introduction/instruction/authorization/README.md)
examples:
- cmd: zeno aigw describe-ai-monthly-total-cost --instance-ids 1652682429418183507 --month 2026-03
  desc: Query the total cost of the AI gateway in the specified month.
sdk:
  service: aigw
  version: '2026-04-14'
  action: DescribeAiMonthlyTotalCost
parameters:
- name: instance-ids
  type: string
  required: false
  sdk-field: instanceIds
  description: Instance ID.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Resource group ID.
- name: month
  type: string
  required: true
  sdk-field: month
  description: 'Month, format: "2026-2" or "2026-02".'
response:
- name: totalCost
  type: float
  description: Total monthly cost of the AI gateway.
