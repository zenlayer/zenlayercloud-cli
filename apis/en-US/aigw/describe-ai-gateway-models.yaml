name: DescribeAiGatewayModels
product: aigw
use: describe-ai-gateway-models
short: Describe AI Gateway Models
long: |-
  Describe AI gateway models
  **Notes**

  * For the authentication method of this API, refer to [Authentication](../../../api-introduction/instruction/authorization/README.md)
examples:
- cmd: zeno aigw describe-ai-gateway-models --gateway-uuid 1568676002379339603
  desc: Query the AI gateway models.
sdk:
  service: aigw
  version: '2026-04-14'
  action: DescribeAiGatewayModels
parameters:
- name: gateway-uuid
  type: string
  required: true
  sdk-field: gatewayUuid
  description: Gateway UUID.
response:
- name: models
  type: object-array
  description: List of associated models.
  array-style: json
  item-schema:
  - name: modelUuid
    type: string
    description: Model UUID.
  - name: modelName
    type: string
    description: Model name.
