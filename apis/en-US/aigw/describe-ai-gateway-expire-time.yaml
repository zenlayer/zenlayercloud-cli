name: DescribeAiGatewayExpireTime
product: aigw
use: describe-ai-gateway-expire-time
short: Describe AI Gateway Expire Time
long: |-
  Describe AI gateway expire time
  **Notes**

  * For the authentication method of this API, refer to [Authentication](../../../api-introduction/instruction/authorization/README.md)
examples:
- cmd: zeno aigw describe-ai-gateway-expire-time --gateway-uuid 1568676002379339603
  desc: Query the AI gateway expire time.
sdk:
  service: aigw
  version: '2026-04-14'
  action: DescribeAiGatewayExpireTime
parameters:
- name: gateway-uuid
  type: string
  required: true
  sdk-field: gatewayUuid
  description: Gateway UUID.
response:
- name: expireType
  type: enum
  description: Expiration type.
  enum-values:
  - value: LONG_LIVED
    desc: Long Lived
  - value: CUSTOM
    desc: Custom Expiration Time
- name: expireTime
  type: string
  description: Expiration time.
