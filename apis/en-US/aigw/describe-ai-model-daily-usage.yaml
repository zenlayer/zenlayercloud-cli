name: DescribeAiModelDailyUsage
product: aigw
use: describe-ai-model-daily-usage
short: Describe daily usage data of AI gateway
long: |-
  Describe daily usage data of AI gateway
  **Notes**

  * For the authentication method of this API, refer to [Authentication](../../../api-introduction/instruction/authorization/README.md)
examples:
- cmd: zeno aigw describe-ai-model-daily-usage --instance-ids 1652682429418183507 --month 2026-06
  desc: Describe daily usage data of AI gateway.
sdk:
  service: aigw
  version: '2026-04-14'
  action: DescribeAiModelDailyUsage
parameters:
- name: instance-ids
  type: string
  required: false
  sdk-field: instanceIds
  description: Instance Uuid.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: ResourceGroup Uuid.
- name: month
  type: string
  required: true
  sdk-field: month
  description: 'Month, format: "2026-2" or "2026-02".'
response:
- name: metric
  type: object-array
  description: Daily usage data list.
  array-style: json
  item-schema:
  - name: date
    type: string
    description: 'Date, format: yyyy-MM-dd.'
  - name: model_usage
    type: object-array
    description: List of usage for each model.
    array-style: json
    item-schema:
    - name: modelName
      type: string
      description: Model Name.
    - name: promptMissedTokens
      type: integer
      description: The number of input tokens that did not hit the cache.
    - name: completionTokens
      type: integer
      description: The number of output tokens.
    - name: cachedTokens
      type: integer
      description: The number of tokens that hit the cache.
    - name: cacheCreationInputTokens
      type: integer
      description: The number of tokens created by the cache (Anthropic model).
    - name: reasoningTokens
      type: integer
      description: The number of Inference token.
