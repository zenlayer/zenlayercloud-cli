name: CreateAiGateway
product: aigw
use: create-ai-gateway
short: Create AI Gateway
long: |-
  Create AI gateway
  **Notes**

  * For the authentication method of this API, refer to [Authentication](../../../api-introduction/instruction/authorization/README.md)
examples:
- cmd: zeno aigw create-ai-gateway --gateway-name AI-Gateway-01 --token-limit 1000 --expire-type CUSTOM --expire-time 2025-12-31T23:59:59Z --resource-group-id 47e7f7e0-d7e9-4b28-b4b2-20da9439a294 --model-access UNLIMITED
  desc: Create an AI gateway.
sdk:
  service: aigw
  version: '2026-04-14'
  action: CreateAiGateway
parameters:
- name: model-uuids
  type: string-array
  required: false
  sdk-field: modelUuids
  description: |-
    List of model UUIDs to associate.
    Required when modelAccess is LIMITED.
- name: gateway-name
  type: string
  required: true
  sdk-field: gatewayName
  description: |-
    AI gateway name.
    Length: 2 to 63 characters.
    Only letters, digits, hyphens (-), and periods (.) are allowed.
    Must start and end with a letter or digit.
- name: token-limit
  type: integer
  required: true
  sdk-field: tokenLimit
  description: Token quota.
- name: expire-type
  type: enum
  required: true
  sdk-field: expireType
  description: |-
    Token expiration policy type.
    Valid values: LONG_LIVED, CUSTOM.
  enum-values:
  - value: LONG_LIVED
    desc: Long Lived
  - value: CUSTOM
    desc: Custom Expiration Time
- name: expire-time
  type: string
  required: false
  sdk-field: expireTime
  description: |-
    Token expiration time.
    Required when expireType is CUSTOM.
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: Resource group ID where the AI gateway will be placed after creation. If not specified, the default resource group is used.
- name: model-access
  type: enum
  required: true
  sdk-field: modelAccess
  description: |-
    Model access permission.
    Valid values: UNLIMITED, LIMITED.
  enum-values:
  - value: UNLIMITED
    desc: There is no restriction on models; all currently listed models can be used
  - value: LIMITED
    desc: Due to restrictions, only associated models can be used
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    Tags associated when creating the AI gateway.
    Note: Associated tag keys must not be duplicated.--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: |-
      Tag key.
      Length limit: 1 to 64 characters.
  - name: value
    type: string
    description: |-
      Tag value.
      Length limit: 1 to 64 characters.
response:
- name: gatewayUuid
  type: string
  description: AI gateway UUID.
- name: token
  type: string
  description: AI gateway token.
