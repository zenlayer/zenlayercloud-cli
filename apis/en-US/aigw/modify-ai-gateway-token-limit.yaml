name: ModifyAiGatewayTokenLimit
product: aigw
use: modify-ai-gateway-token-limit
short: Modify AI Gateway Token Limit
long: |-
  Modify AI gateway token limit
  **Notes**

  * For the authentication method of this API, refer to [Authentication](../../../api-introduction/instruction/authorization/README.md)
examples:
- cmd: zeno aigw modify-ai-gateway-token-limit --gateway-uuid 1568676002379339603 --token-limit 2000
  desc: Modify the AI gateway token limit.
sdk:
  service: aigw
  version: '2026-04-14'
  action: ModifyAiGatewayTokenLimit
parameters:
- name: gateway-uuid
  type: string
  required: true
  sdk-field: gatewayUuid
  description: Gateway UUID.
- name: token-limit
  type: integer
  required: true
  sdk-field: tokenLimit
  description: Token limit (access limit).
