name: DescribeBandwidthClusters
product: traffic
use: describe-bandwidth-clusters
short: 查询共享带宽包列表
long: 查询一个或多个共享带宽包的信息。用户可以根据共享带宽包ID、名称或者城市名称等条件来查询共享带宽包的详细信息。
examples:
- cmd: zeno traffic describe-bandwidth-clusters --page-num 1 --page-size 1
  desc: 分页查询共享带宽包列表
sdk:
  service: traffic
  version: '2024-03-26'
  action: DescribeBandwidthClusters
parameters:
- name: bandwidth-cluster-ids
  type: string-array
  required: false
  sdk-field: bandwidthClusterIds
  description: |-
    共享带宽包ID。
    最多支持100个ID查询。
- name: bandwidth-cluster-name
  type: string
  required: false
  sdk-field: bandwidthClusterName
  description: |-
    共享带宽包显示名称。
    支持模糊匹配。
- name: city-name
  type: string
  required: false
  sdk-field: cityName
  description: 共享带宽包所包含的城市名称。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页数。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID过滤。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 共享带宽包结果集。
  array-style: json
  item-schema:
  - name: bandwidthClusterId
    type: string
    description: 共享带宽包唯一ID。
  - name: bandwidthClusterName
    type: string
    description: 共享带宽包显示名称。
  - name: networkType
    type: enum
    description: |-
      IP 网络类型。
      请使用`ipNetworkType`。
    enum-values:
    - value: BGP
      desc: BGP。
    - value: Cogent
      desc: Cogent。
    - value: CN2
      desc: 回国优化线路。
    - value: CMI
      desc: 中国移动。
    - value: CUG
      desc: 中国联通。
    - value: CTG
      desc: 中国电信。
  - name: networkLineType
    type: enum
    description: 网络线路类型。
    enum-values:
    - value: PremiumBGP
      desc: |-
        精品 BGP。
        高性能网络。
    - value: StandardBGP
      desc: |-
        标准 BGP。
        通用网络，成本优化。
    - value: CN2
      desc: 回国优化线路。
    - value: CMI
      desc: 中国移动。
    - value: CUG
      desc: 中国联通。
    - value: CTG
      desc: 中国电信。
  - name: product
    type: enum
    description: 产品范围。
    enum-values:
    - value: AllProduct
      desc: |-
        全算力产品范围。
        该范围可能会在未来移除。
    - value: BMC
      desc: 裸金属产品范围。
    - value: ZEC
      desc: 弹性算力产品凡范围。
    - value: VM
      desc: 虚拟机产品范围。
    - value: OFFLINE
      desc: 线下产品范围。
  - name: areaCode
    type: string
    description: 区域代号。
  - name: internetChargeType
    type: enum
    description: 带宽计费方式。
    enum-values:
    - value: MonthlyPercent95Bandwidth
      desc: 月95带宽计费。
    - value: DayPeakBandwidth
      desc: 日峰值带宽计费。
  - name: commitBandwidthMbps
    type: integer
    description: |-
      保底带宽。
      单位：Mbps。
  - name: location
    type: string
    description: 所属区域。
  - name: createTime
    type: string
    description: |-
      创建时间。
      格式为：YYYY-MM-ddTHH:mm:ssZ。
  - name: resourceNumber
    type: integer
    description: 带宽包内的资源数量。
  - name: cities
    type: object-array
    description: 城市信息。
  - name: tags
    type: object
    description: 共享带宽包关联的标签。
  - name: resourceGroup
    type: object
    description: 共享带宽包所属的资源组。
