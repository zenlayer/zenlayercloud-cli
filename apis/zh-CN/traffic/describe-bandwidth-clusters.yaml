name: DescribeBandwidthClusters
product: traffic
use: describe-bandwidth-clusters
short: 查询共享带宽包列表
long: 查询一个或多个共享带宽包的信息。用户可以根据共享带宽包ID、名称或者城市名称等条件来查询共享带宽包的详细信息。
examples:
- cmd: zeno traffic describe-bandwidth-clusters --page-num 1 --page-size 1
  desc: 分页查询共享带宽包列表
sdk:
  service: traffic
  version: '2024-03-26'
  action: DescribeBandwidthClusters
parameters:
- name: bandwidth-cluster-ids
  type: string-array
  required: false
  sdk-field: bandwidthClusterIds
  description: |-
    共享带宽包ID。
    最多支持100个ID查询。
- name: bandwidth-cluster-name
  type: string
  required: false
  sdk-field: bandwidthClusterName
  description: |-
    共享带宽包显示名称。
    支持模糊匹配。
- name: city-name
  type: string
  required: false
  sdk-field: cityName
  description: 共享带宽包所包含的城市名称。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页数。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID过滤。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 共享带宽包结果集。
