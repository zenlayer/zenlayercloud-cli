name: DescribeBandwidthClusterResources
product: traffic
use: describe-bandwidth-cluster-resources
short: 查询共享带宽包里的资源
long: 查询一个共享带宽包里的资源。
examples:
- cmd: zeno traffic describe-bandwidth-cluster-resources --bandwidth-cluster-id <bandwidthClusterId>
  desc: 查询共享带宽包的资源。
sdk:
  service: traffic
  version: '2024-03-26'
  action: DescribeBandwidthClusterResources
parameters:
- name: bandwidth-cluster-id
  type: string
  required: true
  sdk-field: bandwidthClusterId
  description: 共享带宽包ID。
response:
- name: resources
  type: object-array
  description: 共享带宽包里的资源信息。
  array-style: json
  item-schema:
  - name: resourceId
    type: string
    description: 资源ID。
  - name: resourceType
    type: enum
    description: 资源类型。
    enum-values:
    - value: VM_INSTANCE
      desc: 虚拟机实例。
    - value: BMC_INSTANCE
      desc: 裸金属实例。
    - value: ZEC_EIP_INSTANCE
      desc: 弹性算力IP。
    - value: ZEC_IPV6_INSTANCE
      desc: 弹性算力IPv6。
    - value: OTHERS
      desc: 其他资源。
- name: totalCount
  type: integer
  description: 共享带宽包里的资源数量。
