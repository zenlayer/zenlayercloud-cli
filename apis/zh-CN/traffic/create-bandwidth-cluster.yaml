name: CreateBandwidthCluster
product: traffic
use: create-bandwidth-cluster
short: 创建共享带宽包
long: 创建一个共享带宽包。
examples:
- cmd: zencli traffic create-bandwidth-cluster --area-code SHA --charge-type POSTPAID
    --commit-bandwidth-mbps 1000 --network-type CMI --internet-charge-type MonthlyPercent95Bandwidth
    --name sample
  desc: 在上海（SHA) 开通中国移动线路的共享带宽包， 保底设置为1G。
sdk:
  service: traffic
  version: '2024-03-26'
  action: CreateBandwidthCluster
parameters:
- name: area-code
  type: string
  required: true
  sdk-field: areaCode
  description: |-
    共享带宽包所属地域。
    具体地域信息可以查询[DescribeBandwidthClusterAreas](../bandwidth-cluster/describebandwidthclusterareas.md)中的areaCode获取。
- name: commit-bandwidth-mbps
  type: integer
  required: false
  sdk-field: commitBandwidthMbps
  description: |-
    保底带宽值。
    单位: Mbps。
- name: network-line-type
  type: enum
  required: false
  sdk-field: networkLineType
  description: |-
    IP网络类型。
    城市共享带宽包该字段必填。
  enum-values:
  - PremiumBGP
  - StandardBGP
  - CN2
  - CMI
  - CUG
  - CTG
- name: network-type
  type: enum
  required: false
  sdk-field: networkType
  description: |-
    IP网络类型。
    请使用networkLineType代替。
  deprecated: true
  enum-values:
  - BGP
  - Cogent
  - CN2
  - CMI
  - CUG
  - CTG
- name: internet-charge-type
  type: enum
  required: true
  sdk-field: internetChargeType
  description: |-
    带宽计费方式。
    默认为月95计费，如果需要日峰值计费，请联系Support开通相关权限。
  enum-values:
  - MonthlyPercent95Bandwidth
  - DayPeakBandwidth
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    带宽包显示名称。
    如果未指定，默认会使用地域名称命名。
- name: product
  type: enum
  required: false
  sdk-field: product
  description: 城市带宽包所属的产品线范围。
  enum-values:
  - AllProduct
  - BMC
  - ZEC
  - VM
  - OFFLINE
