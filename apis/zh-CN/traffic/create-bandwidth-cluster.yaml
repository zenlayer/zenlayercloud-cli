name: CreateBandwidthCluster
product: traffic
use: create-bandwidth-cluster
short: 创建共享带宽包
long: |-
  创建一个共享带宽包。
  **注意事项**

  * 如果没有共享带宽包权限，请联系 Zenlayer Support 获取权限。
examples:
- cmd: zeno traffic create-bandwidth-cluster --area-code SHA --charge-type POSTPAID --commit-bandwidth-mbps 1000 --network-type CMI --internet-charge-type MonthlyPercent95Bandwidth --name sample
  desc: 在上海（SHA) 开通中国移动线路的共享带宽包， 保底设置为1G。
sdk:
  service: traffic
  version: '2024-03-26'
  action: CreateBandwidthCluster
parameters:
- name: area-code
  type: string
  required: true
  sdk-field: areaCode
  description: |-
    共享带宽包所属地域。
    具体地域信息可以查询[DescribeBandwidthClusterAreas](../bandwidth-cluster/describebandwidthclusterareas.md)中的areaCode获取。
- name: commit-bandwidth-mbps
  type: integer
  required: false
  sdk-field: commitBandwidthMbps
  description: |-
    保底带宽值。
    单位: Mbps。
- name: network-line-type
  type: enum
  required: false
  sdk-field: networkLineType
  description: |-
    IP网络类型。
    城市共享带宽包该字段必填。
  enum-values:
  - value: PremiumBGP
    desc: |-
      精品 BGP。
      高性能网络。
  - value: StandardBGP
    desc: |-
      标准 BGP。
      通用网络，成本优化。
  - value: CN2
    desc: 回国优化线路。
  - value: CMI
    desc: 中国移动。
  - value: CUG
    desc: 中国联通。
  - value: CTG
    desc: 中国电信。
- name: network-type
  type: enum
  required: false
  sdk-field: networkType
  description: |-
    IP网络类型。
    请使用networkLineType代替。
  deprecated: true
  enum-values:
  - value: BGP
    desc: BGP。
  - value: Cogent
    desc: Cogent。
  - value: CN2
    desc: 回国优化线路。
  - value: CMI
    desc: 中国移动。
  - value: CUG
    desc: 中国联通。
  - value: CTG
    desc: 中国电信。
- name: internet-charge-type
  type: enum
  required: true
  sdk-field: internetChargeType
  description: |-
    带宽计费方式。
    默认为月95计费，如果需要日峰值计费，请联系Support开通相关权限。
  enum-values:
  - value: MonthlyPercent95Bandwidth
    desc: 月95带宽计费。
  - value: DayPeakBandwidth
    desc: 日峰值带宽计费。
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    带宽包显示名称。
    如果未指定，默认会使用地域名称命名。
- name: product
  type: enum
  required: false
  sdk-field: product
  description: 城市带宽包所属的产品线范围。
  enum-values:
  - value: AllProduct
    desc: |-
      全算力产品范围。
      该范围可能会在未来移除。
  - value: BMC
    desc: 裸金属产品范围。
  - value: ZEC
    desc: 弹性算力产品凡范围。
  - value: VM
    desc: 虚拟机产品范围。
  - value: OFFLINE
    desc: 线下产品范围。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 创建后共享带宽包所在的资源组ID，如不指定则放入默认资源组。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: 创建共享带宽包时关联的标签。--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: orderNumber
  type: string
  description: 订单编号。
- name: bandwidthClusterId
  type: string
  description: 创建的共享带宽包ID。
