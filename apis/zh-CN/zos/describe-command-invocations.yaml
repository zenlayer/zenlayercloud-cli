name: DescribeCommandInvocations
product: zos
use: describe-command-invocations
short: 查询执行记录列表
long: 查询执行记录列表。
examples:
- cmd: zeno zos describe-command-invocations --invocation-ids <invocationId>
  desc: 根据执行记录ID查询执行记录。
sdk:
  service: zos
  version: '2025-10-10'
  action: DescribeCommandInvocations
parameters:
- name: command-ids
  type: string-array
  required: false
  sdk-field: commandIds
  description: 根据命令ID进行筛选。
- name: invocation-ids
  type: string-array
  required: false
  sdk-field: invocationIds
  description: 根据执行记录ID筛选。
- name: instance-ids
  type: string-array
  required: false
  sdk-field: instanceIds
  description: 根据执行的实例ID筛选。
- name: invocation-statuses
  type: string-array
  required: false
  sdk-field: invocationStatuses
  description: 根据执行的总状态筛选。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小，默认为20，最大为10000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
response:
- name: dataSet
  type: object-array
  description: 命令执行记录列表。
  array-style: json
  item-schema:
  - name: invocationId
    type: string
    description: 执行ID。
  - name: commandId
    type: string
    description: 命令的ID。
  - name: commandName
    type: string
    description: 命令的名称。
  - name: commandType
    type: enum
    description: 命令的类型。
    enum-values:
    - value: SHELL
      desc: 在 Linux 实例中运行的 Shell 脚本。
    - value: POWERSHELL
      desc: 在 Windows 中运行的 PowerShell 类型。
    - value: BAT
      desc: 在 Windows 中运行的 Bat 脚本。
  - name: content
    type: string
    description: 执行的内容。
  - name: timeout
    type: integer
    description: 超时时间。
  - name: createTime
    type: string
    description: 命令执行的创建时间。
  - name: invocationStatus
    type: enum
    description: 命令的执行的总执行状态。
    enum-values:
    - value: Pending
      desc: |-
        任务还未执行。
        所有实例任务状态均处于`Pending`。
    - value: Running
      desc: |-
        任务执行中。
        所有实例任务状态均处于`Running`。
    - value: PartialFailed
      desc: |-
        部分失败。
        所有实例执行完毕，且有部分实例任务状态成功，有部分失败未失败。
    - value: Failed
      desc: |-
        全部失败。
        所有实例执行完毕，所有实例执行状态均为失败。
    - value: Success
      desc: |-
        全部成功。
        所有实例执行完毕，所有实例执行状态均为成功。
  - name: invocationInstances
    type: object-array
    description: 命令执行实例列表。
    array-style: json
    item-schema:
    - name: instanceId
      type: string
      description: 执行ID。
    - name: instanceName
      type: string
      description: 实例的名称。
    - name: instanceExist
      type: boolean
      description: 实例是否存在。
    - name: taskStatus
      type: enum
      description: 实例执行任务的状态。
      enum-values:
      - value: Pending
        desc: 等待执行命令。
      - value: Running
        desc: 正在执行命令。
      - value: Timeout
        desc: 执行命令超时。
      - value: Failed
        desc: 执行命令完，退出码为非0。
      - value: Success
        desc: 执行命令完，退出码为0。
      - value: Error
        desc: |-
          命令无法执行。
          由于系统错误或实例未运行等。
    - name: exitCode
      type: integer
      description: 命令进程的退出代码。
    - name: errorCode
      type: enum
      description: 命令执行失败原因的代号。
      enum-values:
      - value: InstanceNotExists
        desc: 实例不存在。
      - value: InstanceInstanceState
        desc: 实例状态非运行。
      - value: SystemError
        desc: |-
          系统错误。
          命令未执行。
      - value: CommandPlatformInvalid
        desc: 命令类型无法在实例上执行。
      - value: ExecutionTimeout
        desc: 脚本执行超时。
      - value: ExecutionExitNoneZero
        desc: 脚本执行，退出码为非0。
    - name: output
      type: string
      description: 命令执行的标准输出(stdout)。
    - name: outputError
      type: string
      description: 命令执行的标准错误输出(stderr)。
    - name: execStartTime
      type: string
      description: 命令执行的开始时间。
    - name: execEndTime
      type: string
      description: 命令执行的结束时间。
- name: totalCount
  type: integer
  description: 匹配条件的命令执行记录总数。
