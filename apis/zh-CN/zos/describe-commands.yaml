name: DescribeCommands
product: zos
use: describe-commands
short: 查询命令列表
long: 查询命令列表。
examples:
- cmd: zeno zos describe-commands
  desc: 查询命令列表。
sdk:
  service: zos
  version: '2025-10-10'
  action: DescribeCommands
parameters:
- name: command-ids
  type: string-array
  required: false
  sdk-field: commandIds
  description: |-
    根据命令ID进行筛选。
    最长不超过100个。
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    根据命令名称进行筛选。
    该字段支持模糊搜索。
- name: types
  type: string-array
  required: false
  sdk-field: types
  description: 根据命令类型进行筛选。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小，默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: dataSet
  type: object-array
  description: 命令列表。
  array-style: json
  item-schema:
  - name: commandId
    type: string
    description: 命令ID。
  - name: name
    type: string
    description: 命令的名称。
  - name: description
    type: string
    description: 命令的描述信息。
  - name: content
    type: string
    description: 命令的内容。
  - name: type
    type: enum
    description: 命令的类型。
    enum-values:
    - value: SHELL
      desc: 在 Linux 实例中运行的 Shell 脚本。
    - value: POWERSHELL
      desc: 在 Windows 中运行的 PowerShell 类型。
    - value: BAT
      desc: 在 Windows 中运行的 Bat 脚本。
  - name: createTime
    type: string
    description: 命令的创建时间。
  - name: latestInvocationTime
    type: string
    description: 最近执行的时间。
  - name: tags
    type: object
    description: 指令的标签。
  - name: resourceGroup
    type: object
    description: 指令所属的资源组。
- name: totalCount
  type: integer
  description: 匹配条件的命令总数。
