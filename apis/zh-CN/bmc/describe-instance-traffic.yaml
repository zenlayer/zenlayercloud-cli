name: DescribeInstanceTraffic
product: bmc
use: describe-instance-traffic
short: 查询实例流量信息
long: |-
  查询实例指定时间段内的流量信息。
  **注意事项**

  * 开始时间和结束时间的跨度不能超过一天。
  * 只能查询30天内的流量数据。
examples:
- cmd: zeno bmc describe-instance-traffic --instance-id instanceId --start-time 2023-01-01T00:00:00Z --end-time 2023-01-01T23:59:59Z
  desc: 查询实例一天内的流量数据。
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeInstanceTraffic
parameters:
- name: start-time
  type: string
  required: true
  sdk-field: startTime
  description: |-
    查询开始时间。
    按照ISO8601标准表示，并且使用UTC时间。格式为：YYYY-MM-ddTHH:mm:ssZ。
- name: end-time
  type: string
  required: true
  sdk-field: endTime
  description: |-
    查询结束时间。
    按照ISO8601标准表示，并且使用UTC时间。格式为：YYYY-MM-ddTHH:mm:ssZ。
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 实例ID。
response:
- name: dataList
  type: object-array
  description: 带宽数据列表。
- name: in95
  type: integer
  description: 入口带宽95值。
- name: in95Time
  type: string
  description: |-
    入口带宽95值时间。
    格式为：YYYY-MM-ddTHH:mm:ssZ。
- name: inAvg
  type: integer
  description: 入口带宽平均值。
- name: inMax
  type: integer
  description: 入口带宽最大值。
- name: inMin
  type: integer
  description: 入口带宽最小值。
- name: inTotal
  type: integer
  description: 入口带宽总流量。
- name: out95
  type: integer
  description: 出口带宽95值。
- name: out95Time
  type: string
  description: |-
    出口带宽95值时间。
    格式为：YYYY-MM-ddTHH:mm:ssZ。
- name: outAvg
  type: integer
  description: 出口带宽平均值。
- name: outMax
  type: integer
  description: 出口带宽最大值。
- name: outMin
  type: integer
  description: 出口带宽最小值。
- name: outTotal
  type: integer
  description: 出口带宽总流量。
- name: maxBandwidth95ValueMbps
  type: float
  description: 最大带宽95值。单位：Mbps。
- name: totalUnit
  type: string
  description: 总流量单位。例如：B。
- name: unit
  type: string
  description: 带宽值单位。例如：bps。
