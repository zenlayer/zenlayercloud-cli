name: DescribeInstanceTraffic
product: bmc
use: describe-instance-traffic
short: 查询实例流量信息
long: 查询实例指定时间段内的流量信息。
examples:
- cmd: zeno bmc describe-instance-traffic --instance-id instanceId --start-time 2023-01-01T00:00:00Z --end-time 2023-01-01T23:59:59Z
  desc: 查询实例一天内的流量数据。
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeInstanceTraffic
parameters:
- name: start-time
  type: string
  required: true
  sdk-field: startTime
  description: |-
    查询开始时间。
    按照ISO8601标准表示，并且使用UTC时间。格式为：YYYY-MM-ddTHH:mm:ssZ。
- name: end-time
  type: string
  required: true
  sdk-field: endTime
  description: |-
    查询结束时间。
    按照ISO8601标准表示，并且使用UTC时间。格式为：YYYY-MM-ddTHH:mm:ssZ。
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 实例ID。
