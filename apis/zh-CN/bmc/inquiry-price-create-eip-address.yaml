name: InquiryPriceCreateEipAddress
product: bmc
use: inquiry-price-create-eip-address
short: 创建Elastic IP询价
long: 创建EIP询价。
examples:
- cmd: zeno bmc inquiry-price-create-eip-address --zone-id SEL-A --eip-charge-type POSTPAID
  desc: EIP后付费询价
sdk:
  service: bmc
  version: '2026-02-01'
  action: InquiryPriceCreateEipAddress
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: EIP所属的可用区ID。
- name: eip-charge-type
  type: enum
  required: true
  sdk-field: eipChargeType
  description: |-
    付费类型。
    PREPAID：预付费，即包年包月。
    POSTPAID：后付费。
  enum-values:
  - value: PREPAID
    desc: 预付费。
  - value: POSTPAID
    desc: 后付费。即按量付费。
- name: eip-charge-prepaid
  type: object
  required: false
  sdk-field: eipChargePrepaid
  description: |-
    预付费模式。
    即包年包月相关参数设置。
    通过该参数可以指定包年包月实例的购买时长等属性。
    若指定实例的付费模式为预付费则该参数必传。
  object-schema:
  - name: period
    type: integer
    description: |-
      购买实例的时长。
      单位：月。
- name: amount
  type: integer
  required: false
  sdk-field: amount
  description: 指定创建EIP的数量。
- name: netmask
  type: integer
  required: false
  sdk-field: netmask
  description: |-
    购买的掩码。
    可以从DescribeEipAvailableResources接口中获取可用的掩码列表。
response:
- name: eipPrice
  type: object
  description: EIP价格。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      预付费的折扣价。
      预付费模式使用，后付费该值为 null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：
      HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: 阶梯用量的开始。
    - name: stepEnd
      type: float
      description: 阶梯用量的结束。
    - name: unitPrice
      type: float
      description: |-
        当前阶梯的单元原始价格。
        后付费模式使用。
    - name: discountUnitPrice
      type: float
      description: |-
        当前阶梯的单元折后价格。
        后付费模式使用。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
