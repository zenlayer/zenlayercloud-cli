name: CreateByoip
product: bmc
use: create-byoip
short: 创建一个BYO IP
long: |-
  创建一个BYO IP。
  **注意事项**
  * 本接口为异步接口，当创建Byoip请求下发成功后会返回`byoipId`和`cidrBlockId`，此时创建Byoip操作并未立即完成。
  * 入参 `cidr` 只支持 IPv4，掩码 22-24
examples:
- cmd: zeno bmc create-byoip --ip-type IPV4 --cidr 22.22.22.0/24 --asn 33322 --public-virtual-interface-id <publicVirtualInterfaceId>
  desc: 创建BYOIP
sdk:
  service: bmc
  version: '2026-02-01'
  action: CreateByoip
parameters:
- name: ip-type
  type: enum
  required: true
  sdk-field: ipType
  description: IP 类型。
  enum-values:
  - value: IPV4
    desc: IPv4。
  - value: IPV6
    desc: IPv6。
- name: cidr
  type: string
  required: true
  sdk-field: cidr
  description: 宣告IPv4或IPv6地址段。
- name: asn
  type: integer
  required: true
  sdk-field: asn
  description: ASN号。
- name: public-virtual-interface-id
  type: string
  required: true
  sdk-field: publicVirtualInterfaceId
  description: 公网VLAN 唯一标识。
response:
- name: byoipId
  type: string
  description: 创建成功的 BYOIP ID。
- name: cidrBlockId
  type: string
  description: 创建成功的 CIDR ID。
