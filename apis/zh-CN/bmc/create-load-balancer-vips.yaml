name: CreateLoadBalancerVIPs
product: bmc
use: create-load-balancer-vips
short: 创建负载均衡的VIP
long: 创建负载均衡的VIP。
examples:
- cmd: zeno bmc create-load-balancer-vips --load-balancer-id xxxx --count 2
  desc: LoadBalancer下创建VIP。
sdk:
  service: bmc
  version: '2026-02-01'
  action: CreateLoadBalancerVIPs
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: 负载均衡的ID。
- name: count
  type: integer
  required: true
  sdk-field: count
  description: 额外创建IP数量。
response:
- name: orderNumber
  type: string
  description: 订单号。若LB是VIP6类型则返回空
- name: vipIdSet
  type: string-array
  description: IP ID集合。
