name: UnAssociateEipAddress
product: bmc
use: un-associate-eip-address
short: 解绑Elastic IP
long: 将EIP上已绑定的机器实例解绑。
examples:
- cmd: zeno bmc un-associate-eip-address --eip-id eipId1
  desc: EIP解绑机器实例
sdk:
  service: bmc
  version: '2026-02-01'
  action: UnAssociateEipAddress
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: |-
    一个EIP ID。
    可通过DescribeEipAddresses接口返回值中的eipId获取。
