name: DescribeLoadBalancers
product: bmc
use: describe-load-balancers
short: 查询一台或多台指定负载均衡实例的信息
long: 查询一台或多台指定负载均衡实例的信息。用户可以根据负载均衡实例的ID、可用区等信息来搜索负载均衡实例的信息。
examples:
- cmd: zeno bmc describe-load-balancers --load-balancer-ids xxxx
  desc: 根据ID查询负载均衡实例的信息。
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeLoadBalancers
parameters:
- name: load-balancer-ids
  type: string-array
  required: false
  sdk-field: loadBalancerIds
  description: 负载均衡实例ID集合。
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: 可用区 ID。
- name: load-balancer-name
  type: string
  required: false
  sdk-field: loadBalancerName
  description: 负载均衡实例的名称。支持模糊搜索。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小。默认为20，最大为1000。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 资源组ID。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～128字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～128字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的LB总数量。
- name: dataSet
  type: object-array
  description: LoadBalancer集合。
  array-style: json
  item-schema:
  - name: loadBalancerId
    type: string
    description: LoadBalancerId唯一ID。
  - name: zoneId
    type: string
    description: LoadBalancer所属的可用区ID。
  - name: loadBalancerName
    type: string
    description: LoadBalancer的名称。
  - name: specName
    type: string
    description: 规格名称。
  - name: vipList
    type: object-array
    description: LoadBalancer的VIP集合。
    array-style: json
    item-schema:
    - name: vipId
      type: string
      description: VIP的ID。
    - name: ipAddress
      type: string
      description: IP地址。
    - name: type
      type: string
      description: |-
        IP类型
        DEFAULT、EXTRA
    - name: status
      type: string
      description: 状态。
  - name: chargeType
    type: string
    description: 计费方式。
  - name: period
    type: integer
    description: 周期。
  - name: createTime
    type: string
    description: 创建时间。按照`ISO8601`标准表示，并且使用`UTC`时间。格式为：`YYYY-MM-ddTHH:mm:ssZ`。
  - name: expiredTime
    type: string
    description: 过期时间。
  - name: status
    type: string
    description: LoadBalancer的状态。
  - name: resourceGroupId
    type: string
    description: 资源组ID。
  - name: resourceGroupName
    type: string
    description: 资源组名称。
  - name: masterIp
    type: string
    description: 主IP。
  - name: backupIp
    type: string
    description: 备IP。
  - name: ipType
    type: string
    description: IPv4。
  - name: bandwidth
    type: integer
    description: 带宽。
  - name: isWorking
    type: boolean
    description: 是否工作。
  - name: listenerList
    type: object-array
    description: 监听器集合。
    array-style: json
    item-schema:
    - name: loadBalancerId
      type: string
      description: LoadBalancerId唯一ID。
    - name: listenerId
      type: string
      description: Listener的ID。
    - name: listenerName
      type: string
      description: Listener的名称。
    - name: status
      type: string
      description: 状态。
    - name: port
      type: string
      description: 监听端口。
    - name: protocol
      type: string
      description: 监听协议。
    - name: backendProtocol
      type: string
      description: 后段服务器协议。
    - name: scheduler
      type: string
      description: 调度算法。
    - name: kind
      type: enum
      description: 流量转发模式。
      enum-values:
      - value: DR
        desc: 直接路由（Direct Routing)。
      - value: FNAT
        desc: 全局网络地址转换(Full NAT)。
    - name: healthCheck
      type: object
      description: 健康检查。
      object-schema:
      - name: checkEnabled
        type: boolean
        description: 检查开关。
      - name: checkType
        type: string
        description: 检查类型。
      - name: checkConnectTimeout
        type: integer
        description: 连接时间。
      - name: checkRetry
        type: integer
        description: 重试次数。
      - name: checkDelayBeforeRetry
        type: integer
        description: 超时时间。
      - name: checkIntervalTime
        type: integer
        description: 重试间隔。
      - name: checkPort
        type: integer
        description: 检查端口。
      - name: httpVersion
        type: string
        description: Http版本。
      - name: httpCheckPath
        type: string
        description: Http地址。
      - name: httpCheckDigest
        type: integer
        description: Http摘要认证。
      - name: httpCode
        type: integer
        description: 状态码。
      - name: miscCheckPath
        type: string
        description: Misc地址。
      - name: miscTimeout
        type: integer
        description: Misc超时时间。
    - name: notify
      type: object
      description: 通知地址。
      object-schema:
      - name: enable
        type: boolean
        description: 通知开关。
      - name: apiAddress
        type: string
        description: 地址。
    - name: createTime
      type: string
      description: 创建时间。按照`ISO8601`标准表示，并且使用`UTC`时间。格式为：`YYYY-MM-ddTHH:mm:ssZ`。
  - name: backendList
    type: object-array
    description: 后端服务器集合。
    array-style: json
    item-schema:
    - name: listenerId
      type: string
      description: Listener的ID。
    - name: backendId
      type: string
      description: Backend的ID。
    - name: backendName
      type: string
      description: Backend的名称。
    - name: status
      type: string
      description: 状态。
    - name: port
      type: string
      description: 端口。
    - name: weight
      type: integer
      description: 权重。
    - name: instanceId
      type: string
      description: 实例ID。
    - name: instanceType
      type: enum
      description: 实例类型。
      enum-values:
      - value: BM
        desc: 裸金属
      - value: VM
        desc: VM
    - name: instanceName
      type: string
      description: 实例名称。
    - name: createTime
      type: string
      description: 创建时间。按照`ISO8601`标准表示，并且使用`UTC`时间。格式为：`YYYY-MM-ddTHH:mm:ssZ`。
  - name: tags
    type: object
    description: 资源关联的标签信息。
    object-schema:
    - name: tags
      type: object-array
      description: 标签对列表。
      array-style: json
      item-schema:
      - name: key
        type: string
        description: |-
          标签键。
          长度限制：1～128字符。
      - name: value
        type: string
        description: |-
          标签值。
          长度限制：1～128字符。
