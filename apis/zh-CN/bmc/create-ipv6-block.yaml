name: CreateIpv6Block
product: bmc
use: create-ipv6-block
short: 创建IPv6 Cidr Block
long: 创建一个或多个IPv6 Cidr Block。
examples:
- cmd: zeno bmc create-ipv6-block --zone-id ISB-B --name example --amount 1
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: CreateIpv6Block
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: Cidr Block所属的可用区 ID。
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    Cidr Block的名称。
    不得超过64个字符。
- name: amount
  type: integer
  required: false
  sdk-field: amount
  description: 购买的数量。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Cidr Block所属的资源组ID。
    如果指定的区域内存在可用的VLAN，则会忽略该参数自动使用与VLAN相同的资源组。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    创建Cidr时关联的标签。
    注意: 关联标签键不能重复。--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～128字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～128字符。
