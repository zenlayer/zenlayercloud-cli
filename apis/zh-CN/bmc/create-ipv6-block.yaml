name: CreateIpv6Block
product: bmc
use: create-ipv6-block
short: 创建IPv6 Cidr Block
long: |-
  创建一个或多个IPv6 Cidr Block。
  #### 准备工作

  * 查询库存：调用[`DescribeAvailableIpv6Resources`](describeavailableipv6resources.md)查看指定地区的资源供给情况。


  **注意事项**

  * 每个Ipv6 Cidr Block包含500个可用的IP。
  * 本接口为异步接口，当创建Cidr Block请求下发成功后会返回一个`ID`列表，此时创建Cidr Block操作并未立即完成。在此期间Cidr Block的状态将会处于`CREATING`，Cidr Block创建结果可以通过调用`DescribeCidrBlocks` 接口查询，如果Cidr Block状态由`CREATING`(创建中)变为`AVAILABLE`，则代表Cidr Block创建成功，`CREATE_FAILED`代表Cidr Block创建失败。创建过程中不可对Cidr Block进行任何操作。
examples:
- cmd: zeno bmc create-ipv6-block --zone-id ISB-B --name example --amount 1
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: CreateIpv6Block
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: Cidr Block所属的可用区 ID。
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    Cidr Block的名称。
    不得超过64个字符。
- name: amount
  type: integer
  required: false
  sdk-field: amount
  description: 购买的数量。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Cidr Block所属的资源组ID。
    如果指定的区域内存在可用的VLAN，则会忽略该参数自动使用与VLAN相同的资源组。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    创建Cidr时关联的标签。
    注意: 关联标签键不能重复。--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～128字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～128字符。
response:
- name: cidrBlockIds
  type: string-array
  description: Cidr Block ID列表。
