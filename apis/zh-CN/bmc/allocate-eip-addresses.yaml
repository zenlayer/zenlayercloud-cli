name: AllocateEipAddresses
product: bmc
use: allocate-eip-addresses
short: 创建Elastic IP
long: 创建一个或多个EIP。
examples:
- cmd: zeno bmc allocate-eip-addresses --eip-charge-type POSTPAID --zone-id SEL-A
  desc: ''
- cmd: zeno bmc allocate-eip-addresses --eip-charge-type PREPAID --zone-id SEL-A --amount 2
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: AllocateEipAddresses
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: EIP所属的可用区ID。
- name: eip-charge-type
  type: enum
  required: true
  sdk-field: eipChargeType
  description: |-
    付费类型。
    PREPAID：预付费，即包年包月。
    POSTPAID：后付费。
  enum-values:
  - value: POSTPAID
    desc: 后付费。即按量付费。
  - value: PREPAID
    desc: 预付费。
- name: eip-charge-prepaid
  type: object
  required: false
  sdk-field: eipChargePrepaid
  description: |-
    预付费模式。
    即包年包月相关参数设置。
    通过该参数可以指定包年包月实例的购买时长等属性。
    若指定实例的付费模式为预付费则该参数必传。
  object-schema:
  - name: period
    type: integer
    description: |-
      购买实例的时长。
      单位：月。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    资源组ID。
    如果不指定，则会放入默认资源组。如果用户没有默认资源组权限， 则请求将会失败。
- name: amount
  type: integer
  required: false
  sdk-field: amount
  description: 指定创建EIP的数量。
- name: netmask
  type: integer
  required: false
  sdk-field: netmask
  description: |-
    购买的掩码。
    可以从DescribeEipAvailableResources接口中获取可用的掩码列表。
- name: marketing-options
  type: object
  required: false
  sdk-field: marketingOptions
  description: 市场营销活动相关信息。
  object-schema:
  - name: discountCode
    type: string
    description: |-
      使用市场发放的折扣码。
      如果折扣码不存在，最终折扣将不会生效。
  - name: usePocVoucher
    type: boolean
    description: |-
      是否使用POC代金券。
      如果系统不存在POC代金券，相关创建流程会失败。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    创建EIP时关联的标签。
    注意: 关联标签键不能重复。--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～128字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～128字符。
