name: DescribeVpcs
product: bmc
use: describe-vpcs
short: 查看VPC列表
long: 本接口用于查询一个或多个指定VPC的信息。用户可以根据VPC ID、Subnet ID、 VPC节点ID、VPC名称等信息来搜索VPC信息。
examples:
- cmd: zeno bmc describe-vpcs --page-size 10 --page-num 1
  desc: 分页查询Vpc列表
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeVpcs
parameters:
- name: vpc-ids
  type: string-array
  required: false
  sdk-field: vpcIds
  description: |-
    VPC ID。
    取值可以由多个VPC ID组成一个。最多支持100个ID查询。
- name: vpc-name
  type: string
  required: false
  sdk-field: vpcName
  description: VPC的名称。
- name: cidr-block
  type: string
  required: false
  sdk-field: cidrBlock
  description: VPC的CIDR。
- name: vpc-status
  type: enum
  required: false
  sdk-field: vpcStatus
  description: VPC的状态。
  enum-values:
  - value: CREATING
    desc: 创建中。
  - value: CREATE_FAILED
    desc: 创建失败。
  - value: AVAILABLE
    desc: 可用。
  - value: DELETING
    desc: 删除中。
- name: vpc-region-id
  type: string
  required: false
  sdk-field: vpcRegionId
  description: VPC的节点ID。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    资源组的ID。
    如果不传，则返回该用户可见的所有资源组内的VPC。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～128字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～128字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: VpcInfo结果集。
