name: DescribeInstanceTypes
product: bmc
use: describe-instance-types
short: 查询实例机型列表
long: |-
  查询实例机型配置。
  **注意事项**

  `DescribeInstanceTypes`仅查询实例机型的配置和性能信息，如果您需要查询具体地域下可购买的实例机型，请查询 `DescribeAvailableResources。`
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeInstanceTypes
parameters:
- name: image-id
  type: string
  required: false
  sdk-field: imageId
  description: 查询实例机型时，支持某镜像的机型。
- name: instance-type-ids
  type: string-array
  required: false
  sdk-field: instanceTypeIds
  description: |-
    实例机型ID。
    数量不超过100个。
- name: minimum-cpu-core-count
  type: integer
  required: false
  sdk-field: minimumCpuCoreCount
  description: |-
    查询实例机型时，期望最小CPU内核的数目。
    取值范围：正整数。
- name: maximum-cpu-core-count
  type: integer
  required: false
  sdk-field: maximumCpuCoreCount
  description: |-
    查询实例机型时，期望最大CPU内核的数目。
    取值范围：正整数。
- name: minimum-memory-size
  type: integer
  required: false
  sdk-field: minimumMemorySize
  description: |-
    查询实例机型时，期望最小内存大小。
    取值范围：正整数。
    单位：GB。
- name: maximum-memory-size
  type: integer
  required: false
  sdk-field: maximumMemorySize
  description: |-
    查询实例机型时，期望最大内存大小。
    取值范围：正整数。
    单位：GB。
- name: minimum-bandwidth
  type: integer
  required: false
  sdk-field: minimumBandwidth
  description: |-
    查询实例机型时，期望最小公网入方向带宽限制。
    单位：Mbps。
- name: support-raids
  type: integer-array
  required: false
  sdk-field: supportRaids
  description: |-
    查询实例机型时，对实例机型做raid时所支持的raid类型。
    Raid可选值包括：0, 1, 5, 10。
- name: support-subnet
  type: boolean
  required: false
  sdk-field: supportSubnet
  description: 查询实例机型时，机型是否支持内网组网。
- name: minimum-disk-size
  type: integer
  required: false
  sdk-field: minimumDiskSize
  description: |-
    查询实例机型时，期望最小磁盘大小。
    取值范围：正整数。
    单位：GB。
- name: maximum-disk-size
  type: integer
  required: false
  sdk-field: maximumDiskSize
  description: |-
    查询实例机型时，期望最大磁盘大小。
    取值范围：正整数。
    单位：GB。
- name: is-ha
  type: boolean
  required: false
  sdk-field: isHA
  description: 查询实例机型时，是否是高可用机型。
response:
- name: instanceTypes
  type: object-array
  description: 查询的机型信息。
  array-style: json
  item-schema:
  - name: imageIds
    type: string-array
    description: |-
      机型支持的镜像ID。
      仅在DescribeInstanceType可取值
  - name: instanceTypeId
    type: string
    description: 实例机型ID。
  - name: description
    type: string
    description: |-
      机型描述。
      一般包括内存大小，硬盘。
  - name: cpuCoreCount
    type: integer
    description: CPU数量。
  - name: cpuDetail
    type: string
    description: CPU详情。
  - name: cpuCores
    type: integer
    description: CPU核心数。
  - name: cpuThreads
    type: integer
    description: CPU线程。
  - name: baseFrequency
    type: string
    description: CPU基础频率。
  - name: memorySize
    type: integer
    description: |-
      内存大小。
      单位：GB。
  - name: maximumBandwidth
    type: integer
    description: |-
      机型支持的最大出口带宽。
      单位：Mbps。
  - name: supportRaids
    type: integer-array
    description: 机型支持的raid。
  - name: supportSubnet
    type: boolean
    description: 是否支持内网组网。
  - name: isHA
    type: boolean
    description: 是否是高可用机型。
  - name: diskInfo
    type: object
    description: |-
      硬盘配置。
      单位：GB。
    object-schema:
    - name: totalDiskSize
      type: integer
      description: |-
        机型的硬盘总大小。
        单位：GB。
        totalDiskSize的大小一般小于描述的信息，系统为了分区能够成功预留了一小部分。如果采用自定义分区，最后的一个分区将会获得剩余的所有磁盘大小。
    - name: diskDescription
      type: string
      description: 机型硬盘的描述信息。
    - name: disks
      type: object-array
      description: |-
        可用于raid和分区的磁盘信息。
        按顺序标号。比如880 x 2、 220 x2，其磁盘序号1,2,3,4 分别对应的磁盘大小为880，880，220，220。
      array-style: json
      item-schema:
      - name: diskSize
        type: integer
        description: |-
          硬盘的大小。
          单位：GB。
      - name: diskCount
        type: integer
        description: 该硬盘大小的硬盘的数量。
  - name: vpuVendor
    type: string
    description: VPU 供应商
  - name: vpuCard
    type: string
    description: VPU 型号。示例：T1U
  - name: vpuCount
    type: integer
    description: VPU 数量
