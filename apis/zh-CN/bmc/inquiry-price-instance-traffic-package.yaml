name: InquiryPriceInstanceTrafficPackage
product: bmc
use: inquiry-price-instance-traffic-package
short: 修改流量包询价
long: |-
  实例修改流量包询价。
  **注意事项**

  * 仅当机器的[`internetChargeType`](../datastructure.md#internetchargetype)为`ByTrafficPackage时可用`
examples:
- cmd: zeno bmc inquiry-price-instance-traffic-package --instance-id instanceId --traffic-package-size 100
  desc: 实例修改流量包询价
sdk:
  service: bmc
  version: '2026-02-01'
  action: InquiryPriceInstanceTrafficPackage
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: |-
    待操作的实例ID。
    可通过DescribeInstances接口返回值中的instanceId获取。
- name: traffic-package-size
  type: float
  required: true
  sdk-field: trafficPackageSize
  description: |-
    流量包大小。
    必须是0.05的倍数。
response:
- name: trafficPackagePrice
  type: object-array
  description: |-
    流量包价格。
    可能有多个价格，比如流量包计费，包含包的价格和用量超出包后的价格。
  array-style: json
  item-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      预付费的折扣价。
      预付费模式使用，后付费该值为 null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：
      HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: 阶梯用量的开始。
    - name: stepEnd
      type: float
      description: 阶梯用量的结束。
    - name: unitPrice
      type: float
      description: |-
        当前阶梯的单元原始价格。
        后付费模式使用。
    - name: discountUnitPrice
      type: float
      description: |-
        当前阶梯的单元折后价格。
        后付费模式使用。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
