name: CreateIpv4Block
product: bmc
use: create-ipv4-block
short: 创建Ipv4 Cidr Block
long: |-
  创建一个或多个Ipv4 Cidr Block。
  #### 准备工作

  * 查询可用资源：调用[`DescribeAvailableIpv4Resources`](describeavailableipv4resources.md)查看指定地区的资源供给情况。
  * 成本估算：了解Cidr Block的的计费方式。更多详情，请参见[计费方式概述](https://docs.console.zenlayer.com/welcome/pricing/bare-metal-cloud-pricing/billing-method#cidr-block)。


  **注意事项**

  * 预付费Cidr Block的购买会预先扣除本次购买所需金额，后付费Cidr Block购买时需要确保账户账号状态正常。
  * 调用本接口创建Cidr Block，支持代金券自动抵扣，详情请参考代金券选用规则。
  * 本接口为异步接口，当创建Cidr Block请求下发成功后会返回一个`ID`列表，此时创建Cidr Block操作并未立即完成。在此期间Cidr Block的状态将会处于`CREATING`，Cidr Block创建结果可以通过调用`DescribeCidrBlocks` 接口查询，如果Cidr Block状态由`CREATING`(创建中)变为`AVAILABLE`，则代表Cidr Block创建成功，`CREATE_FAILED`代表Cidr Block创建失败。创建过程中不可对Cidr Block进行任何操作。
examples:
- cmd: zeno bmc create-ipv4-block --zone-id IST-B --name example1 --charge-type POSTPAID --netmask 29
  desc: ''
- cmd: zeno bmc create-ipv4-block --zone-id AMS-D --name example2 --charge-type PREPAID --netmask 29 --amount 1
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: CreateIpv4Block
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: Cidr Block所属的可用区ID。
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    Cidr Block的名称。
    不得超过64个字符。
- name: cidr-type
  type: enum
  required: false
  sdk-field: cidrType
  description: CIDR地址块的类型
  enum-values:
  - value: BGP
    desc: BGP IP。
  - value: Local
    desc: 本地 IP。
- name: charge-type
  type: enum
  required: true
  sdk-field: chargeType
  description: |-
    付费类型。
    PREPAID：预付费，即包年包月
    POSTPAID：后付费。
  enum-values:
  - value: PREPAID
    desc: 预付费。
  - value: POSTPAID
    desc: 后付费。即按量付费。
- name: charge-prepaid
  type: object
  required: false
  sdk-field: chargePrepaid
  description: |-
    预付费模式。
    即包年包月相关参数设置。通过该参数可以指定包年包月实例的购买时长等属性。若指定Cidr Block的付费模式为预付费则该参数必传。
  object-schema:
  - name: period
    type: integer
    description: |-
      购买实例的时长。
      单位：月。
- name: netmask
  type: integer
  required: true
  sdk-field: netmask
  description: |-
    购买的掩码。
    可以从DescribeAvailableIpv4Resource接口中获取可用的掩码列表。
- name: amount
  type: integer
  required: false
  sdk-field: amount
  description: 购买的数量。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    Cidr Block所属的资源组ID。
    如果指定的区域内存在可用的VLAN，则会忽略该参数自动使用与VLAN相同的资源组。
- name: marketing-options
  type: object
  required: false
  sdk-field: marketingOptions
  description: 市场营销活动相关信息。
  object-schema:
  - name: discountCode
    type: string
    description: |-
      使用市场发放的折扣码。
      如果折扣码不存在，最终折扣将不会生效。
  - name: usePocVoucher
    type: boolean
    description: |-
      是否使用POC代金券。
      如果系统不存在POC代金券，相关创建流程会失败。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    创建Cidr时关联的标签。
    注意: 关联标签键不能重复。--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～128字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～128字符。
response:
- name: orderNumber
  type: string
  description: 订单编号。
- name: cidrBlockIds
  type: string-array
  description: Cidr Block ID列表。
