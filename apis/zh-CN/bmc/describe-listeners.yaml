name: DescribeListeners
product: bmc
use: describe-listeners
short: 查询一台或多台指定Listener的信息
long: 查询一台或多台指定Listener的信息。用户可以根据负载均衡实例的ID、监听器的ID等信息来搜索监听器的信息。
examples:
- cmd: zeno bmc describe-listeners --load-balancer-ids xxxx
  desc: 根据负载均衡实例ID查询。
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeListeners
parameters:
- name: listener-ids
  type: string-array
  required: false
  sdk-field: listenerIds
  description: |-
    监听器ID列表。
    最多支持100个。
- name: load-balancer-ids
  type: string-array
  required: false
  sdk-field: loadBalancerIds
  description: |-
    负载均衡实例ID列表。
    最多支持100个。
- name: listener-name
  type: string
  required: false
  sdk-field: listenerName
  description: |-
    监听器名称。
    支持模糊搜索。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
response:
- name: totalCount
  type: integer
  description: 符合条件的Listener总数量。
- name: dataSet
  type: object-array
  description: 监听器集合。
  array-style: json
  item-schema:
  - name: loadBalancerId
    type: string
    description: LoadBalancerId唯一ID。
  - name: listenerId
    type: string
    description: Listener的ID。
  - name: listenerName
    type: string
    description: Listener的名称。
  - name: status
    type: string
    description: 状态。
  - name: port
    type: string
    description: 监听端口。
  - name: protocol
    type: string
    description: 监听协议。
  - name: backendProtocol
    type: string
    description: 后段服务器协议。
  - name: scheduler
    type: string
    description: 调度算法。
  - name: kind
    type: enum
    description: 流量转发模式。
    enum-values:
    - value: DR
      desc: 直接路由（Direct Routing)。
    - value: FNAT
      desc: 全局网络地址转换(Full NAT)。
  - name: healthCheck
    type: object
    description: 健康检查。
    object-schema:
    - name: checkEnabled
      type: boolean
      description: 检查开关。
    - name: checkType
      type: string
      description: 检查类型。
    - name: checkConnectTimeout
      type: integer
      description: 连接时间。
    - name: checkRetry
      type: integer
      description: 重试次数。
    - name: checkDelayBeforeRetry
      type: integer
      description: 超时时间。
    - name: checkIntervalTime
      type: integer
      description: 重试间隔。
    - name: checkPort
      type: integer
      description: 检查端口。
    - name: httpVersion
      type: string
      description: Http版本。
    - name: httpCheckPath
      type: string
      description: Http地址。
    - name: httpCheckDigest
      type: integer
      description: Http摘要认证。
    - name: httpCode
      type: integer
      description: 状态码。
    - name: miscCheckPath
      type: string
      description: Misc地址。
    - name: miscTimeout
      type: integer
      description: Misc超时时间。
  - name: notify
    type: object
    description: 通知地址。
    object-schema:
    - name: enable
      type: boolean
      description: 通知开关。
    - name: apiAddress
      type: string
      description: 地址。
  - name: createTime
    type: string
    description: 创建时间。按照`ISO8601`标准表示，并且使用`UTC`时间。格式为：`YYYY-MM-ddTHH:mm:ssZ`。
