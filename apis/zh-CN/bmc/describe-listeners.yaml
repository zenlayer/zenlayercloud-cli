name: DescribeListeners
product: bmc
use: describe-listeners
short: 查询一台或多台指定Listener的信息
long: 查询一台或多台指定Listener的信息。用户可以根据负载均衡实例的ID、监听器的ID等信息来搜索监听器的信息。
examples:
- cmd: zeno bmc describe-listeners --load-balancer-ids xxxx
  desc: 根据负载均衡实例ID查询。
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeListeners
parameters:
- name: listener-ids
  type: string-array
  required: false
  sdk-field: listenerIds
  description: |-
    监听器ID列表。
    最多支持100个。
- name: load-balancer-ids
  type: string-array
  required: false
  sdk-field: loadBalancerIds
  description: |-
    负载均衡实例ID列表。
    最多支持100个。
- name: listener-name
  type: string
  required: false
  sdk-field: listenerName
  description: |-
    监听器名称。
    支持模糊搜索。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
response:
- name: totalCount
  type: integer
  description: 符合条件的Listener总数量。
- name: dataSet
  type: object-array
  description: 监听器集合。
  array-style: json
  item-schema:
  - name: loadBalancerId
    type: string
    description: LoadBalancerId唯一ID。
  - name: listenerId
    type: string
    description: Listener的ID。
  - name: listenerName
    type: string
    description: Listener的名称。
  - name: status
    type: string
    description: 状态。
  - name: port
    type: string
    description: 监听端口。
  - name: protocol
    type: string
    description: 监听协议。
  - name: backendProtocol
    type: string
    description: 后段服务器协议。
  - name: scheduler
    type: string
    description: 调度算法。
  - name: kind
    type: enum
    description: 流量转发模式。
    enum-values:
    - value: DR
      desc: 直接路由（Direct Routing)。
    - value: FNAT
      desc: 全局网络地址转换(Full NAT)。
  - name: healthCheck
    type: object
    description: 健康检查。
  - name: notify
    type: object
    description: 通知地址。
  - name: createTime
    type: string
    description: 创建时间。按照`ISO8601`标准表示，并且使用`UTC`时间。格式为：`YYYY-MM-ddTHH:mm:ssZ`。
