name: DescribeCidrBlockIps
product: bmc
use: describe-cidr-block-ips
short: 查看Cidr Block IP列表
long: 查询一个Cidr Block的IP列表。
examples:
- cmd: zeno bmc describe-cidr-block-ips --cidr-block-id aCidrBlockId
  desc: 查询指定Cidr Block包含的IP
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeCidrBlockIps
parameters:
- name: instance-id
  type: string
  required: false
  sdk-field: instanceId
  description: |-
    实例ID。
    可通过DescribeInstances接口返回值中的instanceId获取。
- name: ip
  type: string
  required: false
  sdk-field: ip
  description: IP。
- name: cidr-block-id
  type: string
  required: true
  sdk-field: cidrBlockId
  description: |-
    Cidr Block ID。
    可通过DescribeCidrBlocks接口返回值中的cidrBlockId获取。
response:
- name: cidrBlockIps
  type: object-array
  description: 结果集。
  array-style: json
  item-schema:
  - name: cidrBlockId
    type: string
    description: Cidr Block唯一ID。
  - name: cidrBlockType
    type: enum
    description: CIDR的类型。
    enum-values:
    - value: IPV4
      desc: IPv4。
    - value: IPV6
      desc: IPv6。
  - name: ip
    type: string
    description: IP。
  - name: instanceId
    type: string
    description: 绑定的实例ID。
  - name: status
    type: enum
    description: IP的状态。
    enum-values:
    - value: BINDING
      desc: 绑定中
    - value: UNBINDING
      desc: 解绑中
    - value: BOUND
      desc: 已绑定
    - value: AVAILABLE
      desc: 可用
