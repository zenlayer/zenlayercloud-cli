name: DescribeLoadBalancerZones
product: bmc
use: describe-load-balancer-zones
short: 查询支持创建负载均衡的区域
long: 查询支持创建负载均衡的区域。
examples:
- cmd: zeno bmc describe-load-balancer-zones --charge-type POSTPAID
  desc: 查询后付费支持创建LB可用区节点
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeLoadBalancerZones
parameters:
- name: charge-type
  type: enum
  required: true
  sdk-field: chargeType
  description: |-
    付费类型。
    PREPAID：预付费，即包年包月 POSTPAID：后付费。
  enum-values:
  - value: PREPAID
    desc: 预付费。
  - value: POSTPAID
    desc: 后付费。即按量付费。
