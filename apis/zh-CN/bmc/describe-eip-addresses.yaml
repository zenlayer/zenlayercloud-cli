name: DescribeEipAddresses
product: bmc
use: describe-eip-addresses
short: 查看Elastic IP列表
long: 查询一台或多台指定EIP的信息。用户可以根据EIP ID、IP或者计费模式等信息来搜索EIP的信息。
examples:
- cmd: zeno bmc describe-eip-addresses --eip-charge-type PREPAID
  desc: 列表根据eipChargeType搜索
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeEipAddresses
parameters:
- name: eip-ids
  type: string-array
  required: false
  sdk-field: eipIds
  description: 取值可以由多个EIP ID共同组成。最多支持100个ID查询。
- name: eip-charge-type
  type: enum
  required: false
  sdk-field: eipChargeType
  description: |-
    付费类型。
    PREPAID：预付费，即包年包月。
    POSTPAID：后付费。
  enum-values:
  - value: PREPAID
    desc: 预付费。
  - value: POSTPAID
    desc: 后付费。即按量付费。
- name: ip-address
  type: string
  required: false
  sdk-field: ipAddress
  description: IP地址。
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: EIP所属的可用区ID。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    资源组的ID。
    如果不传，则返回该用户可见的所有资源组内的EIP。
- name: eip-status
  type: enum
  required: false
  sdk-field: eipStatus
  description: EIP状态。
  enum-values:
  - value: CREATING
    desc: 创建中
  - value: CREATE_FAILED
    desc: 创建失败
  - value: ASSOCIATING
    desc: 绑定中
  - value: UNASSOCIATING
    desc: 解绑中
  - value: ASSOCIATED
    desc: 已分配
  - value: AVAILABLE
    desc: 可用
  - value: RECYCLING
    desc: 回收中
  - value: RECYCLE
    desc: 在回收站中
- name: instance-id
  type: string
  required: false
  sdk-field: instanceId
  description: 机器实例ID。
- name: instance-name
  type: string
  required: false
  sdk-field: instanceName
  description: 机器实例名称。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～128字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～128字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的EIP总数量。
- name: dataSet
  type: object-array
  description: EIP列表。
