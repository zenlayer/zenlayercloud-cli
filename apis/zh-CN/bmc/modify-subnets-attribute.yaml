name: ModifySubnetsAttribute
product: bmc
use: modify-subnets-attribute
short: 修改Subnet属性
long: 本接口用于修改Subnet的属性（目前只支持修改Subnet的名称）。
examples:
- cmd: zeno bmc modify-subnets-attribute --subnet-ids your-subnet-id --subnet-name Test-Subnet
  desc: 批量修改Subnet的名称
sdk:
  service: bmc
  version: '2026-02-01'
  action: ModifySubnetsAttribute
parameters:
- name: subnet-name
  type: string
  required: true
  sdk-field: subnetName
  description: |-
    Subnet名称。
    范围1到64个字符。仅支持输入字母、数字、-和英文句点(.)。
- name: subnet-ids
  type: string-array
  required: true
  sdk-field: subnetIds
  description: |-
    一个或多个待操作的Subnet ID。
    可通过DescribeSubnets接口返回值中的subnetId获取。
    每次请求批量Subnet的上限为100。
