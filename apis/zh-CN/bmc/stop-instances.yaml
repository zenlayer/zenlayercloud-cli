name: StopInstances
product: bmc
use: stop-instances
short: 关闭实例
long: 本接口用于关闭一个或多个实例。
examples:
- cmd: zeno bmc stop-instances --instance-ids instanceId1 --instance-ids instanceId2
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: StopInstances
parameters:
- name: instance-ids
  type: string-array
  required: true
  sdk-field: instanceIds
  description: |-
    一个或多个待操作的实例ID。
    可通过DescribeInstances接口返回值中的instanceId获取。每次请求批量实例的上限为100。
