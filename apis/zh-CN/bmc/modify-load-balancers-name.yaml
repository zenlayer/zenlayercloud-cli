name: ModifyLoadBalancersName
product: bmc
use: modify-load-balancers-name
short: 修改负载均衡实例的名称。
long: 修改负载均衡实例的名称。
examples:
- cmd: zeno bmc modify-load-balancers-name --load-balancer-ids xxxx --load-balancer-name xxxx
  desc: 修改负载均衡实例的名称。
sdk:
  service: bmc
  version: '2026-02-01'
  action: ModifyLoadBalancersName
parameters:
- name: load-balancer-name
  type: string
  required: true
  sdk-field: loadBalancerName
  description: |-
    负载均衡名称。
    不得超过64个字符。仅支持输入字母、数字、-和英文句点(.)。
- name: load-balancer-ids
  type: string-array
  required: true
  sdk-field: loadBalancerIds
  description: 负载均衡ID集合。
