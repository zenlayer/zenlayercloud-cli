name: DescribeCidrBlocks
product: bmc
use: describe-cidr-blocks
short: 查看Cidr Block列表
long: 查询一个或多个Cidr Block的信息。
examples:
- cmd: zeno bmc describe-cidr-blocks --page-num 1 --page-size 1
  desc: 分页查询Cidr Block列表
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeCidrBlocks
parameters:
- name: cidr-block-ids
  type: string-array
  required: false
  sdk-field: cidrBlockIds
  description: |-
    Cidr Block ID。
    最多支持100个ID查询。
- name: cidr-block
  type: string
  required: false
  sdk-field: cidrBlock
  description: CIDR。
- name: cidr-block-name
  type: string
  required: false
  sdk-field: cidrBlockName
  description: Cidr Block名称。
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: Cidr Block所属的可用区ID。
- name: cidr-block-type
  type: enum
  required: false
  sdk-field: cidrBlockType
  description: CIDR地址块的类型。
  enum-values:
  - value: IPV4
    desc: IPv4。
  - value: IPV6
    desc: IPv6。
- name: gateway
  type: string
  required: false
  sdk-field: gateway
  description: 网关地址。
- name: charge-type
  type: enum
  required: false
  sdk-field: chargeType
  description: |-
    计费类型。
    PREPAID：预付费，即包年包月。
    POSTPAID：后付费。
  enum-values:
  - value: PREPAID
    desc: 预付费。
  - value: POSTPAID
    desc: 后付费。即按量付费。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    资源组的ID。
    如果不传，则返回该用户可见的所有资源组内的Cidr Block。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～128字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～128字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 结果集。
