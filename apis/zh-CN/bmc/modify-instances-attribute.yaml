name: ModifyInstancesAttribute
product: bmc
use: modify-instances-attribute
short: 修改实例的属性
long: |-
  本接口用于修改实例的属性（目前只支持修改实例的显示名称）。
  **注意事项**

  * 支持批量操作。每次请求批量实例的上限为100。
  * 如果其中有实例ID不存在，则本操作会立即失败。
examples:
- cmd: zeno bmc modify-instances-attribute --instance-ids instanceId1 --instance-ids instanceId2 --instance-name myInstanceName
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: ModifyInstancesAttribute
parameters:
- name: instance-name
  type: string
  required: true
  sdk-field: instanceName
  description: |-
    实例名称。
    不得超过64个字符。仅支持输入字母、数字、-和英文句点(.)。
- name: instance-ids
  type: string-array
  required: true
  sdk-field: instanceIds
  description: |-
    一个或多个待操作的实例ID。
    可通过DescribeInstances接口返回值中的instanceId获取。每次请求批量实例的上限为100。
