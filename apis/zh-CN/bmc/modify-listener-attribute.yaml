name: ModifyListenerAttribute
product: bmc
use: modify-listener-attribute
short: 修改监听器配置
long: 修改监听器配置。
examples:
- cmd: zeno bmc modify-listener-attribute --listener-id xxxx --listener-name xxxx
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: ModifyListenerAttribute
parameters:
- name: listener-id
  type: string
  required: true
  sdk-field: listenerId
  description: 监听器的ID。
- name: listener-name
  type: string
  required: false
  sdk-field: listenerName
  description: |-
    监听器名称。
    不得超过64个字符。仅支持输入字母、数字、-和英文句点(.)。
- name: protocol
  type: string
  required: false
  sdk-field: protocol
  description: |-
    监听协议。取值：
    <ul><li>TCP</li><li>UDP</li></ul>
- name: backend-protocol
  type: string
  required: false
  sdk-field: backendProtocol
  description: |-
    后端转发协议。取值：
    <ul><li>TCP</li><li>UDP</li></ul>
- name: scheduler
  type: string
  required: false
  sdk-field: scheduler
  description: |-
    调度算法。取值：
    <ul><li>wrr（默认值）：加权轮询，权重值越高的后端服务器，被轮询到的概率也越高。</li><li>rr：轮询，按照访问顺序依次将外部请求分发到后端服务器。</li></ul>
- name: kind
  type: enum
  required: false
  sdk-field: kind
  description: |-
    工作模式。取值：
    <ul><li>NAT</li><li>DR</li></ul>
  enum-values:
  - value: DR
    desc: 直接路由（Direct Routing)。
  - value: FNAT
    desc: 全局网络地址转换(Full NAT)。
- name: health-check
  type: object
  required: false
  sdk-field: healthCheck
  description: 健康检查。
  object-schema:
  - name: checkEnabled
    type: boolean
    description: 检查开关。
  - name: checkType
    type: string
    description: 检查类型。
  - name: checkConnectTimeout
    type: integer
    description: 连接时间。
  - name: checkRetry
    type: integer
    description: 重试次数。
  - name: checkDelayBeforeRetry
    type: integer
    description: 超时时间。
  - name: checkIntervalTime
    type: integer
    description: 重试间隔。
  - name: checkPort
    type: integer
    description: 检查端口。
  - name: httpVersion
    type: string
    description: Http版本。
  - name: httpCheckPath
    type: string
    description: Http地址。
  - name: httpCheckDigest
    type: integer
    description: Http摘要认证。
  - name: httpCode
    type: integer
    description: 状态码。
  - name: miscCheckPath
    type: string
    description: Misc地址。
  - name: miscTimeout
    type: integer
    description: Misc超时时间。
- name: notify
  type: object
  required: false
  sdk-field: notify
  description: 警报。
  object-schema:
  - name: enable
    type: boolean
    description: 通知开关。
  - name: apiAddress
    type: string
    description: 地址。
