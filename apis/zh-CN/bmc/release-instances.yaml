name: ReleaseInstances
product: bmc
use: release-instances
short: 释放实例
long: |-
  本接口用于释放一个或多个实例。
  **注意事项**

  * 只有在回收站中的实例才支持该操作。
  * 支持批量操作。每次请求批量实例的上限为100。
examples:
- cmd: zeno bmc release-instances --instance-ids instanceId1 --instance-ids instanceId2
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: ReleaseInstances
parameters:
- name: instance-ids
  type: string-array
  required: true
  sdk-field: instanceIds
  description: |-
    一个或多个待操作的实例ID。
    可通过DescribeInstances接口返回值中的instanceId获取。每次请求批量实例的上限为100。
