name: DescribeBackends
product: bmc
use: describe-backends
short: 查询一台或多台指定后端配置服务器的信息
long: 查询一台或多台指定后端配置服务器的信息。用户可以根据监听器的ID、后端配置服务器的ID等信息来搜索后端配置服务器的信息。
examples:
- cmd: zeno bmc describe-backends --listener-id xxxx
  desc: 根据监听器的ID获取下面所有后端配置服务器列表。
sdk:
  service: bmc
  version: '2026-02-01'
  action: DescribeBackends
parameters:
- name: listener-id
  type: string
  required: true
  sdk-field: listenerId
  description: 监听器的ID。
- name: backend-ids
  type: string-array
  required: false
  sdk-field: backendIds
  description: 后端配置服务器的ID集合。
- name: backend-name
  type: string
  required: false
  sdk-field: backendName
  description: 后端配置服务器的名称。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小。默认为20，最大为1000。
response:
- name: totalCount
  type: integer
  description: 符合条件的后端配置服务器总数量。
- name: dataSet
  type: object-array
  description: 后端配置服务器集合。
  array-style: json
  item-schema:
  - name: listenerId
    type: string
    description: Listener的ID。
  - name: backendId
    type: string
    description: Backend的ID。
  - name: backendName
    type: string
    description: Backend的名称。
  - name: status
    type: string
    description: 状态。
  - name: port
    type: string
    description: 端口。
  - name: weight
    type: integer
    description: 权重。
  - name: instanceId
    type: string
    description: 实例ID。
  - name: instanceName
    type: string
    description: 实例名称。
  - name: createTime
    type: string
    description: 创建时间。按照`ISO8601`标准表示，并且使用`UTC`时间。格式为：`YYYY-MM-ddTHH:mm:ssZ`。
