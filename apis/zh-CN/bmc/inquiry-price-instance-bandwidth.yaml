name: InquiryPriceInstanceBandwidth
product: bmc
use: inquiry-price-instance-bandwidth
short: 修改带宽询价
long: |-
  实例修改带宽询价。
  **注意事项**

  * 仅当机器的[`internetChargeType`](../datastructure.md#internetchargetype)为`ByBandwidth时可用`，且当修改的带宽大于默认带宽时，接口会返回价格。
  * 机器的`instanceChargeType`不同，返回的价格结构是不同的。
examples:
- cmd: zeno bmc inquiry-price-instance-bandwidth --instance-id instanceId --bandwidth-out-mbps 100
  desc: 实例修改带宽询价
sdk:
  service: bmc
  version: '2026-02-01'
  action: InquiryPriceInstanceBandwidth
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: |-
    待操作的实例ID。
    可通过DescribeInstances接口返回值中的instanceId获取。
- name: bandwidth-out-mbps
  type: integer
  required: true
  sdk-field: bandwidthOutMbps
  description: 带宽大小。
response:
- name: bandwidthPrice
  type: object-array
  description: |-
    公网带宽价格。
    可能有多个价格，比如流量包计费，包含包的价格和用量超出包后的价格。
  array-style: json
  item-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      预付费的折扣价。
      预付费模式使用，后付费该值为 null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：
      HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
