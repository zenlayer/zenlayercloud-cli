name: RebootInstances
product: bmc
use: reboot-instances
short: 重启实例
long: 本接口用于重启一个或多个实例。
examples:
- cmd: zeno bmc reboot-instances --instance-ids instanceId1 --instance-ids instanceId2
  desc: ''
sdk:
  service: bmc
  version: '2026-02-01'
  action: RebootInstances
parameters:
- name: instance-ids
  type: string-array
  required: true
  sdk-field: instanceIds
  description: |-
    一个或多个待操作的实例ID。
    可通过DescribeInstances接口返回值中的instanceId获取。每次请求批量实例的上限为100。
