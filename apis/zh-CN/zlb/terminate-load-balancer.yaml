name: TerminateLoadBalancer
product: zlb
use: terminate-load-balancer
short: 删除负载均衡器实例
long: |-
  本接口用户删除一个指定的负载均衡器实例。
  **注意事项**

  * 删除实例后实例可能会保留一段时间，保留时状态为`RECYCLED`. 可以通过[`RestoreLoadBalancer`](restoreloadbalancer.md)接口恢复实例。
examples:
- cmd: zeno zlb terminate-load-balancer --load-balancer-id <loadBalancerId>
  desc: 终止一个负载均衡器。
sdk:
  service: zlb
  version: '2025-04-01'
  action: TerminateLoadBalancer
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: 负载均衡实例 ID。
