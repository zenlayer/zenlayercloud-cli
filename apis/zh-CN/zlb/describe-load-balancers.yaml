name: DescribeLoadBalancers
product: zlb
use: describe-load-balancers
short: 负载均衡列表
long: 查询负载均衡实例列表。
examples:
- cmd: zeno zlb describe-load-balancers
  desc: 查看负载均衡实例列表。
sdk:
  service: zlb
  version: '2025-04-01'
  action: DescribeLoadBalancers
parameters:
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: 节点ID。
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: 根据负载均衡后端服务器所属的VPC网络 ID过滤。
- name: load-balancer-ids
  type: string-array
  required: false
  sdk-field: loadBalancerIds
  description: |-
    负载均衡实例ID集合。
    实例ID数量上限为100个。
- name: load-balancer-name
  type: string
  required: false
  sdk-field: loadBalancerName
  description: |-
    负载均衡实例名称。
    可以在末尾加入*以支持模糊匹配。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页页码。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID进行过滤。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
     最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
     最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: 负载均衡实例绑定的安全组ID。
