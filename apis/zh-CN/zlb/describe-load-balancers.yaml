name: DescribeLoadBalancers
product: zlb
use: describe-load-balancers
short: 负载均衡列表
long: 查询负载均衡实例列表。
examples:
- cmd: zeno zlb describe-load-balancers
  desc: 查看负载均衡实例列表。
sdk:
  service: zlb
  version: '2025-04-01'
  action: DescribeLoadBalancers
parameters:
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: 节点ID。
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: 根据负载均衡后端服务器所属的VPC网络 ID过滤。
- name: load-balancer-ids
  type: string-array
  required: false
  sdk-field: loadBalancerIds
  description: |-
    负载均衡实例ID集合。
    实例ID数量上限为100个。
- name: load-balancer-name
  type: string
  required: false
  sdk-field: loadBalancerName
  description: |-
    负载均衡实例名称。
    可以在末尾加入*以支持模糊匹配。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页页码。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID进行过滤。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
     最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
     最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: 负载均衡实例绑定的安全组ID。
response:
- name: totalCount
  type: integer
  description: 满足过滤条件的负载均衡实例总数。
- name: dataSet
  type: object-array
  description: 返回的负载均衡实例列表。
  array-style: json
  item-schema:
  - name: regionId
    type: string
    description: 区域节点ID。
  - name: loadBalancerId
    type: string
    description: 负载均衡器ID。
  - name: loadBalancerName
    type: string
    description: 负载均衡期名称。
  - name: vpcId
    type: string
    description: 负载均衡后端服务器所属的VPC网络 ID。
  - name: status
    type: enum
    description: 负载均衡实例的状态。
    enum-values:
    - value: CREATING
      desc: 实例过程中。
    - value: RUNNING
      desc: 实例运行。
    - value: RECYCLED
      desc: 实例处于回收站。
    - value: CREATE_FAILED
      desc: 实例创建失败。
    - value: RELEASING
      desc: 实例正在释放中。
  - name: publicIpAddress
    type: string-array
    description: 负载均衡实例的公网 VIP 列表。
  - name: privateIpAddress
    type: string-array
    description: 负载均衡实例的内网 VIP 列表。
  - name: healthCheckPrivateIps
    type: string-array
    description: 负载均衡实例的健康检查内网IP列表。
  - name: listenerCount
    type: integer
    description: 负载均衡器下监听器的数量。
  - name: createTime
    type: string
    description: |-
      创建时间。
      按照ISO8601标准表示，并且使用UTC时间, 格式为：YYYY-MM-ddTHH:mm:ssZ。
  - name: resourceGroup
    type: object
    description: 关联的资源组信息。
  - name: tags
    type: object
    description: 该负载均衡器关联的标签。
  - name: securityGroupId
    type: string
    description: 负载均衡实例绑定的安全组ID。
