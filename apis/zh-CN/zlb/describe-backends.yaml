name: DescribeBackends
product: zlb
use: describe-backends
short: 后端服务器列表
long: 查询负载均衡实例的绑定的后端服务列表。
examples:
- cmd: zeno zlb describe-backends --load-balancer-id <loadBalancerId>
  desc: 查询负载均衡实例上绑定的所有后端服务。
- cmd: zeno zlb describe-backends --load-balancer-id <loadBalancerId> --listener-id <listenerId>
  desc: 查询负载均衡实例上指定监听器上绑定的后端服务。
sdk:
  service: zlb
  version: '2025-04-01'
  action: DescribeBackends
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: 负载均衡实例 ID。
- name: listener-id
  type: string
  required: false
  sdk-field: listenerId
  description: |-
    负载均衡监听器的 ID。
    如果未指定，则查询所有后端。
response:
- name: backends
  type: object-array
  description: 负载均衡的后端服务器列表。
  array-style: json
  item-schema:
  - name: instanceId
    type: string
    description: |-
      实例ID。
      可通过 DescribeInstances 接口返回字段中的 InstanceId 字段获取。
  - name: privateIpAddress
    type: string
    description: 实例上绑定网卡的私网IP地址。
  - name: weight
    type: integer
    description: |-
      后端服务修改后的转发权重。
      创建绑定服务器时默认值为100, 修改时如果不指定，则不会进行修改。
      删除时不需要指定该参数。
  - name: backendPort
    type: integer
    description: |-
      请求转发和健康检查的目标端口。
      如果为空，将跟随监听器端口配置。
      删除时不需要指定该参数。
  - name: listenerId
    type: string
    description: 负载均衡监听器 ID。
  - name: listenerName
    type: string
    description: 监听器的名称。
  - name: protocol
    type: enum
    description: 监听器协议。
    enum-values:
    - value: TCP
      desc: TCP 协议。
    - value: UDP
      desc: UDP 协议。
  - name: listenerPort
    type: string
    description: |-
      监听器端口。
      多个端口使用,分隔。
      当端口是范围时用`-`连接，例如：10000-10005。
