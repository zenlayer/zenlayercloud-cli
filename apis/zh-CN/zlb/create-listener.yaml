name: CreateListener
product: zlb
use: create-listener
short: 创建负载均衡监听器
long: |-
  在指定的网络型负载均衡实例中创建一个监听器，支持 TCP、UDP 协议。创建时可配置监听端口、调度算法、转发模式及健康检查策略。
  **注意事项**

  * 当监听器端口为全端口（0）且健康检查类型为`TCP`或`HTTP_GET`时，必须指定`healthCheck.checkPort`（健康检查端口）。
examples:
- cmd: zeno zlb create-listener --load-balancer-id <loadBalancerId> --listener-name sample --protocol TCP --scheduler mh --port 8080-9000,8000 --persistent 60 --idle-timeout 60
  desc: 创建一个TCP负载均衡监听器，监听8080-9000以及8000端口。不开启健康检查。
- cmd: zeno zlb create-listener --load-balancer-id <loadBalancerId> --listener-name sample --protocol TCP --scheduler mh --port 8080 --persistent 60 --idle-timeout 60
  desc: 创建一个TCP负载均衡监听器的同时设置健康检查信息。
sdk:
  service: zlb
  version: '2025-04-01'
  action: CreateListener
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: 负载均衡实例 ID。
- name: listener-name
  type: string
  required: true
  sdk-field: listenerName
  description: |-
    要创建的监听器名称。
    仅支持字母、数字、连字符 (-) 和句点 (.)，且开头和结尾必须是字母或数字。
- name: health-check
  type: object
  required: false
  sdk-field: healthCheck
  description: |-
    健康检查相关参数。
    如果不传该参数或者healthCheck.enable = false. 将会关闭健康检查。
  object-schema:
  - name: enabled
    type: boolean
    description: 是否开启健康检查。
  - name: checkType
    type: enum
    description: |-
      健康检查使用的协议。
      当开启健康检查时， 该字段必填。
  - name: checkPort
    type: integer
    description: |-
      健康检查端口。
      当监听器端口为全端口（0）且健康检查类型为TCP或HTTP时，必须指定该端口。
      默认为后端服务的端口，除非您希望指定特定端口，否则建议留空。
  - name: checkDelayLoop
    type: integer
    description: |-
      健康检查的检查间隔时间。
      单位:秒。
  - name: checkConnTimeout
    type: integer
    description: |-
      健康检查的连接超时时间。
      单位:秒。
  - name: checkRetry
    type: integer
    description: 检查重试次数。
  - name: checkDelayTry
    type: integer
    description: |-
      健康检查重试的间隔时间。
      单位:秒。
  - name: checkHttpGetUrl
    type: string
    description: |-
      健康检查路径。
      仅适用于HTTP_GET的协议。
      如果指定，必须以/开头。
  - name: checkHttpStatusCode
    type: integer
    description: |-
      健康检查状态码。
      仅适用于HTTP_GET的协议。
  - name: failOpen
    type: boolean
    description: 开启后，当所有后端健康检查均失败时，负载均衡器将暂视所有节点为健康，继续转发流量，以保障业务连续性。
- name: protocol
  type: enum
  required: true
  sdk-field: protocol
  description: 监听器协议。
  enum-values:
  - value: TCP
    desc: TCP 协议。
  - value: UDP
    desc: UDP 协议。
- name: scheduler
  type: enum
  required: true
  sdk-field: scheduler
  description: 监听器转发的方式。
  enum-values:
  - value: mh
    desc: 磁力哈希方式。
  - value: rr
    desc: 轮训方式。
  - value: wrr
    desc: 加权轮训方式。
  - value: lc
    desc: 最少连接方式。
  - value: wlc
    desc: 加权最少连接方式。
  - value: sh
    desc: 根据源地址哈希方式。
  - value: dh
    desc: 根据目标地址哈希方式。
- name: port
  type: string
  required: true
  sdk-field: port
  description: |-
    监听器端口。
    多个端口使用,分隔。
    当端口是范围时用-连接，例如：10000-10005。
    端口的取值范围为0～65535，0代表全范围端口。
    请注意端口不能和该监听器的其他端口有重叠。
- name: kind
  type: enum
  required: false
  sdk-field: kind
  description: |-
    工作模式。
    如果不传则会根据负载均衡实例所在的区域设定默认值。
    默认值可能为DNAT、FNAT。
  enum-values:
  - value: FNAT
    desc: 全局网络地址转换(Full NAT)。
  - value: DR
    desc: 直接路由（Direct Routing)。
  - value: DNAT
    desc: 目标网络地址转换(Destination NAT)。
- name: persistent
  type: integer
  required: false
  sdk-field: persistent
  description: 会话保持时间，单位秒。
- name: idle-timeout
  type: integer
  required: false
  sdk-field: idleTimeout
  description: 空闲超时时间，单位秒。
