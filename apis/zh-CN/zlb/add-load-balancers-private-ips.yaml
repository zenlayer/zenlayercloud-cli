name: AddLoadBalancersPrivateIps
product: zlb
use: add-load-balancers-private-ips
short: 为负载均衡器实例添加内网IP
long: |-
  为负载均衡器实例添加内网IP。
  **注意事项**

  * Subnet所属的区域和VPC需要和负载均衡器实例一致。
  * 指定的内网IP需要在Subnet的CIDR范围内且没被其它资源占用。
examples:
- cmd: zeno zlb add-load-balancers-private-ips --private-ips 10.0.0.0 --load-balancer-id "<your lb id>" --subnet-id "<your subnet id>"
  desc: 为负载均衡器实例添加内网IP
sdk:
  service: zlb
  version: '2025-04-01'
  action: AddLoadBalancersPrivateIps
parameters:
- name: private-ips
  type: string-array
  required: true
  sdk-field: privateIps
  description: |-
    要加入的内网Ip。
    单次最多20个。
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: 负载均衡ID。
- name: subnet-id
  type: string
  required: true
  sdk-field: subnetId
  description: |-
    作为内网ip的subnetId。
    可以通过[DescribeSubnets](../../zec/vpc-network/describesubnets.md)接口获取。
