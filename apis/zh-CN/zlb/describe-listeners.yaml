name: DescribeListeners
product: zlb
use: describe-listeners
short: 查询负载均衡监听器列表
long: 本接口接口可根据负载均衡器 ID、监听器的协议作为过滤条件获取监听器列表。如果不指定任何过滤条件，则返回指定负载均衡实例下的所有监听器。
examples:
- cmd: zeno zlb describe-listeners --load-balancer-id <loadBalancerId>
  desc: 查询指定负载均衡实例下所有的监听器。
- cmd: zeno zlb describe-listeners --load-balancer-id <loadBalancerId> --protocol TCP
  desc: 指定监听器和监听协议过滤查询监听器。
sdk:
  service: zlb
  version: '2025-04-01'
  action: DescribeListeners
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: 负载均衡实例的ID。
- name: listener-ids
  type: string-array
  required: false
  sdk-field: listenerIds
  description: 要查询的负载均衡监听器 ID列表。
- name: protocol
  type: enum
  required: false
  sdk-field: protocol
  description: 要查询的监听器协议类型。
  enum-values:
  - value: TCP
    desc: TCP 协议。
  - value: UDP
    desc: UDP 协议。
response:
- name: listeners
  type: object-array
  description: 监听器列表。
  array-style: json
  item-schema:
  - name: listenerId
    type: string
    description: 负载均衡监听器 ID。
  - name: listenerName
    type: string
    description: 监听器的名称。
  - name: protocol
    type: enum
    description: 监听器协议。
    enum-values:
    - value: TCP
      desc: TCP 协议。
    - value: UDP
      desc: UDP 协议。
  - name: port
    type: string
    description: |-
      监听器端口。
      多个端口使用,分隔。
      当端口是范围时用`-`连接，例如：10000-10005。
      如果传多个单独的端口连续，将会被自动聚合为范围端口。
  - name: healthCheck
    type: object
    description: 监听器的健康检查信息。
    object-schema:
    - name: enabled
      type: boolean
      description: 是否开启健康检查。
    - name: checkType
      type: enum
      description: |-
        健康检查使用的协议。
        当开启健康检查时， 该字段必填。
      enum-values:
      - value: PING_CHECK
        desc: Ping 检查。
      - value: TCP
        desc: TCP 检查。
      - value: HTTP_GET
        desc: HTTP Get 请求检查。
    - name: checkPort
      type: integer
      description: |-
        健康检查端口。
        当监听器端口为全端口（0）且健康检查类型为TCP或HTTP时，必须指定该端口。
        默认为后端服务的端口，除非您希望指定特定端口，否则建议留空。
    - name: checkDelayLoop
      type: integer
      description: |-
        健康检查的检查间隔时间。
        单位:秒。
    - name: checkConnTimeout
      type: integer
      description: |-
        健康检查的连接超时时间。
        单位:秒。
    - name: checkRetry
      type: integer
      description: 检查重试次数。
    - name: checkDelayTry
      type: integer
      description: |-
        健康检查重试的间隔时间。
        单位:秒。
    - name: checkHttpGetUrl
      type: string
      description: |-
        健康检查路径。
        仅适用于HTTP_GET的协议。
        如果指定，必须以/开头。
    - name: checkHttpStatusCode
      type: integer
      description: |-
        健康检查状态码。
        仅适用于HTTP_GET的协议。
    - name: failOpen
      type: boolean
      description: 开启后，当所有后端健康检查均失败时，负载均衡器将暂视所有节点为健康，继续转发流量，以保障业务连续性。
  - name: scheduler
    type: enum
    description: 监听器转发的方式。
    enum-values:
    - value: mh
      desc: 磁力哈希方式。
    - value: rr
      desc: 轮训方式。
    - value: wrr
      desc: 加权轮训方式。
    - value: lc
      desc: 最少连接方式。
    - value: wlc
      desc: 加权最少连接方式。
    - value: sh
      desc: 根据源地址哈希方式。
    - value: dh
      desc: 根据目标地址哈希方式。
  - name: kind
    type: enum
    description: 工作模式。
    enum-values:
    - value: FNAT
      desc: 全局网络地址转换(Full NAT)。
    - value: DR
      desc: 直接路由（Direct Routing)。
    - value: DNAT
      desc: 目标网络地址转换(Destination NAT)。
  - name: createTime
    type: string
    description: |-
      创建时间。
      按照ISO8601标准表示，并且使用UTC时间。
      格式为：YYYY-MM-ddTHH:mm:ssZ。
  - name: persistent
    type: integer
    description: 会话保持时间，单位秒。
  - name: idleTimeout
    type: integer
    description: 空闲超时时间，单位秒。
