name: DescribeBackendHealth
product: zlb
use: describe-backend-health
short: 获取负载均衡后端服务器的健康检查状态
long: 查询负载均衡实例的绑定的后端服务列表。
examples:
- cmd: zeno zlb describe-backend-health --load-balancer-id <loadBalancerId>
  desc: 查询负载均衡实例上绑定的所有后端服务健康检查状态。
sdk:
  service: zlb
  version: '2025-04-01'
  action: DescribeBackendHealth
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: 负载均衡实例 ID。
- name: listener-id
  type: string
  required: false
  sdk-field: listenerId
  description: |-
    负载均衡监听器的 ID。
    如果未指定，则查询所有后端。
response:
- name: backends
  type: object-array
  description: 负载均衡的后端服务器状态。
  array-style: json
  item-schema:
  - name: healthStatus
    type: enum
    description: 后端服务健康检查状态。
    enum-values:
    - value: Alive
      desc: 健康正常状态。
    - value: Dead
      desc: 异常状态。
    - value: Unknown
      desc: 未探测状态。
    - value: Close
      desc: 健康检查关闭。
  - name: healthStatusDetail
    type: object-array
    description: |-
      后端服务健康检查对应端口的健康检查状态。
      当`healthStatus`为`Close` 或 `Unknown`时，无详情信息。
  - name: instanceId
    type: string
    description: |-
      实例ID。
      可通过 DescribeInstances 接口返回字段中的 InstanceId 字段获取。
  - name: privateIpAddress
    type: string
    description: 实例上绑定网卡的私网IP地址。
  - name: weight
    type: integer
    description: |-
      后端服务修改后的转发权重。
      创建绑定服务器时默认值为100, 修改时如果不指定，则不会进行修改。
      删除时不需要指定该参数。
  - name: backendPort
    type: integer
    description: |-
      请求转发和健康检查的目标端口。
      如果为空，将跟随监听器端口配置。
      删除时不需要指定该参数。
  - name: listenerId
    type: string
    description: 负载均衡监听器 ID。
  - name: listenerName
    type: string
    description: 监听器的名称。
  - name: protocol
    type: enum
    description: 监听器协议。
    enum-values:
    - value: TCP
      desc: TCP 协议。
    - value: UDP
      desc: UDP 协议。
  - name: listenerPort
    type: string
    description: |-
      监听器端口。
      多个端口使用,分隔。
      当端口是范围时用`-`连接，例如：10000-10005。
