name: DescribeBackendHealth
product: zlb
use: describe-backend-health
short: 获取负载均衡后端服务器的健康检查状态
long: 查询负载均衡实例的绑定的后端服务列表。
examples:
- cmd: zeno zlb describe-backend-health --load-balancer-id <loadBalancerId>
  desc: 查询负载均衡实例上绑定的所有后端服务健康检查状态。
sdk:
  service: zlb
  version: '2025-04-01'
  action: DescribeBackendHealth
parameters:
- name: load-balancer-id
  type: string
  required: true
  sdk-field: loadBalancerId
  description: 负载均衡实例 ID。
- name: listener-id
  type: string
  required: false
  sdk-field: listenerId
  description: |-
    负载均衡监听器的 ID。
    如果未指定，则查询所有后端。
