name: UnbindSecurityGroupFromLoadBalancers
product: zlb
use: unbind-security-group-from-load-balancers
short: 批量解绑负载均衡实例的安全组。
long: 将一个或多个负载均衡实例与其绑定的安全组解除关联。
examples:
- cmd: zeno zlb unbind-security-group-from-load-balancers --load-balancer-ids "<your lb id1>" --load-balancer-ids "<your lb id2>"
  desc: 批量解绑负载器均衡的安全组
sdk:
  service: zlb
  version: '2025-04-01'
  action: UnbindSecurityGroupFromLoadBalancers
parameters:
- name: load-balancer-ids
  type: string-array
  required: true
  sdk-field: loadBalancerIds
  description: 要解绑安全组的负载均衡ID集合。
response:
- name: failedLoadBalancerIds
  type: string-array
  description: 解绑失败的负载均衡实例集合。
