name: DescribeLoadBalancerRegions
product: zlb
use: describe-load-balancer-regions
short: 查询支持负载均衡售卖的区域
long: 查询支持购买负载均衡的区域。
examples:
- cmd: zeno zlb describe-load-balancer-regions
  desc: 获取负载均衡售卖的区域。
sdk:
  service: zlb
  version: '2025-04-01'
  action: DescribeLoadBalancerRegions
response:
- name: regions
  type: object-array
  description: 节点列表。
  array-style: json
  item-schema:
  - name: regionId
    type: string
    description: 节点ID。
  - name: cityName
    type: string
    description: 节点所属的城市名称。
  - name: cityCode
    type: string
    description: 城市对应的三字码。
