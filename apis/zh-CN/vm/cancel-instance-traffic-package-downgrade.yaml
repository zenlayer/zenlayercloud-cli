name: CancelInstanceTrafficPackageDowngrade
product: vm
use: cancel-instance-traffic-package-downgrade
short: 取消实例流量包降配
long: |-
  取消虚拟机实例流量包降配订单。
  **注意事项**

  * 当虚拟机实例为预付费且实例的[`internetChargeType`](../datastructure.md#internetchargetype)为`ByTrafficPackage`时，实例下调流量包大小时，将生成降配订单，该降配订单在下个续费周期生效，通过本接口可以取消下调流量包。
examples:
- cmd: zeno vm cancel-instance-traffic-package-downgrade --instance-id instanceId
  desc: 取消实例流量包降配订单
sdk:
  service: vm
  version: '2026-04-01'
  action: CancelInstanceTrafficPackageDowngrade
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 待操作的实例ID。
