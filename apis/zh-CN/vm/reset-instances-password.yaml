name: ResetInstancesPassword
product: vm
use: reset-instances-password
short: 重置虚拟机实例密码
long: |-
  将虚拟机实例操作系统的密码重置为用户指定的密码。
  **注意事项**

  * 重置密码操作，针对Windows系统默认重置的是Administrator的密码；针对Linux系统默认重置的是root的密码。
  * 重置密码要求实例必须处于开机状态，重置成功后，实例可能会自动重启
  * 单次最多能创建**100**台实例。
sdk:
  service: vm
  version: '2026-04-01'
  action: ResetInstancesPassword
parameters:
- name: instance-ids
  type: string-array
  required: true
  sdk-field: instanceIds
  description: 虚拟机实例ID集合。
- name: password
  type: string
  required: true
  sdk-field: password
  description: 实例登录密码。
