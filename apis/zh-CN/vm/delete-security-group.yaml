name: DeleteSecurityGroup
product: vm
use: delete-security-group
short: 删除安全组
long: |-
  删除安全组。
  **注意事项**

  * 不能删除存在实例的安全组，可通过`DescribeSecurityGroups`接口查看。
  * 该接口只能处于 **Available** 或 **Fail** 状态的安全组调用。
  * 默认安全组不支持删除。
examples:
- cmd: zeno vm delete-security-group --security-group-id your-security-group-id
  desc: 删除安全组。
sdk:
  service: vm
  version: '2026-04-01'
  action: DeleteSecurityGroup
parameters:
- name: security-group-id
  type: string
  required: true
  sdk-field: securityGroupId
  description: 安全组ID。
