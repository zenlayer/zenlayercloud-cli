name: DescribeVncUrl
product: vm
use: describe-vnc-url
short: 获取实例VNC地址
long: 获取实例VNC地址。
examples:
- cmd: zeno vm describe-vnc-url --instance-id <instanceId>
  desc: 获取VNC URL地址。
sdk:
  service: vm
  version: '2026-04-01'
  action: DescribeVncUrl
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 要查询的实例ID。
response:
- name: url
  type: string
  description: VNC地址URL。
