name: AssociateSecurityGroupInstance
product: vm
use: associate-security-group-instance
short: 安全组绑定实例
long: |-
  为安全组绑定实例。
  **注意事项**

  * 安全组状态需是**Available。**
  * 实例状态需是**RUNNING**或**STOPPED**。
  * 实例可绑定的安全组数量限制为2个。
examples:
- cmd: zeno vm associate-security-group-instance --security-group-id your-security-group-id --instance-id your-instance-id
  desc: 安全组绑定实例。
sdk:
  service: vm
  version: '2026-04-01'
  action: AssociateSecurityGroupInstance
parameters:
- name: security-group-id
  type: string
  required: true
  sdk-field: securityGroupId
  description: 安全组ID。
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 实例ID。
