name: DescribeDisks
product: vm
use: describe-disks
short: 查询云硬盘列表
long: 查询云硬盘列表。
examples:
- cmd: zeno vm describe-disks --disk-status AVAILABLE --disk-size 20 --portable true --zone-id SIN-E
  desc: 查询云硬盘列表。
sdk:
  service: vm
  version: '2026-04-01'
  action: DescribeDisks
parameters:
- name: disk-ids
  type: string-array
  required: false
  sdk-field: diskIds
  description: 云硬盘ID集合。
- name: disk-name
  type: string
  required: false
  sdk-field: diskName
  description: 云硬盘名称。
- name: disk-status
  type: enum
  required: false
  sdk-field: diskStatus
  description: 云硬盘状态。
  enum-values:
  - value: CREATING
    desc: 创建中。
  - value: IN_USE
    desc: 使用中（已挂载）。
  - value: AVAILABLE
    desc: 未挂载状态。
  - value: CHANGING
    desc: 变更中
  - value: ATTACHING
    desc: 挂载中。
  - value: DETACHING
    desc: 卸载中。
  - value: DELETING
    desc: 删除中。
  - value: RECYCLED
    desc: 在回收站中
  - value: RECYCLING
    desc: 回收中。
- name: disk-type
  type: enum
  required: false
  sdk-field: diskType
  description: |-
    云硬盘类型。
    SYSTEM：系统盘。
    DATA：数据盘。
  enum-values:
  - value: SYSTEM
    desc: 系统盘。
  - value: DATA
    desc: 数据盘。
- name: disk-category
  type: string
  required: false
  sdk-field: diskCategory
  description: |-
    云硬盘种类。
    STANDARD：标准云盘。
    SSD：固态硬盘。
- name: disk-size
  type: integer
  required: false
  sdk-field: diskSize
  description: 云硬盘大小，单位GB。
- name: portable
  type: boolean
  required: false
  sdk-field: portable
  description: |-
    是否可拔插。
    false代表会随实例一起删除。
    true代表不会随实例一起删除。
- name: instance-id
  type: string
  required: false
  sdk-field: instanceId
  description: 实例ID。
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: |-
    可用区ID。
    可从DescribeZones接口中获取。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    返回的分页数。
    默认为1。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 资源组ID。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 结果集。
  array-style: json
  item-schema:
  - name: diskId
    type: string
    description: 云硬盘ID。
  - name: diskName
    type: string
    description: 云硬盘名称。
  - name: zoneId
    type: string
    description: 云盘所属区域。
  - name: diskType
    type: enum
    description: |-
      云盘类型。
      SYSTEM：系统盘。
      DATA：数据盘。
    enum-values:
    - value: SYSTEM
      desc: 系统盘。
    - value: DATA
      desc: 数据盘。
  - name: portable
    type: boolean
    description: 是否可拔插。
  - name: diskCategory
    type: string
    description: |-
      云硬盘种类。
      STANDARD：标准云盘。
      SSD：固态硬盘。
  - name: diskSize
    type: integer
    description: 云盘大小，单位GB。
  - name: diskStatus
    type: enum
    description: 云盘状态。
    enum-values:
    - value: CREATING
      desc: 创建中。
    - value: IN_USE
      desc: 使用中（已挂载）。
    - value: AVAILABLE
      desc: 未挂载状态。
    - value: CHANGING
      desc: 变更中
    - value: ATTACHING
      desc: 挂载中。
    - value: DETACHING
      desc: 卸载中。
    - value: DELETING
      desc: 删除中。
    - value: RECYCLED
      desc: 在回收站中
    - value: RECYCLING
      desc: 回收中。
  - name: instanceId
    type: string
    description: 所绑定的实例ID。
  - name: instanceName
    type: string
    description: 所绑定的实例名字。
  - name: chargeType
    type: enum
    description: |-
      付费类型。
      PREPAID：预付费。
      POSTPAID：后付费。
    enum-values:
    - value: PREPAID
      desc: 预付费计费方式。
    - value: POSTPAID
      desc: 后付费计费方式。
  - name: createTime
    type: string
    description: |-
      创建时间。
      格式为：YYYY-MM-DDThh:mm:ssZ。
  - name: expiredTime
    type: string
    description: |-
      到期时间。
      格式为：YYYY-MM-DDThh:mm:ssZ。
  - name: period
    type: integer
    description: |-
      购买实例的时长，单位：月。
      后付费实例该字段为null。
  - name: autoRenew
    type: boolean
    description: |-
      是否自动续费。
      对于预付费实例，取消订阅后，该字段值将返回false。
  - name: tags
    type: object
    description: 资源关联的标签信息。
    object-schema:
    - name: tags
      type: object-array
      description: 标签对列表。
      array-style: json
      item-schema:
      - name: key
        type: string
        description: |-
          标签键。
          长度限制：1～64个字符。
      - name: value
        type: string
        description: |-
          标签值。
          长度限制：1～64个字符。
