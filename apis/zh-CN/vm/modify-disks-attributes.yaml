name: ModifyDisksAttributes
product: vm
use: modify-disks-attributes
short: 修改云硬盘属性
long: |-
  修改一个或多个云硬盘属性。
  **注意事项**

  * 目前仅支持修改云硬盘的名称。
  * 如果传入多个云硬盘ID，仅支持所有云盘修改为同一属性。
examples:
- cmd: zeno vm modify-disks-attributes --disk-ids your-disk-id --disk-name newDiskName
  desc: 修改一个或多个云硬盘属性。
sdk:
  service: vm
  version: '2026-04-01'
  action: ModifyDisksAttributes
parameters:
- name: disk-ids
  type: string-array
  required: true
  sdk-field: diskIds
  description: 待修改属性的云硬盘ID集合。
- name: disk-name
  type: string
  required: true
  sdk-field: diskName
  description: |-
    新的云盘名称。
    必须以数字或字母开头或结尾，长度1-64字符，仅支持字母、数字、-和英文句点(.)。
