name: InquiryPriceCreateDisks
product: vm
use: inquiry-price-create-disks
short: 创建云硬盘询价
long: |-
  创建云硬盘询价。
  **注意事项**

  * 本接口只能为数据类型的云硬盘询价。
  * 如果客户是预付费类型，则只支持预付费询价，反之亦然。如需开通对应付费方式，请联系Support。
examples:
- cmd: zeno vm inquiry-price-create-disks --zone-id HKG-A --disk-size 2000 --charge-type PREPAID
  desc: 创建云硬盘询价。
sdk:
  service: vm
  version: '2026-04-01'
  action: InquiryPriceCreateDisks
parameters:
- name: zone-id
  type: string
  required: true
  sdk-field: zoneId
  description: |-
    可用区ID。
    可从DescribeZones接口中获取。
- name: disk-size
  type: integer
  required: true
  sdk-field: diskSize
  description: 云硬盘大小，单位GB。
- name: disk-amount
  type: integer
  required: false
  sdk-field: diskAmount
  description: |-
    云硬盘数量。
    最小值与默认值均为1，最大值50。
- name: charge-type
  type: enum
  required: true
  sdk-field: chargeType
  description: |-
    付费类型。
    PREPAID：预付费，即包年包月。
    POSTPAID：后付费。
  enum-values:
  - value: PREPAID
    desc: 预付费计费方式。
  - value: POSTPAID
    desc: 后付费计费方式。
- name: charge-prepaid
  type: object
  required: false
  sdk-field: chargePrepaid
  description: |-
    预付费模式，即包年包月相关参数设置。
    若指定云硬盘的付费类型为预付费则该参数必传。
  object-schema:
  - name: period
    type: integer
    description: |-
      购买实例的时长。
      单位：月。
- name: disk-category
  type: string
  required: false
  sdk-field: diskCategory
  description: |-
    云硬盘种类。
    STANDARD：标准云盘。
    SSD：固态硬盘。
    默认为SSD。
response:
- name: dataDiskPrice
  type: object
  description: 云硬盘价格。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：<br/>HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
