name: DescribeAiMonthlyTotalCost
product: aigw
use: describe-ai-monthly-total-cost
short: 查询AI网关月总费用
long: |-
  查询AI网关月总费用
  **注意事项**

  * 本接口认证方式请参考[认证方式](../../../api-introduction/instruction/authorization/README.md)
examples:
- cmd: zeno aigw describe-ai-monthly-total-cost --instance-ids 1652682429418183507 --month 2026-03
  desc: 查询 AI 网关在指定月份的总费用。
sdk:
  service: aigw
  version: '2026-04-14'
  action: DescribeAiMonthlyTotalCost
parameters:
- name: instance-ids
  type: string
  required: false
  sdk-field: instanceIds
  description: 实例ID。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 资源组ID。
- name: month
  type: string
  required: true
  sdk-field: month
  description: 月份，格式："2026-2" 或 "2026-02"。
response:
- name: totalCost
  type: float
  description: AI网关月总费用。
