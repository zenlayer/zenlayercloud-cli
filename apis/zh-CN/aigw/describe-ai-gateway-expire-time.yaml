name: DescribeAiGatewayExpireTime
product: aigw
use: describe-ai-gateway-expire-time
short: 查询AI网关过期时间
long: |-
  查询AI网关过期时间
  **注意事项**

  * 本接口认证方式请参考[认证方式](../../../api-introduction/instruction/authorization/README.md)
examples:
