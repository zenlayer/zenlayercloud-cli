name: ModifyAiGatewayModels
product: aigw
use: modify-ai-gateway-models
short: 修改AI网关模型
long: |-
  修改AI网关模型
  **注意事项**

  * 本接口认证方式请参考[认证方式](../../../api-introduction/instruction/authorization/README.md)
examples:
- cmd: zeno aigw modify-ai-gateway-models --gateway-uuid 1568676002379339603 --model-access LIMITED --model-uuids 8eapj83as8 --model-uuids 0yb8yk2dl0
  desc: 修改 AI 网关模型。
sdk:
  service: aigw
  version: '2026-04-14'
  action: ModifyAiGatewayModels
parameters:
- name: gateway-uuid
  type: string
  required: true
  sdk-field: gatewayUuid
  description: 网关UUID。
- name: model-access
  type: enum
  required: true
  sdk-field: modelAccess
  description: 模型访问权限。
  enum-values:
  - value: UNLIMITED
    desc: 不限制模型，可使用当前上架的所有模型
  - value: LIMITED
    desc: 受限，只可使用关联的模型
- name: model-uuids
  type: string-array
  required: false
  sdk-field: modelUuids
  description: 模型UUID列表。
