name: DescribeAiGatewayModels
product: aigw
use: describe-ai-gateway-models
short: 查询AI网关模型
long: |-
  查询AI网关模型
  **注意事项**

  * 本接口认证方式请参考[认证方式](../../../api-introduction/instruction/authorization/README.md)
examples:
- cmd: zeno aigw describe-ai-gateway-models --gateway-uuid 1568676002379339603
  desc: 查询 AI 网关模型。
sdk:
  service: aigw
  version: '2026-04-14'
  action: DescribeAiGatewayModels
parameters:
- name: gateway-uuid
  type: string
  required: true
  sdk-field: gatewayUuid
  description: 网关UUID。
response:
- name: models
  type: object-array
  description: 关联模型列表。
  array-style: json
  item-schema:
  - name: modelUuid
    type: string
    description: 模型uuid。
  - name: modelName
    type: string
    description: 模型名称。
