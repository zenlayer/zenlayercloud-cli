name: ModifyAiGatewayIpAcl
product: aigw
use: modify-ai-gateway-ip-acl
short: 修改AI网关IP访问控制
long: |-
  修改AI网关IP访问控制
  **注意事项**

  * 本接口认证方式请参考[认证方式](../../../api-introduction/instruction/authorization/README.md)
examples:
- cmd: zeno aigw modify-ai-gateway-ip-acl --gateway-uuid 1681046263778257235 --ip-acl-type WHITE --ip-addresses 1.1.1.1 --enabled true
  desc: 修改 AI 网关 IP 访问控制。
sdk:
  service: aigw
  version: '2026-04-14'
  action: ModifyAiGatewayIpAcl
parameters:
- name: gateway-uuid
  type: string
  required: true
  sdk-field: gatewayUuid
  description: 网关UUID。
- name: ip-acl-type
  type: enum
  required: true
  sdk-field: ipAclType
  description: IP访问控制类型（白名单/黑名单）。
  enum-values:
  - value: WHITE
    desc: IP白名单
  - value: BLACK
    desc: IP黑名单
- name: ip-addresses
  type: string-array
  required: false
  sdk-field: ipAddresses
  description: IP地址列表。
- name: enabled
  type: boolean
  required: false
  sdk-field: enabled
  description: 是否启用。
