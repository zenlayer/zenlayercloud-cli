name: DescribeVmInventoryCapacity
product: zec
use: describe-vm-inventory-capacity
short: VM库存容量
long: 查询各节点VM库存容量级别信息。
examples:
- cmd: zeno zec describe-vm-inventory-capacity
  desc: 查询全部节点的VM库存容量。
- cmd: zeno zec describe-vm-inventory-capacity --region-ids asia-southeast-1
  desc: 查询指定节点的VM库存容量。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeVmInventoryCapacity
parameters:
- name: region-ids
  type: string-array
  required: false
  sdk-field: regionIds
  description: |-
    节点 ID 列表，格式如 asia-north-1。
    不传则返回全部节点。
response:
- name: remark
  type: string
  description: 库存容量档位说明，描述各档位对应的可售核数范围。
- name: dataSet
  type: object-array
  description: 各节点库存容量列表。
  array-style: json
  item-schema:
  - name: regionId
    type: string
    description: 节点 ID，格式如 asia-north-1。
  - name: capacity
    type: enum
    description: |-
      该节点整体库存容量级别。
      库存容量根据所有机型可售核数定义，不包含内存、存储或其他资源因素。
    enum-values:
    - value: LIMITED
      desc: 库存有限，可售核数 < 1000。
    - value: NORMAL
      desc: 库存一般，可售核数 1000–2000。
    - value: SUFFICIENT
      desc: 库存充足，可售核数 2000–5000。
    - value: ABUNDANT
      desc: 库存富余，可售核数 ≥ 5000。
  - name: instanceTypes
    type: object-array
    description: 各实例类型的库存容量明细，不含库存为 0 的条目。
    array-style: json
    item-schema:
    - name: instanceType
      type: string
      description: CPU 实例类型，如 z2a、z2i、z4a。
    - name: gpuSpec
      type: string
      description: |-
        GPU 型号，如 z4a.g.C49。
        仅 GPU 实例返回此字段。
    - name: capacity
      type: enum
      description: |-
        该实例类型的库存容量级别。
        库存容量根据所有机型可售核数定义，不包含内存、存储或其他资源因素。
      enum-values:
      - value: LIMITED
        desc: 库存有限，可售核数 < 1000。
      - value: NORMAL
        desc: 库存一般，可售核数 1000–2000。
      - value: SUFFICIENT
        desc: 库存充足，可售核数 2000–5000。
      - value: ABUNDANT
        desc: 库存富余，可售核数 ≥ 5000。
