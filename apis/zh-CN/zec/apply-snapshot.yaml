name: ApplySnapshot
product: zec
use: apply-snapshot
short: 回滚快照
long: |-
  回滚快照到原云盘。
  **注意事项**

  * 用于回滚的快照必须处于AVAILABLE状态。快照状态可以通过[`DescribeSnapshots`](describesnapshots.md)接口查询，见输出参数中`SnapshotState`字段解释。
examples:
- cmd: zeno zec apply-snapshot --snapshot-id snapshotId1 --disk-id disk1
  desc: 回滚快照
sdk:
  service: zec
  version: '2025-09-01'
  action: ApplySnapshot
parameters:
- name: snapshot-id
  type: string
  required: true
  sdk-field: snapshotId
  description: 快照唯一ID。
- name: disk-id
  type: string
  required: true
  sdk-field: diskId
  description: 云硬盘ID。
