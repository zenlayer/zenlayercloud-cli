name: DescribeEipMonitorData
product: zec
use: describe-eip-monitor-data
short: 查询弹性公网IP监控指标
long: 查询一段时间的弹性公网IP监控指标数据。
examples:
- cmd: zeno zec describe-eip-monitor-data --eip-id "< EipId >" --metric-type BANDWIDTH --start-time 2025-06-25T01:55:00Z --end-time 2025-06-25T07:55:00Z
  desc: 查询弹性公网IP监控指标
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeEipMonitorData
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: EIP唯一标识ID。
- name: metric-type
  type: enum
  required: true
  sdk-field: metricType
  description: EIP监控指标类型。
  enum-values:
  - value: BANDWIDTH
    desc: |-
      带宽类型。
      单位bps。
  - value: PACKETS
    desc: |-
      数据包类型。
      单位pps。
- name: start-time
  type: string
  required: true
  sdk-field: startTime
  description: |-
    查询开始时间。
    时间格式：yyyy-MM-ddTHH:mm:ssZ。
- name: end-time
  type: string
  required: true
  sdk-field: endTime
  description: |-
    查询结束时间。
    时间格式：yyyy-MM-ddTHH:mm:ssZ。
response:
- name: inMaxValue
  type: float
  description: 入方向最大值。
- name: inAvgValue
  type: float
  description: 入方向平均值。
- name: inMinValue
  type: float
  description: 入方向最小值。
- name: inTotalValue
  type: float
  description: 入方向总和值。
- name: outMaxValue
  type: float
  description: 出方向最大值。
- name: outAvgValue
  type: float
  description: 出方向平均值。
- name: outMinValue
  type: float
  description: 出方向最小值。
- name: outTotalValue
  type: float
  description: 出方向总和值。
- name: loseOutMaxValue
  type: float
  description: 丢失出方向最大值。
- name: loseOutMinValue
  type: float
  description: 丢失出方向最小值。
- name: loseOutTotalValue
  type: float
  description: 丢失出方向总和值。
- name: loseInMaxValue
  type: float
  description: 丢失入方向最大值。
- name: loseInMinValue
  type: float
  description: 丢失入方向最小值。
- name: loseInTotalValue
  type: float
  description: 丢失入方向总和值。
- name: dataList
  type: object-array
  description: 监控数据集合。
