name: DescribePlacementGroups
product: zec
use: describe-placement-groups
short: 查询置放组列表
long: 查询一个或多个置放组的信息。用户可以根据置放组ID、名称或可用区等条件来查询置放组的详细信息。
examples:
- cmd: zeno zec describe-placement-groups --page-size 20 --page-num 1
  desc: 查询置放组列表。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribePlacementGroups
parameters:
- name: placement-group-ids
  type: string-array
  required: false
  sdk-field: placementGroupIds
  description: |-
    根据置放组ID列表筛选。
    最多支持100个ID查询。
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    根据置放组名称筛选。
    支持模糊匹配。
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: 根据置放组所属可用区筛选。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID筛选。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 置放组结果集。
  array-style: json
  item-schema:
  - name: placementGroupId
    type: string
    description: 置放组ID。
  - name: name
    type: string
    description: 置放组名称。
  - name: zoneId
    type: string
    description: 置放组所属可用区ID。
  - name: partitionNum
    type: integer
    description: |-
      置放组的分区数。
      取值范围为2到5，决定置放组最大可关联实例数。
  - name: affinity
    type: integer
    description: |-
      置放组的亲和度。
      取值范围为1到分区数向下取整除以2。
  - name: instanceCount
    type: integer
    description: 置放组内的实例数量。
  - name: instanceIds
    type: string-array
    description: 置放组内关联的实例ID列表。
  - name: constraintStatus
    type: enum
    description: 置放组约束满足状态。
    enum-values:
    - value: Satisfied
      desc: 已满足放置策略约束。
    - value: Unsatisfied
      desc: 未满足放置策略约束。
  - name: createTime
    type: string
    description: 置放组的创建时间。
  - name: resourceGroup
    type: object
    description: 置放组所属的资源组信息。
    object-schema:
    - name: resourceGroupId
      type: string
      description: 资源组ID。
    - name: resourceGroupName
      type: string
      description: 资源组名称。
  - name: tags
    type: object
    description: 置放组的标签。
    object-schema:
    - name: tags
      type: object-array
      description: 标签对列表。
      array-style: json
      item-schema:
      - name: key
        type: string
        description: |-
          标签键。
          长度限制：1～64个字符。
      - name: value
        type: string
        description: |-
          标签值。
          长度限制：1～64个字符。
