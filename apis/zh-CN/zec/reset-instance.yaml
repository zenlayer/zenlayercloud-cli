name: ResetInstance
product: zec
use: reset-instance
short: 重装一台虚拟机实例操作系统
long: |-
  重装一台虚拟机实例操作系统。
  #### 准备工作

  * 查询镜像：调用[DescribeImages](../image/describeimages.md)可以查询到需要重装的操作系统镜像信息。


  **注意事项**

  * 如果指定了`imageId`参数，则使用指定的镜像重装；否则按照实例当前使用的镜像进行重装。
  * 不支持跨操作系统类型(`osType`)重装。比如操作系统类型`linux` 重装成 `windows`
  * 实例的系统盘大小必须大于或等于被重装镜像的大小。否则操作将被拒绝。
  * 系统盘将会被格式化，并重置；请确保系统盘中无重要文件。
  * 密码与keyPair必须且只能指定其中一种。
  * 重装系统必须在实例为关机状态才能进行。
  * `Windows` 和 `Generic` 不支持指定 `key_id` SSH登录。
  * 重装实例后进入`DEPLOYING`(部署中)的状态。如果实例的最新状态变为`RUNNING`(开机)，则代表操作成功，如果变为`REINSTALL_FAILED`(重装失败)，则代表操作失败，请与管理员联系；实例的状态可以通过调用 [`DescribeInstancesStatus`](describeinstancesstatus.md) 接口查询。
examples:
- cmd: zeno zec reset-instance --instance-id <instanceId> --image-id ubuntu2022 --password Example+123 --enable-agent true
  desc: 重装系统。
sdk:
  service: zec
  version: '2025-09-01'
  action: ResetInstance
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 要重装的实例ID。
- name: password
  type: string
  required: false
  sdk-field: password
  description: |-
    实例的新密码。
    与keyId必须指定其中的一种（Windows和Generic类型的镜像无法指定密码和key）。
    必须包含以下3种格式的字符：大小写字母: [a-zA-Z]数字: 0-9特殊字符: ~!@$^*-_=+。
- name: key-id
  type: string
  required: false
  sdk-field: keyId
  description: |-
    密钥ID。
    与password必须指定其中的一种（Windows和Generic类型的镜像无法指定密码和key）。
    可调用接口DescribeKeyPairs来获得最新的密钥对信息。
    关联密钥后，就可以通过对应的私钥来访问实例；密钥与密码不能同时指定，同时Windows操作系统不支持指定密钥。
    示例值：key-YWD2QFOl。
- name: image-id
  type: string
  required: false
  sdk-field: imageId
  description: |-
    指定重装的的镜像ID。
    可以通过[DescribeImages](describeimages.md)取返回信息中的imageId字段。
    如果不指定，会根据当前镜像进行重装。
- name: timezone
  type: string
  required: false
  sdk-field: timezone
  description: 操作系统时区设置。
- name: enable-agent
  type: boolean
  required: false
  sdk-field: enableAgent
  description: 是否启用 QEMU Guest 代理 (QGA)。
- name: instance-name
  type: string
  required: false
  sdk-field: instanceName
  description: |-
    修改的实例名称。
    2～63个字符。
    仅支持输入字母、数字、-和英文句点(.)。
- name: user-data
  type: string
  required: false
  sdk-field: userData
  description: 初始化命令。
