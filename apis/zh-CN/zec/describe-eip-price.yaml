name: DescribeEipPrice
product: zec
use: describe-eip-price
short: 创建公网弹性IP询价
long: |-
  创建公网弹性IP询价。
  **注意事项**

  * 保底流量包大小仅对计费周期为月有效。
examples:
- cmd: zeno zec describe-eip-price --region-id asia-east-1 --amount 1 --name Test-EIP --internet-charge-type ByTrafficPackage --network-line-type PremiumBGP --bandwidth 50 --flow-package 10
  desc: 查询一个BGP公网IP的价格，网络计费采用流量包计费。流量包大小为10TB。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeEipPrice
parameters:
- name: region-id
  type: string
  required: true
  sdk-field: regionId
  description: 创建EIP所在的节点ID。
- name: internet-charge-type
  type: enum
  required: true
  sdk-field: internetChargeType
  description: 公网弹性IP的网络计费方式。
  enum-values:
  - value: ByBandwidth
    desc: 固定带宽计费方式。
  - value: ByTrafficPackage
    desc: 流量包计费方式。
  - value: BandwidthCluster
    desc: 共享带宽包计费方式。
- name: amount
  type: integer
  required: false
  sdk-field: amount
  description: 需要创建EIP的数量。
- name: eip-v4-type
  type: enum
  required: false
  sdk-field: eipV4Type
  description: |-
    公网弹性IP的线路类型。
    已废弃，请使用networkLineType。
  deprecated: true
  enum-values:
  - value: BGPLine
    desc: BGP 线路。
  - value: CN2Line
    desc: CN2 回国优化线路。
  - value: LocalLine
    desc: 本地IP。
  - value: ChinaMobile
    desc: 中国移动线路。
  - value: ChinaUnicom
    desc: 中国联通线路。
  - value: ChinaTelecom
    desc: 中国电信线路。
  - value: Cogent
    desc: Cogent。
  - value: PathBasedBandwidthIP
    desc: 多路径带宽 IP。
- name: network-line-type
  type: enum
  required: false
  sdk-field: networkLineType
  description: 公网弹性IP的线路类型。
  enum-values:
  - value: PremiumBGP
    desc: |-
      优质 BGP。
      高性能网络。
  - value: CN2
    desc: 回国优化线路。
  - value: PathBasedBandwidthIP
    desc: 多路径带宽 IP。
  - value: LocalLine
    desc: 本地IP。
  - value: StandardBGP
    desc: |-
      标准 BGP。
      通用网络，成本优化。
  - value: CMI
    desc: 中国移动。
  - value: CUG
    desc: 中国联通。
  - value: CTG
    desc: 中国电信。
- name: bandwidth
  type: integer
  required: false
  sdk-field: bandwidth
  description: |-
    公网弹性IP的带宽限速。
    单位：Mbps。
- name: flow-package
  type: float
  required: false
  sdk-field: flowPackage
  description: |-
    公网IPv6的流量包大小。
    单位为TB。
    值要求为0或0.1的倍数。
    当子网的堆栈类型包括V6且为公网时，且网络计费方式是流量计费(ByTrafficPackage)需要指定。
- name: cidr-id
  type: string
  required: false
  sdk-field: cidrId
  description: |-
    指定CIDR ID，使用CIDR内分配弹性IP。
    该字段和eipV4Type不能同时指定。
- name: cluster-id
  type: string
  required: false
  sdk-field: clusterId
  description: |-
    公网IPv6所指定的共享带宽包ID。
    当子网的堆栈类型包括V6且为公网时，且网络计费方式是共享带宽包计费(BandwidthCluster)需要指定。
- name: peer-region-id
  type: string
  required: false
  sdk-field: peerRegionId
  description: 远端的节点ID。
response:
- name: eipPrice
  type: object
  description: |-
    公网弹性IP的保留价格。
    如果是通过cidr创建，则保留价格为null。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：<br/>HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
- name: bandwidthPrice
  type: object
  description: 公网弹性IP的带宽价格。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
