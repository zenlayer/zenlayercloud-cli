name: ModifyInstanceType
product: zec
use: modify-instance-type
short: 变更实例的规格
long: |-
  将指定弹性计算实例的规格变更为目标规格。
  **注意事项**

  * 本接口为异步接口，变更规格请求发送成功后会立即返回，此时操作并未完成。实例操作结果可以通过调用[`DescribeInstancesStatus`](describeinstancesstatus.md)接口查询，如果实例状态(`instanceStatus`)由`RESIZING`变为`STOPPED`，则代表规格变更成功，变更过程中不可对实例进行任何操作。
  * 仅实例状态为`STOPPED` 状态的实例才能进行此操作。
  * GPU实例不允许执行该操作。
examples:
- cmd: zeno zec modify-instance-type --instance-id instanceId --instance-type z2a.cpu.4
  desc: 变更实例的规格。
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifyInstanceType
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 要变更的实例ID。
- name: instance-type
  type: string
  required: true
  sdk-field: instanceType
  description: 变更的目标实例规格。
