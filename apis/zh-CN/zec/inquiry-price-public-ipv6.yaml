name: InquiryPricePublicIpv6
product: zec
use: inquiry-price-public-ipv6
short: 公网Ipv6流量包或固定带宽询价
long: |-
  公网Ipv6流量包或固定带宽询价。
  **注意事项**

  * 保底流量包大小仅对计费周期为月有效。
examples:
- cmd: zeno zec inquiry-price-public-ipv6 --region-id asia-east-1 --package-size 10
  desc: 在asia-east-1节点，公网Ipv6流量计费10TB的询价。
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPricePublicIpv6
parameters:
- name: region-id
  type: string
  required: true
  sdk-field: regionId
  description: 节点ID。
- name: package-size
  type: float
  required: false
  sdk-field: packageSize
  description: |-
    流量包订购大小。
    单位为TB。
- name: bandwidth
  type: integer
  required: false
  sdk-field: bandwidth
  description: |-
    公网出带宽上限。
    单位：Mbps。
    不同机型带宽上限范围不一致，具体限制详见购买网络带宽。
response:
- name: bandwidthPrice
  type: object
  description: 带宽的价格。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：<br/>HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: 阶梯的起始值。
    - name: stepEnd
      type: float
      description: |-
        阶梯的到达值。
        为null代表最后一级阶梯。
    - name: unitPrice
      type: float
      description: 阶梯单价。
    - name: discountUnitPrice
      type: float
      description: 阶梯折后价。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
