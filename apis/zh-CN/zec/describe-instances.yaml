name: DescribeInstances
product: zec
use: describe-instances
short: 获取ZEC实例列表
long: 查询一台或多台虚拟机实例的信息。用户可以根据实例ID、实例名称等条件来查询实例的详细信息。
examples:
- cmd: zeno zec describe-instances --instance-ids xxx --page-size 10 --page-num 1
  desc: 查询虚拟机实例列表
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeInstances
parameters:
- name: instance-ids
  type: string-array
  required: false
  sdk-field: instanceIds
  description: |-
    根据实例ID列表进行筛选。
    最大不能超过100个。
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: 实例所属的可用区ID。
- name: image-id
  type: string
  required: false
  sdk-field: imageId
  description: 镜像ID。
- name: ipv4-address
  type: string
  required: false
  sdk-field: ipv4Address
  description: 根据实例关联的IPv4过滤。
- name: ipv6-address
  type: string
  required: false
  sdk-field: ipv6Address
  description: 根据实例关联的IPv6信息过滤。
- name: status
  type: enum
  required: false
  sdk-field: status
  description: 根据实例的状态过滤。
  enum-values:
  - value: DEPLOYING
    desc: 创建部署中。
  - value: REBUILDING
    desc: 重装系统中。
  - value: REBOOT
    desc: 系统重启中。
  - value: RUNNING
    desc: 运行开机。
  - value: STOPPED
    desc: 已关机状态。
  - value: BOOTING
    desc: 系统启动中。
  - value: RELEASING
    desc: 实例释放中。
  - value: STOPPING
    desc: 系统关机中。
  - value: RECYCLE
    desc: 实例处于回收站。
  - value: RECYCLING
    desc: 实例回收中。
  - value: CREATE_FAILED
    desc: 创建失败。
  - value: IMAGING
    desc: 镜像制作中。
  - value: RESIZING
    desc: 变更规格大小中。
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    根据实例显示名称过滤。
    该字段支持模糊搜索。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID过滤。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 实例列表的数据。
  array-style: json
  item-schema:
  - name: instanceId
    type: string
    description: 实例唯一ID。
  - name: instanceName
    type: string
    description: 实例显示名称。
  - name: zoneId
    type: string
    description: 实例所属的可用区ID。
  - name: instanceType
    type: string
    description: |-
      CPU 规格。
      如果是GPU实例，该字段取值为null。
  - name: cpu
    type: integer
    description: |-
      CPU 核数。
      单位：个。
  - name: memory
    type: integer
    description: |-
      内存容量。
      单位：GiB。
  - name: imageId
    type: string
    description: 镜像ID。
  - name: imageName
    type: string
    description: 镜像名称。
  - name: timeZone
    type: string
    description: 设置的系统时区信息。
  - name: nicNetworkType
    type: enum
    description: 网卡模式。
    enum-values:
    - value: Auto
      desc: 默认模式(镜像自适应)。
    - value: FailOver
      desc: 故障转移模式。
    - value: VirtioOnly
      desc: 软件模拟模式。
    - value: VfOnly
      desc: 物理直通模式。
  - name: status
    type: enum
    description: 实例状态。
    enum-values:
    - value: DEPLOYING
      desc: 创建部署中。
    - value: REBUILDING
      desc: 重装系统中。
    - value: REBOOT
      desc: 系统重启中。
    - value: RUNNING
      desc: 运行开机。
    - value: STOPPED
      desc: 已关机状态。
    - value: BOOTING
      desc: 系统启动中。
    - value: RELEASING
      desc: 实例释放中。
    - value: STOPPING
      desc: 系统关机中。
    - value: RECYCLE
      desc: 实例处于回收站。
    - value: RECYCLING
      desc: 实例回收中。
    - value: CREATE_FAILED
      desc: 创建失败。
    - value: IMAGING
      desc: 镜像制作中。
    - value: RESIZING
      desc: 变更规格大小中。
  - name: systemDisk
    type: object
    description: 系统盘信息。
  - name: dataDisks
    type: object-array
    description: 实例上挂载的数据盘信息。
  - name: publicIpAddresses
    type: string-array
    description: 实例上公网IPv4列表。
  - name: privateIpAddresses
    type: string-array
    description: 实例上内网IP列表。
  - name: keyId
    type: string
    description: 安装的SSH密钥ID。
  - name: subnetId
    type: string
    description: 实例主网卡关联的子网ID。
  - name: securityGroupId
    type: string
    description: 实例主网卡关联的安全组ID。
  - name: enableAgent
    type: boolean
    description: 是否开启QGA Agent。
  - name: enableAgentMonitor
    type: boolean
    description: 是否开启QGA 监控采集。
  - name: enableIpForward
    type: boolean
    description: 是否开启IP转发。
  - name: createTime
    type: string
    description: 创建时间。
  - name: expiredTime
    type: string
    description: 到期时间。
  - name: resourceGroupId
    type: string
    description: 实例所属的资源组ID。
  - name: resourceGroupName
    type: string
    description: 实例所属的资源组名称。
  - name: nics
    type: object-array
    description: 实例上绑定的网卡信息。
  - name: tags
    type: object
    description: 实例关联的标签。
  - name: loadBalancerIds
    type: string-array
    description: 实例上绑定的负载均衡ID列表。
  - name: placementGroupId
    type: string
    description: 实例所属的置放组ID。
  - name: instanceOptions
    type: object
    description: 实例选项配置。
