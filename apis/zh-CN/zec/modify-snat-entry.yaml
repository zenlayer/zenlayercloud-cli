name: ModifySnatEntry
product: zec
use: modify-snat-entry
short: 修改SNAT规则
long: 修改SNAT规则。
examples:
- cmd: zeno zec modify-snat-entry --snat-entry-id <snatEntryId> --subnet-ids <subnetId> --eip-ids <eipId>
  desc: 修改成一个子网类型的SNAT。
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifySnatEntry
parameters:
- name: snat-entry-id
  type: string
  required: true
  sdk-field: snatEntryId
  description: SNAT规则 ID。
- name: eip-ids
  type: string-array
  required: false
  sdk-field: eipIds
  description: |-
    SNAT规则添加的弹性公网IP ID集合。
    如果需要修改为NAT网关所有上弹性公网IP，请指定isAllEip=true。
- name: is-all-eip
  type: boolean
  required: false
  sdk-field: isAllEip
  description: 弹性公网IP是否为所有的NAT网关上的公网弹性IP。
- name: cidr
  type: string
  required: false
  sdk-field: cidr
  description: |-
    源CIDR网段。
    该字段已废弃，请使用sourceCidrBlocks。
- name: source-cidr-blocks
  type: string-array
  required: false
  sdk-field: sourceCidrBlocks
  description: |-
    源CIDR地址段列表。
    与subnetIds必须指定其中的一种。
    如果使用全地址段，指定为0.0.0.0/0。
- name: subnet-ids
  type: string-array
  required: false
  sdk-field: subnetIds
  description: |-
    要修改子网ID集合。
    该参数表示该子网内的实例均可以通过SNAT规则访问外部网络。
    与sourceCidrBlocks必须指定其中的一种。
