- name: ipv4BandwidthPrices
  type: object-array
  description: 各流量方向的IPv4带宽价格明细。仅当internetChargeType有值时返回。PathBasedBandwidthIP 线路返回多项（ipv4BandwidthPrice 为 null）；其他线路返回单项（trafficType=ALL）。
