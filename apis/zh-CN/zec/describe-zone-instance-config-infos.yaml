name: DescribeZoneInstanceConfigInfos
product: zec
use: describe-zone-instance-config-infos
short: 查询可用区售卖的机型信息
long: 查询可用区售卖的机型信息。
examples:
- cmd: zeno zec describe-zone-instance-config-infos --instance-type z2a.cpu.4
  desc: 获取规格为z2a.cpu.4的可用配置。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeZoneInstanceConfigInfos
parameters:
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: |-
    要查询的可用区ID。
    例如：asia-east-1a。
- name: instance-type
  type: string
  required: false
  sdk-field: instanceType
  description: |-
    要查询的实例规格。
    例如：z2a.cpu.1。
response:
- name: instanceTypeQuotaSet
  type: object-array
  required: true
  description: 实例规格信息。
  array-style: json
  item-schema:
  - name: zoneId
    type: string
    description: 可用区ID。
  - name: instanceType
    type: string
    description: 实例规格ID。
  - name: instanceTypeName
    type: string
    description: 实例规格的名称。
  - name: cpuCount
    type: integer
    description: |-
      CPU核数。
      单位：核。
  - name: memory
    type: integer
    description: |-
      实例内存容量。
      单位：GiB。
  - name: internetMaxBandwidthOutLimit
    type: integer
    description: 最大出口带宽限制。
  - name: withStock
    type: boolean
    description: 是否有库存。
  - name: internetChargeTypes
    type: string-array
    description: 支持的网络计费类型。
