name: DescribeSecurityGroups
product: zec
use: describe-security-groups
short: 查询安全组列表
long: 查询账户下的安全组信息，支持按安全组 ID 或名称进行筛选，支持分页查询。
examples:
- cmd: zeno zec describe-security-groups --security-group-name --page-size 5 --page-num 1
  desc: 查询安全组列表。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeSecurityGroups
parameters:
- name: security-group-ids
  type: string-array
  required: false
  sdk-field: securityGroupIds
  description: 根据安全组ID列表筛选。
- name: security-group-name
  type: string
  required: false
  sdk-field: securityGroupName
  description: |-
    根据安全组名称筛选。
    支持模糊搜索。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 安全组的结果数据。
  array-style: json
  item-schema:
  - name: securityGroupId
    type: string
    description: 安全组ID。
  - name: securityGroupName
    type: string
    description: 安全组名称。
  - name: scope
    type: string
    description: |-
      范围。
      目前只有全球范围(`Global`)。
  - name: createTime
    type: string
    description: 创建时间。
  - name: vpcIds
    type: string-array
    description: 关联的VPC ID列表。
  - name: isDefault
    type: boolean
    description: 是否是默认安全组。
  - name: nicIdList
    type: string-array
    description: 关联安全组的网卡ID列表。
  - name: natIdList
    type: string-array
    description: 关联安全组的NAT网关ID列表。
  - name: loadBalancerIdList
    type: string-array
    description: 关联安全组的负载均衡ID列表。
