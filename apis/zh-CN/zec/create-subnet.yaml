name: CreateSubnet
product: zec
use: create-subnet
short: 创建子网
long: 创建子网。
examples:
- cmd: zeno zec create-subnet --vpc-id <vpcId> --region-id asia-east-1 --stack-type IPv4_IPv6 --ipv6-type Public --name XXX --cidr-block 10.0.0.0/9
  desc: 创建一个子网。堆栈类型为IPv4_IPv6。IPv6为公网。
sdk:
  service: zec
  version: '2025-09-01'
  action: CreateSubnet
parameters:
- name: vpc-id
  type: string
  required: true
  sdk-field: vpcId
  description: 需要添加子网的VPC ID。
- name: name
  type: string
  required: true
  sdk-field: name
  description: |-
    子网名称。
    范围2到63个字符。
    仅支持输入字母、数字、-和英文句点(.)。
    且必须以数字或字母开头和结尾。
- name: region-id
  type: string
  required: true
  sdk-field: regionId
  description: 子网所在的节点ID。
- name: stack-type
  type: enum
  required: true
  sdk-field: stackType
  description: 子网的IP堆栈类型。
  enum-values:
  - value: IPv4
    desc: 仅IPv4。
  - value: IPv4_IPv6
    desc: IPv4和IPv6。
  - value: IPv6
    desc: 仅IPv6。
- name: cidr-block
  type: string
  required: false
  sdk-field: cidrBlock
  description: |-
    子网的IPv4 CIDR地址段。
    如果指定堆栈类型stackType 包含 IPv4, 则该字段必填。
    指定的CIDR地址段必须属于VPC的CIDR范围内。
- name: ipv6-type
  type: enum
  required: false
  sdk-field: ipv6Type
  description: |-
    IPv6的类型。
    如果指定堆栈类型stackType 包含 IPv6, 则该字段必填。
  enum-values:
  - value: Private
    desc: 内网类型。
  - value: Public
    desc: 公网类型。
- name: dhcp-options-set-id
  type: string
  required: false
  sdk-field: dhcpOptionsSetId
  description: 要绑定的DHCP 选项集ID。
- name: ipv6-cidr-block-id
  type: string
  required: false
  sdk-field: ipv6CidrBlockId
  description: |-
    公网IPv6 CIDR ID。
    该字段仅当ipv6Type是公网(Public)时允许指定。
    如果不指定，将从系统默认IP池里分配。
- name: ipv6-mask-length
  type: integer
  required: false
  sdk-field: ipv6MaskLength
  description: |-
    分配给虚拟机（VM）的IPv6 CIDR前缀的大小。
    该参数必须与ipv6CidrBlockId参数配合使用。
    当未显式传递时，默认值为96。
    最小必须大于或等于指定ipv6CidrBlockId的前缀，最大不能超过96。
