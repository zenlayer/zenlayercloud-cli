name: StartAgentMonitor
product: zec
use: start-agent-monitor
short: 开启实例的 Agent 监控数据采集
long: |-
  为指定弹性计算实例开启 QEMU Guest Agent（QGA）监控数据采集，开启后可通过监控接口获取实例内部性能指标数据。
  **注意事项**

  * 要开启Agent监控采集，要确保安装了QGA(QEMU Guest Agent)。
examples:
- cmd: zeno zec start-agent-monitor --instance-id <instanceId>
  desc: 开启实例Agent采集监控。
sdk:
  service: zec
  version: '2025-09-01'
  action: StartAgentMonitor
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 要操作的实例ID。
