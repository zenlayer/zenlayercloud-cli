name: DeleteImages
product: zec
use: delete-images
short: 删除镜像
long: |-
  删除一个或多个镜像。
  **注意事项**

  * 接口会返回删除失败的镜像id集合，如果集合为空则说明全部成功。
examples:
- cmd: zeno zec delete-images --image-ids imageId1 --image-ids imageId2
  desc: 批量删除自定义镜像
sdk:
  service: zec
  version: '2025-09-01'
  action: DeleteImages
parameters:
- name: image-ids
  type: string-array
  required: true
  sdk-field: imageIds
  description: 镜像ID列表。
response:
- name: imageIds
  type: string-array
  description: 操作失败的镜像ID列表。
