name: InquiryPriceModifyIpv6Bandwidth
product: zec
use: inquiry-price-modify-ipv6-bandwidth
short: 查询调整IPv6带宽后的价格。
long: |-
  查询调整IPv6带宽后的价格。
  **注意事项**

  * 只有网络计费方式为按带宽计费（`ByBandwidth`）的IPv6才支持该操作。
examples:
- cmd: zeno zec inquiry-price-modify-ipv6-bandwidth --ipv6-id ipv6-xxx --bandwidth 20
  desc: 查询将IPv6带宽调整为20Mbps后的价格。
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPriceModifyIpv6Bandwidth
parameters:
- name: ipv6-id
  type: string
  required: true
  sdk-field: ipv6Id
  description: 要操作的公网IPv6。
- name: bandwidth
  type: integer
  required: true
  sdk-field: bandwidth
  description: |-
    调整后的带宽上限。
    单位：Mbps。
response:
- name: ipv6Price
  type: object
  description: 公网IPv6的保留价格。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：<br/>HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
- name: bandwidthPrice
  type: object
  description: 公网IPv6的带宽价格。
  object-schema:
