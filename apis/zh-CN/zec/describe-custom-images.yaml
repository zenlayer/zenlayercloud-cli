name: DescribeCustomImages
product: zec
use: describe-custom-images
short: 查询自定义镜像列表
long: 查询当前账号下的自定义镜像列表。
examples:
- cmd: zeno zec describe-custom-images --page-num 1 --page-size 20
  desc: 查询当前账号下所有自定义镜像。
- cmd: zeno zec describe-custom-images --region-id asia-east-1 --page-num 1 --page-size 20
  desc: 查询`asia-east-1`区域下可用的自定义镜像。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeCustomImages
parameters:
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: 区域ID，传入时仅返回该区域可用的自定义镜像。
- name: image-ids
  type: string-array
  required: false
  sdk-field: imageIds
  description: 镜像ID列表。
- name: image-name
  type: string
  required: false
  sdk-field: imageName
  description: |-
    根据镜像名称过滤。
    该字段支持模糊搜索。
- name: category
  type: string
  required: false
  sdk-field: category
  description: 镜像所属分类。
- name: os-type
  type: enum
  required: false
  sdk-field: osType
  description: 操作系统类型。
  enum-values:
  - value: linux
    desc: Linux操作系统。
  - value: bsd
    desc: BSD操作系统。
  - value: windows
    desc: Windows操作系统。
  - value: android
    desc: Android操作系统。
  - value: any
    desc: 任意类型。
- name: image-status
  type: enum
  required: false
  sdk-field: imageStatus
  description: 镜像的状态。
  enum-values:
  - value: CREATING
    desc: 镜像创建中。
  - value: AVAILABLE
    desc: 镜像创建成功。
  - value: UNAVAILABLE
    desc: 镜像下架。
  - value: SYNCING
    desc: 镜像复制中。
  - value: FAILED
    desc: 镜像创建失败。
  - value: DELETING
    desc: 镜像释放中。
  - value: PROCESSING
    desc: 镜像进行中。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页页码。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID过滤。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 镜像列表数据。
