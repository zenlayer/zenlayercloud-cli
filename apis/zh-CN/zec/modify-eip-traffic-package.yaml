name: ModifyEipTrafficPackage
product: zec
use: modify-eip-traffic-package
short: 调整弹性公网IP流量包
long: |-
  调整弹性公网IP流量包。
  **注意事项**

  * 只有可用状态(`BINDED`、`UNBIND`)的EIP才支持该操作。
  * 国际线路（`PathBasedBandwidthIP`）不支持该操作。
  * 保底流量包大小仅对计费周期为月有效。
  * 该操作为异步执行，调用成功后流量包变更将在后台处理。可通过查询EIP列表接口的 `operationInfo` 字段获取当前操作状态。
examples:
- cmd: zeno zec modify-eip-traffic-package --eip-id "< EipId >" --traffic-package-size 10
  desc: 调整EIP流量包到10TB。
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifyEipTrafficPackage
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: EIP唯一标识ID。
- name: traffic-package-size
  type: float
  required: true
  sdk-field: trafficPackageSize
  description: 流量包大小，单位TB。
