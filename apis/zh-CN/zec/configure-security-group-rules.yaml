name: ConfigureSecurityGroupRules
product: zec
use: configure-security-group-rules
short: 配置安全组规则
long: |-
  配置安全组规则。
  **注意事项**

  * 同一规则方向，规则不能重复。
  * 安全组的规则数量有限，如果需要申请更多资源，请提交Support申请。
  * 该接口是配置的安全组规则会全量覆盖当前的安全组规则。
examples:
- cmd: zeno zec configure-security-group-rules --security-group-id your-security-group-id --rule-infos "{direction=ingress, policy=accept, priority=1, ipProtocol=tcp, portRange=22, cidrIp=0.0.0.0/0, desc=aaa}" --rule-infos "{direction=egress, policy=accept, priority=1, ipProtocol=tcp, portRange=22, cidrIp=0.0.0.0/0, desc=xxx}"
  desc: 配置安全的规则。
sdk:
  service: zec
  version: '2025-09-01'
  action: ConfigureSecurityGroupRules
parameters:
- name: security-group-id
  type: string
  required: true
  sdk-field: securityGroupId
  description: 要配置的安全组ID。
- name: rule-infos
  type: object-array
  required: false
  sdk-field: ruleInfos
  description: |-
    需要配置的安全组规则列表。
    注意：配置为全量覆盖。
  array-style: json
  item-schema:
  - name: direction
    type: string
    description: |-
      规则方向。
      ingress: 入方向。
      egress：出方向。
  - name: policy
    type: string
    description: |-
      设置访问权限。
      accept：接受访问。
      deny: 拒绝访问。
  - name: priority
    type: integer
    description: 规则优先级。
  - name: ipProtocol
    type: string
    description: |-
      传输层协议。
      取值大小写敏感, 取值范围：<br/>tcp：TCP协议。
      udp：UDP协议。
      icmp：ICMP协议。
      all：支持所有协议。
  - name: portRange
    type: string
    description: |-
      目的端安全组开放的传输层协议相关的端口范围。
      取值范围：<br/> TCP/UDP协议：取值范围为1~65535。
      ICMP协议：-1。
      all：-1。
  - name: cidrIp
    type: string
    description: |-
      源端IP地址范围。
      支持CIDR格式和IPv4格式的IP地址范围。
      默认值：0.0.XX.XX/0。
  - name: desc
    type: string
    description: 备注,长度在255个以内。
