name: ModifyCidrAttribute
product: zec
use: modify-cidr-attribute
short: 修改IPv4 CIDR地址段的属性。
long: 修改IPv4 CIDR地址段的属性。 目前只能修改名称。
examples:
- cmd: zeno zec modify-cidr-attribute --cidr-id <cidrId> --name TestCidrName
  desc: 修改cidr地址段的名称。
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifyCidrAttribute
parameters:
- name: cidr-id
  type: string
  required: true
  sdk-field: cidrId
  description: 要修改CIDR地址段的ID。
- name: name
  type: string
  required: true
  sdk-field: name
  description: |-
    要修改的名称。
    范围2到63个字符。
    仅支持输入字母、数字、-/_和英文句点(.)。
    且必须以数字或字母开头和结尾。
