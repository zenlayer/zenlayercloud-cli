name: InquiryPriceResizeDisk
product: zec
use: inquiry-price-resize-disk
short: 云硬盘扩容询价
long: |-
  查询云硬盘扩容后的新价格。
  **注意事项**

  * 目标大小需大于等于当前云硬盘大小
examples:
- cmd: zeno zec inquiry-price-resize-disk --disk-id disk-xxx --disk-size 500
  desc: 查询将云硬盘扩容至 500 GiB 后的新价格与性能配置。
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPriceResizeDisk
parameters:
- name: disk-id
  type: string
  required: true
  sdk-field: diskId
  description: 云硬盘ID。
- name: disk-size
  type: integer
  required: true
  sdk-field: diskSize
  description: |-
    云硬盘扩容后的目标大小。
    单位：GiB。
response:
- name: diskPrice
  type: object
  description: 扩容后云硬盘的价格。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：<br/>HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: 阶梯的起始值。
    - name: stepEnd
      type: float
      description: |-
        阶梯的到达值。
        为null代表最后一级阶梯。
    - name: unitPrice
      type: float
      description: 阶梯单价。
    - name: discountUnitPrice
      type: float
      description: 阶梯折后价。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
- name: specPrice
  type: object
  description: |-
    系统盘扩容时，对应实例的规格价格。
    仅当云硬盘为系统盘且实例类型为 VM 时返回。
