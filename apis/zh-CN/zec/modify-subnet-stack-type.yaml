name: ModifySubnetStackType
product: zec
use: modify-subnet-stack-type
short: 修改子网的 IP 堆栈类型
long: |-
  修改指定子网的 IP 地址堆栈类型（IPv4 / IPv4_IPv6 / IPv6）。变更为双栈或纯 IPv6 时须配置 IPv6 类型及对应的 CIDR 地址块。
  **注意事项**

  * 支持`IPv4`切换为`IPv4_IPv6`（开启IPv6）：必须指定`ipv6Type`（公网`Public`/内网`Private`）；切换后，将得到一个IPv6地址段。
  * 支持`IPv4_IPv6`切换为`IPv4`（关闭IPv6）：公网和内网IPv6类型的子网均支持；关闭前须确保子网内所有网卡已通过`UnassignNetworkInterfaceIpv6`删除其IPv6地址。
examples:
- cmd: zeno zec modify-subnet-stack-type --subnet-id <subnetId> --stack-type IPv4_IPv6 --ipv6-type Private
  desc: 修改子网的堆栈类型：IPv4 → IPv4_IPv6，指定内网 IPv6。
- cmd: zeno zec modify-subnet-stack-type --subnet-id <subnetId> --stack-type IPv4
  desc: 关闭子网 IPv6：IPv4_IPv6 → IPv4。
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifySubnetStackType
parameters:
- name: subnet-id
  type: string
  required: true
  sdk-field: subnetId
  description: 要操作的子网的ID。
- name: stack-type
  type: enum
  required: true
  sdk-field: stackType
  description: |-
    子网堆栈类型。
    IPv4_IPv6：开启 IPv6，公网或内网由ipv6Type指定。
    IPv4：关闭 IPv6，公网和内网 IPv6 类型的子网均支持；关闭前须确保子网内所有网卡已通过 UnassignNetworkInterfaceIpv6 删除其 IPv6 地址。
  enum-values:
  - value: IPv4
    desc: 仅IPv4。
  - value: IPv4_IPv6
    desc: IPv4和IPv6。
  - value: IPv6
    desc: 仅IPv6。
- name: ipv6-type
  type: enum
  required: false
  sdk-field: ipv6Type
  description: |-
    IPv6 的类型，当stackType为IPv4_IPv6时必填。
    Public：公网 IPv6；Private：内网 IPv6。
  enum-values:
  - value: Private
    desc: 内网类型。
  - value: Public
    desc: 公网类型。
- name: ipv6-cidr-block-id
  type: string
  required: false
  sdk-field: ipv6CidrBlockId
  description: |-
    公网IPv6 CIDR ID。
    该字段仅当ipv6Type是公网(Public)时允许指定。
    如果不指定，将从系统默认IP池里分配。
- name: ipv6-mask-length
  type: integer
  required: false
  sdk-field: ipv6MaskLength
  description: |-
    分配给虚拟机（VM）的IPv6 CIDR前缀的大小。
    该参数必须与ipv6CidrBlockId参数配合使用。
    当未显式传递时，默认值为96。
    最小必须大于或等于指定ipv6CidrBlockId的前缀，最大不能超过96。
response:
- name: ipv6CidrBlock
  type: string
  description: 分配的IPv6地址段。
