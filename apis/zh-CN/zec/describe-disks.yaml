name: DescribeDisks
product: zec
use: describe-disks
short: 云盘列表
long: 查询云盘的列表信息。
examples:
- cmd: zeno zec describe-disks --disk-status IN_USE --disk-size 20 --zone-id asia-east-1a
  desc: 查询云硬盘列表。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeDisks
parameters:
- name: disk-ids
  type: string-array
  required: false
  sdk-field: diskIds
  description: 根据云盘ID列表筛选。
- name: disk-name
  type: string
  required: false
  sdk-field: diskName
  description: 根据云盘名称筛选，该字段支持模糊搜索。
- name: disk-status
  type: enum
  required: false
  sdk-field: diskStatus
  description: 根据云盘的状态进行筛选。
  enum-values:
  - value: CREATING
    desc: 创建中。
  - value: IN_USE
    desc: 挂载使用中。
  - value: AVAILABLE
    desc: 未挂载。
  - value: CHANGING
    desc: 变更大小中。
  - value: ATTACHING
    desc: 云盘挂载实例中。
  - value: DETACHING
    desc: 云盘解绑实例中。
  - value: DELETING
    desc: 销毁中。
  - value: RECYCLED
    desc: 处于回收状态，等待销毁。
  - value: RECYCLING
    desc: 回收中。
  - value: FAILED
    desc: 创建失败。
  - value: SNAPSHOT_CREATING
    desc: 快照创建过程中。
  - value: ROLLING_BACK
    desc: 云盘使用快照回滚过程中。
- name: disk-type
  type: enum
  required: false
  sdk-field: diskType
  description: 根据云盘的类型进行筛选。
  enum-values:
  - value: SYSTEM
    desc: 代表系统盘。
  - value: DATA
    desc: 代表数据盘。
- name: disk-category
  type: string
  required: false
  sdk-field: diskCategory
  description: 根据云盘的分类进行筛选。
- name: instance-id
  type: string
  required: false
  sdk-field: instanceId
  description: 根据云盘挂载的实例ID进行筛选。
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: 根据云盘所在的可用区进行筛选。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: 根据云盘所在的节点ID进行筛选。
- name: snapshot-ability
  type: boolean
  required: false
  sdk-field: snapshotAbility
  description: 根据云盘是否有快照能力进行筛选。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据快照所属的资源组进行筛选。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 云盘的结果集。
  array-style: json
  item-schema:
  - name: diskId
    type: string
    description: 云盘的 ID。
  - name: diskName
    type: string
    description: 云盘的名称。
  - name: regionId
    type: string
    description: 云盘所在的节点ID。
  - name: zoneId
    type: string
    description: 云盘所在节点的可用区ID。
  - name: diskType
    type: enum
    description: 云盘的类型。
    enum-values:
    - value: SYSTEM
      desc: 代表系统盘。
    - value: DATA
      desc: 代表数据盘。
  - name: portable
    type: boolean
    description: 是否可卸载。
  - name: diskCategory
    type: string
    description: 云盘的类别。
  - name: diskSize
    type: integer
    description: |-
      云盘的大小。
      单位：GiB。
  - name: diskStatus
    type: enum
    description: 云盘的状态。
    enum-values:
    - value: CREATING
      desc: 创建中。
    - value: IN_USE
      desc: 挂载使用中。
    - value: AVAILABLE
      desc: 未挂载。
    - value: CHANGING
      desc: 变更大小中。
    - value: ATTACHING
      desc: 云盘挂载实例中。
    - value: DETACHING
      desc: 云盘解绑实例中。
    - value: DELETING
      desc: 销毁中。
    - value: RECYCLED
      desc: 处于回收状态，等待销毁。
    - value: RECYCLING
      desc: 回收中。
    - value: FAILED
      desc: 创建失败。
    - value: SNAPSHOT_CREATING
      desc: 快照创建过程中。
    - value: ROLLING_BACK
      desc: 云盘使用快照回滚过程中。
  - name: instanceId
    type: string
    description: 云盘绑定实例的ID。
  - name: instanceName
    type: string
    description: 云盘绑定实例的名称。
  - name: createTime
    type: string
    description: 创建时间。
  - name: expiredTime
    type: string
    description: 到期时间。
  - name: period
    type: integer
    description: 周期。
  - name: resourceGroupId
    type: string
    description: 云盘所属的资源组ID。
  - name: resourceGroupName
    type: string
    description: 云盘所属的资源组名称。
  - name: serial
    type: string
    description: |-
      云盘序号。
      可能为null，表示取不到值。
  - name: snapshotAbility
    type: boolean
    description: 是否具体快照能力。
  - name: autoSnapshotPolicyId
    type: string
    description: 云盘关联的自动快照策略ID。
  - name: tags
    type: object
    description: 该云盘关联的标签。
  - name: burstingEnabled
    type: boolean
    description: 是否开启 Burst。
