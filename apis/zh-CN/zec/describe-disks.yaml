name: DescribeDisks
product: zec
use: describe-disks
short: 云盘列表
long: 查询云盘的列表信息。
examples:
- cmd: zencli zec describe-disks --disk-status IN_USE --disk-size 20 --zone-id asia-east-1a
  desc: 查询云硬盘列表。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeDisks
parameters:
- name: disk-ids
  type: string-array
  required: false
  sdk-field: diskIds
  description: 根据云盘ID列表筛选。
- name: disk-name
  type: string
  required: false
  sdk-field: diskName
  description: 根据云盘名称筛选，该字段支持模糊搜索。
- name: disk-status
  type: enum
  required: false
  sdk-field: diskStatus
  description: 根据云盘的状态进行筛选。
  enum-values:
  - CREATING
  - IN_USE
  - AVAILABLE
  - CHANGING
  - ATTACHING
  - DETACHING
  - DELETING
  - RECYCLED
  - RECYCLING
  - FAILED
  - SNAPSHOT_CREATING
  - ROLLING_BACK
- name: disk-type
  type: enum
  required: false
  sdk-field: diskType
  description: 根据云盘的类型进行筛选。
  enum-values:
  - SYSTEM
  - DATA
- name: disk-category
  type: string
  required: false
  sdk-field: diskCategory
  description: 根据云盘的分类进行筛选。
- name: instance-id
  type: string
  required: false
  sdk-field: instanceId
  description: 根据云盘挂载的实例ID进行筛选。
- name: zone-id
  type: string
  required: false
  sdk-field: zoneId
  description: 根据云盘所在的可用区进行筛选。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页数。
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: 根据云盘所在的节点ID进行筛选。
- name: snapshot-ability
  type: boolean
  required: false
  sdk-field: snapshotAbility
  description: 根据云盘是否有快照能力进行筛选。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据快照所属的资源组进行筛选。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
