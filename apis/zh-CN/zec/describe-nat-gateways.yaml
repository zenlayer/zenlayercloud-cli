name: DescribeNatGateways
product: zec
use: describe-nat-gateways
short: NAT网关表
long: 查询NAT网关列表。
examples:
- cmd: zeno zec describe-nat-gateways
  desc: 查看NAT网关列表。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeNatGateways
parameters:
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: 节点ID。
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: 根据NAT网关所属的VPC网络 ID过滤。
- name: nat-gateway-ids
  type: string-array
  required: false
  sdk-field: natGatewayIds
  description: |-
    NAT网关ID集合。
    实例ID数量上限为100个。
- name: name
  type: string
  required: false
  sdk-field: name
  description: NAT网关名称。
- name: status
  type: string
  required: false
  sdk-field: status
  description: NAT网关状态。
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: 根据NAT网关所属的安全组ID过滤。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页页码。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 资源组ID。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: totalCount
  type: integer
  description: 满足过滤条件的NAT网关总数。
- name: dataSet
  type: object-array
  description: 返回的NAT网关列表。
  array-style: json
  item-schema:
  - name: natGatewayId
    type: string
    description: NAT网关唯一ID。
  - name: vpcId
    type: string
    description: NAT网关所属的VPC网络ID。
  - name: regionId
    type: string
    description: 区域节点ID。
  - name: status
    type: enum
    description: NAT网关的状态。
    enum-values:
    - value: CREATING
      desc: NAT网关创建中。
    - value: RUNNING
      desc: NAT网关运行。
    - value: RECYCLED
      desc: NAT网关处于回收站。
    - value: CREATE_FAILED
      desc: NAT网关创建失败。
    - value: RELEASING
      desc: NAT网关释放中。
  - name: name
    type: string
    description: NAT网关的名称。
  - name: subnetIds
    type: string-array
    description: NAT网关所属的Subnet子网ID集合。
  - name: isAllSubnets
    type: boolean
    description: 是否节点内所有子网关联了NAT网关。
  - name: eipIds
    type: string-array
    description: NAT网关所关联的EIP ID集合。
  - name: zbgId
    type: string
    description: 边界网关ID。
  - name: icmpReplyEnabled
    type: boolean
    description: 是否开启ICMP代回。
  - name: securityGroupId
    type: string
    description: 边界网关关联的安全组ID。
  - name: resourceGroupId
    type: string
    description: 资源组ID。
  - name: resourceGroupName
    type: string
    description: 资源组名称。
  - name: createTime
    type: string
    description: |-
      创建时间。
      按照ISO8601标准表示，并且使用UTC时间, 格式为：YYYY-MM-ddTHH:mm:ssZ。
  - name: expiredTime
    type: string
    description: |-
      到期时间。
      按照ISO8601标准表示，并且使用UTC时间, 格式为：YYYY-MM-ddTHH:mm:ssZ。
  - name: tags
    type: object
    description: 该CIDR地址段关联的标签。
    object-schema:
    - name: tags
      type: object-array
      description: 标签对列表。
      array-style: json
      item-schema:
      - name: key
        type: string
        description: |-
          标签键。
          长度限制：1～64个字符。
      - name: value
        type: string
        description: |-
          标签值。
          长度限制：1～64个字符。
