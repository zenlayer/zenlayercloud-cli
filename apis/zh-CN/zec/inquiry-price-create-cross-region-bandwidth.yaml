name: InquiryPriceCreateCrossRegionBandwidth
product: zec
use: inquiry-price-create-cross-region-bandwidth
short: 创建内网跨区域带宽询价
long: 创建内网跨区域带宽询价。
examples:
- cmd: zeno zec inquiry-price-create-cross-region-bandwidth --internet-charge-type ByBandwidth --region-a asia-east-1 --region-z asia-north-1 --bandwidth 100
  desc: 创建一个从上海到北京的内网跨区域带宽, 使用固定带宽计费。带宽为100Mbps。
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPriceCreateCrossRegionBandwidth
parameters:
- name: internet-charge-type
  type: enum
  required: true
  sdk-field: internetChargeType
  description: 网络计费类型。
  enum-values:
  - value: ByBandwidth
    desc: 固定带宽计费方式。
  - value: ByTrafficPackage
    desc: 流量包计费方式。
  - value: BandwidthCluster
    desc: 共享带宽包计费方式。
- name: marketing-info
  type: object
  required: false
  sdk-field: marketingInfo
  description: 市场营销的相关选项。
  object-schema:
  - name: discountCode
    type: string
    description: |-
      使用市场发放的折扣码。
      如果折扣码不存在，最终折扣将不会生效。
  - name: usePocVoucher
    type: boolean
    description: |-
      是否使用POC代金券。
      如果系统不存在POC代金券，相关创建流程会失败。
- name: region-a
  type: string
  required: true
  sdk-field: regionA
  description: 其中一端的区域连接点（A）。
- name: region-z
  type: string
  required: true
  sdk-field: regionZ
  description: 另一端的区域连接点（Z）。
- name: bandwidth
  type: integer
  required: true
  sdk-field: bandwidth
  description: |-
    带宽|保底带宽。
    单位：Mbps。
response:
- name: crossRegionBandwidthPrice
  type: object
  description: 内网跨区域带宽的价格。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：<br/>HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: 阶梯的起始值。
    - name: stepEnd
      type: float
      description: |-
        阶梯的到达值。
        为null代表最后一级阶梯。
    - name: unitPrice
      type: float
      description: 阶梯单价。
    - name: discountUnitPrice
      type: float
      description: 阶梯折后价。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
