name: RenewIpv6Cidr
product: zec
use: renew-ipv6-cidr
short: 恢复IPv6 CIDR地址段。
long: 将一个处于回收站的IPv6 CIDR地址段恢复回正常。
examples:
- cmd: zeno zec renew-ipv6-cidr --cidr-id <cidrId>
  desc: 恢复一个IPv6 CIDR地址块
sdk:
  service: zec
  version: '2025-09-01'
  action: RenewIpv6Cidr
parameters:
- name: cidr-id
  type: string
  required: true
  sdk-field: cidrId
  description: IPv6 地址块ID。
