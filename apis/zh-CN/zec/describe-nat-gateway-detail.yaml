name: DescribeNatGatewayDetail
product: zec
use: describe-nat-gateway-detail
short: NAT网关详情规则表
long: 查询NAT网关详情规则表。
examples:
- cmd: zeno zec describe-nat-gateway-detail --nat-gateway-id <natGatewayId>
  desc: 查询网关规则详情
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeNatGatewayDetail
parameters:
- name: nat-gateway-id
  type: string
  required: true
  sdk-field: natGatewayId
  description: NAT网关 ID。
response:
- name: natGatewayId
  type: string
  description: NAT网关唯一ID。
- name: name
  type: string
  description: NAT网关名称。
- name: snats
  type: object-array
  description: SNAT网关规则集合。
- name: dnats
  type: object-array
  description: DNAT网关规则集合。
