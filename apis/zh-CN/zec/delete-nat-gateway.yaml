name: DeleteNatGateway
product: zec
use: delete-nat-gateway
short: 删除NAT网关
long: 删除一个指定的NAT网关。
examples:
- cmd: zeno zec delete-nat-gateway --nat-gateway-id <natGatewayId>
  desc: 终止一个NAT网关。
sdk:
  service: zec
  version: '2025-09-01'
  action: DeleteNatGateway
parameters:
- name: nat-gateway-id
  type: string
