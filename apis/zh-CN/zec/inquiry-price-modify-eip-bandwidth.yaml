    - name: stepEnd
      type: float
      description: |-
        阶梯的到达值。
        为null代表最后一级阶梯。
    - name: unitPrice
      type: float
      description: 阶梯单价。
    - name: discountUnitPrice
      type: float
      description: 阶梯折后价。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
- name: bandwidthPrices
  type: object-array
  description: |-
    各流量方向的带宽价格明细。
    PathBasedBandwidthIP线路返回多项；其他线路返回单项（trafficType=ALL）。
