        用量单位。
        比如Mbps, LCU等。
        如果为null, 代表取不到值。
    - name: excessUnitPrice
      type: float
      description: 超量原始价格。
    - name: excessDiscountUnitPrice
      type: float
      description: 超量折扣后价格。
    - name: excessAmountUnit
      type: string
      description: |-
        超量用量单位。
        如果为null, 代表取不到值。
    - name: category
      type: enum
      description: 价格所属类别。
      enum-values:
      - value: STANDARD
        desc: 标准价格。
      - value: CUSTOMIZED
        desc: 一口价格。
