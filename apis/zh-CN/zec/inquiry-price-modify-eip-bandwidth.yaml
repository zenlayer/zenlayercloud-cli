name: InquiryPriceModifyEipBandwidth
product: zec
use: inquiry-price-modify-eip-bandwidth
short: 查询调整EIP带宽后的价格。
long: |-
  查询调整EIP带宽后的价格。
  **注意事项**

  * 只有可用状态（`BINDED`、`UNBIND`）且网络计费方式为按带宽计费（`ByBandwidth`）的EIP才支持该操作。
  * 国际线路（`PathBasedBandwidthIP`）不支持该操作。
examples:
- cmd: zeno zec inquiry-price-modify-eip-bandwidth --eip-id eip-xxx --bandwidth 20
  desc: 查询将EIP带宽调整为20Mbps后的价格。
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPriceModifyEipBandwidth
parameters:
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: 要操作的公网弹性IP。
- name: bandwidth
  type: integer
  required: true
  sdk-field: bandwidth
  description: |-
    调整后的带宽上限。
    单位：Mbps。
response:
- name: eipPrice
  type: object
  description: |-
    公网弹性IP的保留价格。
    通过CIDR创建的IP保留价格为null。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：<br/>HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: 阶梯的起始值。
    - name: stepEnd
      type: float
      description: |-
        阶梯的到达值。
        为null代表最后一级阶梯。
    - name: unitPrice
      type: float
      description: 阶梯单价。
    - name: discountUnitPrice
      type: float
      description: 阶梯折后价。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
- name: bandwidthPrice
  type: object
  description: |-
    公网弹性IP的带宽价格。
    PathBasedBandwidthIP线路时为null，详见bandwidthPrices。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
