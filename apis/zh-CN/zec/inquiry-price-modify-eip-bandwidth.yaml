  - name: trafficType
    type: string
    description: |-
      流量方向类型。
      LOCAL：境内；INTERNATIONAL：境外；ALL：全部方向。
  - name: price
    type: object
    description: 该方向的带宽价格。
    object-schema:
    - name: discount
