name: DescribeCidrs
product: zec
use: describe-cidrs
short: 查询IPv4 CIDR地址块列表
long: 查询IPv4 CIDR地址块列表。
examples:
- cmd: zeno zec describe-cidrs --cidr-ids xxx --region-id asia-east-1 --cidr-block 128.0.0.0/24 --page-size 10 --page-num 1
  desc: 查询CidrBlock为`128.0.0.0/24`的Cidr列表。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeCidrs
parameters:
- name: cidr-ids
  type: string-array
  required: false
  sdk-field: cidrIds
  description: 一个或多个待操作的Cidr ID，根据cidrId进行过滤。
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: 根据CIDR所在的节点ID进行过滤。
- name: name
  type: string
  required: false
  sdk-field: name
  description: 根据CIDR名称进行过滤，支持模糊查询。
- name: cidr-block
  type: string
  required: false
  sdk-field: cidrBlock
  description: 根据CIDR地址进行过滤。
- name: source
  type: enum
  required: false
  sdk-field: source
  description: 根据CIDR来源进行过滤。
  enum-values:
  - value: CONSOLE
    desc: 归属于Zenlayer创建的IP。
  - value: BYOIP
    desc: 客户自带IP(bring your own IP)。
  - value: SDN_RIPT
    desc: SDN 场景创建的 CIDR。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID进行过滤。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小，默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 查询CIDR地址的结果数据。
