name: DescribeCidrs
product: zec
use: describe-cidrs
short: 查询IPv4 CIDR地址块列表
long: 查询IPv4 CIDR地址块列表。
examples:
- cmd: zeno zec describe-cidrs --cidr-ids xxx --region-id asia-east-1 --cidr-block 128.0.0.0/24 --page-size 10 --page-num 1
  desc: 查询CidrBlock为`128.0.0.0/24`的Cidr列表。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeCidrs
parameters:
- name: cidr-ids
  type: string-array
  required: false
  sdk-field: cidrIds
  description: 一个或多个待操作的Cidr ID，根据cidrId进行过滤。
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: 根据CIDR所在的节点ID进行过滤。
- name: name
  type: string
  required: false
  sdk-field: name
  description: 根据CIDR名称进行过滤，支持模糊查询。
- name: cidr-block
  type: string
  required: false
  sdk-field: cidrBlock
  description: 根据CIDR地址进行过滤。
- name: source
  type: enum
  required: false
  sdk-field: source
  description: 根据CIDR来源进行过滤。
  enum-values:
  - value: CONSOLE
    desc: 归属于Zenlayer创建的IP。
  - value: BYOIP
    desc: 客户自带IP(bring your own IP)。
  - value: SDN_RIPT
    desc: SDN 场景创建的 CIDR。
- name: asn
  type: integer
  required: false
  sdk-field: asn
  description: 根据ASN编号进行过滤。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID进行过滤。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小，默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 查询CIDR地址的结果数据。
  array-style: json
  item-schema:
  - name: cidrId
    type: string
    description: CIDR ID。
  - name: regionId
    type: string
    description: CIDR所属的区域节点ID。
  - name: name
    type: string
    description: CIDR的名称。
  - name: cidrBlock
    type: string
    description: CIDR地址块，例如：10.0.0.0/16。
  - name: totalCount
    type: integer
    description: CIDR中IP地址的总数量。
  - name: usedCount
    type: integer
    description: CIDR中已被使用的IP地址数量。
  - name: source
    type: enum
    description: |-
      CIDR的来源。
      如CONSOLE（属于zenlayer）或 BYOIP（客户自带IP）。
    enum-values:
    - value: CONSOLE
      desc: 归属于Zenlayer创建的IP。
    - value: BYOIP
      desc: 客户自带IP(bring your own IP)。
    - value: SDN_RIPT
      desc: SDN 场景创建的 CIDR。
  - name: eipV4Type
    type: enum
    description: |-
      EIP网络类型。
      表示该CIDR支持的公网IP线路类型。
      已废弃，请参考`networkLineType`。
    enum-values:
    - value: BGPLine
      desc: BGP 线路。
    - value: CN2Line
      desc: CN2 回国优化线路。
    - value: LocalLine
      desc: 本地IP。
    - value: ChinaMobile
      desc: 中国移动线路。
    - value: ChinaUnicom
      desc: 中国联通线路。
    - value: ChinaTelecom
      desc: 中国电信线路。
    - value: Cogent
      desc: Cogent。
    - value: PathBasedBandwidthIP
      desc: 多路径带宽 IP。
  - name: networkLineType
    type: enum
    description: |-
      EIP网络类型。
      表示该CIDR支持的公网IP线路类型。
    enum-values:
    - value: PremiumBGP
      desc: |-
        优质 BGP。
        高性能网络。
    - value: CN2
      desc: 回国优化线路。
    - value: PathBasedBandwidthIP
      desc: 多路径带宽 IP。
    - value: LocalLine
      desc: 本地IP。
    - value: StandardBGP
      desc: |-
        标准 BGP。
        通用网络，成本优化。
    - value: CMI
      desc: 中国移动。
    - value: CUG
      desc: 中国联通。
    - value: CTG
      desc: 中国电信。
  - name: netmask
    type: integer
    description: |-
      子网掩码。
      表示CIDR的网络位长度。
  - name: poolId
    type: string
    description: |-
      Pool的ID。
      表示该CIDR所属的公网IP池。
  - name: createTime
    type: string
    description: CIDR的创建时间。
  - name: expiredTime
    type: string
    description: CIDR的到期时间。
  - name: resourceGroupId
    type: string
    description: 该CIDR所属的资源组。
  - name: resourceGroupName
    type: string
    description: 该CIDR所属资源组的名称。
  - name: status
    type: enum
    description: CIDR的状态。
    enum-values:
    - value: CREATING
      desc: 创建中。
    - value: AVAILABLE
      desc: 正常可用。
    - value: CHANGING
      desc: 变更中。
    - value: RECYCLED
      desc: 处于回收站。
    - value: DELETING
      desc: 删除中。
    - value: FAILED
      desc: 创建失败。
  - name: asn
    type: integer
    description: |-
      ASN编号。
      仅当CIDR来源为BYOIP时存在。
  - name: tags
    type: object
    description: 该CIDR地址段关联的标签。
    object-schema:
    - name: tags
      type: object-array
      description: 标签对列表。
      array-style: json
      item-schema:
      - name: key
        type: string
        description: |-
          标签键。
          长度限制：1～64个字符。
      - name: value
        type: string
        description: |-
          标签值。
          长度限制：1～64个字符。
  - name: asnObservation
    type: object
    description: ASN 观测结果。
    object-schema:
    - name: verificationStatus
      type: enum
      description: ASN 验证状态。
      enum-values:
      - value: agreed
        desc: 各数据源观测结果一致。
      - value: disagreed
        desc: 各数据源观测结果不一致。
      - value: unavailable
        desc: 主数据源查询失败或未命中。
      - value: querying
        desc: 查询中。
    - name: observedPrefix
      type: string
      description: 观测网段。
    - name: primarySource
      type: string
      description: 主数据源名称，如 RIPE。
    - name: primaryStatus
      type: enum
      description: 主数据源查询状态。
      enum-values:
      - value: QUERYING
        desc: 查询中。
      - value: FINISHED
        desc: 查询已完成。
      - value: FAILURE
        desc: 查询失败。
    - name: primaryAsns
      type: integer-array
      description: 主数据源观测到的 ASN 列表。
    - name: secondarySource
      type: string
      description: 二级数据源名称，如 BGP Tool。
    - name: secondaryStatus
      type: enum
      description: 二级数据源查询状态。
      enum-values:
      - value: QUERYING
        desc: 查询中。
      - value: FINISHED
        desc: 查询已完成。
      - value: FAILURE
        desc: 查询失败。
    - name: secondaryAsns
      type: integer-array
      description: 二级数据源观测到的 ASN 列表。
