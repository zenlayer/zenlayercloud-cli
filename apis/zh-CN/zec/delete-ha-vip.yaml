name: DeleteHaVip
product: zec
use: delete-ha-vip
short: 删除高可用虚拟IP
long: |-
  删除高可用虚拟IP。
  **删除前提条件**

  * HaVip 必须未绑定任何实例（即 `associatedInstances` 为空列表）。
examples:
- cmd: zeno zec delete-ha-vip --ha-vip-id havip-xxxxxxxx
  desc: 删除一个HaVip。
sdk:
  service: zec
  version: '2025-09-01'
  action: DeleteHaVip
parameters:
- name: ha-vip-id
  type: string
  required: true
  sdk-field: haVipId
  description: 高可用虚拟IP的ID。
