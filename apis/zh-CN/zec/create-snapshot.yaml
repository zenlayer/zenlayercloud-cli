name: CreateSnapshot
product: zec
use: create-snapshot
short: 云盘创建快照
long: |-
  对指定云盘创建快照。
  **注意事项**

  * 本接口为异步接口，创建快照请求发送成功后会立即返回，此时操作并未完成。快照创建结果可以通过调用[`DescribeSnapshots`](../snapshot/describesnapshots.md)接口查询，如果快照状态由`CREATING`变为`AVAILABLE`则代表创建成功，创建过程中不可删除该快照。
  * 云盘是否支持创建快照可根据`SnapshotAbility`字段判断。该值可通过[`DescribeDisks`](../disk/describedisks.md)接口查询。
  * 云盘必须处于**使用中**或**待挂载**状态。
  * 可创建快照数量限制见产品使用限制。
examples:
- cmd: zeno zec create-snapshot --disk-id diskId1 --snapshot-name xxx --retention-time 2025-07-16T01:26:39Z
  desc: 云盘创建快照。
sdk:
  service: zec
  version: '2025-09-01'
  action: CreateSnapshot
parameters:
- name: disk-id
  type: string
  required: true
  sdk-field: diskId
  description: 云硬盘ID。
- name: snapshot-name
  type: string
  required: true
  sdk-field: snapshotName
  description: 快照名称。
- name: retention-time
  type: string
  required: false
  sdk-field: retentionTime
  description: |-
    保留的到期时间。
    格式为：yyyy-MM-ddTHH:mm:ssZ。
    如果不传，则代表永久保留。
    指定时间必须在当前时间24小时后。
response:
- name: snapshotId
  type: string
  description: 创建的快照ID。
