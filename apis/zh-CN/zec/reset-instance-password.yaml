name: ResetInstancePassword
product: zec
use: reset-instance-password
short: 重置虚拟机实例密码
long: 重置一台虚拟机实例密码。
sdk:
  service: zec
  version: '2025-09-01'
  action: ResetInstancePassword
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 待操作的实例ID。
- name: password
  type: string
  required: true
  sdk-field: password
  description: |-
    密码。
    必须是8-16位。
    必须包含以下3种格式的字符：大小写字母: [a-zA-Z]数字: 0-9特殊字符: ~!@$^*-_=+。
