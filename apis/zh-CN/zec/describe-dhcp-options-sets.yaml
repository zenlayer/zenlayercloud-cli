name: DescribeDhcpOptionsSets
product: zec
use: describe-dhcp-options-sets
short: 查询已创建的DHCP选项集列表
long: 查询已创建的DHCP选项集列表。
examples:
- cmd: zeno zec describe-dhcp-options-sets --dhcp-options-set-name dhcpOptionsSetName1 --page-size 10 --page-num 1
  desc: 查询已创建的DHCP选项集列表
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeDhcpOptionsSets
parameters:
- name: dhcp-options-set-ids
  type: string-array
  required: false
  sdk-field: dhcpOptionsSetIds
  description: |-
    DHCP 选项集的 ID。
    最多支持输入 20 个 DHCP 选项集的 ID。
- name: dhcp-options-set-name
  type: string
  required: false
  sdk-field: dhcpOptionsSetName
  description: |-
    DHCP 选项集的名称。
    该字段支持模糊搜索。
- name: subnet-id
  type: string
  required: false
  sdk-field: subnetId
  description: 关联的子网 ID。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小，默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID过滤。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: DHCP 选项集列表的数据。
