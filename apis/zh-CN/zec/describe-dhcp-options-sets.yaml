name: DescribeDhcpOptionsSets
product: zec
use: describe-dhcp-options-sets
short: 查询已创建的DHCP选项集列表
long: 查询已创建的DHCP选项集列表。
examples:
- cmd: zeno zec describe-dhcp-options-sets --dhcp-options-set-name dhcpOptionsSetName1 --page-size 10 --page-num 1
  desc: 查询已创建的DHCP选项集列表
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeDhcpOptionsSets
parameters:
- name: dhcp-options-set-ids
  type: string-array
  required: false
  sdk-field: dhcpOptionsSetIds
  description: |-
    DHCP 选项集的 ID。
    最多支持输入 20 个 DHCP 选项集的 ID。
- name: dhcp-options-set-name
  type: string
  required: false
  sdk-field: dhcpOptionsSetName
  description: |-
    DHCP 选项集的名称。
    该字段支持模糊搜索。
- name: subnet-id
  type: string
  required: false
  sdk-field: subnetId
  description: 关联的子网 ID。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小，默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID过滤。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: DHCP 选项集列表的数据。
  array-style: json
  item-schema:
  - name: dhcpOptionsSetId
    type: string
    description: DHCP 选项集ID。
  - name: dhcpOptionsSetName
    type: string
    description: |-
      DHCP 选项集的名称。
      长度为1～64个字符。
  - name: domainNameServers
    type: string
    description: |-
      DNS 服务器 IP。
      最多传入 4 个 DNS 服务器 Ipv4，DNS 服务器 IP 之间用半角逗号（,）隔开。
  - name: ipv6DomainNameServers
    type: string
    description: |-
      DNS 服务器 IP。
      最多传入 4 个 DNS 服务器 Ipv6，DNS 服务器 IP 之间用半角逗号（,）隔开。
  - name: leaseTime
    type: string
    description: |-
      IPv4 DHCP 选项集的租赁时间。
      单位：h。
  - name: ipv6LeaseTime
    type: string
    description: |-
      IPv6 DHCP 选项集的租赁时间。
      单位：h。
  - name: createTime
    type: string
    description: |-
      创建时间。
      按照ISO8601标准表示，并且使用UTC时间, 格式为：YYYY-MM-ddTHH:mm:ssZ。
  - name: description
    type: string
    description: DHCP选项集 描述信息。
  - name: resourceGroupId
    type: string
    description: 实例所属的资源组ID。
  - name: resourceGroupName
    type: string
    description: 实例所属的资源组名称。
  - name: tags
    type: object
    description: 实例关联的标签。
    object-schema:
    - name: tags
      type: object-array
      description: 标签对列表。
      array-style: json
      item-schema:
      - name: key
        type: string
        description: |-
          标签键。
          长度限制：1～64个字符。
      - name: value
        type: string
        description: |-
          标签值。
          长度限制：1～64个字符。
