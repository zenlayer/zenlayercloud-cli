name: RenewCidr
product: zec
use: renew-cidr
short: 恢复IPv4 CIDR地址段。
long: 将一个处于回收站的IPv4 CIDR地址段恢复回正常。
examples:
- cmd: zeno zec renew-cidr --cidr-id xxx
  desc: 恢复CIDR地址块。
sdk:
  service: zec
  version: '2025-09-01'
  action: RenewCidr
parameters:
- name: cidr-id
  type: string
  required: true
  sdk-field: cidrId
  description: 要恢复的CIDR ID。
