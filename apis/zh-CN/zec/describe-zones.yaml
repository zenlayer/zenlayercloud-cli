name: DescribeZones
product: zec
use: describe-zones
short: 查询可用区信息
long: 查询可用区信息。包括名称，所属的节点等。
examples:
- cmd: zeno zec describe-zones --zone-ids sa-north-1a --zone-ids asia-east-1a
  desc: 查询可用区列表。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeZones
parameters:
- name: zone-ids
  type: string-array
  required: false
  sdk-field: zoneIds
  description: 根据可用区ID过滤。
response:
- name: zoneSet
  type: object-array
  description: 可用区列表。
  array-style: json
  item-schema:
  - name: zoneId
    type: string
    description: 可用区ID。
  - name: regionId
    type: string
    description: 可用区所在的节点ID。
  - name: zoneName
    type: string
    description: 可用区名称。
  - name: supportSecurityGroup
    type: boolean
    description: |-
      可用区是否支持安全组。
      该字段已废弃，当前所有节点均支持安全组。
  - name: timeZone
    type: string
    description: 可用区所在的时区。
  - name: cityName
    type: string
    description: 可用区所在的城市名称。
  - name: cityCode
    type: string
    description: 城市三字码。
  - name: countryCode
    type: string
    description: 可用区所在的国家，ISO 3166-1 alpha-2 两字母代码（如 US、JP）。
  - name: countryName
    type: string
    description: 可用区所在的国家名称。
