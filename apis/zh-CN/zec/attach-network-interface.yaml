name: AttachNetworkInterface
product: zec
use: attach-network-interface
short: 网卡绑定实例
long: 网卡绑定实例。
examples:
- cmd: zeno zec attach-network-interface --nic-id <nicId> --instance-id <instanceId>
  desc: 网卡绑定实例。
sdk:
  service: zec
  version: '2025-09-01'
  action: AttachNetworkInterface
parameters:
- name: nic-id
  type: string
  required: true
  sdk-field: nicId
  description: 需要操作的网卡ID。
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 需要绑定的实例ID。
