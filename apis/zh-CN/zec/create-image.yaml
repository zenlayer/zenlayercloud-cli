name: CreateImage
product: zec
use: create-image
short: 创建自定义镜像
long: |-
  用实例创建自定义镜像。
  **注意事项**

  * 本接口为异步接口，创建镜像请求发送成功后会立即返回，此时操作并未完成。镜像创建结果可以通过调用[`DescribeCustomImages`](describecustomimages.md)接口查询，如果镜像状态由`CREATING`变为`AVAILABLE`则代表创建成功，如果变为`FAILED`则代表创建失败，创建过程中不可删除该镜像。
  * 会在实例所在zone下创建出对应的自定义镜像。
  * 所选实例必须处于`STOPPED`状态。
  * GPU机型暂时不支持创建自定义镜像。
  * 如果配额超过了限制，可以联系Support来提高配额。
examples:
- cmd: zeno zec create-image --instance-id "<instance id>" --image-name imageXXX
  desc: 用实例创建一个自定义镜像。
sdk:
  service: zec
  version: '2025-09-01'
  action: CreateImage
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 需要制作镜像的实例ID。
- name: image-name
  type: string
  required: true
  sdk-field: imageName
  description: |-
    名称。
    范围2到63个字符。
    仅支持输入字母、数字、-/_和英文句点(.)。
    且必须以数字或字母开头和结尾。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 镜像所放的资源组ID，如不指定则放入默认资源组。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    创建镜像时关联的标签。
    注意：·关联标签键不能重复。--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: imageId
  type: string
  description: 镜像ID。
- name: imageName
  type: string
  description: 镜像名称。
