name: CreateHaVip
product: zec
use: create-ha-vip
short: 创建高可用虚拟IP
long: |-
  创建一个高可用虚拟IP。
  **注意事项**

  * 创建 HaVip 时，若不指定 `ipAddress`，系统将在子网 CIDR 范围内自动分配一个私网 IP。
  * 若指定 `ipAddress`，该 IP 必须在子网 CIDR 范围内，且不能是网关地址或已被占用的地址。
  * 若不指定 `securityGroupId`，将使用所在 VPC 的默认安全组。
  * 每个团队最多创建 10 个 HaVip（默认配额），如遇到数量超过限制，可以联系 Support 来提高配额。
examples:
- cmd: zeno zec create-ha-vip --subnet-id subnet-xxxxxxxx --name my-havip
  desc: 创建一个HaVip（自动分配IP）。
- cmd: zeno zec create-ha-vip --subnet-id subnet-xxxxxxxx --name my-havip-fixed --ip-address 10.0.1.100 --security-group-id sg-xxxxxxxx
  desc: 创建一个HaVip（指定IP和安全组）。
sdk:
  service: zec
  version: '2025-09-01'
  action: CreateHaVip
parameters:
- name: subnet-id
  type: string
  required: true
  sdk-field: subnetId
  description: HaVip所属子网ID。
- name: name
  type: string
  required: true
  sdk-field: name
  description: |-
    HaVip名称。
    长度1到64个字符。
- name: ip-address
  type: string
  required: false
  sdk-field: ipAddress
  description: |-
    指定HaVip的私网IP地址。
    不填时系统自动分配。
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: |-
    安全组ID。
    不填时使用VPC默认安全组。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: 创建HaVip时关联的标签。--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: haVipId
  type: string
  description: 高可用虚拟IP的ID。
