name: DescribeInstanceMonitorData
product: zec
use: describe-instance-monitor-data
short: 查询实例监控指标数据
long: 查询一段时间的实例的监控指标数据。包括CPU,内存等相关指标数据。
examples:
- cmd: zencli zec describe-instance-monitor-data --instance-id "< instanceId >" --metric-type VCPU_TIME --start-time 2025-06-25T01:55:00Z --end-time 2025-06-25T07:55:00Z
  desc: 查询某段时间的实例的 `VCPU_TIME` 监控指标数据。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeInstanceMonitorData
parameters:
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 实例唯一标识ID。
- name: metric-type
  type: enum
  required: true
  sdk-field: metricType
  description: 实例监控指标类型。
  enum-values:
  - CPU_UTILIZATION
  - HYPERVISOR_IO_WAIT_TIME
  - HYPERVISOR_QUEUE_TIME
  - HYPERVISOR_CPU_USER
  - HYPERVISOR_CPU_TIME
  - HYPERVISOR_CPU_SYSTEM
  - PROC_CPU_USER
  - PROC_CPU_SYSTEM
  - PROC_CPU_IOWAIT
  - PROC_CPU_SOFTIRQ
  - PROC_CPU_IDLE
  - PROC_CPU_OTHER
  - LOAD1
  - LOAD5
  - LOAD15
  - MEM_UTIL
  - REALMEM_UTIL
  - TCP_ESTABLISHED
  - SWAP_TOTAL
  - SWAP_FREE
  - SWAP_IN
  - SWAP_OUT
  - KSWAPD_STEAL
  - KSWAPD_LHWM
  - RX_PACKETS
  - TX_PACKETS
  - RX_DROPPED
  - TX_DROPPED
  - RX_ERRORS
  - TX_ERRORS
- name: start-time
  type: string
  required: true
  sdk-field: startTime
  description: |-
    查询开始时间。
    时间格式：yyyy-MM-ddTHH:mm:ssZ。
- name: end-time
  type: string
  required: true
  sdk-field: endTime
  description: |-
    查询结束时间。
    时间格式：yyyy-MM-ddTHH:mm:ssZ。
