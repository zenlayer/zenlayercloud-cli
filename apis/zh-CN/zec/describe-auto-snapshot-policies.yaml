name: DescribeAutoSnapshotPolicies
product: zec
use: describe-auto-snapshot-policies
short: 自动快照策略列表
long: 查询自动快照策略的列表数据。
examples:
- cmd: zeno zec describe-auto-snapshot-policies
  desc: 查询策略列表。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeAutoSnapshotPolicies
parameters:
- name: auto-snapshot-policy-ids
  type: string-array
  required: false
  sdk-field: autoSnapshotPolicyIds
  description: 根据自动快照策略的ID进行过滤。
- name: zone-ids
  type: string-array
  required: false
  sdk-field: zoneIds
  description: 根据自动快照策略的可用区ID进行过滤。
- name: auto-snapshot-policy-name
  type: string
  required: false
  sdk-field: autoSnapshotPolicyName
  description: |-
    根据自动快照策略的名称进行过滤。
    该字段支持模糊搜索。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID进行过滤。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: dataSet
  type: object-array
  description: 查询的自动快照策略数据结果。
  array-style: json
  item-schema:
  - name: autoSnapshotPolicyId
    type: string
    description: 自动快照策略ID。
  - name: zoneId
    type: string
    description: 可用区ID。
  - name: autoSnapshotPolicyName
    type: string
    description: 自动快照策略的名称。
  - name: repeatWeekDays
    type: integer-array
    description: |-
      自动快照的重复日期。
      单位为天，周期为星期，例如 1 表示周一。
  - name: hours
    type: integer-array
    description: |-
      指定定期快照策略的触发时间。
      使用 UTC 时间，单位为小时。
      00:00 ~ 23:00 共 24 个时间点可选，1表示 01:00，依此类推。
  - name: retentionDays
    type: integer
    description: |-
      自动快照的保留时间，单位为天。
      如果该值设置-1，则代表永久保留。
      取值范围：-1或[1,65535]。
  - name: diskNum
    type: integer
    description: 关联的云盘数量。
  - name: createTime
    type: string
    description: 策略创建时间。
  - name: resourceGroup
    type: object
    description: 资源组信息。
  - name: diskIdSet
    type: string-array
    description: 关联的云盘ID。
  - name: tags
    type: object
    description: 自动快照策略关联的标签。
- name: totalCount
  type: integer
  description: 符合匹配的总数量。
