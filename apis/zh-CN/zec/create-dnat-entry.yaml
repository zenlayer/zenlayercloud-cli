name: CreateDnatEntry
product: zec
use: create-dnat-entry
short: 创建DNAT规则
long: |-
  创建DNAT规则。
  **注意事项**

  * 默认一个NAT网关可以创建100条DNAT规则. 如果想扩大可以联系Console Support。
examples:
- cmd: zeno zec create-dnat-entry --nat-gateway-id <natGatewayId> --eip-id <eipId> --private-ip 10.0.0.2 --protocol TCP --listener-port 1-30 --internal-port 1-30
  desc: 创建一个DNAT规则。
sdk:
  service: zec
  version: '2025-09-01'
  action: CreateDnatEntry
parameters:
- name: nat-gateway-id
  type: string
  required: true
  sdk-field: natGatewayId
  description: NAT网关 ID。
- name: eip-id
  type: string
  required: true
  sdk-field: eipId
  description: DNAT规则添加的弹性公网ID。
- name: private-ip
  type: string
  required: true
  sdk-field: privateIp
  description: DNAT规则的内网IP地址。
- name: protocol
  type: enum
  required: true
  sdk-field: protocol
  description: |-
    DNAT规则的协议类型。
    如果要转发所有流量，端口不变，请指定协议类型为Any且内部端口和公网外部端口不要设置。
  enum-values:
  - value: TCP
    desc: TCP 协议。
  - value: UDP
    desc: UDP 协议。
  - value: Any
    desc: Any 所有协议。
- name: listener-port
  type: string
  required: false
  sdk-field: listenerPort
  description: |-
    DNAT规则端口转发的外部公网端口或端口段。
    可使用连字符（-）指定端口范围，例如：80-100，公网和内网端口数量需保持一致。
    取值范围1-65535。
    仅在协议类型不为Any时生效。
- name: internal-port
  type: string
  required: false
  sdk-field: internalPort
  description: |-
    DNAT规则端口转发的内部端口或端口段。
    可使用连字符（-）指定端口范围，例如：80-100，公网和内网端口数量需保持一致。
    取值范围1-65535。
    仅在协议类型不为Any时生效。
