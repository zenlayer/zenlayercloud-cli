name: UnassociateHaVip
product: zec
use: unassociate-ha-vip
short: 解绑高可用虚拟IP与实例
long: 将高可用虚拟IP从实例解绑。
examples:
- cmd: zeno zec unassociate-ha-vip --ha-vip-id havip-xxxxxxxx --instance-id vm-xxxxxxxx
  desc: 将HaVip与实例解绑。
sdk:
  service: zec
  version: '2025-09-01'
  action: UnassociateHaVip
parameters:
- name: ha-vip-id
  type: string
  required: true
  sdk-field: haVipId
  description: 高可用虚拟IP的ID。
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 要解绑的实例ID。
