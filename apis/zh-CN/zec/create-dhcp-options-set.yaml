name: CreateDhcpOptionsSet
product: zec
use: create-dhcp-options-set
short: 创建DHCP选项集
long: 创建DHCP选项集。
examples:
- cmd: zeno zec create-dhcp-options-set --dhcp-options-set-name dhcpOptionsSetName-1 --domain-name-servers 88.88.88.88 --lease-time 168
  desc: 创建DHCP选项集
sdk:
  service: zec
  version: '2025-09-01'
  action: CreateDhcpOptionsSet
parameters:
- name: dhcp-options-set-name
  type: string
  required: true
  sdk-field: dhcpOptionsSetName
  description: |-
    DHCP 选项集的名称。
    长度为1～64个字符。
- name: domain-name-servers
  type: string
  required: true
  sdk-field: domainNameServers
  description: |-
    DNS 服务器 IP。
    最多传入 4 个 DNS 服务器 Ipv4，DNS 服务器 IP 之间用半角逗号（,）隔开。
- name: ipv6-domain-name-servers
  type: string
  required: false
  sdk-field: ipv6DomainNameServers
  description: |-
    DNS 服务器 IP。
    最多传入 4 个 DNS 服务器 Ipv6，DNS 服务器 IP 之间用半角逗号（,）隔开。
- name: lease-time
  type: string
  required: false
  sdk-field: leaseTime
  description: |-
    IPv4 DHCP 选项集的租赁时间。
    单位：h。
    取值范围：**24~1176**，**87600~175200**。
- name: ipv6-lease-time
  type: string
  required: false
  sdk-field: ipv6LeaseTime
  description: |-
    IPv6 DHCP 选项集的租赁时间。
    单位：h。
    取值范围：**24~1176**，**87600~175200**。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    创建DHCP 选项集时关联的标签。
    注意：·关联标签键不能重复。--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    资源组ID。
    如果不指定，则会创建在默认资源组。
- name: description
  type: string
  required: false
  sdk-field: description
  description: |-
    DHCP选项集 描述信息。
    最长不超过255个字符。
response:
- name: dhcpOptionsSetId
  type: string
  description: DHCP 选项集ID。
