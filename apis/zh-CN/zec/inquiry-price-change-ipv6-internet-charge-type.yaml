name: InquiryPriceChangeIpv6InternetChargeType
product: zec
use: inquiry-price-change-ipv6-internet-charge-type
short: 查询变更IPv6网络计费模式后的价格。
long: |-
  查询变更IPv6网络计费模式后的价格。
  **注意事项**

  * 变更为按带宽计费（`ByBandwidth`）时，需传入 `bandwidth`。
  * 变更为流量包计费（`ByTrafficPackage`）时，需传入 `flowPackage`（单位TB，为0或0.1的倍数）。
  * 变更为共享带宽包计费（`BandwidthCluster`）时，需传入 `clusterId`。
  * 保底流量包大小仅对计费周期为月有效。
examples:
- cmd: zeno zec inquiry-price-change-ipv6-internet-charge-type --ipv6-id ipv6-xxx --internet-charge-type ByBandwidth --bandwidth 20
  desc: 查询将IPv6变更为按带宽计费（带宽20Mbps）后的价格。
sdk:
  service: zec
  version: '2025-09-01'
  action: InquiryPriceChangeIpv6InternetChargeType
parameters:
- name: ipv6-id
  type: string
  required: true
  sdk-field: ipv6Id
  description: 要操作的公网IPv6。
- name: internet-charge-type
  type: enum
  required: true
  sdk-field: internetChargeType
  description: 要变更的目标网络计费类型。
  enum-values:
  - value: ByBandwidth
    desc: 固定带宽计费方式。
  - value: ByTrafficPackage
    desc: 流量包计费方式。
  - value: BandwidthCluster
    desc: 共享带宽包计费方式。
- name: bandwidth
  type: integer
  required: false
  sdk-field: bandwidth
  description: |-
    带宽限速。
    单位：Mbps。
    网络计费方式为按带宽计费（ByBandwidth）时需指定。
- name: flow-package
  type: float
  required: false
  sdk-field: flowPackage
  description: |-
    流量包大小。
    单位：TB。
    网络计费方式为流量包计费（ByTrafficPackage）时需指定。
response:
- name: ipv6Price
  type: object
  description: 公网IPv6的保留价格。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：<br/>HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
- name: bandwidthPrice
  type: object
  description: 公网IPv6的带宽价格。
