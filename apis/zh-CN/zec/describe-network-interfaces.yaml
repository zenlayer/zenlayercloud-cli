name: DescribeNetworkInterfaces
product: zec
use: describe-network-interfaces
short: 网卡列表
long: 查询一个或多个指定网卡的信息。用户可以根据 网卡ID、网卡名称等信息来搜索网卡信息。
examples:
- cmd: zeno zec describe-network-interfaces --nic-type Secondary --page-size 1 --page-num 1
  desc: 查询辅助网卡列表。
- cmd: zeno zec describe-network-interfaces --subnet-id <subnetId> --nic-subnet-type IPv4_IPv6 --page-size 20 --page-num 1
  desc: 查询指定子网内持有 IPv6 的网卡列表（用于关闭子网 IPv6 前确认）。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeNetworkInterfaces
parameters:
- name: nic-ids
  type: string-array
  required: false
  sdk-field: nicIds
  description: |-
    根据网卡ID过滤。
    最多传入100个ID。
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    根据网卡所属的名称过滤。
    该字段支持模糊搜索。
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: 根据网卡所属的节点 ID过滤。
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: 根据网卡所属的VPC ID过滤。
- name: subnet-id
  type: string
  required: false
  sdk-field: subnetId
  description: 根据网卡所属的子网ID过滤。
- name: instance-id
  type: string
  required: false
  sdk-field: instanceId
  description: 网卡关联的实例ID过滤。
- name: status
  type: enum
  required: false
  sdk-field: status
  description: 根据网卡的状态过滤。
  enum-values:
  - value: PENDING
    desc: 网卡创建中。
  - value: AVAILABLE
    desc: 可用未绑定实例的。
  - value: ATTACHING
    desc: 绑定实例过程中。
  - value: DETACHING
    desc: 解绑实例过程中。
  - value: DELETING
    desc: 删除中。
  - value: CREATE_FAILED
    desc: 创建失败的。
  - value: USED
    desc: 已经绑定实例的。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: nic-type
  type: enum
  required: false
  sdk-field: nicType
  description: 根据网卡的类型筛选过滤。
  enum-values:
  - value: Primary
    desc: 主网卡类型。
  - value: Secondary
    desc: 辅助网卡类型。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据网卡所属的资源组ID过滤。
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: 根据网卡所属的安全组ID过滤。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
- name: nic-subnet-type
  type: enum
  required: false
  sdk-field: nicSubnetType
  description: |-
    根据网卡堆栈类型筛选。
    枚举值：IPv4 / IPv4_IPv6 / IPv6。
    配合subnetId使用可查出子网内持有IPv6的全部网卡。
  enum-values:
  - value: IPv4
    desc: 仅IPv4。
  - value: IPv4_IPv6
    desc: IPv4和IPv6。
  - value: IPv6
    desc: 仅IPv6。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 网卡的结果集。
  array-style: json
  item-schema:
  - name: nicId
    type: string
    description: 网卡的ID。
  - name: name
    type: string
    description: 网卡的名称。
  - name: status
    type: enum
    description: 网卡状态。
    enum-values:
    - value: PENDING
      desc: 网卡创建中。
    - value: AVAILABLE
      desc: 可用未绑定实例的。
    - value: ATTACHING
      desc: 绑定实例过程中。
    - value: DETACHING
      desc: 解绑实例过程中。
    - value: DELETING
      desc: 删除中。
    - value: CREATE_FAILED
      desc: 创建失败的。
    - value: USED
      desc: 已经绑定实例的。
  - name: nicType
    type: enum
    description: 网卡类型。
    enum-values:
    - value: Primary
      desc: 主网卡类型。
    - value: Secondary
      desc: 辅助网卡类型。
  - name: regionId
    type: string
    description: 所属节点ID。
  - name: nicSubnetType
    type: enum
    description: 网卡的IP堆栈类型。
    enum-values:
    - value: IPv4
      desc: 仅IPv4。
    - value: IPv4_IPv6
      desc: IPv4和IPv6。
    - value: IPv6
      desc: 仅IPv6。
  - name: publicIpList
    type: string-array
    description: 关联的公网IP。
  - name: privateIpList
    type: string-array
    description: 关联的内网IP。
  - name: primaryIpv4
    type: string
    description: 主的内网IPv4地址。
  - name: primaryIpv6
    type: string
    description: |-
      网卡上的主IPv6地址。
      如果堆栈类型是V4,该值取值为空。
  - name: ipv6Cidr
    type: string
    description: |-
      网卡上的IPv6地址。
      如果堆栈类型是V4,该值取值为空。
  - name: secondaryIpv4s
    type: string-array
    description: 网卡上的辅助 IPv4 地址。
  - name: macAddress
    type: string
    description: 网卡的MAC地址。
  - name: instanceId
    type: string
    description: 所绑定的实例ID。
  - name: vpcId
    type: string
    description: 所关联VPC ID。
  - name: subnetId
    type: string
    description: 所关联的子网ID。
  - name: createTime
    type: string
    description: 网卡的创建时间。
  - name: updateTime
    type: string
    description: 网卡的更新时间。
  - name: resourceGroup
    type: object
    description: 网卡所属的资源组信息。
    object-schema:
    - name: resourceGroupId
      type: string
      description: 资源组ID。
    - name: resourceGroupName
      type: string
      description: 资源组名称。
  - name: securityGroupId
    type: string
    description: 网卡关联的安全组ID。
  - name: tags
    type: object
    description: 该网卡关联的标签。
    object-schema:
    - name: tags
      type: object-array
      description: 标签对列表。
      array-style: json
      item-schema:
      - name: key
        type: string
        description: |-
          标签键。
          长度限制：1～64个字符。
      - name: value
        type: string
        description: |-
          标签值。
          长度限制：1～64个字符。
