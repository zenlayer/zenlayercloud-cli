name: ApplyAutoSnapshotPolicy
product: zec
use: apply-auto-snapshot-policy
short: 自动快照策略添加云盘
long: |-
  云硬盘添加到指定的自动快照策略。
  **注意事项**

  * 如果云盘已经关联该自动快照策略，则重复关联不会报错。如果云盘已经关联自动快照策略，将会报`INVALID_DISK_AUTO_SNAPSHOT_POLICY_EXIST`错误。且本次操作立刻失败。
  * 绑定的云盘如果在自动快照执行时，状态不可用，则不会自动创建快照。
  * 一个云盘只能被一个自动快照策略关联。
examples:
- cmd: zeno zec apply-auto-snapshot-policy --auto-snapshot-policy-id <autoSnapshotPolicyId> --disk-ids <diskId>
  desc: 向自动快照策略添加云盘。
sdk:
  service: zec
  version: '2025-09-01'
  action: ApplyAutoSnapshotPolicy
parameters:
- name: auto-snapshot-policy-id
  type: string
  required: true
  sdk-field: autoSnapshotPolicyId
  description: 自动快照策略ID。
- name: disk-ids
  type: string-array
  required: true
  sdk-field: diskIds
  description: 要添加的磁盘ID列表。
