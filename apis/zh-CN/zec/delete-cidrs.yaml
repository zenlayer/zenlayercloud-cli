name: DeleteCidrs
product: zec
use: delete-cidrs
short: 删除一个或多个IPv4 CIDR地址块
long: |-
  删除一个或多个IPv4 CIDR地址块。
  **注意事项**

  * CIDR 地址段下如果有分配的 EIP，则无法删除该 CIDR 地址段。
  * 普通账号删除CIDR后，该资源会直接回收。操作不可逆。
examples:
- cmd: zeno zec delete-cidrs --cidr-ids cidrId1 --cidr-ids cidrId2
  desc: 批量删除CIDR。
sdk:
  service: zec
  version: '2025-09-01'
  action: DeleteCidrs
parameters:
- name: cidr-ids
  type: string-array
  required: true
  sdk-field: cidrIds
  description: 要删除的cidrId列表。
response:
- name: failedCidrIds
  type: string-array
  description: 操作失败的CIDR ID列表。
