name: RemoveQosPolicyGroupMembers
product: zec
use: remove-qos-policy-group-members
short: 移除QoS策略组成员
long: 从QoS策略组中移除成员。
examples:
- cmd: zeno zec remove-qos-policy-group-members --qos-policy-group-id qos-xxxxxxxx --resource-ids eip-xxxxxxxx --resource-ids ipv6-xxxxxxxx
  desc: 移除QoS策略组中的指定成员。
- cmd: zeno zec remove-qos-policy-group-members --qos-policy-group-id qos-xxxxxxxx
  desc: 移除QoS策略组中的全部成员（不传resourceIds）。
sdk:
  service: zec
  version: '2025-09-01'
  action: RemoveQosPolicyGroupMembers
parameters:
- name: qos-policy-group-id
  type: string
  required: true
  sdk-field: qosPolicyGroupId
  description: QoS策略组ID。
- name: resource-ids
  type: string-array
  required: false
  sdk-field: resourceIds
  description: |-
    要移出策略组的成员资源ID列表。
    不传则移除该策略组的全部成员。
