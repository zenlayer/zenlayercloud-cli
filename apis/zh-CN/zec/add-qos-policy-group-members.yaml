name: AddQosPolicyGroupMembers
product: zec
use: add-qos-policy-group-members
short: 添加QoS策略组成员
long: 向QoS策略组中添加EIP、IPv6或UNMANAGED出口IP。
examples:
- cmd: zeno zec add-qos-policy-group-members --qos-policy-group-id qos-xxxxxxxx --members "{resourceId=eip-xxxxxxxx, ipType=Eip}" --members "{resourceId=ipv6-xxxxxxxx, ipType=Ipv6}"
  desc: 向QoS策略组中添加成员。
sdk:
  service: zec
  version: '2025-09-01'
  action: AddQosPolicyGroupMembers
parameters:
- name: qos-policy-group-id
  type: string
  required: true
  sdk-field: qosPolicyGroupId
  description: QoS策略组ID。
- name: members
  type: object-array
  required: true
  sdk-field: members
  description: 要加入策略组的成员列表。
  array-style: json
  item-schema:
  - name: resourceId
    type: string
    description: IP 资源 的ID。
  - name: ipType
    type: enum
    description: IP类型。
