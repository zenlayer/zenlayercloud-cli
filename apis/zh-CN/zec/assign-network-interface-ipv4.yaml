name: AssignNetworkInterfaceIpv4
product: zec
use: assign-network-interface-ipv4
short: 网卡绑定内网IPv4
long: |-
  网卡绑定内网IPv4。
  **注意事项**

  * 网卡状态需为`AVAILABLE`或`USED`
examples:
- cmd: zeno zec assign-network-interface-ipv4 --nic-id <nicId> --ip-address 10.0.0.3
  desc: 网卡绑定内网IPv4。
sdk:
  service: zec
  version: '2025-09-01'
  action: AssignNetworkInterfaceIpv4
parameters:
- name: nic-id
  type: string
  required: true
  sdk-field: nicId
  description: 需要绑定的网卡ID。
- name: ip-address
  type: string
  required: true
  sdk-field: ipAddress
  description: |-
    绑定的内网IP地址。
    该地址必须属于子网的CIDR内，且未被使用。
