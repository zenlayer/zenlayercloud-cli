name: DescribeByoipRegions
product: zec
use: describe-byoip-regions
short: 查询支持售卖 BYOIP 的区域列表
long: 返回支持售卖 BYOIP 的区域及对应网段、网络类型等信息。
examples:
- cmd: zeno zec describe-byoip-regions
  desc: 查询支持售卖 BYOIP 的区域列表。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeByoipRegions
response:
- name: regions
  type: object-array
  description: 支持售卖 BYOIP 的区域列表。
  array-style: json
  item-schema:
  - name: netmask
    type: integer
    description: 支持的网段。
  - name: regionId
    type: string
    description: 支持售卖的区域。
  - name: network
    type: enum
    description: 支持的网络类型。
    enum-values:
    - value: PremiumBGP
      desc: |-
        优质 BGP。
        高性能网络。
    - value: CN2
      desc: 回国优化线路。
    - value: LocalLine
      desc: 本地IP。
    - value: StandardBGP
      desc: |-
        标准 BGP。
        通用网络，成本优化。
    - value: CMI
      desc: 中国移动。
    - value: CUG
      desc: 中国联通。
    - value: CTG
      desc: 中国电信。
    - value: ThreeLine
      desc: 三线IP。
  - name: ipType
    type: enum
    description: 支持的IP类型。
    enum-values:
    - value: IPv4
      desc: IPv4。
    - value: IPv6
      desc: IPv6。
