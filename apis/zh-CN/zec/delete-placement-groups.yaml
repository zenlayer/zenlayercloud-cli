name: DeletePlacementGroups
product: zec
use: delete-placement-groups
short: 删除置放组
long: |-
  删除一个或多个置放组。删除后置放组内所有实例解除放置策略约束。
  **注意事项**

  * 删除为直接操作，删除后置放组内所有实例解除放置策略约束。
examples:
- cmd: zeno zec delete-placement-groups --placement-group-ids placementgroup-xxxxxxxx --placement-group-ids placementgroup-yyyyyyyy
  desc: 删除一个或多个置放组。
sdk:
  service: zec
  version: '2025-09-01'
  action: DeletePlacementGroups
parameters:
- name: placement-group-ids
  type: string-array
  required: true
  sdk-field: placementGroupIds
  description: 要删除的置放组ID列表。
