name: DescribeBorderGateways
product: zec
use: describe-border-gateways
short: 查询边界网关列表。
long: 查询边界网关列表。
examples:
- cmd: zeno zec describe-border-gateways --region-id xxx --page-size 10 --page-num 1
  desc: 查询网关列表。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeBorderGateways
parameters:
- name: zbg-ids
  type: string-array
  required: false
  sdk-field: zbgIds
  description: 根据边界网关ID列表过滤。
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    根据网关名称过滤。
    支持模糊搜索。
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: 根据边界网关所在的节点过滤。
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: 根据边界网关所属的VPC ID过滤。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
