name: DescribeBorderGateways
product: zec
use: describe-border-gateways
short: 查询边界网关列表
long: 查询边界网关列表。
examples:
- cmd: zeno zec describe-border-gateways --region-id xxx --page-size 10 --page-num 1
  desc: 查询网关列表。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeBorderGateways
parameters:
- name: zbg-ids
  type: string-array
  required: false
  sdk-field: zbgIds
  description: 根据边界网关ID列表过滤。
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    根据网关名称过滤。
    支持模糊搜索。
- name: region-id
  type: string
  required: false
  sdk-field: regionId
  description: 根据边界网关所在的节点过滤。
- name: vpc-id
  type: string
  required: false
  sdk-field: vpcId
  description: 根据边界网关所属的VPC ID过滤。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 边界网关的列表数据。
  array-style: json
  item-schema:
  - name: zbgId
    type: string
    description: 边界网关ID。
  - name: name
    type: string
    description: 边界网关名称。
  - name: vpcId
    type: string
    description: VPC的ID。
  - name: regionId
    type: string
    description: 节点的ID。
  - name: asn
    type: integer
    description: ASN号。
  - name: interConnectCidr
    type: string
    description: 互联IP地址段。
  - name: createTime
    type: string
    description: 创建时间。
  - name: cloudRouterIds
    type: string-array
    description: 关联的三层网络ID集合。
  - name: routingMode
    type: enum
    description: 路由模式。
    enum-values:
    - value: Regional
      desc: 节点级别路由。
    - value: Global
      desc: 全节点级别路由。
  - name: natId
    type: string
    description: NAT的ID。
  - name: advertisedSubnet
    type: enum
    description: 子网控制。
    enum-values:
    - value: ALL
      desc: 全部宣告。
    - value: NONE
      desc: 不宣告。
    - value: PART
      desc: 部分宣告。
  - name: advertisedSubnetIds
    type: string-array
    description: 子网ID集合。
  - name: advertisedCidrs
    type: string-array
    description: IPv4 Cidr集合。
  - name: advertisedRouteIds
    type: string-array
    description: 自定义路由集合。
