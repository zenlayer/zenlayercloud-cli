name: DescribeVpcs
product: zec
use: describe-vpcs
short: 查询VPC列表
long: 查询私有网络（VPC）列表，用户可以根据 VPC ID、VPC 名称等信息来筛选过滤VPC信息。
examples:
- cmd: zeno zec describe-vpcs --cidr-block 10.0.0.0/24 --page-size 10 --page-num 1
  desc: 查询CidrBlock为`10.0.0.0/24`的VPC列表
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeVpcs
parameters:
- name: vpc-ids
  type: string-array
  required: false
  sdk-field: vpcIds
  description: |-
    VPC的ID列表。
    最多可传100个ID。
- name: name
  type: string
  required: false
  sdk-field: name
  description: |-
    根据VPC名称过滤。
    支持模糊查询。
- name: cidr-block
  type: string
  required: false
  sdk-field: cidrBlock
  description: |-
    根据VPC的IPv4 CIDR过滤。
    支持模糊查询。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 返回的分页大小。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 根据资源组ID过滤。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签键进行搜索。
    最长不得超过20个标签键。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
response:
- name: totalCount
  type: integer
  description: 匹配筛选条件的vpc总数量。
- name: dataSet
  type: object-array
  description: 返回分页的vpc集合数据。
  array-style: json
  item-schema:
  - name: vpcId
    type: string
    description: VPC的ID。
  - name: name
    type: string
    description: VPC的名称。
  - name: cidrBlock
    type: string
    description: VPC的IPv4 CIDR。
  - name: ipv6CidrBlock
    type: string
    description: |-
      VPC的内网IPv6 CIDR。
      如果为null,说明未开启IPv6。
  - name: mtu
    type: integer
    description: VPC的MTU（最大传输单元），单位字节。
  - name: isDefault
    type: boolean
    description: 是否为默认VPC。
  - name: createTime
    type: string
    description: 创建时间。
  - name: usageIpv4Count
    type: integer
    description: VPC内已分配的IPv4地址数量。
  - name: usageIpv6Count
    type: integer
    description: VPC内已分配的IPv6地址数量。
  - name: securityGroupId
    type: string
    description: 关联的安全组ID。
  - name: dnsZoneIds
    type: string-array
    description: VPC关联的DNS内网权威域名ID。
  - name: resourceGroup
    type: object
    description: VPC关联的资源组信息。
    object-schema:
    - name: resourceGroupId
      type: string
      description: 资源组ID。
    - name: resourceGroupName
      type: string
      description: 资源组名称。
  - name: tags
    type: object
    description: 该VPC关联的标签。
    object-schema:
    - name: tags
      type: object-array
      description: 标签对列表。
      array-style: json
      item-schema:
      - name: key
        type: string
        description: |-
          标签键。
          长度限制：1～64个字符。
      - name: value
        type: string
        description: |-
          标签值。
          长度限制：1～64个字符。
