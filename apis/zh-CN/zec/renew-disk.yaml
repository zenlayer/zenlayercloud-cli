name: RenewDisk
product: zec
use: renew-disk
short: 恢复云硬盘
long: |-
  恢复处于回收状态的云硬盘，使其重新可用。仅可恢复保留期内的已删除云硬盘，超出保留期后资源将被彻底销毁。
  **注意事项**

  * 系统盘不支持该操作，系统盘随实例一起恢复。
  * 如果账户余额不足，则恢复将会失败。
examples:
- cmd: zeno zec renew-disk --disk-id your-disk-id
  desc: 用户恢复云硬盘。
sdk:
  service: zec
  version: '2025-09-01'
  action: RenewDisk
parameters:
- name: disk-id
  type: string
  required: true
  sdk-field: diskId
  description: 要恢复的云硬盘ID。
