name: DescribeSecurityGroupRule
product: zec
use: describe-security-group-rule
short: 查询安全组规则
long: 查询指定安全组内的规则。
examples:
- cmd: zeno zec describe-security-group-rule --security-group-id 791721259766392536
  desc: 查询安全组下的所有规则。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeSecurityGroupRule
parameters:
- name: security-group-id
  type: string
  required: true
  sdk-field: securityGroupId
  description: 安全组ID。
response:
- name: ingressRuleList
  type: object-array
  description: 入方向规则列表。
  array-style: json
  item-schema:
  - name: direction
    type: string
    description: |-
      规则方向。
      ingress: 入方向。
      egress：出方向。
  - name: policy
    type: string
    description: |-
      设置访问权限。
      accept：接受访问。
      deny: 拒绝访问。
  - name: priority
    type: integer
    description: 规则优先级。
  - name: ipProtocol
    type: string
    description: |-
      传输层协议。
      取值大小写敏感, 取值范围：<br/>tcp：TCP协议。
      udp：UDP协议。
      icmp：ICMP协议。
      all：支持所有协议。
  - name: portRange
    type: string
    description: |-
      目的端安全组开放的传输层协议相关的端口范围。
      取值范围：<br/> TCP/UDP协议：取值范围为1~65535。
      ICMP协议：-1。
      all：-1。
  - name: cidrIp
    type: string
    description: |-
      源端IP地址范围。
      支持CIDR格式和IPv4格式的IP地址范围。
      默认值：0.0.XX.XX/0。
  - name: desc
    type: string
    description: 备注,长度在255个以内。
- name: egressRuleList
  type: object-array
  description: 出方向规则列表。
  array-style: json
  item-schema:
  - name: direction
    type: string
    description: |-
      规则方向。
      ingress: 入方向。
      egress：出方向。
  - name: policy
    type: string
    description: |-
      设置访问权限。
      accept：接受访问。
      deny: 拒绝访问。
  - name: priority
    type: integer
    description: 规则优先级。
  - name: ipProtocol
    type: string
    description: |-
      传输层协议。
      取值大小写敏感, 取值范围：<br/>tcp：TCP协议。
      udp：UDP协议。
      icmp：ICMP协议。
      all：支持所有协议。
  - name: portRange
    type: string
    description: |-
      目的端安全组开放的传输层协议相关的端口范围。
      取值范围：<br/> TCP/UDP协议：取值范围为1~65535。
      ICMP协议：-1。
      all：-1。
  - name: cidrIp
    type: string
    description: |-
      源端IP地址范围。
      支持CIDR格式和IPv4格式的IP地址范围。
      默认值：0.0.XX.XX/0。
  - name: desc
    type: string
    description: 备注,长度在255个以内。
