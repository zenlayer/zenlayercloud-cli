- name: bandwidthPrices
  type: object-array
  description: |-
    各流量方向的带宽价格明细。
    PathBasedBandwidthIP线路返回多项；其他线路返回单项（trafficType=ALL）。
  array-style: json
  item-schema:
  - name: trafficType
    type: string
    description: |-
      流量方向类型。
      LOCAL：境内；INTERNATIONAL：境外；ALL：全部方向。
  - name: price
    type: object
    description: 该方向的带宽价格。
- name: remoteBandwidthPrice
  type: object
  description: |-
    Remote IPT的带宽价格。
    EIP未开启Remote IPT时为null。
  object-schema:
