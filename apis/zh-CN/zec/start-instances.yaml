name: StartInstances
product: zec
use: start-instances
short: 启动虚拟机实例
long: 启动一台或多台虚拟机实例。
examples:
- cmd: zeno zec start-instances --instance-ids instanceId1 --instance-ids instanceId2
  desc: 启动实例。
sdk:
  service: zec
  version: '2025-09-01'
  action: StartInstances
parameters:
- name: instance-ids
  type: string-array
  required: true
  sdk-field: instanceIds
  description: 要启动的实例ID。
