name: ModifyDisksAttributes
product: zec
use: modify-disks-attributes
short: 修改云硬盘属性
long: 修改一块或多块云硬盘属性。当前接口只支持修改名称。
examples:
- cmd: zeno zec modify-disks-attributes --disk-ids your-disk-id --disk-name newDiskName
  desc: 修改一个或多个云硬盘属性。
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifyDisksAttributes
parameters:
- name: disk-ids
  type: string-array
  required: true
  sdk-field: diskIds
  description: 需要修改的云盘ID列表。
- name: disk-name
  type: string
  required: true
  sdk-field: diskName
  description: |-
    云盘名称。
    范围1到64个字符。
    仅支持输入字母、数字、-/_和英文句点(.)。
    且必须以数字或字母开头和结尾。
