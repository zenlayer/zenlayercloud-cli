name: ModifyRouteAttribute
product: zec
use: modify-route-attribute
short: 修改路由属性
long: 修改路由的基本信息，目前只允许修改路由的名称。
examples:
- cmd: zeno zec modify-route-attribute --route-id <routeId> --name Test
  desc: 修改路由的名称。
sdk:
  service: zec
  version: '2025-09-01'
  action: ModifyRouteAttribute
parameters:
- name: route-id
  type: string
  required: true
  sdk-field: routeId
  description: 路由ID。
- name: name
  type: string
  required: true
  sdk-field: name
  description: |-
    路由名称。
    名称长度为 2 到 63 个字符，仅支持字母、数字、连字符 (-) 、下划线(_) 、斜杠(/) 、和句点 (.)，且开头和结尾必须是字母或数字。
