name: CreateNatGateway
product: zec
use: create-nat-gateway
short: 创建NAT网关
long: |-
  创建NAT网关。
  **注意事项**

  * 本接口为异步接口，接口成功返回后，可使用 [DescribeNatGateways](describenatgateways.md) 接口查询NAT网关的状态。其中状态为`RUNNING`则代表创建成功。
  * 只支持后付费NAT网关创建。
examples:
- cmd: zeno zec create-nat-gateway --region-id asia-east-1 --vpc-id <vpcId> --name name --subnet-ids <subnet> --subnet-ids <subnet> --resource-group-id <resourceGroupId>
  desc: 创建一个NAT网关。
sdk:
  service: zec
  version: '2025-09-01'
  action: CreateNatGateway
parameters:
- name: region-id
  type: string
  required: true
  sdk-field: regionId
  description: 区域节点ID。
- name: vpc-id
  type: string
  required: true
  sdk-field: vpcId
  description: NAT网关所属的VPC网络ID。
- name: name
  type: string
  required: true
  sdk-field: name
  description: |-
    NAT网关的名称。
    长度为2～63个字符。
- name: subnet-ids
  type: string-array
  required: false
  sdk-field: subnetIds
  description: |-
    NAT网关所属的Subnet子网ID集合。
    如果未指定，则指定区域的所有子网将自动关联NAT网关。
- name: security-group-id
  type: string
  required: false
  sdk-field: securityGroupId
  description: |-
    安全组ID。
    如果未指定，则指定VPC所属的安全组ID。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: |-
    资源组ID。
    如果不指定，则会创建在默认资源组。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  sdk-wrapper: tags
  description: |-
    创建NAT网关时关联的标签。
    注意：·关联标签键不能重复。--tags 'key=env,value=prod'
  array-style: kv
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
