name: AttachDisks
product: zec
use: attach-disks
short: 批量挂载云硬盘
long: |-
  云硬盘挂载到实例上。
  **注意事项**

  * 单次最多可挂载10块云硬盘。
  * 挂载云硬盘的数量不能超过实例可用的最大数量，具体数量详见配额。
  * 实例与云硬盘的所在区域必须一致。
  * 实例必须处于可用状态（创建中、初始化中等状态均不属于可用状态）。
  * 云硬盘必须处于未挂载状态（`AVAILABLE`)。
examples:
- cmd: zeno zec attach-disks --disk-ids your-disk-id --instance-id your-instance-id
  desc: 挂载云硬盘到云主机实例。P
sdk:
  service: zec
  version: '2025-09-01'
  action: AttachDisks
parameters:
- name: disk-ids
  type: string-array
  required: true
  sdk-field: diskIds
  description: 需要挂载的云硬盘ID列表。
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 被挂载的实例ID。
