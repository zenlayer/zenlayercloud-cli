name: AttachDisks
product: zec
use: attach-disks
short: 批量挂载云硬盘
long: 云硬盘挂载到实例上。
examples:
- cmd: zeno zec attach-disks --disk-ids your-disk-id --instance-id your-instance-id
  desc: 挂载云硬盘到云主机实例。P
sdk:
  service: zec
  version: '2025-09-01'
  action: AttachDisks
parameters:
- name: disk-ids
  type: string-array
  required: true
  sdk-field: diskIds
  description: 需要挂载的云硬盘ID列表。
- name: instance-id
  type: string
  required: true
  sdk-field: instanceId
  description: 被挂载的实例ID。
