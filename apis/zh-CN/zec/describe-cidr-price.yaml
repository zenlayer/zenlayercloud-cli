name: DescribeCidrPrice
product: zec
use: describe-cidr-price
short: 查询IPv4 CIDR地址块售卖价格
long: 查询IPv4 CIDR地址块售卖价格。
examples:
- cmd: zeno zec describe-cidr-price --region-id asia-east-1 --network-line-type PremiumBGP
  desc: 查询2个`/28`的BGP线路的CIDR的总价格。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeCidrPrice
parameters:
- name: region-id
  type: string
  required: true
  sdk-field: regionId
  description: 查询CIDR所在的节点ID。
- name: eip-v4-type
  type: enum
  required: false
  sdk-field: eipV4Type
  description: |-
    查询CIDR的IP线路类型。
    已废弃，请使用networkLineType。
  deprecated: true
  enum-values:
  - value: BGPLine
    desc: BGP 线路。
  - value: CN2Line
    desc: CN2 回国优化线路。
  - value: LocalLine
    desc: 本地IP。
  - value: ChinaMobile
    desc: 中国移动线路。
  - value: ChinaUnicom
    desc: 中国联通线路。
  - value: ChinaTelecom
    desc: 中国电信线路。
  - value: Cogent
    desc: Cogent。
  - value: ThreeLine
    desc: 三线IP。
- name: network-line-type
  type: enum
  required: false
  sdk-field: networkLineType
  description: 查询CIDR的IP线路类型。
  enum-values:
  - value: PremiumBGP
    desc: |-
      优质 BGP。
      高性能网络。
  - value: CN2
    desc: 回国优化线路。
  - value: LocalLine
    desc: 本地IP。
  - value: StandardBGP
    desc: |-
      标准 BGP。
      通用网络，成本优化。
  - value: CMI
    desc: 中国移动。
  - value: CUG
    desc: 中国联通。
  - value: CTG
    desc: 中国电信。
  - value: ThreeLine
    desc: 三线IP。
- name: netmask
  type: object
  required: true
  sdk-field: netmask
  description: 需要查询的CIDR子网数量和掩码信息。
  object-schema:
  - name: netmask
    type: integer
    description: 掩码大小。
  - name: amount
    type: integer
    description: CIDR的数量。
response:
- name: cidrPrice
  type: object
  description: CIDR的价格信息。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：<br/>HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
