name: DescribeByoipPrice
product: zec
use: describe-byoip-price
short: BYOIP 询价
long: 根据宣告 IP 段、区域、线路类型等查询 BYOIP 价格。
examples:
- cmd: zeno zec describe-byoip-price --byoip-list "{cidrBlock=192.0.2.0/24, networkType=PremiumBGP, regionId=asia-east-1}"
  desc: BYOIP 询价。
sdk:
  service: zec
  version: '2025-09-01'
  action: DescribeByoipPrice
parameters:
- name: byoip-list
  type: object-array
  required: true
  sdk-field: byoipList
  description: 待询价的 BYOIP 列表。
  array-style: json
  item-schema:
  - name: cidrBlock
    type: string
    description: 宣告ip段。
  - name: networkType
    type: enum
    description: 线路类型。
    enum-values:
    - value: PremiumBGP
      desc: |-
        优质 BGP。
        高性能网络。
    - value: CN2
      desc: 回国优化线路。
    - value: LocalLine
      desc: 本地IP。
    - value: StandardBGP
      desc: |-
        标准 BGP。
        通用网络，成本优化。
    - value: CMI
      desc: 中国移动。
    - value: CUG
      desc: 中国联通。
    - value: CTG
      desc: 中国电信。
    - value: ThreeLine
      desc: 三线IP。
  - name: regionId
    type: string
    description: 区域id。
response:
- name: byoipPrices
  type: object-array
  required: true
  description: BYOIP 价格列表。
  array-style: json
  item-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：<br/>HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
