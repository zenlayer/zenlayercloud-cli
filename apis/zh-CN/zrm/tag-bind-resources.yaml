name: TagBindResources
product: zrm
use: tag-bind-resources
short: 标签批量绑定资源
long: 标签批量绑定资源。
examples:
- cmd: zeno zrm tag-bind-resources --resource-uuids resourceUuids_19b06df9eaac
  desc: 绑定一个资源到标签下
sdk:
  service: zrm
  version: '2025-10-14'
  action: TagBindResources
parameters:
- name: tag
  type: object
  required: true
  sdk-field: tag
  description: 标签，包含标签键和值。
  object-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～64个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～64个字符。
- name: resource-uuids
  type: string-array
  required: true
  sdk-field: resourceUuids
  description: 需要绑定的资源唯一标识列表。
