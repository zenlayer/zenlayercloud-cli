name: DescribeKeyPairs
product: ccs
use: describe-key-pairs
short: 查询密钥对列表
long: 查询账户下的 SSH 密钥对信息，支持按密钥对 ID 或名称筛选，支持分页查询。
examples:
- cmd: zeno ccs describe-key-pairs
  desc: 获取密钥对列表。
sdk:
  service: ccs
  version: '2025-09-01'
  action: DescribeKeyPairs
parameters:
- name: key-ids
  type: string-array
  required: false
  sdk-field: keyIds
  description: 根据密钥对ID列表进行筛选。
- name: key-name
  type: string
  required: false
  sdk-field: keyName
  description: |-
    根据密钥对名称进行筛选。
    该字段支持模糊搜索。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 返回的分页数。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: 密钥对结果集。
  array-style: json
  item-schema:
  - name: keyId
    type: string
    description: |-
      密钥对ID。
      示例值：key-xxxxxxxx。
  - name: keyName
    type: string
    description: 密钥对名称。
  - name: publicKey
    type: string
    description: |-
      密钥对的公钥内容。
      OpenSSH 格式。
      示例值：ssh-rsa XXXXXXXXXXXX key_xxx。
  - name: keyDescription
    type: string
    description: 密钥对描述信息。
  - name: createTime
    type: string
    description: |-
      创建时间。
      格式为：YYYY-MM-ddTHH:mm:ssZ。
