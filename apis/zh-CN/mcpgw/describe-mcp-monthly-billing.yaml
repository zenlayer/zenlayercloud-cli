name: DescribeMcpMonthlyBilling
product: mcpgw
use: describe-mcp-monthly-billing
short: 查询MCP网关按月计费明细
long: |-
  查询MCP网关按月计费明细
  **注意事项**

  * 本接口认证方式请参考[认证方式](../../../api-introduction/instruction/authorization/README.md)
examples:
- cmd: zeno mcpgw describe-mcp-monthly-billing --month 2026-05
  desc: 查询MCP网关按月计费明细。
sdk:
  service: mcpgw
  version: '2026-06-02'
  action: DescribeMcpMonthlyBilling
parameters:
- name: month
  type: string
  required: true
  sdk-field: month
  description: 月份，格式："2026-05"。
response:
- name: items
  type: object-array
  description: 按Token+日期维度的计费明细。
  array-style: json
  item-schema:
  - name: gatewayUuid
    type: string
    description: MCP网关uuid。
  - name: gatewayName
    type: string
    description: MCP网关名称。
  - name: date
    type: string
    description: 用量日期，格式 yyyy-MM-dd。
  - name: unit
    type: string
    description: 计量单位。
  - name: usage
    type: string
    description: 用量（字符串，保留精度）。
  - name: modelName
    type: string
    description: 模型名称。
  - name: unitPrice
    type: string
    description: 单价（字符串，保留精度）。
  - name: originalPrice
    type: string
    description: 原价（字符串，保留精度）。
- name: totalUsage
  type: string
  description: 当月用量合计（字符串，保留精度）。
