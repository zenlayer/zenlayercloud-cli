name: DescribeMembers
product: user
use: describe-members
short: 查询成员列表
long: 查询成员列表。用户可以根据名称、邮箱等信息来搜索成员信息。
examples:
- cmd: zeno user describe-members --name name --username username --member-group-name memberGroupName --member-group-uid memberGroupUid --page-num 1 --page-size 1
  desc: 查询成员组列表。用户可以根据名称信息来搜索成员组信息。
sdk:
  service: user
  version: '2024-05-29'
  action: DescribeMembers
parameters:
- name: name
  type: string
  required: false
  sdk-field: name
  description: 成员名称。
- name: username
  type: string
  required: false
  sdk-field: username
  description: 成员邮箱。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: 分页数。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: 分页大小。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  required: true
  description: 成员列表信息。
  array-style: json
  item-schema:
  - name: memberId
    type: string
    description: 成员列表唯一ID。
  - name: userUid
    type: string
    description: 用户唯一ID。
  - name: firstName
    type: string
    description: 用户名称。
  - name: lastName
    type: string
    description: 用户姓氏。
  - name: username
    type: string
    description: 用户邮箱。
  - name: assignmentStatus
    type: string
    description: |-
      用户邀请状态。
      ACTIVE：已加入,PENDING: 待确认
  - name: updateTime
    type: string
    description: 更新时间。
  - name: createTime
    type: string
    description: 加入时间。
