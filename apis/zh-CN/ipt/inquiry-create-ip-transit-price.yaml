name: InquiryCreateIPTransitPrice
product: ipt
use: inquiry-create-ip-transit-price
short: 创建一条IP Transit 的询价
long: 创建一条IP Transit 的询价。
examples:
- cmd: zeno ipt inquiry-create-ip-transit-price --ipt-description test_ipt_desc --peer-port-id your-port-id --internet-type ByBandwidth --bandwidth 50 --ipt-dc-id AMS1 --routing-type Static --public-ipv4-block-size 25
  desc: 查询创建一条IP Transit，公网地址使用/25的CIDR。带宽限速为50Mbps, 计费方式为固定带宽。
sdk:
  service: ipt
  version: '2024-09-01'
  action: InquiryCreateIPTransitPrice
parameters:
- name: peer-port-id
  type: string
  required: true
  sdk-field: peerPortId
  description: 端口的ID。
- name: ipt-dc-id
  type: string
  required: false
  sdk-field: iptDcId
  description: |-
    IP Transit 目的地数据中心ID。
    如果不指定，则代表和端口位于同一个数据中心。
- name: internet-type
  type: enum
  required: false
  sdk-field: internetType
  description: IP Transit的带宽计费方式。
  enum-values:
  - value: ByBandwidth
    desc: 按固定带宽计费。
  - value: ByInstanceBandwidth95
    desc: 实例95计费。
- name: commit-bandwidth
  type: integer
  required: false
  sdk-field: commitBandwidth
  description: |-
    保底带宽。
    单位Mbps。
    有且仅当internetType=ByInstanceBandwidth95时该字段必传。
- name: bandwidth
  type: integer
  required: false
  sdk-field: bandwidth
  description: |-
    带宽限速。
    单位Mbps。
    最小值不能低于10Mbps。
- name: routing-type
  type: enum
  required: true
  sdk-field: routingType
  description: 路由类型。
  enum-values:
  - value: BGP
    desc: BGP。（目前api暂不支持该方式）
  - value: Static
    desc: 静态路由。
  - value: Gateway
    desc: 网关模式。
- name: public-ipv4-block-size
  type: integer-array
  required: false
  sdk-field: publicIPv4BlockSize
  description: |-
    公网IPv4地址。
    网段范围：24～30
    有且仅当路由类型是Static 或 Gateway时必须指定。
    目前只允许指定一个公网CIDR。
- name: bgp-route-type
  type: enum
  required: false
  sdk-field: bgpRouteType
  description: BGP入站路由类型。
  enum-values:
  - value: ALL_ROUTES
    desc: 全路由。
  - value: ALL_ROUTES_WITH_DEFAULT_ROUTES
    desc: 全路由+默认路由。
  - value: DEFAULT_ROUTES
    desc: 默认路由。
response:
- name: privateConnectPrice
  type: object
  description: |-
    IP Transit 的 专线价格。
    如果IP Transit 和端口位于同一个数据中心，则取值为null。
  object-schema:
  - name: discount
    type: float
    description: |-
      折扣大小。
      如80.0代表8折。
  - name: discountPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: originalPrice
    type: float
    description: |-
      预付费的原价。
      预付费模式使用，后付费该值为 null。
  - name: unitPrice
    type: float
    description: |-
      后付费的单元原始价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: discountUnitPrice
    type: float
    description: |-
      后付费的单元折后价格。
      后付费模式使用，如果价格为阶梯价格，该项为null。
  - name: chargeUnit
    type: string
    description: |-
      后付费计价单元。
      后付费模式使用，可取值范围：<br/>HOUR: 表示计价单元是按每小时来计算。
      DAY: 表示计价单元是按天来计算。
      MONTH: 表示计价单元是按月来计算，95计费则是这种。
  - name: stepPrices
    type: object-array
    description: |-
      后付费阶梯价格。
      后付费模式使用，如果非阶梯价格，该项为null。
    array-style: json
    item-schema:
    - name: stepStart
      type: float
      description: 阶梯用量的开始。
    - name: stepEnd
      type: float
      description: 阶梯用量的结束。
    - name: unitPrice
      type: float
      description: |-
        当前阶梯的单元原始价格。
        后付费模式使用。
    - name: discountUnitPrice
      type: float
      description: |-
        当前阶梯的单元折后价格。
        后付费模式使用。
  - name: amountUnit
    type: string
    description: |-
      用量单位。
      比如Mbps, LCU等。
      如果为null, 代表取不到值。
  - name: excessUnitPrice
    type: float
    description: 超量原始价格。
  - name: excessDiscountUnitPrice
    type: float
    description: 超量折扣后价格。
  - name: excessAmountUnit
    type: string
    description: |-
      超量用量单位。
      如果为null, 代表取不到值。
  - name: category
    type: enum
    description: 价格所属类别。
    enum-values:
    - value: STANDARD
      desc: 标准价格。
    - value: CUSTOMIZED
      desc: 一口价格。
- name: iptBandwidthPrice
