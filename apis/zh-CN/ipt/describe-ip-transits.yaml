name: DescribeIPTransits
product: ipt
use: describe-ip-transits
short: 本接口用于查询IP Transit资源列表
long: 本接口用于查询IP Transit资源列表。
sdk:
  service: ipt
  version: '2024-09-01'
  action: DescribeIPTransits
parameters:
- name: ipt-ids
  type: string-array
  required: false
  sdk-field: iptIds
  description: |-
    IP Transit ID列表。
    最大支持长度为100。
- name: ipt-name
  type: string
  required: false
  sdk-field: iptName
  description: |-
    IPT 名称。
    支持模糊搜索。
- name: resource-group-id
  type: string
  required: false
  sdk-field: resourceGroupId
  description: 资源组ID。
- name: peer-port-id
  type: string
  required: false
  sdk-field: peerPortId
  description: |-
    端口ID。
    通过该字段可以筛选与指定端口有关的IP Transit。
- name: ipt-dc-id
  type: string
  required: false
  sdk-field: iptDcId
  description: |-
    数据中心ID。
    具体取值可通过调用接口DescribeDataCenters来获得最新的数据中心列表。
- name: page-size
  type: integer
  required: false
  sdk-field: pageSize
  description: |-
    返回的分页大小。
    默认为20，最大为1000。
- name: page-num
  type: integer
  required: false
  sdk-field: pageNum
  description: |-
    返回的分页数。
    默认为1。
- name: tag-keys
  type: string-array
  required: false
  sdk-field: tagKeys
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
- name: tags
  type: object-array
  required: false
  sdk-field: tags
  description: |-
    根据标签进行搜索。
    最长不得超过20个标签。
  array-style: json
  item-schema:
  - name: key
    type: string
    description: |-
      标签键。
      长度限制：1～128个字符。
  - name: value
    type: string
    description: |-
      标签值。
      长度限制：1～128个字符。
response:
- name: totalCount
  type: integer
  description: 符合条件的数据总数。
- name: dataSet
  type: object-array
  description: IP Transit列表结果集。
  array-style: json
  item-schema:
  - name: iptId
    type: string
    description: IP Transit ID。
  - name: iptName
    type: string
    description: IP Transit 名称。
  - name: iptDescription
    type: string
    description: IP Transit 描述信息。
  - name: dataCenter
    type: object
    description: IP Transit 对应的数据中心。
    object-schema:
    - name: dcId
      type: string
      description: 数据中心ID。
    - name: dcName
      type: string
      description: 数据中心名称。
    - name: dcAddress
      type: string
      description: 数据中心地址。
    - name: cityName
      type: string
      description: 城市名称。
    - name: countryName
      type: string
      description: 国家名称。
    - name: areaName
      type: string
      description: 地区名称。
    - name: latitude
      type: float
      description: 数据中心所在地理位置的维度。
    - name: longitude
      type: float
      description: 数据中心所在地理位置的经度。
  - name: peerPortId
    type: string
    description: 连接的端口ID。
  - name: peerPortName
    type: string
    description: 连接的端口名称。
  - name: peerDataCenter
    type: object
    description: 端口侧所属数据中心。
    object-schema:
    - name: dcId
      type: string
      description: 数据中心ID。
    - name: dcName
      type: string
      description: 数据中心名称。
    - name: dcAddress
      type: string
      description: 数据中心地址。
    - name: cityName
      type: string
      description: 城市名称。
    - name: countryName
      type: string
      description: 国家名称。
    - name: areaName
      type: string
      description: 地区名称。
    - name: latitude
      type: float
      description: 数据中心所在地理位置的维度。
    - name: longitude
      type: float
      description: 数据中心所在地理位置的经度。
  - name: deliveryType
    type: enum
    description: 交付类型。
    enum-values:
    - value: Auto
      desc: 自动化交付（一般在分钟内完成）。
    - value: Manual
      desc: 手动交付（一般在3天内交付完成）。
  - name: resourceGroupId
    type: string
    description: IP Transit 所属资源组ID。
  - name: resourceGroupName
    type: string
    description: IP Transit 所属资源组名称。
  - name: createTime
    type: string
    description: |-
      创建时间。
      格式为：YYYY-MM-ddTHH:mm:ssZ。
  - name: routingType
    type: enum
    description: 路由类型。
    enum-values:
    - value: BGP
      desc: BGP。（目前api暂不支持该方式）
    - value: Static
      desc: 静态路由。
    - value: Gateway
      desc: 网关模式。
  - name: internetType
    type: enum
    description: 带宽计费方式。
    enum-values:
    - value: ByBandwidth
      desc: 按固定带宽计费。
    - value: ByInstanceBandwidth95
      desc: 实例95计费。
  - name: bandwidth
    type: integer
    description: |-
      带宽限速。
      单位Mbps。
  - name: commitBandwidth
    type: integer
    description: |-
      承诺保底带宽。
      仅当带宽计费方式为ByInstanceBandwidth95 可取到值。
  - name: bfd
    type: object
    description: BFD 配置。
    object-schema:
    - name: bfdTxInterval
      type: integer
      description: |-
        发送间隔。
        单位：ms。
        取值范围：100～60000。
    - name: bfdRxInterval
      type: integer
      description: |-
        接收间隔。
        单位：ms
        取值范围：100～60000。
    - name: bfdMultiplier
      type: integer
      description: |-
        本地检测倍数。
        取值范围：3～20。
  - name: bgp
    type: object
    description: BGP相关配置。
    object-schema:
    - name: routeType
      type: enum
      description: 入站路由类型。
      enum-values:
      - value: ALL_ROUTES
        desc: 全路由。
      - value: ALL_ROUTES_WITH_DEFAULT_ROUTES
        desc: 全路由+默认路由。
      - value: DEFAULT_ROUTES
        desc: 默认路由。
    - name: asn
      type: integer
      description: 宣告出站路由的ASN号。
    - name: password
      type: string
      description: 加密认证秘钥。
    - name: asnList
      type: integer-array
      description: 宣告出站路由的ASN号列表。
    - name: asSetList
      type: string-array
      description: 宣告出站路由的AS-SET列表。
  - name: interconnect
    type: object
    description: 互联IP地址信息。
    object-schema:
    - name: vendorIpv4Address
      type: string
      description: 运营商侧的IPv4地址。
    - name: customerIpv4Address
      type: string
      description: 用户侧的IPv4地址。
  - name: privateConnectId
    type: string
    description: IP Transit 互联的专线ID。
  - name: privateConnectName
    type: string
    description: IP Transit 互联的专线名称。
  - name: publicIpv4Addresses
    type: object-array
    description: 公网IP信息。
    array-style: json
    item-schema:
    - name: ipAddress
      type: string
      description: IP地址。
    - name: netmask
      type: integer
      description: 掩码。
    - name: gatewayIpAddress
      type: string
      description: 网关IP地址。
  - name: iptStatus
    type: enum
    description: IP Transit 的业务状态。
    enum-values:
    - value: CREATING
      desc: 创建中。
    - value: UPDATING
      desc: 更新中。
    - value: DELETING
      desc: 终止中。
    - value: DESTROYING
      desc: 销毁中。
    - value: RECOVERING
      desc: 恢复中。
    - value: RUNNING
      desc: 正常运行中。
    - value: RECYCLED
      desc: 已入回收站。
    - value: DESTROYED
      desc: 已销毁。
    - value: CREATING_FAILED
      desc: 创建失败。
    - value: UPDATING_FAILED
      desc: 更新失败。
    - value: DELETING_FAILED
      desc: 终止失败。
    - value: DESTROYING_FAILED
      desc: 销毁失败。
    - value: RECOVERING_FAILED
      desc: 恢复失败。
  - name: tags
    type: object
    description: 该IP Transit关联的标签。
    object-schema:
    - name: tags
      type: object-array
      description: 标签对列表。
      array-style: json
      item-schema:
      - name: key
        type: string
        description: |-
          标签键。
          长度限制：1～128个字符。
      - name: value
        type: string
        description: |-
          标签值。
          长度限制：1～128个字符。
