name: DescribeIPTransitTraffic
product: ipt
use: describe-ip-transit-traffic
short: 查询IP Transit在指定时间段内的带宽数据
long: |-
  查询IP Transit在指定时间段内的带宽数据。
  **注意事项**

  * 只能查询30天内的流量数据。
examples:
- cmd: zeno ipt describe-ip-transit-traffic --ipt-id your-ipt-id --start-time 2024-01-01T00:00:00Z --end-time 2024-01-01T23:59:59Z
  desc: 查询IP Transit一天内的流量数据。
sdk:
  service: ipt
  version: '2024-09-01'
  action: DescribeIPTransitTraffic
parameters:
- name: ipt-id
  type: string
  required: true
  sdk-field: iptId
  description: IP Transit ID。
- name: start-time
  type: string
  required: true
  sdk-field: startTime
  description: |-
    查询开始时间。
    按照ISO8601标准表示，并且使用UTC时间。格式为：YYYY-MM-ddTHH:mm:ssZ。
- name: end-time
  type: string
  required: false
  sdk-field: endTime
  description: |-
    查询结束时间。
    按照ISO8601标准表示，并且使用UTC时间。格式为：YYYY-MM-ddTHH:mm:ssZ。
    默认为当前时间。
